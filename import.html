<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データ一括登録 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --sidebar-bg: #1a1a1a; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .form-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .tab-btn { transition: all 0.3s; border-bottom: 4px solid transparent; opacity: 0.4; padding-bottom: 1rem; font-weight: 900; }
        .tab-btn.active { opacity: 1; }
        .tab-staffs.active { color: #0ea5e9; border-bottom-color: #0ea5e9; }
        .tab-customers.active { color: var(--copros-orange); border-bottom-color: var(--copros-orange); }
        .tab-records.active { color: #10b981; border-bottom-color: #10b981; }
        .console-log { background: #1e293b; color: #10b981; font-family: 'Courier New', monospace; font-size: 0.7rem; border-radius: 1rem; padding: 1.5rem; height: 200px; overflow-y: auto; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div class="max-w-5xl mx-auto">
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-8">データー一括登録</h1>

                <div class="form-card p-10 mb-8">
                    <!-- タブ -->
                    <div class="flex gap-10 border-b border-slate-100 mb-8">
                        <button onclick="switchTab('staffs')" id="tab-staffs" class="tab-btn tab-staffs active">社員名簿</button>
                        <button onclick="switchTab('customers')" id="tab-customers" class="tab-btn tab-customers">お客様名簿</button>
                        <button onclick="switchTab('activity_records')" id="tab-records" class="tab-btn tab-records">実績データ（本番用）</button>
                    </div>

                    <!-- ガイド -->
                    <div id="importGuide" class="p-6 rounded-2xl mb-6 border bg-slate-50">
                        <p class="font-bold text-sm mb-2">Excelの列順を合わせて貼り付けてください：</p>
                        <div id="columnMapping" class="text-[10px] font-mono font-black tracking-tight leading-relaxed"></div>
                    </div>

                    <textarea id="csvData" class="w-full h-64 p-6 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none font-mono text-[10px] mb-8" placeholder="ExcelのA列から最後までを選択してコピーし、ここに貼り付けてください"></textarea>

                    <div class="flex gap-4">
                        <button id="importBtn" class="flex-1 py-4 text-white rounded-2xl font-black shadow-lg transition-all flex items-center justify-center gap-3">
                            <i class="fa-solid fa-upload"></i> <span id="btnText">インポート開始</span>
                        </button>
                        <button id="deleteAllBtn" class="px-8 py-4 bg-rose-50 text-rose-600 rounded-2xl font-bold border border-rose-100 hover:bg-rose-600 hover:text-white transition-all">全消去</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[1.5rem] border border-slate-200 shadow-sm">
                    <div id="statusLog" class="console-log">ログ待機中...</div>
                </div>
            </div>
        </div>
    </main>

    <script src="common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, addDoc, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AiZaSyDh00EZ7Jb1K2rTxLyTH6d80b4Qzcrwf_XI",
            authDomain: "copros-my-page.firebaseapp.com",
            projectId: "copros-my-page",
            storageBucket: "copros-my-page.firebasestorage.app",
            messagingSenderId: "54419849010",
            appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentMode = 'staffs';
        const mapping = {
            customers: "A:お客様名 | B:カナ | C:ランク | D:属性 | E:郵便 | F:住所 | G:ビル名 | H:電話",
            staffs: "A:社員番号 | B:氏名 | C:パスワード | D:メール | E:権限 | F:有効無効 | G:部署",
            activity_records: "A:お客様名 | B:ランク | C:属性 | D:先方担当 | E:開始日時 | F:終了日時 | G～J:省略 | K:内容 | L:訪問者 | M:同行者 | N:定性1 | O:定性2 | P:定性3 | Q:自由 | R:お客様情報 | S:自分の考え"
        };

        window.switchTab = (mode) => {
            currentMode = mode;
            const guide = document.getElementById('importGuide');
            const btn = document.getElementById('importBtn');
            const btnText = document.getElementById('btnText');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${mode === 'activity_records' ? 'records' : mode}`).classList.add('active');
            document.getElementById('columnMapping').innerText = mapping[mode];

            if (mode === 'staffs') {
                guide.className = "p-6 rounded-2xl mb-6 border border-sky-200 bg-sky-50 text-sky-600";
                btn.className = "flex-1 py-4 bg-sky-500 text-white rounded-2xl font-black shadow-lg";
                btnText.innerText = "社員名簿をインポート";
            } else if (mode === 'customers') {
                guide.className = "p-6 rounded-2xl mb-6 border border-orange-200 bg-orange-50 text-orange-600";
                btn.className = "flex-1 py-4 bg-[#ff7e11] text-white rounded-2xl font-black shadow-lg";
                btnText.innerText = "お客様名簿をインポート";
            } else {
                guide.className = "p-6 rounded-2xl mb-6 border border-emerald-200 bg-emerald-50 text-emerald-600";
                btn.className = "flex-1 py-4 bg-emerald-500 text-white rounded-2xl font-black shadow-lg";
                btnText.innerText = "実績本番データをインポート";
            }
        };

        function log(msg) {
            const div = document.getElementById('statusLog');
            div.innerHTML += `<div>> ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        }

        document.getElementById('importBtn').onclick = async () => {
            const rawData = document.getElementById('csvData').value.trim();
            if (!rawData) return alert("データがありません。");
            const rows = rawData.split('\n');
            log(`${rows.length}件の処理を開始...`);

            for (const line of rows) {
                const col = line.split('\t');
                if (col.length < 2) continue;

                let data = {};
                if (currentMode === 'activity_records') {
                    // 日時(E列)の分割例: "2026/1/5 0:00"
                    const startFull = col[4]?.trim() || "";
                    const endFull = col[5]?.trim() || "";
                    const datePart = startFull.split(' ')[0] ? startFull.split(' ')[0].replace(/\//g, '-') : "";
                    const startTime = startFull.split(' ')[1] || "00:00";
                    const endTime = endFull.split(' ')[1] || "00:00";

                    data = {
                        customerName: col[0]?.trim(),
                        customerRank: col[1]?.trim(),
                        customerType: col[2]?.trim(),
                        customerStaff: col[3]?.trim(),
                        visitDate: datePart,
                        startTime: startTime,
                        endTime: endTime,
                        visitContent: col[10]?.trim(),
                        visitorName: col[11]?.trim(),
                        visitorRole: "メイン",
                        companion: col[12]?.trim(),
                        qualData1: col[13]?.trim(),
                        qualData2: col[14]?.trim(),
                        qualData3: col[15]?.trim(),
                        customerReport: col[17]?.trim(),
                        staffThoughts: col[18]?.trim(),
                        createdAt: serverTimestamp()
                    };
                } else if (currentMode === 'customers') {
                    data = { name: col[0]?.trim(), kana: col[1]?.trim(), rank: col[2]?.trim(), type: col[3]?.trim(), zip: col[4]?.trim(), address: col[5]?.trim(), building: col[6]?.trim(), tel: col[7]?.trim(), visitCount: 0, lastVisit: "未訪問", updatedAt: serverTimestamp() };
                } else {
                    const docId = col[0]?.trim();
                    data = { id: docId, name: col[1]?.trim(), password: col[2]?.trim() || "1234", email: col[3]?.trim() || "", role: col[4]?.trim() || "一般", status: col[5]?.trim() || "有効", dept: col[6]?.trim() || "営業部", updatedAt: serverTimestamp() };
                    await setDoc(doc(db, "staffs", docId), data);
                    log(`${data.name} ... OK`);
                    continue;
                }

                try {
                    await addDoc(collection(db, currentMode), data);
                    log(`${data.customerName || data.name} ... 成功`);
                } catch (e) { log(`エラー: ${e.message}`); }
            }
            alert("完了しました！");
        };

        document.getElementById('deleteAllBtn').onclick = async () => {
            if (!confirm("現在選択中のデータを全消去しますか？")) return;
            const snap = await getDocs(collection(db, currentMode));
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
            log("全消去完了");
            alert("削除しました。");
        };

        switchTab('staffs');
    </script>
</body>
</html>
