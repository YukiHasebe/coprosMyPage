<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>データ一括登録 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #004098; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .form-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .tab-btn { transition: all 0.3s; border-bottom: 3px solid transparent; opacity: 0.4; padding-bottom: 1rem; font-weight: 900; cursor: pointer; }
        .tab-btn.active { opacity: 1; }
        .tab-staffs.active { color: #0ea5e9; border-bottom-color: #0ea5e9; }
        .tab-customers.active { color: var(--copros-orange); border-bottom-color: var(--copros-orange); }
        .tab-records.active { color: #10b981; border-bottom-color: #10b981; }
        .console-log { background: #0f172a; color: #34d399; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.7rem; border-radius: 1rem; padding: 1.2rem; height: 350px; overflow-y: auto; border: 4px solid #1e293b; line-height: 1.6; }
        .log-error { color: #f87171; }
        .log-info { color: #60a5fa; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
<div id="sidebar-placeholder"></div>
<main class="flex-1 flex flex-col overflow-hidden">
    <div id="header-placeholder"></div>
    <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-end mb-8">
                <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-1">データ一括登録</h1>
            </div>

            <div class="form-card p-8 lg:p-10 mb-8">
                <div class="flex gap-10 border-b border-slate-100 mb-8">
                    <button onclick="window.switchTab('customers')" id="tab-customers" class="tab-btn tab-customers">お客様名簿</button>
                    <button onclick="window.switchTab('staffs')" id="tab-staffs" class="tab-btn tab-staffs">組織員名簿</button>
                    <button onclick="window.switchTab('activity_records')" id="tab-records" class="tab-btn tab-records active">実績データ</button>
                </div>

                <div id="importGuide" class="p-6 rounded-2xl mb-8 border border-slate-100 bg-slate-50/50">
                    <p class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-tighter">Excelの列順序（見出し行は含めずコピー）</p>
                    <div id="columnMapping" class="text-[11px] font-mono font-black text-[#004098]"></div>
                </div>

                <textarea id="csvData" class="w-full h-64 p-6 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none font-mono text-xs mb-8" placeholder="データをここに貼り付けてください"></textarea>

                <button id="importBtn" class="w-full py-5 text-white rounded-2xl font-black shadow-lg transition-all active:scale-[0.98]">
                    インポートを開始する
                </button>
            </div>

            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm mb-20">
                <div id="statusLog" class="console-log custom-scrollbar">待機中...</div>
            </div>
        </div>
    </div>
</main>

<script type="module" src="common.js"></script>
<script type="module">
    import { db } from "./common.js";
    import { collection, doc, setDoc, addDoc, serverTimestamp, getDocs, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let currentMode = 'activity_records';
    let staffMap = new Map();

    const mapping = {
        customers: "A:名 | B:カナ | C:ランク | D:属性 | E:住所 | F:電話 | G:回数 | H:最終訪問",
        staffs: "A:ID | B:氏名 | C:パス | D:メール | E:権限 | F:状態 | G:部署",
        activity_records: "A:客名 | B:ランク | C:属性 | D:客先担当 | E:開始日時 | F:終了日時 | G:訪問者 | H:同行者 | I:定性1 | J:定性2 | K:定性3 | L:報告 | M:考え"
    };

    // 🌟 高度な行分割（セル内の改行を保護する）
    function parseCSV(text) {
        const rows = [];
        let currentRow = [];
        let currentCell = '';
        let inQuotes = false;
        const delimiter = text.includes('\t') ? '\t' : ','; // タブかカンマを自動判別

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i + 1];

            if (char === '"' && inQuotes && nextChar === '"') {
                currentCell += '"'; i++;
            } else if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === delimiter && !inQuotes) {
                currentRow.push(currentCell);
                currentCell = '';
            } else if ((char === '\r' || char === '\n') && !inQuotes) {
                if (currentCell !== '' || currentRow.length > 0) {
                    currentRow.push(currentCell);
                    rows.push(currentRow);
                    currentCell = '';
                    currentRow = [];
                }
                if (char === '\r' && nextChar === '\n') i++;
            } else {
                currentCell += char;
            }
        }
        if (currentCell !== '' || currentRow.length > 0) {
            currentRow.push(currentCell);
            rows.push(currentRow);
        }
        return rows;
    }

    const cleanDate = (s) => {
        if (!s || s === "0" || s.includes("未訪問")) return "未訪問";
        const parts = s.trim().replace(/\//g, '-').replace(/\s+/g, '-').split('-');
        if (parts.length < 3) return s;
        return `${parts[0]}/${parts[1].padStart(2, '0')}/${parts[2].padStart(2, '0')}`;
    };

    window.switchTab = (mode) => {
        currentMode = mode;
        const btn = document.getElementById('importBtn');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(mode === 'activity_records' ? 'tab-records' : `tab-${mode}`).classList.add('active');
        document.getElementById('columnMapping').innerText = mapping[mode];
        btn.className = "w-full py-5 text-white rounded-2xl font-black " + (mode==='staffs'?'bg-sky-500':mode==='customers'?'bg-[#ff7e11]':'bg-emerald-500');
    };

    function log(msg, type = "success") {
        const div = document.getElementById('statusLog');
        div.innerHTML += `<div class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        div.scrollTop = div.scrollHeight;
    }

    document.getElementById('importBtn').onclick = async () => {
        const rawData = document.getElementById('csvData').value.trim();
        if (!rawData) return alert("データがありません。");
        
        // 🌟 改良したパーサーで行を正確に切り出す
        const rows = parseCSV(rawData);
        const total = rows.length;
        const btn = document.getElementById('importBtn');
        
        if(!confirm(`${total}件のインポートを開始しますか？`)) return;

        btn.disabled = true;
        document.getElementById('statusLog').innerHTML = "";
        log(`${total}件のデータを解析しました。照合を開始します...`, "info");

        // 社員部署マップ作成
        const sSnap = await getDocs(collection(db, "staffs"));
        sSnap.forEach(d => staffMap.set(d.data().name.replace(/\s+/g, ''), d.data().dept || "不明"));

        for (let i = 0; i < rows.length; i++) {
            const col = rows[i];
            try {
                if (currentMode === 'customers') {
                    await addDoc(collection(db, "customers"), {
                        name: col[0]?.trim() || "", kana: col[1]?.trim() || "",
                        rank: col[2]?.trim() || "-", type: col[3]?.trim() || "-",
                        address: col[4]?.trim() || "", tel: col[5]?.trim() || "",
                        visitCount: parseInt(col[6]) || 0, lastVisit: cleanDate(col[7]),
                        updatedAt: serverTimestamp()
                    });
                } 
                else if (currentMode === 'activity_records') {
                    const startFull = (col[4]||"").trim().split(' ');
                    const endFull = (col[5]||"").trim().split(' ');
                    const visitorNameClean = (col[6]||"").replace(/\s+/g, '');
                    const dept = staffMap.get(visitorNameClean) || "不明";

                    await addDoc(collection(db, "activity_records"), {
                        customerName: col[0]?.trim() || "",
                        customerRank: col[1]?.trim() || "-",
                        customerType: col[2]?.trim() || "-",
                        customerStaff: col[3]?.trim() || "-",
                        visitDate: cleanDate(startFull[0]),
                        startTime: startFull[1] || "00:00",
                        endTime: endFull[1] || "00:00",
                        visitorName: col[6]?.trim() || "不明",
                        companion: col[7]?.trim() || "-",
                        qualData1: col[8]?.trim() || "-",
                        qualData2: col[9]?.trim() || "-",
                        qualData3: col[10]?.trim() || "-",
                        content: col[11]?.trim() || "-",
                        staffThoughts: col[12]?.trim() || "-",
                        visitorDept: dept,
                        createdAt: serverTimestamp()
                    });
                }
                else if (currentMode === 'staffs') {
                    const docId = col[0]?.trim();
                    await setDoc(doc(db, "staffs", docId), {
                        id: docId, name: col[1]?.trim(), password: col[2]?.trim(),
                        email: col[3]?.trim(), role: col[4]?.trim(),
                        status: col[5]?.trim(), dept: col[6]?.trim(), updatedAt: serverTimestamp()
                    });
                }
                if ((i + 1) % 10 === 0) log(`${i+1} / ${total} 件完了...`);
            } catch (e) { log(`${i+1}行目エラー: ${e.message}`, "error"); }
        }
        log("全ての処理が完了しました！", "info");
        btn.disabled = false;
        alert("インポートが完了しました。");
    };
    window.switchTab('activity_records');
</script>
</body>
</html>
