<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データ一括登録 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --sidebar-bg: #1a1a1a; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .form-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .tab-btn { transition: all 0.3s; border-bottom: 4px solid transparent; opacity: 0.4; padding-bottom: 1rem; }
        .tab-btn.active { opacity: 1; }
        .tab-staffs.active { color: #0ea5e9; border-bottom-color: #0ea5e9; }
        .tab-customers.active { color: var(--copros-orange); border-bottom-color: var(--copros-orange); }
        .console-log { background: #1e293b; color: #10b981; font-family: 'Courier New', Courier, monospace; font-size: 0.75rem; border-radius: 1rem; padding: 1.5rem; height: 180px; overflow-y: auto; }
        #importGuide, #importBtn { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div class="max-w-5xl mx-auto">
                
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-2">データー一括登録</h1>
                        <nav class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Bulk Data Management System</nav>
                    </div>
                </div>

                <div class="form-card p-10 mb-8">
                    <div class="flex gap-12 border-b border-slate-100 mb-8">
                        <button onclick="switchTab('staffs')" id="tab-staffs" class="tab-btn tab-staffs active text-sm font-black uppercase tracking-widest flex items-center gap-2">
                            <i class="fa-solid fa-id-card-clip"></i> 社員名簿（組織員）
                        </button>
                        <button onclick="switchTab('customers')" id="tab-customers" class="tab-btn tab-customers text-sm font-black uppercase tracking-widest flex items-center gap-2">
                            <i class="fa-solid fa-address-book"></i> お客様名簿
                        </button>
                    </div>

                    <div id="importGuide" class="p-6 rounded-2xl mb-6 border">
                        <p class="font-bold text-sm mb-2">Excelの列を以下の順番でコピー＆ペーストしてください：</p>
                        <div id="columnMapping" class="text-[11px] font-mono font-black tracking-tight italic">
                            <!-- JSで挿入 -->
                        </div>
                    </div>

                    <textarea id="csvData" class="w-full h-64 p-6 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none font-mono text-xs mb-8 transition-all" placeholder="ここに貼り付け"></textarea>

                    <div class="flex gap-4">
                        <button id="importBtn" class="flex-1 py-4 text-white rounded-2xl font-black shadow-lg hover:scale-[1.01] transition-all flex items-center justify-center gap-3">
                            <i class="fa-solid fa-upload"></i> <span id="btnText">インポート</span>
                        </button>
                        <button id="deleteAllBtn" class="px-8 py-4 bg-rose-50 text-rose-600 rounded-2xl font-bold border border-rose-100 hover:bg-rose-600 hover:text-white transition-all">
                            全消去
                        </button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[1.5rem] border border-slate-200 shadow-sm">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">Process Log</p>
                    <div id="statusLog" class="console-log">待機中...</div>
                </div>

            </div>
        </div>
    </main>

    <script src="common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AiZaSyDh00EZ7Jb1K2rTxLyTH6d80b4Qzcrwf_XI",
            authDomain: "copros-my-page.firebaseapp.com",
            projectId: "copros-my-page",
            storageBucket: "copros-my-page.firebasestorage.app",
            messagingSenderId: "54419849010",
            appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentMode = 'staffs';
        const mapping = {
            customers: "A:お客様名 | B:カナ | C:ランク | D:属性 | E:郵便番号 | F:住所 | G:ビル名 | H:電話番号",
            staffs: "A:社員番号(ID) | B:氏名 | C:パスワード | D:メール | E:権限(管理者/一般) | F:有効無効 | G:所属部署"
        };

        window.switchTab = (mode) => {
            currentMode = mode;
            const guide = document.getElementById('importGuide');
            const btn = document.getElementById('importBtn');
            const btnText = document.getElementById('btnText');

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            document.getElementById('columnMapping').innerText = mapping[mode];

            if (mode === 'staffs') {
                guide.className = "p-6 rounded-2xl mb-6 border border-sky-200 bg-sky-50 text-sky-600";
                btn.className = "flex-1 py-4 bg-sky-500 text-white rounded-2xl font-black shadow-lg shadow-sky-200 transition-all flex items-center justify-center gap-3";
                btnText.innerText = "社員名簿をインポート（上書き更新）";
           } else {
   　　　　　　 guide.className = "p-6 rounded-2xl mb-6 border border-orange-200 bg-orange-50 text-orange-600";
    　　　　　　// bg-[#004098]（紺）を bg-[#ff7e11]（オレンジ）に変更し、影の色もオレンジ系にしました
   　　　　　　 btn.className = "flex-1 py-4 bg-[#ff7e11] text-white rounded-2xl font-black shadow-lg shadow-orange-200 transition-all flex items-center justify-center gap-3";
   　　　　　　 btnText.innerText = "お客様名簿をインポート";
　　　　　　}

            log(`モード切替: ${mode === 'staffs' ? '社員名簿' : 'お客様名簿'}`);
        };

        function log(msg) {
            const div = document.getElementById('statusLog');
            div.innerHTML += `<div>> ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        }

        switchTab('staffs');

        document.getElementById('importBtn').onclick = async () => {
            const rawData = document.getElementById('csvData').value.trim();
            if (!rawData) return alert("データがありません。");
            const rows = rawData.split('\n');
            log(`${rows.length}件の処理を開始...`);

            for (const line of rows) {
                const col = line.split('\t');
                if (col.length < 2) continue;

                let data = {};
                let docId = null;

                if (currentMode === 'customers') {
                    data = {
                        name: col[0]?.trim(),
                        kana: col[1]?.trim() || "",
                        rank: col[2]?.trim() || "",
                        type: col[3]?.trim() || "",
                        zip: col[4]?.trim() || "",
                        address: col[5]?.trim() || "",
                        building: col[6]?.trim() || "",
                        tel: col[7]?.trim() || "",
                        visitCount: 0,
                        lastVisit: "未訪問",
                        updatedAt: serverTimestamp()
                    };
                } else {
                    docId = col[0]?.trim(); // 社員番号をドキュメントIDに
                    data = {
                        id: docId,
                        name: col[1]?.trim(),
                        password: col[2]?.trim() || "1234",
                        email: col[3]?.trim() || "",
                        role: col[4]?.trim() || "一般",
                        status: col[5]?.trim() || "有効",
                        dept: col[6]?.trim() || "営業部",
                        updatedAt: serverTimestamp()
                    };
                }

                try {
                    if (currentMode === 'staffs' && docId) {
                        // 社員の場合はID（社員番号）を指定して保存（既存なら上書き）
                        await setDoc(doc(db, "staffs", docId), data);
                    } else {
                        // お客様の場合は新規追加
                        await setDoc(doc(collection(db, currentMode), data.name), data);
                    }
                    log(`${data.name} ... 完了`);
                } catch (e) { log(`エラー (${col[0]}): ${e.message}`); }
            }
            alert("インポートが完了しました！");
        };

        document.getElementById('deleteAllBtn').onclick = async () => {
            const target = currentMode === 'staffs' ? '社員名簿' : 'お客様名簿';
            if (!confirm(`警告：${target}をすべて消去しますか？`)) return;
            try {
                const snap = await getDocs(collection(db, currentMode));
                const batch = writeBatch(db);
                snap.forEach(d => batch.delete(d.ref));
                await batch.commit();
                log(`${target}を全消去しました。`);
                alert("削除完了しました。");
            } catch (e) { log(`エラー: ${e.message}`); }
        };
    </script>
</body>
</html>
