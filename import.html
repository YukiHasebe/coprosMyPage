<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>データ一括登録 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #004098; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .form-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .tab-btn { transition: all 0.3s; border-bottom: 3px solid transparent; opacity: 0.4; padding-bottom: 1rem; font-weight: 900; cursor: pointer; }
        .tab-btn.active { opacity: 1; }
        .tab-staffs.active { color: #0ea5e9; border-bottom-color: #0ea5e9; }
        .tab-customers.active { color: var(--copros-orange); border-bottom-color: var(--copros-orange); }
        .tab-records.active { color: #10b981; border-bottom-color: #10b981; }
        .console-log { background: #1e293b; color: #10b981; font-family: 'Courier New', monospace; font-size: 0.75rem; border-radius: 1rem; padding: 1.5rem; height: 300px; overflow-y: auto; border: 4px solid #334155; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
<div id="sidebar-placeholder"></div>
<main class="flex-1 flex flex-col overflow-hidden">
    <div id="header-placeholder"></div>
    <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-2">データー一括登録</h1>
                    <nav class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Database Maintenance V2</nav>
                </div>
                <button id="clearRecordsBtn" class="px-4 py-2 text-rose-400 text-[10px] font-bold hover:bg-rose-50 rounded-xl">
                    <i class="fa-solid fa-triangle-exclamation mr-1"></i>実績データのみ全消去
                </button>
            </div>

            <div class="form-card p-10 mb-8">
                <div class="flex gap-10 border-b border-slate-100 mb-8">
                    <button onclick="window.switchTab('staffs')" id="tab-staffs" class="tab-btn tab-staffs active">社員名簿</button>
                    <button onclick="window.switchTab('customers')" id="tab-customers" class="tab-btn tab-customers">お客様名簿</button>
                    <button onclick="window.switchTab('activity_records')" id="tab-records" class="tab-btn tab-records">実績データ</button>
                </div>

                <div id="importGuide" class="p-6 rounded-2xl mb-6 border bg-slate-50">
                    <p class="text-[10px] font-black text-slate-400 mb-3 uppercase">Excelの列順序（項目名なしで貼り付け）</p>
                    <div id="columnMapping" class="text-[11px] font-mono font-black tracking-tight leading-relaxed text-slate-600"></div>
                </div>

                <textarea id="csvData" class="w-full h-64 p-6 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none font-mono text-xs mb-8 shadow-inner" placeholder="Excelからコピーしてここに貼り付けてください"></textarea>

                <button id="importBtn" class="w-full py-5 text-white rounded-2xl font-black shadow-lg transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-cloud-arrow-up text-xl"></i><span id="btnText" class="text-lg">インポート開始</span>
                </button>
            </div>

            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm mb-20">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Processing Log</span>
                    <span id="progressPercent" class="text-sm font-mono font-bold text-emerald-500">READY</span>
                </div>
                <div id="statusLog" class="console-log custom-scrollbar">ログ待機中...</div>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import { db } from "./common.js";
    import { collection, doc, setDoc, addDoc, serverTimestamp, getDocs, writeBatch, query, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let currentMode = 'staffs';
    const mapping = {
        customers: "A:お客様名 | B:カナ | C:ランク | D:属性 | E:住所 | F:電話 | G:訪問回数 | H:最終訪問日",
        staffs: "A:社員番号 | B:氏名 | C:パスワード | D:メール | E:権限 | F:状態 | G:部署",
        // 🌟 部門(P列)を追加した新しいマッピング
        activity_records: "A:お客様名 | B:ランク | C:属性 | D:担当 | E:開始日時 | F:終了日時 | G:内容 | H:訪問者 | I:同行者 | J:定性1 | K:定性2 | L:定性3 | M:金額 | N:報告 | O:考え | P:訪問者の部門"
    };

    window.switchTab = (mode) => {
        currentMode = mode;
        const btn = document.getElementById('importBtn');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(mode === 'activity_records' ? 'tab-records' : `tab-${mode}`).classList.add('active');
        document.getElementById('columnMapping').innerText = mapping[mode];
        
        if (mode === 'staffs') btn.className = "w-full py-5 bg-sky-500 text-white rounded-2xl font-black shadow-lg";
        else if (mode === 'customers') btn.className = "w-full py-5 bg-[#ff7e11] text-white rounded-2xl font-black shadow-lg";
        else btn.className = "w-full py-5 bg-emerald-500 text-white rounded-2xl font-black shadow-lg";
    };

    function log(msg, color = "#10b981") {
        const div = document.getElementById('statusLog');
        div.innerHTML += `<div style="color: ${color}">> ${msg}</div>`;
        div.scrollTop = div.scrollHeight;
    }

    document.getElementById('importBtn').onclick = async () => {
        const rawData = document.getElementById('csvData').value.trim();
        if (!rawData) return alert("データがありません。");
        
        const rows = rawData.split('\n');
        const total = rows.length;
        log(`${total}件の処理を開始...`, "#fbbf24");
        document.getElementById('importBtn').disabled = true;

        for (let i = 0; i < rows.length; i++) {
            const col = rows[i].split('\t');
            if (col.length < 2) continue;

            try {
                if (currentMode === 'customers') {
                    await addDoc(collection(db, "customers"), {
                        name: col[0]?.trim() || "",
                        kana: col[1]?.trim() || "",
                        rank: col[2]?.trim() || "",
                        type: col[3]?.trim() || "",
                        address: col[4]?.trim() || "",
                        tel: col[5]?.trim() || "",
                        visitCount: parseInt(col[6]?.trim()) || 0,
                        lastVisit: col[7]?.trim() || "未訪問",
                        updatedAt: serverTimestamp()
                    });
                } 
                else if (currentMode === 'activity_records') {
                    const startFull = col[4]?.trim() || "";
                    const datePart = startFull.split(' ')[0] ? startFull.split(' ')[0].replace(/\//g, '-') : "";
                    const startTime = startFull.split(' ')[1] || "00:00";
                    const endTime = (col[5]?.trim() || "").split(' ')[1] || "00:00";

                    await addDoc(collection(db, "activity_records"), {
                        customerName: col[0]?.trim() || "",
                        customerRank: col[1]?.trim() || "",
                        customerType: col[2]?.trim() || "",
                        customerStaff: col[3]?.trim() || "",
                        visitDate: datePart,
                        startTime: startTime,
                        endTime: endTime,
                        visitContent: col[6]?.trim() || "",
                        visitorName: col[7]?.trim() || "不明",
                        companion: col[8]?.trim() || "",
                        qualData1: col[9]?.trim() || "",
                        qualData2: col[10]?.trim() || "",
                        qualData3: col[11]?.trim() || "",
                        estimatedAmount: col[12]?.trim() || "0",
                        customerReport: col[13]?.trim() || "",
                        staffThoughts: col[14]?.trim() || "",
                        visitorDept: col[15]?.trim() || "不明", // 🌟 P列から部門を取得
                        createdAt: serverTimestamp()
                    });
                }
                else if (currentMode === 'staffs') {
                    const docId = col[0]?.trim();
                    await setDoc(doc(db, "staffs", docId), {
                        id: docId,
                        name: col[1]?.trim() || "",
                        password: col[2]?.trim() || "1234",
                        email: col[3]?.trim() || "",
                        role: col[4]?.trim() || "一般",
                        status: col[5]?.trim() || "有効",
                        dept: col[6]?.trim() || "営業部",
                        updatedAt: serverTimestamp()
                    });
                }
                if (i % 10 === 0) log(`${i+1}件目 処理中...`);
            } catch (e) { log(`エラー行 ${i+1}: ${e.message}`, "#f87171"); }
            document.getElementById('progressPercent').innerText = `${Math.round(((i + 1) / total) * 100)}%`;
        }
        document.getElementById('importBtn').disabled = false;
        alert("インポートが完了しました！");
    };

    document.getElementById('clearRecordsBtn').onclick = async () => {
        if (!confirm("実績データを全消去しますか？")) return;
        log("消去中...", "#f87171");
        const snap = await getDocs(collection(db, "activity_records"));
        const batch = writeBatch(db);
        snap.docs.forEach(d => batch.delete(d.ref));
        await batch.commit();
        alert("消去完了");
        location.reload();
    };
    window.switchTab('staffs');
</script>
</body>
</html>
