<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データ一括登録 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .form-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .tab-btn { transition: all 0.3s; border-bottom: 4px solid transparent; opacity: 0.4; padding-bottom: 1rem; font-weight: 900; }
        .tab-btn.active { opacity: 1; }
        .tab-staffs.active { color: #0ea5e9; border-bottom-color: #0ea5e9; }
        .tab-customers.active { color: var(--copros-orange); border-bottom-color: var(--copros-orange); }
        .tab-records.active { color: #10b981; border-bottom-color: #10b981; }
        .console-log { background: #1e293b; color: #10b981; font-family: 'Courier New', monospace; font-size: 0.7rem; border-radius: 1rem; padding: 1.5rem; height: 250px; overflow-y: auto; border: 4px solid #334155; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col lg:flex-row h-screen overflow-hidden text-slate-700">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>

        <div class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-5xl mx-auto">
                <div class="mb-8">
                    <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-2">データー一括登録</h1>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Data Maintenance Tool (Safety Add Mode)</p>
                </div>

                <div class="form-card p-6 lg:p-10 mb-8">
                    <div class="flex gap-6 lg:gap-10 border-b border-slate-100 mb-8 overflow-x-auto whitespace-nowrap">
                        <button onclick="switchTab('staffs')" id="tab-staffs" class="tab-btn tab-staffs active">社員名簿 (更新/追加)</button>
                        <button onclick="switchTab('customers')" id="tab-customers" class="tab-btn tab-customers">お客様名簿 (追加のみ)</button>
                        <button onclick="switchTab('activity_records')" id="tab-records" class="tab-btn tab-records">実績データ (追加のみ)</button>
                    </div>

                    <div id="importGuide" class="p-4 lg:p-6 rounded-2xl mb-6 border bg-slate-50">
                        <p class="font-bold text-xs mb-2 text-slate-500">コピーしたデータを貼り付けてください：</p>
                        <div id="columnMapping" class="text-[9px] lg:text-[11px] font-mono font-black tracking-tight leading-relaxed break-all"></div>
                        <p class="mt-4 text-[10px] text-rose-500 font-bold"><i class="fa-solid fa-shield-halved mr-1"></i>自動重複チェック有効：既存のデータはスキップまたは更新されます。</p>
                    </div>

                    <textarea id="csvData" class="w-full h-48 lg:h-64 p-4 lg:p-6 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none font-mono text-[10px] mb-8 focus:bg-white transition-all" placeholder="Excelからコピーして貼り付け"></textarea>

                    <div class="flex flex-col lg:flex-row gap-4">
                        <button id="importBtn" class="flex-1 py-4 text-white rounded-2xl font-black shadow-lg transition-all flex items-center justify-center gap-3 active:scale-95">
                            <i class="fa-solid fa-cloud-arrow-up"></i> <span id="btnText">インポート開始</span>
                        </button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[1.5rem] border border-slate-200 shadow-sm mb-20">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Process Log</span>
                        <span id="progressPercent" class="text-xs font-mono font-bold text-emerald-500">Ready</span>
                    </div>
                    <div id="statusLog" class="console-log custom-scrollbar">ログ待機中...</div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, addDoc, serverTimestamp, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./common.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentMode = 'staffs';
        const mapping = {
            customers: "A:お客様名 | B:カナ | C:ランク | D:属性 | E:郵便 | F:住所 | G:ビル | H:電話",
            staffs: "A:社員番号 | B:氏名 | C:パスワード | D:メール | E:権限 | F:有効 | G:部署",
            activity_records: "A:お客様名 | B:ランク | C:属性 | D:先方担当 | E:開始日時 | F:終了日時 | K:内容 | L:訪問者 | M:同行者 | R:報告 | S:考え"
        };

        window.switchTab = (mode) => {
            currentMode = mode;
            const btn = document.getElementById('importBtn');
            const btnText = document.getElementById('btnText');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${mode === 'activity_records' ? 'records' : mode}`).classList.add('active');
            document.getElementById('columnMapping').innerText = mapping[mode];

            if (mode === 'staffs') {
                btn.className = "flex-1 py-4 bg-sky-500 text-white rounded-2xl font-black shadow-lg";
                btnText.innerText = "社員名簿を更新・追加";
            } else if (mode === 'customers') {
                btn.className = "flex-1 py-4 bg-[#ff7e11] text-white rounded-2xl font-black shadow-lg";
                btnText.innerText = "お客様名簿を新規分のみ追加";
            } else {
                btn.className = "flex-1 py-4 bg-emerald-500 text-white rounded-2xl font-black shadow-lg";
                btnText.innerText = "実績データを新規分のみ追加";
            }
        };

        function log(msg, color = "#10b981") {
            const div = document.getElementById('statusLog');
            div.innerHTML += `<div style="color: ${color}">> ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        }

        document.getElementById('importBtn').onclick = async () => {
            const rawData = document.getElementById('csvData').value.trim();
            if (!rawData) return alert("データがありません。");
            const rows = rawData.split('\n');
            const total = rows.length;
            log(`全${total}件の分析・処理を開始します...`, "#fbbf24");
            document.getElementById('importBtn').disabled = true;

            for (let i = 0; i < rows.length; i++) {
                const col = rows[i].split('\t');
                if (col.length < 2) continue;

                try {
                    if (currentMode === 'staffs') {
                        // 社員はID固定なので上書きOK
                        const docId = col[0]?.trim();
                        const data = { id: docId, name: col[1]?.trim(), password: col[2]?.trim() || "1234", email: col[3]?.trim() || "", role: col[4]?.trim() || "一般", status: col[5]?.trim() || "有効", dept: col[6]?.trim() || "営業部", updatedAt: serverTimestamp() };
                        await setDoc(doc(db, "staffs", docId), data);
                        if(i%5===0) log(`社員 [${data.name}] を更新/追加しました`);
                    } 
                    else if (currentMode === 'customers') {
                        // 🌟 重複チェック：同じ名前のお客様がいないか確認
                        const name = col[0]?.trim();
                        const q = query(collection(db, "customers"), where("name", "==", name), limit(1));
                        const snap = await getDocs(q);
                        
                        if (snap.empty) {
                            const data = { name, kana: col[1]?.trim(), rank: col[2]?.trim(), type: col[3]?.trim(), zip: col[4]?.trim(), address: col[5]?.trim(), building: col[6]?.trim(), tel: col[7]?.trim(), visitCount: 0, lastVisit: "未訪問", updatedAt: serverTimestamp() };
                            await addDoc(collection(db, "customers"), data);
                            log(`新規追加: ${name}`);
                        } else {
                            log(`スキップ(登録済): ${name}`, "#94a3b8");
                        }
                    } 
                    else if (currentMode === 'activity_records') {
                        // 🌟 重複チェック：同じ日時・お客様・訪問者の記録がないか確認
                        const cust = col[0]?.trim();
                        const startFull = col[4]?.trim() || "";
                        const datePart = startFull.split(' ')[0] ? startFull.split(' ')[0].replace(/\//g, '-') : "";
                        const visitor = col[11]?.trim();

                        const q = query(collection(db, "activity_records"), 
                            where("customerName", "==", cust), 
                            where("visitDate", "==", datePart),
                            where("visitorName", "==", visitor),
                            limit(1));
                        const snap = await getDocs(q);

                        if (snap.empty) {
                            const data = {
                                customerName: cust, customerRank: col[1]?.trim(), customerType: col[2]?.trim(),
                                customerStaff: col[3]?.trim(), visitDate: datePart,
                                startTime: startFull.split(' ')[1] || "00:00", endTime: (col[5]?.trim() || "").split(' ')[1] || "00:00",
                                visitContent: col[10]?.trim(), visitorName: visitor, visitorRole: "メイン",
                                companion: col[12]?.trim(), customerReport: col[17]?.trim(), staffThoughts: col[18]?.trim(),
                                createdAt: serverTimestamp()
                            };
                            await addDoc(collection(db, "activity_records"), data);
                            log(`実績追加: ${cust} (${datePart})`);
                        } else {
                            log(`実績スキップ(登録済): ${cust}`, "#94a3b8");
                        }
                    }
                } catch (e) { log(`エラー: ${e.message}`, "#f87171"); }

                const percent = Math.round(((i + 1) / total) * 100);
                document.getElementById('progressPercent').innerText = `${percent}%`;
            }
            document.getElementById('importBtn').disabled = false;
            alert("処理が完了しました。ログを確認してください。");
        };

        switchTab('staffs');
    </script>
</body>
</html>
