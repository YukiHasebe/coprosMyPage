<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>カレンダー | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #e2e8f0; gap: 1px; border: 1px solid #e2e8f0; border-radius: 1rem; overflow: hidden; }
        .calendar-day { background: white; min-height: 120px; padding: 0.4rem; position: relative; }
        .calendar-day.other-month { background: #f8fafc; color: #cbd5e1; }
        .day-num { font-weight: 900; font-size: 0.85rem; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
        .is-today .day-num { background: var(--copros-orange); color: white; border-radius: 50%; }
        .event-label { font-size: 9px; font-weight: 800; padding: 3px 6px; border-radius: 4px; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid; transition: all 0.2s; }
        .event-label:hover { transform: translateX(3px); filter: brightness(1.05); }
        .label-result { border-left-color: var(--copros-orange); background: #fff7ed; color: #ea580c; }
        .label-next { border-left-color: #10b981; background: #f0fdf4; color: #16a34a; }
        .label-appoint { border-left-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
        .month-btn { padding: 0.5rem 0.2rem; border-radius: 0.75rem; font-size: 0.7rem; font-weight: 900; flex: 1; text-align: center; transition: 0.2s; }
        .month-btn.active { background: var(--copros-navy); color: white; }
        .scope-select { background: #e2e8f0; border: none; padding: 0.4rem 1rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; color: #475569; outline: none; cursor: pointer; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                
                <div class="flex flex-col gap-6 mb-6">
                    <div class="relative flex flex-col lg:flex-row items-start lg:items-center min-h-[80px] gap-4">
                        
                        <!-- 左：タイトルと会社表示（いつもの場所） -->
                        <div class="flex items-end gap-4 lg:gap-6 shrink-0">
                            <div>
                                <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-1">カレンダー</h1>
                                <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Schedule Management</nav>
                            </div>
                            <select id="deptFilter" onchange="window.renderCalendar()" class="scope-select shadow-inner mb-2">
                                <option value="ALL">全社表示</option>
                                <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option><option>土木部</option><option>建築部</option><option>建機部</option><option>総務部</option><option>購買課</option><option>宮崎産商</option><option>企画部</option>
                            </select>
                        </div>

                        <!-- 中央：月切り替えツール（今月ボタンなし・スッキリ版） -->
                        <div class="lg:absolute lg:left-1/2 lg:-translate-x-1/2 flex items-center gap-6 bg-white py-2 px-6 rounded-2xl shadow-sm border border-slate-100 mx-auto lg:mx-0">
                            <button onclick="window.changeMonth(-1)" class="text-slate-300 hover:text-slate-600 transition-colors"><i class="fa-solid fa-chevron-left fa-lg"></i></button>
                            <span id="displayMonthCenter" class="text-lg font-black text-slate-700 min-w-[140px] text-center tracking-tighter">----年 --月</span>
                            <button onclick="window.changeMonth(1)" class="text-slate-300 hover:text-slate-600 transition-colors"><i class="fa-solid fa-chevron-right fa-lg"></i></button>
                        </div>

                        <!-- 右：チェックボックス（スマホでも右寄せ） -->
                        <div class="flex gap-4 items-center bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-100 text-[10px] font-black ml-auto">
                            <label class="flex items-center gap-1.5 cursor-pointer text-orange-600"><input type="checkbox" id="showRes" checked onchange="renderCalendar()" class="accent-orange-500"> 実績</label>
                            <label class="flex items-center gap-1.5 cursor-pointer text-emerald-600"><input type="checkbox" id="showNext" checked onchange="renderCalendar()" class="accent-emerald-500"> 次回</label>
                            <label class="flex items-center gap-1.5 cursor-pointer text-blue-600"><input type="checkbox" id="showApp" checked onchange="renderCalendar()" class="accent-blue-500"> アポ</label>
                        </div>
                    </div>

                    <div class="flex overflow-x-auto p-1 bg-white rounded-2xl border border-slate-200 shadow-sm whitespace-nowrap custom-scrollbar">
                        <script>for(let i=1; i<=12; i++) document.write(`<button onclick="window.jumpMonth(${i})" id="month-btn-${i}" class="month-btn">${i}月</button>`);</script>
                    </div>
                </div>

                <div class="bg-white p-2 lg:p-4 rounded-[1.5rem] lg:rounded-[2rem] shadow-xl border border-slate-200">
                    <div class="grid grid-cols-7 mb-4 font-black text-[10px] text-slate-400 uppercase text-center">
                        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-rose-400">Sat</div><div class="text-rose-600">Sun</div>
                    </div>
                    <div id="calendarGrid" class="calendar-grid"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, where, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentDate = new Date();
        let loadedData = { records: [], appoints: [] };

        function formatDateKey(dateStr) {
            if (!dateStr) return null;
            const d = new Date(dateStr.replace(/\//g, '-'));
            if (isNaN(d.getTime())) return null;
            return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        }

        async function fetchMonthData() {
            const y = currentDate.getFullYear(); const m = currentDate.getMonth() + 1;
            const m1 = `${y}-${m}-`; const m2 = `${y}-${String(m).padStart(2, '0')}-`;
            document.getElementById('displayMonthCenter').innerText = `${y}年 ${m}月`;
            try {
                const qRes1 = query(collection(db, "activity_records"), where("visitDate", ">=", m1), where("visitDate", "<=", m1 + "\uf8ff"));
                const qRes2 = query(collection(db, "activity_records"), where("visitDate", ">=", m2), where("visitDate", "<=", m2 + "\uf8ff"));
                const qNext1 = query(collection(db, "activity_records"), where("nextVisitDate", ">=", m1), where("nextVisitDate", "<=", m1 + "\uf8ff"));
                const qNext2 = query(collection(db, "activity_records"), where("nextVisitDate", ">=", m2), where("nextVisitDate", "<=", m2 + "\uf8ff"));
                const qApp1 = query(collection(db, "appointments"), where("appointDate", ">=", m1), where("appointDate", "<=", m1 + "\uf8ff"));
                const qApp2 = query(collection(db, "appointments"), where("appointDate", ">=", m2), where("appointDate", "<=", m2 + "\uf8ff"));
                const snaps = await Promise.all([getDocs(qRes1), getDocs(qRes2), getDocs(qNext1), getDocs(qNext2), getDocs(qApp1), getDocs(qApp2)]);
                const recordMap = new Map();
                [...snaps[0].docs, ...snaps[1].docs, ...snaps[2].docs, ...snaps[3].docs].forEach(d => recordMap.set(d.id, d.data()));
                loadedData.records = Array.from(recordMap.values()).sort((a, b) => (a.startTime || "00:00").localeCompare(b.startTime || "00:00"));
                const appointMap = new Map();
                [...snaps[4].docs, ...snaps[5].docs].forEach(d => appointMap.set(d.id, { id: d.id, ...d.data() }));
                loadedData.appoints = Array.from(appointMap.values());
            } catch (e) { console.error(e); }
        }

        window.renderCalendar = () => {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = "";
            const year = currentDate.getFullYear(); const month = currentDate.getMonth();
            const dept = document.getElementById('deptFilter').value; const today = new Date();
            document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById(`month-btn-${month + 1}`)) document.getElementById(`month-btn-${month + 1}`).classList.add('active');
            const firstDay = new Date(year, month, 1).getDay();
            const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let i=0; i<startOffset; i++) grid.insertAdjacentHTML('beforeend', '<div class="calendar-day other-month"></div>');
            for(let d=1; d<=daysInMonth; d++) {
                const targetKey = `${year}-${month + 1}-${d}`;
                const isTodayClass = (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) ? "is-today" : "";
                let eventsHtml = "";
                if (document.getElementById('showRes').checked) {
                    loadedData.records.filter(r => formatDateKey(r.visitDate) === targetKey && (dept === 'ALL' || r.visitorDept === dept))
                        .forEach(r => { eventsHtml += `<div class="event-label label-result" onclick="location.href='customer_history.html?name=${encodeURIComponent(r.customerName)}'">実績: ${r.customerName}</div>`; });
                }
                if (document.getElementById('showNext').checked) {
                    loadedData.records.filter(r => formatDateKey(r.nextVisitDate) === targetKey && (dept === 'ALL' || r.visitorDept === dept))
                        .forEach(r => { eventsHtml += `<div class="event-label label-next" onclick="location.href='customer_history.html?name=${encodeURIComponent(r.customerName)}'">次回: ${r.customerName}</div>`; });
                }
                if (document.getElementById('showApp').checked) {
                    loadedData.appoints.filter(a => formatDateKey(a.appointDate) === targetKey && (dept === 'ALL' || !a.visitorDept || a.visitorDept === dept))
                        .forEach(a => { eventsHtml += `<div class="event-label label-appoint" onclick="window.showAppointDetail('${a.id}','${a.customerName}','${a.appointDate}','${a.subject}')">アポ: ${a.customerName}</div>`; });
                }
                grid.insertAdjacentHTML('beforeend', `<div class="calendar-day ${isTodayClass}"><div class="day-header mb-1"><span class="day-num">${d}</span></div><div class="max-h-[90px] overflow-y-auto custom-scrollbar space-y-0.5">${eventsHtml}</div></div>`);
            }
        };
        window.changeMonth = async (v) => { currentDate.setMonth(currentDate.getMonth() + v); await fetchMonthData(); window.renderCalendar(); };
        window.jumpMonth = async (m) => { currentDate.setMonth(m - 1); await fetchMonthData(); window.renderCalendar(); };
        (async () => { await fetchMonthData(); window.renderCalendar(); })();
        window.showAppointDetail = async (id, cust, date, subject) => {
            if(confirm(`【アポ詳細】\n顧客: ${cust}\n内容: ${subject || 'なし'}\n\nこのアポを削除しますか？`)) {
                try { const batch = writeBatch(db); batch.delete(doc(db, "appointments", id)); await batch.commit(); alert("削除しました"); await fetchMonthData(); window.renderCalendar(); } catch (e) { alert("失敗"); }
            }
        };
    </script>
</body>
</html>
