<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>カレンダー | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #e2e8f0; gap: 1px; border: 1px solid #e2e8f0; border-radius: 1rem; overflow: hidden; }
        .calendar-day { background: white; min-height: 100px; lg:min-height: 130px; padding: 0.4rem; position: relative; overflow: hidden; }
        .calendar-day.other-month { background: #f8fafc; color: #cbd5e1; }
        .day-num { font-weight: 900; font-size: 0.85rem; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
        .is-today .day-num { background: var(--copros-orange); color: white; border-radius: 50%; }
        .event-label { font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid; transition: transform 0.2s; }
        .label-result { border-left-color: var(--copros-orange); background: #fff7ed; color: #ea580c; }
        .label-next { border-left-color: #10b981; background: #f0fdf4; color: #16a34a; }
        .label-appoint { border-left-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
        .month-btn { padding: 0.5rem 0.2rem; border-radius: 0.75rem; font-size: 0.7rem; font-weight: 900; flex: 1; text-align: center; }
        .month-btn.active { background: #334155; color: white; }
        .scope-select { background: #e2e8f0; border: none; padding: 0.4rem 1rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; color: #475569; outline: none; appearance: none; cursor: pointer; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4">
                    <div class="flex items-end gap-4 lg:gap-6">
                        <div><h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-1">カレンダー</h1><p id="currentMonthDisplay" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">--</p></div>
                        <select id="deptFilter" onchange="window.renderCalendar()" class="scope-select shadow-inner">
                            <option value="ALL">全社表示</option>
                            <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option><option>土木部</option><option>建築部</option><option>建機部</option><option>総務部</option><option>購買課</option><option>宮崎産商</option><option>企画部</option>
                        </select>
                    </div>
                    <div class="flex gap-4 items-center bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100 text-[10px] font-black">
                        <div class="flex gap-3 px-3 border-r border-slate-100">
                            <label class="flex items-center gap-1 cursor-pointer text-orange-600"><input type="checkbox" id="showRes" checked onchange="renderCalendar()" class="accent-orange-500"> 実績</label>
                            <label class="flex items-center gap-1 cursor-pointer text-emerald-600"><input type="checkbox" id="showNext" checked onchange="renderCalendar()" class="accent-emerald-500"> 次回</label>
                            <label class="flex items-center gap-1 cursor-pointer text-blue-600"><input type="checkbox" id="showApp" checked onchange="renderCalendar()" class="accent-blue-500"> アポ</label>
                        </div>
                        <button onclick="window.changeMonth(-1)" class="p-2 text-slate-400"><i class="fa-solid fa-chevron-left"></i></button>
                        <button onclick="window.setToday()" class="px-4 py-1.5 bg-slate-100 text-slate-600 rounded-lg">今日</button>
                        <button onclick="window.changeMonth(1)" class="p-2 text-slate-400"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="flex overflow-x-auto p-1 bg-white rounded-2xl border border-slate-200 shadow-sm mb-6 whitespace-nowrap">
                    <script>for(let i=1; i<=12; i++) document.write(`<button onclick="window.jumpMonth(${i})" id="month-btn-${i}" class="month-btn">${i}月</button>`);</script>
                </div>
                <div class="bg-white p-2 lg:p-4 rounded-[1.5rem] lg:rounded-[2rem] shadow-xl border border-slate-200">
                    <div class="grid grid-cols-7 mb-4 font-black text-[10px] text-slate-400 uppercase text-center">
                        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-rose-400">Sat</div><div class="text-rose-600">Sun</div>
                    </div>
                    <div id="calendarGrid" class="calendar-grid"></div>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, where, limit, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentDate = new Date();
        let loadedData = { records: [], appoints: [] };

        async function init() { await fetchMonthData(); window.renderCalendar(); }

        // 🌟 どんな形式(2026-1-7も2026-01-07も)でもマッチさせる正規化関数
        function normalizeDate(str) {
            if (!str) return "";
            const d = new Date(str.replace(/\//g, '-'));
            if (isNaN(d.getTime())) return "";
            return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        }

        async function fetchMonthData() {
            const y = currentDate.getFullYear(), m = currentDate.getMonth() + 1;
            const mPrefix1 = `${y}-${m}-`, mPrefix2 = `${y}-${String(m).padStart(2, '0')}-`;
            
            try {
                // 🌟 超省エネ：今月分（1桁月と2桁月の両方）だけをピンポイント取得
                const qRes = query(collection(db, "activity_records"), where("visitDate", ">=", mPrefix1), where("visitDate", "<=", mPrefix1 + "\uf8ff"));
                const qRes2 = query(collection(db, "activity_records"), where("visitDate", ">=", mPrefix2), where("visitDate", "<=", mPrefix2 + "\uf8ff"));
                const qNext = query(collection(db, "activity_records"), where("nextVisitDate", ">=", mPrefix1), where("nextVisitDate", "<=", mPrefix1 + "\uf8ff"));
                const qApp = query(collection(db, "appointments"), where("appointDate", ">=", mPrefix1), where("appointDate", "<=", mPrefix1 + "\uf8ff"));
                
                const snaps = await Promise.all([getDocs(qRes), getDocs(qRes2), getDocs(qNext), getDocs(qApp)]);
                
                const resMap = new Map();
                [...snaps[0].docs, ...snaps[1].docs, ...snaps[2].docs].forEach(d => resMap.set(d.id, d.data()));
                loadedData.records = Array.from(resMap.values());
                loadedData.appoints = snaps[3].docs.map(d => ({ id: d.id, ...d.data() }));
            } catch (e) { console.error("Load Error:", e); }
        }

        window.showAppointDetail = async (id, cust, date, subject) => {
            if(confirm(`【アポ詳細】\n顧客: ${cust}\n内容: ${subject || 'なし'}\n\nこのアポを削除しますか？`)) {
                try {
                    const batch = writeBatch(db);
                    batch.delete(doc(db, "appointments", id));
                    const q = query(collection(db, "notifications"), where("customerName", "==", cust), where("visitDate", "==", date));
                    const snap = await getDocs(q);
                    snap.forEach(d => batch.delete(d.ref));
                    await batch.commit(); alert("完了"); location.reload();
                } catch (e) { alert("失敗"); }
            }
        };

        window.renderCalendar = () => {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = "";
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const dept = document.getElementById('deptFilter').value;
            document.getElementById('currentMonthDisplay').innerText = `${year}年 ${month + 1}月`;
            document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById(`month-btn-${month + 1}`)) document.getElementById(`month-btn-${month + 1}`).classList.add('active');

            const firstDay = new Date(year, month, 1).getDay();
            const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for(let i=0; i<startOffset; i++) grid.insertAdjacentHTML('beforeend', '<div class="calendar-day other-month"></div>');

            for(let d=1; d<=daysInMonth; d++) {
                const targetDate = `${year}-${month + 1}-${d}`;
                let eventsHtml = "";
                if (document.getElementById('showRes').checked) {
                    loadedData.records.filter(r => normalizeDate(r.visitDate) === targetDate && (dept === 'ALL' || r.visitorDept === dept)).forEach(r => {
                        eventsHtml += `<div class="event-label label-result" onclick="location.href='customer_history.html?name=${encodeURIComponent(r.customerName)}'">実績: ${r.customerName}</div>`;
                    });
                }
                if (document.getElementById('showNext').checked) {
                    loadedData.records.filter(r => normalizeDate(r.nextVisitDate) === targetDate && (dept === 'ALL' || r.visitorDept === dept)).forEach(r => {
                        eventsHtml += `<div class="event-label label-next">次回: ${r.visitorName}</div>`;
                    });
                }
                if (document.getElementById('showApp').checked) {
                    loadedData.appoints.filter(a => normalizeDate(a.appointDate) === targetDate).forEach(a => {
                        eventsHtml += `<div class="event-label label-appoint" onclick="window.showAppointDetail('${a.id}','${a.customerName}','${a.appointDate}','${a.subject}')">アポ: ${a.customerName}</div>`;
                    });
                }
                grid.insertAdjacentHTML('beforeend', `<div class="calendar-day"><div class="day-header"><span class="day-num">${d}</span></div><div class="max-h-[85px] overflow-y-auto custom-scrollbar">${eventsHtml}</div></div>`);
            }
        };

        window.changeMonth = async (v) => { currentDate.setMonth(currentDate.getMonth() + v); await fetchMonthData(); window.renderCalendar(); };
        window.jumpMonth = async (m) => { currentDate.setMonth(m - 1); await fetchMonthData(); window.renderCalendar(); };
        window.setToday = async () => { currentDate = new Date(); await fetchMonthData(); window.renderCalendar(); };
        init();
    </script>
</body>
</html>
