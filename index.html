<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>営業管理アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <div class="flex h-screen overflow-hidden">
        <!-- サイドバー -->
        <aside class="w-48 bg-gray-900 text-white flex-shrink-0">
            <div class="p-4 text-sm font-bold border-b border-gray-700 text-blue-400">メニュー</div>
            <nav class="mt-2 text-sm">
                <a href="#" class="block px-4 py-3 bg-blue-600">お客様</a>
                <a href="#" class="block px-4 py-3 hover:bg-gray-800">実績</a>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white border-b h-14 flex items-center justify-between px-6 shadow-sm">
                <div class="text-xl font-bold text-blue-800">株式会社コプロス</div>
            </header>

            <div class="flex-1 overflow-auto p-6">
                <h1 class="text-2xl font-bold mb-4">お客様情報一覧</h1>
                
                <div class="flex space-x-2 mb-6">
                    <button id="addBtn" class="bg-blue-800 text-white px-10 py-2 rounded shadow hover:bg-blue-900">テストデータを追加登録</button>
                </div>

                <div class="bg-white shadow rounded-lg overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-800 text-white text-sm">
                                <th class="p-3 border">お客様名</th>
                                <th class="p-3 border">電話番号</th>
                                <th class="p-3 border">住所</th>
                                <th class="p-3 border">最終訪問日</th>
                            </tr>
                        </thead>
                        <tbody id="customerTable" class="text-xs">
                            <!-- ここにデータが入ります -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK の設定 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // あなたのFirebase設定（スクリーンショットから反映済み）
        const firebaseConfig = {
            apiKey: "AIzaSyDhOEZ7Jb1K2rTXlyTH6d8ob4Qzcrwf_XI",
            authDomain: "copros-my-page.firebaseapp.com",
            projectId: "copros-my-page",
            storageBucket: "copros-my-page.firebasestorage.app",
            messagingSenderId: "54419849010",
            appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b",
            measurementId: "G-LJ2Z0ERV77"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // データを取得して表示する関数
        async function loadData() {
            const tbody = document.getElementById("customerTable");
            tbody.innerHTML = "<tr><td colspan='4' class='p-3 text-center'>読み込み中...</td></tr>";
            
            try {
                const querySnapshot = await getDocs(collection(db, "customers"));
                tbody.innerHTML = ""; 
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const row = `
                        <tr class="hover:bg-blue-50 border-b">
                            <td class="p-3 font-bold text-blue-600 underline">${data.name || ''}</td>
                            <td class="p-3">${data.tel || ''}</td>
                            <td class="p-3">${data.address || ''}</td>
                            <td class="p-3">${data.lastVisit || '未訪問'}</td>
                        </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (e) {
                console.error("エラー: ", e);
                tbody.innerHTML = "<tr><td colspan='4' class='p-3 text-red-500'>エラーが発生しました。Firestoreの「ルール」を確認してください。</td></tr>";
            }
        }

        // テストデータを追加する関数
        async function addSampleData() {
            try {
                await addDoc(collection(db, "customers"), {
                    name: "株式会社 木村設計",
                    tel: "098-894-8448",
                    address: "沖縄県宜野湾市...",
                    lastVisit: "2025/12/24",
                    createdAt: serverTimestamp()
                });
                alert("データを追加しました！");
                loadData();
            } catch (e) {
                alert("保存に失敗しました。Firestoreのルールを確認してください。");
                console.error(e);
            }
        }

        document.getElementById("addBtn").onclick = addSampleData;
        window.onload = loadData;
    </script>
</body>
</html>
