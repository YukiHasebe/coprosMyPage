<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%); min-height: 100vh; }
        .login-card { backdrop-filter: blur(10px); background-color: rgba(255, 255, 255, 0.95); border-top: 5px solid #ff7e11; }
        .input-focus:focus { border-color: #2c5282; box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.2); }
        
        /* お知らせボードの特別スタイル */
        .notice-board { max-width: 450px; margin-top: 2rem; background: rgba(255,255,255,0.05); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .notice-item { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 1rem; transition: background 0.3s; }
        .notice-item:last-child { border-bottom: none; }
        .notice-item:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <!-- ログインカード -->
    <div class="login-card p-10 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-[#2c5282] tracking-tight">株式会社コプロス</h1>
            <p class="text-[#4299e1] text-sm font-bold tracking-[0.2em] mt-2">CP My Page - 営業支援システム</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1 ml-1">ユーザーID</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="userId" placeholder="UserID" class="w-full border border-gray-300 pl-10 p-3 rounded-lg outline-none input-focus transition-all" required>
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1 ml-1">パスワード</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" placeholder="Password" class="w-full border border-gray-300 pl-10 p-3 rounded-lg outline-none input-focus transition-all" required>
                </div>
            </div>
            <div class="flex items-center justify-between text-xs text-gray-500">
                <label class="flex items-center cursor-pointer"><input type="checkbox" class="mr-1"> ログイン状態を保持</label>
                <a href="#" class="hover:text-[#2c5282]">パスワードを忘れた場合</a>
            </div>
            <button type="submit" class="w-full bg-[#ff7e11] hover:bg-[#e66a00] text-white py-4 rounded-lg font-bold shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                ログイン <i class="fa-solid fa-right-to-bracket"></i>
            </button>
        </form>
        <p class="mt-8 text-center text-gray-400 text-[10px]">© 2026 COPROS Co., Ltd. All Rights Reserved.</p>
    </div>

    <!-- 🌟 重要なお知らせボード（ログイン画面の下に配置） -->
    <div class="notice-board w-full shadow-2xl">
        <div class="bg-white/10 px-6 py-3 flex items-center gap-2">
            <i class="fa-solid fa-bullhorn text-orange-400 text-xs"></i>
            <span class="text-white text-[10px] font-black uppercase tracking-widest">Important Notices</span>
        </div>
        <div id="noticeContainer" class="p-2">
            <p class="text-gray-500 text-xs font-bold p-6 text-center">お知らせを読み込み中...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AiZaSyDh00EZ7Jb1K2rTxLyTH6d80b4Qzcrwf_XI",
            authDomain: "copros-my-page.firebaseapp.com",
            projectId: "copros-my-page",
            storageBucket: "copros-my-page.firebasestorage.app",
            messagingSenderId: "54419849010",
            appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 1. お知らせの取得表示 ---
        async function loadNotices() {
            try {
                const snap = await getDocs(query(collection(db, "notices"), orderBy("createdAt", "desc")));
                const container = document.getElementById('noticeContainer');
                const today = new Date().toISOString().split('T')[0];

                const activeNotices = snap.docs.filter(d => {
                    const data = d.data();
                    return today >= data.startDate && today <= data.endDate;
                });

                if (activeNotices.length > 0) {
                    container.innerHTML = activeNotices.map(d => {
                        const data = d.data();
                        return `
                            <div class="notice-item">
                                <div class="flex justify-between items-center mb-1">
                                    <h4 class="text-sky-300 font-black text-sm">${data.title}</h4>
                                    <span class="text-[9px] text-gray-500 font-mono">${data.startDate.replace(/-/g,'/')}</span>
                                </div>
                                <p class="text-gray-300 text-xs leading-relaxed line-clamp-2">${data.content}</p>
                            </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<p class="text-gray-500 text-[10px] p-4 text-center font-bold">現在、掲載中のお知らせはありません。</p>';
                }
            } catch (e) { console.warn("Quota待機中..."); }
        }
        loadNotices();

        // --- 2. ログイン処理 ---
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputId = document.getElementById('userId').value;
            const inputPw = document.getElementById('password').value;

            try {
                const q = query(collection(db, "staffs"), where("id", "==", inputId));
                const snap = await getDocs(q);

                if (!snap.empty) {
                    const staffData = snap.docs[0].data();
                    if (staffData.password === inputPw) {
                        sessionStorage.setItem('userName', staffData.name);
                        sessionStorage.setItem('userDept', staffData.dept || '未設定');
                        alert(`${staffData.name}さん、お疲れ様です！`);
                        location.href = 'list.html';
                    } else { alert("パスワードが正しくありません。"); }
                } else { alert("社員番号が見つかりません。"); }
            } catch (error) { alert("ログイン処理中にエラーが発生しました。"); }
        });
    </script>
</body>
</html>
