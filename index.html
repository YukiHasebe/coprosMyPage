<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%); min-height: 100vh; }
        .login-card { backdrop-filter: blur(10px); background-color: rgba(255, 255, 255, 0.95); border-top: 5px solid #ff7e11; }
        /* お知らせボードの幅と高さを固定して統一感を出す */
        .notice-board { max-width: 28rem; width: 100%; margin-top: 2rem; background: rgba(255,255,255,0.05); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">
    <!-- ログインフォーム -->
    <div class="login-card p-10 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-[#2c5282]">株式会社コプロス</h1>
            <p class="text-[#4299e1] text-sm font-bold tracking-[0.2em] mt-2 uppercase">CP My Page</p>
        </div>
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">ユーザーID</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="userId" placeholder="社員番号を入力" class="w-full border border-gray-300 pl-10 p-3 rounded-lg outline-none font-bold" required>
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">パスワード</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" placeholder="Password" class="w-full border border-gray-300 pl-10 p-3 rounded-lg outline-none font-bold" required>
                </div>
            </div>
            <button type="submit" class="w-full bg-[#ff7e11] hover:bg-[#e66a00] text-white py-4 rounded-lg font-bold shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">ログイン <i class="fa-solid fa-right-to-bracket"></i></button>
        </form>
    </div>

    <!-- お知らせボード -->
    <div class="notice-board shadow-2xl overflow-hidden">
        <div class="bg-white/10 px-6 py-3 flex items-center gap-2 text-white text-[10px] font-black uppercase tracking-widest"><i class="fa-solid fa-bullhorn text-orange-400"></i>Important Notices</div>
        <!-- 🌟 縦幅を最大250pxに固定 ＆ スクロール対応 -->
        <div id="noticeContainer" class="p-2 max-h-[250px] overflow-y-auto custom-scrollbar min-h-[100px] flex flex-col justify-center">
            <p class="text-white/20 text-[10px] p-6 text-center font-bold">読み込み中...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5L1V6jn3Q8i1bWFWO3Gd25w_If6dklmY",
            authDomain: "copros-my-page-v2.firebaseapp.com",
            projectId: "copros-my-page-v2",
            storageBucket: "copros-my-page-v2.firebasestorage.app",
            messagingSenderId: "595195904220",
            appId: "1:595195904220:web:402fd4e8620e2f32673419"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🌟 お知らせ読み込み
        async function loadNotices() {
            const container = document.getElementById('noticeContainer');
            try {
                const q = query(collection(db, "notices"), orderBy("startDate", "desc"), limit(5));
                const snap = await getDocs(q);
                const today = new Date().toISOString().split('T')[0];
                const active = snap.docs.filter(d => {
                    const data = d.data();
                    return today >= data.startDate && today <= data.endDate;
                });

                if (active.length > 0) {
                    container.classList.remove('justify-center');
                    container.innerHTML = active.map(d => {
                        const data = d.data();
                        return `
                            <div class="p-4 border-b border-white/5 hover:bg-white/5 cursor-pointer transition-all" onclick="location.href='notice_list.html'">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="text-sky-300 font-black text-sm">${data.title}</h4>
                                    <span class="text-[8px] text-slate-500 font-mono">${data.startDate.replace(/-/g,'/')}</span>
                                </div>
                                <p class="text-gray-400 text-xs line-clamp-2">${data.content}</p>
                            </div>`;
                    }).join('');
                } else {
                    // 🌟 お知らせがない時の「なし」表示
                    container.classList.add('justify-center');
                    container.innerHTML = '<p class="text-gray-500 text-[10px] p-6 text-center font-bold tracking-widest uppercase italic">現在、新しいお知らせはありません</p>';
                }
            } catch (e) {
                container.innerHTML = '<p class="text-rose-400 text-[10px] text-center">読み込み失敗</p>';
            }
        }
        loadNotices();

        // 🌟 ログイン処理 ＆ 個別通知カウント
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const userId = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value;

            try {
                const q = query(collection(db, "staffs"), where("id", "==", userId), limit(1));
                const snap = await getDocs(q);

                if (!snap.empty) {
                    const userData = snap.docs[0].data();
                    if (userData.password === password) {
                        // 🌟 ログイン成功：相手への通知があるか確認
                        const qNoti = query(collection(db, "notifications"), 
                                            where("recipient", "==", userData.name), 
                                            where("isRead", "==", false));
                        const snapNoti = await getDocs(qNoti);
                        const count = snapNoti.size;

                        let msg = `${userData.name}さん、お疲れ様です！`;
                        if (count > 0) {
                            msg += `\n\n📢 未読の回覧が ${count} 件届いています。`;
                        }
                        
                        alert(msg); // 🌟 ここで通知件数も報告！
                        
                        sessionStorage.setItem('userName', userData.name);
                        sessionStorage.setItem('userDept', userData.dept || '未設定');
                        location.href = 'list.html';
                    } else {
                        alert("パスワードが間違っています。");
                    }
                } else {
                    alert("ユーザーIDが見つかりません。");
                }
            } catch (error) {
                alert("通信エラーが発生しました。");
            }
        };
    </script>
</body>
</html>
