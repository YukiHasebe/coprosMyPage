
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | CP My Page (株式会社コプロス)</title>
    <!-- Tailwind CSS を使用しつつ、カスタムカラーを定義 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            /* 背景を少しグラデーションにして深みを出します */
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
        }
        .login-card {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95);
            border-top: 5px solid #ff7e11; /* コプロス・オレンジをアクセントに */
        }
        .input-focus:focus {
            border-color: #2c5282;
            box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen">

    <div class="login-card p-10 rounded-xl shadow-2xl w-full max-w-md">
        <!-- ロゴエリア -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-[#2c5282] tracking-tight">
                株式会社コプロス
            </h1>
            <p class="text-[#4299e1] text-sm font-bold tracking-[0.2em] mt-2">
                CP My Page - 営業支援システム
            </p>
        </div>

        <!-- ログインフォーム -->
         <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1 ml-1">ユーザーID</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" 
                           class="w-full border border-gray-300 pl-10 p-3 rounded-lg outline-none input-focus transition-all" 
                           placeholder="UserID" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1 ml-1">パスワード</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" 
                           class="w-full border border-gray-300 pl-10 p-3 rounded-lg outline-none input-focus transition-all" 
                           placeholder="Password" required>
                </div>
            </div>

            <div class="flex items-center justify-between text-xs text-gray-500">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" class="mr-1"> ログイン状態を保持
                </label>
                <a href="#" class="hover:text-[#2c5282]">パスワードを忘れた場合</a>
            </div>

            <button type="submit" 
                    class="w-full bg-[#ff7e11] hover:bg-[#e66f00] text-white py-4 rounded-lg font-bold shadow-lg text-lg transition-transform active:scale-95">
                ログイン <i class="fa-solid fa-right-to-bracket ml-2"></i>
            </button>
        </form>

        <!-- フッター情報 -->
        <div class="mt-8 text-center">
            <p class="text-gray-400 text-[10px]">
                © 2026 COPROS Co., Ltd. All Rights Reserved.
            </p>
        </div>
    </div>
       <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase設定（いつものAPIキー）
    const firebaseConfig = {
        apiKey: "AIzaSyDhOEZ7Jb1K2rTxLyTH6d8ob4Qzcrwf_XI",
        authDomain: "copros-my-page.firebaseapp.com",
        projectId: "copros-my-page",
        storageBucket: "copros-my-page.firebasestorage.app",
        messagingSenderId: "54419849010",
        appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ログインフォームの動作設定
    const loginForm = document.querySelector('form');
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // 画面リロードを防止
        
        // 入力されたIDとパスワードを取得
        const inputId = document.querySelector('input[placeholder="UserID"]').value;
        const inputPw = document.querySelector('input[placeholder="Password"]').value;
        
        try {
            // 1. Firebaseの "staffs" から、入力された「社員番号(id)」が一致する人を探す
            const q = query(collection(db, "staffs"), where("id", "==", inputId));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                // 社員番号が見つかった場合
                const staffData = querySnapshot.docs[0].data();
                
                // 2. パスワードが一致するかチェック
                if (staffData.password === inputPw) {
                    // 【成功】名前を保存して、次の一覧画面へ移動
                    sessionStorage.setItem('userName', staffData.name);
                    alert(staffData.name + " さん、お疲れ様です！");
                    window.location.href = 'list.html';
                } else {
                    // 【失敗】パスワードが違う
                    alert("パスワードが正しくありません。");
                }
            } else {
                // 【失敗】社員番号そのものがない
                alert("社員番号が見つかりません。");
            }
        } catch (error) {
            console.error("Login Error:", error);
            alert("ログイン処理中にエラーが発生しました。");
        }
    });
</script>
</body>
    
</html>
