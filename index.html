<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%); min-height: 100vh; }
        .login-card { backdrop-filter: blur(10px); background-color: rgba(255, 255, 255, 0.95); border-top: 5px solid #ff7e11; }
        .notice-board { max-width: 450px; margin-top: 2rem; background: rgba(255,255,255,0.05); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">
    <div class="login-card p-10 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-[#2c5282]">株式会社コプロス</h1>
            <p class="text-[#4299e1] text-sm font-bold tracking-[0.2em] mt-2 uppercase">CP My Page</p>
        </div>
        <form id="loginForm" class="space-y-6">
            <div><label class="block text-xs font-bold text-gray-600 mb-1">ユーザーID</label>
                <div class="relative"><span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="userId" placeholder="社員番号" class="w-full border border-gray-300 pl-10 p-3 rounded-lg outline-none" required></div>
            </div>
            <div><label class="block text-xs font-bold text-gray-600 mb-1">パスワード</label>
                <div class="relative"><span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" placeholder="Password" class="w-full border border-gray-300 pl-10 p-3 rounded-lg outline-none" required></div>
            </div>
            <button type="submit" class="w-full bg-[#ff7e11] hover:bg-[#e66a00] text-white py-4 rounded-lg font-bold shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">ログイン <i class="fa-solid fa-right-to-bracket"></i></button>
        </form>
    </div>
    <div class="notice-board w-full shadow-2xl overflow-hidden">
        <div class="bg-white/10 px-6 py-3 flex items-center gap-2 text-white text-[10px] font-black uppercase tracking-widest"><i class="fa-solid fa-bullhorn text-orange-400"></i>Important Notices</div>
        <div id="noticeContainer" class="p-2 max-h-[200px] overflow-y-auto"></div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyC5L1V6jn3Q8i1bWFW03Gd25w_If6dklmY", authDomain: "copros-my-page-v2.firebaseapp.com", projectId: "copros-my-page-v2", storageBucket: "copros-my-page-v2.firebasestorage.app", messagingSenderId: "595195904220", appId: "1:595195904220:web:402fd4e8620e2f32673419" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        async function loadNotices() {
            try {
                const q = query(collection(db, "notices"), orderBy("createdAt", "desc"), limit(5));
                const snap = await getDocs(q);
                const container = document.getElementById('noticeContainer');
                const today = new Date().toISOString().split('T')[0];
                const active = snap.docs.filter(d => { const data = d.data(); return today >= data.startDate && today <= data.endDate; });
                if (active.length > 0) { container.innerHTML = active.map(d => `<div class="p-4 border-b border-white/5"><h4 class="text-sky-300 font-black text-sm">${d.data().title}</h4><p class="text-gray-300 text-xs">${d.data().content}</p></div>`).join(''); }
                else { container.innerHTML = '<p class="text-gray-500 text-[10px] p-6 text-center font-bold">現在、掲載中のお知らせはありません。</p>'; }
            } catch (e) { console.warn(e); }
        }
        loadNotices();
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const q = query(collection(db, "staffs"), where("id", "==", document.getElementById('userId').value.trim()), limit(1));
            const snap = await getDocs(q);
            if (!snap.empty && snap.docs[0].data().password === document.getElementById('password').value) {
                sessionStorage.setItem('userName', snap.docs[0].data().name);
                sessionStorage.setItem('userDept', snap.docs[0].data().dept || '未設定');
                location.href = 'list.html';
            } else { alert("認証に失敗しました。"); }
        };
    </script>
</body>
</html>
