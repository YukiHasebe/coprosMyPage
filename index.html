<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CP My Page - ログイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1a202c] flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded shadow-2xl w-full max-w-md text-center">
        <h1 class="text-3xl font-bold text-[#2c5282] mb-2">株式会社コプロス</h1>
        <p class="text-[#4299e1] text-lg font-bold tracking-widest mb-10">CP My Page</p>
        <form onsubmit="event.preventDefault(); window.location.href='list.html';" class="space-y-6">
            <input type="text" class="w-full border p-3 rounded outline-none" placeholder="ユーザーID" required>
            <input type="password" class="w-full border p-3 rounded outline-none" placeholder="パスワード" required>
            <button type="submit" class="w-full bg-[#ff7211] text-white py-3 rounded font-bold shadow-lg text-lg">ログイン</button>
        </form>
    </div>
</body>
</html>
