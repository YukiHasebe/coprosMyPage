<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>営業マップ | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --copros-blue: #004098; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        #map { height: calc(100vh - 150px); width: 100%; z-index: 1; position: relative; }
        
        /* 検索・フィルタエリアの改善 */
        .search-bar-area { background: white; padding: 12px 20px; border-bottom: 1px solid #e2e8f0; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; z-index: 50; }
        .search-wrapper { position: relative; flex: 1; max-width: 350px; }
        .search-input { width: 100%; padding: 10px 16px; border-radius: 12px; border: 1px solid #cbd5e1; font-weight: 800; font-size: 13px; outline: none; background: #f8fafc; }
        .search-input:focus { border-color: var(--copros-orange); background: white; }
        
        .scope-select { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 10px 12px; border-radius: 12px; font-size: 12px; font-weight: 900; color: #475569; outline: none; cursor: pointer; min-width: 120px; }
        .search-btn { background: var(--copros-blue); color: white; padding: 10px 24px; border-radius: 12px; font-weight: 900; font-size: 13px; box-shadow: 0 4px 10px rgba(0,64,152,0.2); transition: all 0.2s; }
        .search-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(0,64,152,0.3); }

        /* マップコントロール */
        .map-control { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .text-control-btn { background: white; padding: 12px 18px; border-radius: 12px; font-weight: 900; font-size: 11px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #e2e8f0; color: #475569; transition: all 0.2s; text-align: center; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .text-control-btn:hover { background: var(--copros-navy); color: white; }

        /* ピンのデザイン */
        .custom-pin { width: 28px; height: 28px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .custom-pin i { transform: rotate(45deg); color: white; font-size: 12px; }

        /* 凡例 */
        .map-legend { position: absolute; bottom: 30px; left: 20px; z-index: 1000; background: white; padding: 15px; border-radius: 1.2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-size: 11px; font-weight: 900; border: 1px solid #e2e8f0; }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .dot { width: 14px; height: 14px; border-radius: 4px; }

        #geo-log { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1001; background: rgba(15, 23, 42, 0.9); color: #fff; padding: 12px 30px; border-radius: 50px; font-size: 12px; font-weight: 800; display: none; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <div id="header-placeholder"></div>
        
        <!-- 🌟 タイトルエリア（デザイン統合） -->
        <div class="bg-white px-6 pt-6">
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">営業マップ</h1>
            <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic mb-4">Geospatial Customer Intelligence</nav>
        </div>

        <div class="search-bar-area shadow-sm">
            <div class="search-wrapper">
                <input type="text" id="mapSearchInput" class="search-input" placeholder="お客様名を検索...">
            </div>
            <!-- 🌟 ケコム関連属性フィルタ -->
            <select id="typeFilter" class="scope-select">
                <option value="ALL">全属性</option>
                <option value="ケコム">ケコム</option>
                <option value="コンサル">コンサル</option>
                <option value="官庁">官庁</option>
                <option value="取引先">取引先</option>
            </select>
            <button onclick="window.initMap('search')" class="search-btn active:scale-95 transition-all">検索を実行</button>
        </div>

        <div id="map">
            <div id="geo-log"></div>
            <div class="map-control">
                <button onclick="window.locateMe()" class="text-control-btn"><i class="fa-solid fa-location-crosshairs text-orange-500"></i>現在地を表示</button>
                <button onclick="window.initMap('recent')" class="text-control-btn"><i class="fa-solid fa-clock-rotate-left text-blue-500"></i>最近の100件</button>
                <button onclick="window.clearAllPins()" class="text-control-btn text-rose-500"><i class="fa-solid fa-trash-can"></i>クリア</button>
            </div>

            <div class="map-legend">
                <p class="text-[9px] text-slate-400 mb-3 uppercase tracking-widest font-black">Visit Freshness</p>
                <div class="legend-item"><div class="dot" style="background:#0ea5e9"></div><span>1ヶ月以内</span></div>
                <div class="legend-item"><div class="dot" style="background:#ff7e11"></div><span>1〜3ヶ月</span></div>
                <div class="legend-item"><div class="dot" style="background:#ef4444"></div><span>3ヶ月以上</span></div>
                <div class="legend-item"><div class="dot" style="background:#94a3b8"></div><span>未訪問</span></div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, limit, updateDoc, doc, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const map = L.map('map', { zoomControl: false }).setView([34.0, 131.0], 9);
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', { 
            attribution: '© 国土地理院',
            maxZoom: 18
        }).addTo(map);
        
        let markersLayer = L.layerGroup().addTo(map);

        function log(msg) {
            const el = document.getElementById('geo-log');
            el.style.display = 'block'; 
            el.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles text-orange-400 mr-2"></i>${msg}`;
            setTimeout(() => el.style.display = 'none', 3000);
        }

        window.clearAllPins = () => { markersLayer.clearLayers(); log("地図をクリアしました。"); };

        function addPin(c) {
            let color = '#94a3b8';
            if (c.lastVisit && c.lastVisit !== "未訪問") {
                const diffDays = (new Date() - new Date(c.lastVisit.replace(/\//g, '-'))) / (1000 * 60 * 60 * 24);
                if (diffDays < 30) color = '#0ea5e9';
                else if (diffDays > 90) color = '#ef4444';
                else color = '#ff7e11';
            }
            
            const icon = L.divIcon({ 
                html: `<div class="custom-pin" style="background-color:${color};"><i class="fa-solid fa-building"></i></div>`, 
                className: '', iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -28] 
            });

            L.marker([c.lat, c.lng], { icon }).addTo(markersLayer).bindPopup(`
                <div class="p-2" style="min-width:220px;">
                    <p class="text-[10px] font-black text-orange-500 uppercase tracking-tighter mb-1">${c.type || 'カテゴリ未設定'}</p>
                    <h3 class="font-black text-base text-slate-800 mb-1 leading-tight">${c.name}</h3>
                    <p class="text-[10px] text-slate-500 mb-4 font-bold"><i class="fa-solid fa-location-dot mr-1"></i>${c.address}</p>
                    <div class="grid grid-cols-2 gap-2">
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.address)}" target="_blank" class="bg-slate-800 text-white text-[10px] py-2.5 rounded-xl text-center font-black shadow-sm">ナビ開始</a>
                        <button onclick="location.href='customer_history.html?name=${encodeURIComponent(c.name)}'" class="bg-blue-50 text-[#004098] text-[10px] py-2.5 rounded-xl font-black border border-blue-100">履歴を表示</button>
                        <button onclick="location.href='history.html?name=${encodeURIComponent(c.name)}'" class="col-span-2 bg-[#ff7e11] text-white text-[10px] py-2.5 rounded-xl font-black shadow-md active:scale-95">このお客様の実績を書く</button>
                    </div>
                </div>
            `);
        }

        async function getCoords(address) {
            try {
                const res = await fetch(`https://msearch.gsi.go.jp/address-search/AddressSearch?q=${encodeURIComponent(address)}`);
                const data = await res.json();
                if (data && data.length > 0) return { lat: data[0].geometry.coordinates[1], lng: data[0].geometry.coordinates[0] };
            } catch (e) { return null; }
            return null;
        }

        window.initMap = async (mode = 'recent') => {
            const keyword = document.getElementById('mapSearchInput').value.trim();
            const type = document.getElementById('typeFilter').value;
            
            log(mode === 'search' ? `検索中: ${keyword || type}` : "最新の100件を同期中...");
            
            let q;
            const ref = collection(db, "customers");

            // 🌟 省エネ ＆ ケコム特化クエリ
            if (mode === 'search') {
                if (keyword) {
                    q = query(ref, where("name", ">=", keyword), where("name", "<=", keyword + '\uf8ff'), limit(50));
                } else if (type !== 'ALL') {
                    q = query(ref, where("type", "==", type), orderBy("updatedAt", "desc"), limit(100));
                } else {
                    q = query(ref, orderBy("updatedAt", "desc"), limit(100));
                }
            } else {
                q = query(ref, orderBy("updatedAt", "desc"), limit(100));
            }

            try {
                const snap = await getDocs(q);
                markersLayer.clearLayers();

                for (const d of snap.docs) {
                    const c = { id: d.id, ...d.data() };
                    // 🌟 住所から座標への自動メンテナンス
                    if (!c.lat || !c.lng) {
                        const coords = await getCoords(c.address);
                        if (coords) {
                            await updateDoc(doc(db, "customers", c.id), coords);
                            c.lat = coords.lat; c.lng = coords.lng;
                        }
                    }
                    if (c.lat && c.lng) addPin(c);
                }

                if (markersLayer.getLayers().length > 0) {
                    map.fitBounds(new L.featureGroup(markersLayer.getLayers()).getBounds().pad(0.2));
                } else {
                    alert("該当するお客様が見つかりませんでした。");
                }
            } catch (e) { console.error(e); }
        };

        window.locateMe = () => map.locate({setView: true, maxZoom: 15});
        
        // 🌟 起動時に実行
        window.initMap();
    </script>
</body>
</html>
