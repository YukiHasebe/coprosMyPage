<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>営業マップ | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --copros-blue: #004098; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        #map { height: calc(100vh - 124px); width: 100%; z-index: 1; position: relative; }
        .search-bar-area { background: white; padding: 10px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: center; gap: 8px; z-index: 50; }
        .search-input { width: 100%; max-width: 400px; padding: 8px 16px; border-radius: 10px; border: 1px solid #cbd5e1; font-weight: 800; font-size: 13px; }
        .search-btn { background: var(--copros-blue); color: white; padding: 8px 20px; border-radius: 10px; font-weight: 900; font-size: 13px; }
        .map-control { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .control-btn { background: white; width: 42px; height: 42px; border-radius: 10px; display: flex; items-center: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #e2e8f0; color: #475569; }
        #geo-log { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1001; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 25px; font-size: 11px; font-weight: 800; display: none; text-align: center; }
        .popup-card { min-width: 200px; padding: 5px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <div id="header-placeholder"></div>
        <div class="search-bar-area shadow-sm">
            <input type="text" id="mapSearchInput" class="search-input" placeholder="地域名(下関市など)やお客様名で検索">
            <button onclick="window.execMapSearch()" class="search-btn">検索</button>
        </div>
        <div id="map">
            <div id="geo-log"></div>
            <div class="map-control">
                <button onclick="window.locateMe()" class="control-btn" title="現在地"><i class="fa-solid fa-location-crosshairs text-lg"></i></button>
                <button onclick="window.initMap('recent')" class="control-btn" title="再読込"><i class="fa-solid fa-arrows-rotate text-lg"></i></button>
                <button onclick="window.zoomToJapan()" class="control-btn" title="全体"><i class="fa-solid fa-map text-lg"></i></button>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, limit, updateDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const map = L.map('map', { zoomControl: false }).setView([35.6812, 139.7671], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
        let markersLayer = L.layerGroup().addTo(map);

        function log(msg, isError = false) {
            const el = document.getElementById('geo-log');
            el.style.display = 'block';
            el.style.color = isError ? '#ff4b4b' : '#fff';
            el.innerHTML = `<i class="fa-solid ${isError ? 'fa-circle-exclamation' : 'fa-spinner fa-spin'} mr-2"></i>${msg}`;
        }

        // 🌟 執念の解析関数（住所をどんどん短くして再試行する）
        async function getCoords(address) {
            if (!address) return null;
            // 住所を「スペース」や「ビル名」で細かく切る
            const parts = address.split(/[\s　]|ビル|館|階|F|様|号室/);
            
            // 試行する検索ワードのリストを作成
            const searchWords = [
                parts[0] + (parts[1] || ""), // 1. 県＋市＋番地（できればここまで）
                parts[0],                    // 2. 最初のカタマリだけ
                address.substring(0, 15)      // 3. 先頭15文字だけ
            ];

            for (let word of searchWords) {
                if (word.length < 5) continue; // 短すぎる言葉は無視
                try {
                    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent('日本 ' + word)}&limit=1`;
                    const res = await fetch(url, { headers: { "Accept-Language": "ja" } });
                    const data = await res.json();
                    if (data && data.length > 0) {
                        return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                    }
                    // 🌟 サービスの負荷制限を守るために2秒待機
                    await new Promise(r => setTimeout(r, 2000));
                } catch (e) { console.error(e); }
            }
            return null;
        }

        function addPin(c) {
            const color = (c.rank && c.rank.startsWith('A')) ? '#ff7e11' : '#0ea5e9';
            const icon = L.divIcon({ html: `<div style="background-color:${color}; width:16px; height:16px; border-radius:50%; border:2px solid white; box-shadow:0 3px 8px rgba(0,0,0,0.3);"></div>`, className: '', iconSize: [16, 16] });
            L.marker([c.lat, c.lng], { icon }).addTo(markersLayer)
                .bindPopup(`<b>${c.name}</b><br><small>${c.address}</small>`);
        }

        window.initMap = async (mode = 'recent', keyword = '') => {
            markersLayer.clearLayers();
            log("名簿からお客様を探しています...");
            try {
                const snap = await getDocs(query(collection(db, "customers"), limit(100)));
                let list = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                if (mode === 'search' && keyword) {
                    list = list.filter(c => (c.name||"").includes(keyword) || (c.address||"").includes(keyword));
                } else {
                    list.sort((a,b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));
                }

                let successCount = 0;
                let failCount = 0;

                for (const c of list) {
                    if (c.lat && c.lng) {
                        addPin(c);
                        successCount++;
                    } else if (c.address && c.address !== "未登録" && successCount < 5) {
                        log(`${c.name} の位置を特定中...`);
                        const coords = await getCoords(c.address);
                        if (coords) {
                            addPin({ ...c, ...coords });
                            await updateDoc(doc(db, "customers", c.id), coords);
                            successCount++;
                        } else {
                            failCount++;
                        }
                    }
                }

                if (successCount > 0) {
                    const group = new L.featureGroup(markersLayer.getLayers());
                    map.fitBounds(group.getBounds().pad(0.2));
                    document.getElementById('geo-log').style.display = 'none';
                } else {
                    log("ピンを立てられませんでした。住所を簡略化してください。", true);
                }
            } catch (e) { log("通信エラーが発生しました。", true); }
        };

        window.execMapSearch = () => {
            const val = document.getElementById('mapSearchInput').value.trim();
            if (val) window.initMap('search', val);
        };
        window.locateMe = () => map.locate({setView: true, maxZoom: 15});
        window.zoomToJapan = () => map.setView([35.6812, 139.7671], 5);

        window.initMap('recent');
    </script>
</body>
</html>
