<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>営業マップ | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --copros-blue: #004098; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        #map { height: calc(100vh - 124px); width: 100%; z-index: 1; }
        .search-bar-area { background: white; padding: 10px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: center; gap: 8px; z-index: 50; }
        .search-input { width: 100%; max-width: 400px; padding: 8px 16px; border-radius: 10px; border: 1px solid #cbd5e1; font-weight: 800; font-size: 13px; }
        .search-btn { background: var(--copros-blue); color: white; padding: 8px 20px; border-radius: 10px; font-weight: 900; }
        .map-control { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .control-btn { background: white; width: 42px; height: 42px; border-radius: 10px; display: flex; items-center: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #e2e8f0; color: #475569; }
        #geo-log { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1001; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 25px; font-size: 11px; font-weight: 800; display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <div id="header-placeholder"></div>
        <div class="search-bar-area shadow-sm">
            <input type="text" id="mapSearchInput" class="search-input" placeholder="地域名で検索（住所がある人のみヒット）">
            <button onclick="window.execMapSearch()" class="search-btn">検索</button>
        </div>
        <div id="map">
            <div id="geo-log"></div>
            <div class="map-control">
                <button onclick="window.locateMe()" class="control-btn" title="現在地"><i class="fa-solid fa-location-crosshairs"></i></button>
                <button onclick="window.repairPins()" class="control-btn" style="color:#ff7e11" title="ピンを10件だけ修理する"><i class="fa-solid fa-wrench"></i></button>
                <button onclick="window.initMap()" class="control-btn" title="再読込"><i class="fa-solid fa-sync"></i></button>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, limit, updateDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const map = L.map('map', { zoomControl: false }).setView([35.6812, 139.7671], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
        let markersLayer = L.layerGroup().addTo(map);

        function log(msg) {
            const el = document.getElementById('geo-log');
            el.style.display = 'block';
            el.innerHTML = msg;
        }

        function addPin(c) {
            const color = (c.rank && c.rank.startsWith('A')) ? '#ff7e11' : '#0ea5e9';
            const icon = L.divIcon({ html: `<div style="background-color:${color}; width:14px; height:14px; border-radius:50%; border:2px solid white; box-shadow:0 3px 8px rgba(0,0,0,0.3);"></div>`, className: '', iconSize: [14, 14] });
            L.marker([c.lat, c.lng], { icon }).addTo(markersLayer).bindPopup(`<b>${c.name}</b><br><small>${c.address}</small>`);
        }

        // 🌟 1. 初期表示：すでに座標がある人だけを100件出す（超エコ）
        window.initMap = async () => {
            markersLayer.clearLayers();
            log("名簿を読み込み中...");
            const q = query(collection(db, "customers"), limit(500)); // 手元に少し多めに持っておく
            const snap = await getDocs(q);
            const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            list.filter(c => c.lat && c.lng).forEach(c => addPin(c));
            
            if (markersLayer.getLayers().length > 0) {
                map.fitBounds(new L.featureGroup(markersLayer.getLayers()).getBounds().pad(0.1));
            }
            document.getElementById('geo-log').style.display = 'none';
        };

        // 🌟 2. ピンを修理する（ボタンを押した時だけ10件解析）
        window.repairPins = async () => {
            log("ピンがないお客様を10件だけ解析します...");
            const snap = await getDocs(query(collection(db, "customers"), limit(500)));
            const noPins = snap.docs.filter(d => !d.data().lat).slice(0, 10);
            
            for (const d of noPins) {
                const c = d.data();
                log(`${c.name} を解析中...`);
                // 解析ロジック（短くした住所で試行）
                const cleaned = c.address.split(/[\s　]|ビル|館|階/)[0];
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent('日本 ' + cleaned)}`);
                const data = await res.json();
                if (data && data.length > 0) {
                    const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                    await updateDoc(doc(db, "customers", d.id), coords);
                    addPin({ ...c, ...coords });
                }
                await new Promise(r => setTimeout(r, 2000));
            }
            log("修理完了！");
            setTimeout(() => document.getElementById('geo-log').style.display = 'none', 3000);
        };

        window.execMapSearch = () => { /* 手元のデータから検索するロジック（エコ） */ };
        window.locateMe = () => map.locate({setView: true, maxZoom: 15});
        window.zoomToJapan = () => map.setView([35.6812, 139.7671], 5);

        window.initMap();
    </script>
</body>
</html>
