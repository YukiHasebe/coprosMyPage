<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>営業マップ | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --copros-blue: #004098; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        
        /* 🌟 地図の高さ：ヘッダー(64px)と検索バー分を引く */
        #map { height: calc(100vh - 124px); width: 100%; z-index: 1; }

        /* 🌟 検索バー：ヘッダーの下にピタッと配置 */
        .search-bar-area { background: white; padding: 10px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: center; gap: 8px; z-index: 50; }
        .search-input { width: 100%; max-width: 400px; padding: 8px 16px; border-radius: 10px; border: 1px solid #cbd5e1; outline: none; font-weight: 800; font-size: 13px; }
        .search-btn { background: var(--copros-blue); color: white; padding: 8px 20px; border-radius: 10px; font-weight: 900; font-size: 13px; }

        /* 🌟 右側アイコン：重ならない位置に調整 */
        .map-control { position: absolute; top: 80px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .control-btn { background: white; width: 40px; height: 40px; border-radius: 10px; display: flex; items-center: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; color: #475569; }
        .control-btn:hover { background: var(--copros-orange); color: white; }

        .leaflet-popup-content-wrapper { border-radius: 1rem; }
        .popup-card { min-width: 200px; padding: 5px; }
        .nav-btn { background: var(--copros-blue); color: white; padding: 8px; border-radius: 6px; width: 100%; display: block; text-align: center; font-weight: 900; font-size: 11px; margin-top: 8px; text-decoration: none; }
        
        .map-legend { position: absolute; bottom: 20px; left: 20px; z-index: 1000; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 0.8rem; font-size: 9px; font-weight: 900; border: 1px solid #e2e8f0; }
        .legend-item { display: flex; items-center: center; gap: 6px; margin-bottom: 3px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        #geo-loader { position: absolute; top: 130px; left: 50%; transform: translateX(-50%); z-index: 1001; background: #334155; color: white; padding: 6px 15px; border-radius: 20px; font-size: 10px; font-weight: 800; display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <div id="header-placeholder"></div>

        <!-- 🌟 検索バー（ヘッダーと分離して配置） -->
        <div class="search-bar-area shadow-sm">
            <input type="text" id="mapSearchInput" class="search-input" placeholder="地域名(山口県など)やお客様名で検索">
            <button onclick="window.execMapSearch()" class="search-btn"><i class="fa-solid fa-magnifying-glass mr-1"></i>検索</button>
        </div>

        <div id="geo-loader">解析中...</div>

        <!-- 地図コントロール -->
        <div class="map-control">
            <button onclick="window.locateMe()" title="現在地" class="control-btn"><i class="fa-solid fa-location-crosshairs"></i></button>
            <button onclick="window.initMap('recent')" title="最近の100件" class="control-btn"><i class="fa-solid fa-sync"></i></button>
            <button onclick="window.zoomToJapan()" title="全体" class="control-btn"><i class="fa-solid fa-map"></i></button>
        </div>

        <div class="map-legend">
            <div class="legend-item"><div class="dot" style="background:#ff4500"></div><span>最重要 (Aa)</span></div>
            <div class="legend-item"><div class="dot" style="background:#ffa500"></div><span>重要 (A系)</span></div>
            <div class="legend-item"><div class="dot" style="background:#0ea5e9"></div><span>一般 (B系)</span></div>
            <div class="legend-item"><div class="dot" style="background:#004098"></div><span>取引先</span></div>
        </div>

        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, limit, updateDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const map = L.map('map', { zoomControl: false }).setView([35.6812, 139.7671], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' }).addTo(map);
        let markersLayer = L.layerGroup().addTo(map);

        window.locateMe = () => { map.locate({setView: true, maxZoom: 15}); };
        window.zoomToJapan = () => { map.setView([35.6812, 139.7671], 5); };

        function getPinColor(rank) {
            if (!rank) return '#94a3b8';
            if (rank === 'Aa') return '#ff4500';
            if (rank.startsWith('A')) return '#ffa500';
            if (rank.startsWith('B')) return '#0ea5e9';
            if (rank === '取引先') return '#004098';
            return '#94a3b8';
        }

        function addPin(c, id) {
            if (!c.lat || !c.lng) return;
            const color = getPinColor(c.rank);
            const icon = L.divIcon({ 
                html: `<div style="background-color:${color}; width:14px; height:14px; border-radius:50%; border:2px solid white; box-shadow:0 2px 5px rgba(0,0,0,0.3);"></div>`,
                className: '', iconSize: [14, 14] 
            });
            L.marker([c.lat, c.lng], { icon }).addTo(markersLayer)
                .bindPopup(`<div class="popup-card"><h3 class="font-black text-sm">${c.name}</h3><p class="text-[9px] mb-2">${c.address}</p><a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.address)}" target="_blank" class="nav-btn">ナビ開始</a></div>`);
        }

        async function getCoords(address) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await res.json();
                return (data && data.length > 0) ? { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) } : null;
            } catch (e) { return null; }
        }

        // 🌟 確実にピンを出すため、orderByを一旦削除してシンプルなクエリに変更
        window.initMap = async (mode = 'recent', keyword = '') => {
            markersLayer.clearLayers();
            const loader = document.getElementById('geo-loader');
            loader.style.display = 'block';

            try {
                let q = query(collection(db, "customers"), limit(100)); // 🌟 最も確実なクエリ

                if (mode === 'search' && keyword) {
                    // 名前での検索（前方一致）
                    q = query(collection(db, "customers"), where("name", ">=", keyword), where("name", "<=", keyword + "\uf8ff"), limit(50));
                }

                const snap = await getDocs(q);
                const needsGeo = [];

                snap.forEach(d => {
                    const c = d.data();
                    if (c.lat && c.lng) addPin(c, d.id);
                    else if (c.address && c.address !== "未登録") needsGeo.push({ id: d.id, data: c });
                });

                // 住所解析を5件だけ実行
                if (needsGeo.length > 0) {
                    for (let i = 0; i < Math.min(needsGeo.length, 5); i++) {
                        const target = needsGeo[i];
                        const coords = await getCoords(target.data.address);
                        if (coords) {
                            addPin({ ...target.data, ...coords }, target.id);
                            await updateDoc(doc(db, "customers", target.id), coords);
                        }
                        await new Promise(r => setTimeout(r, 1200));
                    }
                }
            } catch (e) { console.error(e); }
            loader.style.display = 'none';
        };

        window.execMapSearch = () => {
            const val = document.getElementById('mapSearchInput').value.trim();
            if (val) window.initMap('search', val);
        };

        window.initMap('recent');
    </script>
</body>
</html>
