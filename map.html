<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客地図 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- 地図用ライブラリ -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --copros-blue: #87ceeb; --sidebar-bg: #1a1a1a; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        #map { height: calc(100vh - 64px); width: 100%; z-index: 1; }
        
        /* プロ仕様の浮き出しコントロール */
        .map-control { position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .control-btn { background: white; width: 50px; height: 50px; border-radius: 15px; display: flex; items-center: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; transition: all 0.2s; color: #475569; }
        .control-btn:hover { background: var(--copros-orange); color: white; transform: scale(1.1); }
        
        /* ポップアップのデザイン */
        .leaflet-popup-content-wrapper { border-radius: 1.5rem; padding: 5px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .popup-card { min-width: 220px; }
        .nav-btn { background: #004098; color: white; padding: 8px; border-radius: 10px; width: 100%; display: block; text-align: center; font-weight: 900; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <div id="header-placeholder"></div>

        <!-- 地図コントロール -->
        <div class="map-control">
            <button onclick="locateMe()" title="現在地を表示" class="control-btn"><i class="fa-solid fa-location-crosshairs text-xl"></i></button>
            <button onclick="zoomToJapan()" title="全体を表示" class="control-btn"><i class="fa-solid fa-map-location-dot text-xl"></i></button>
        </div>

        <!-- 地図本体 -->
        <div id="map"></div>
    </main>

    <script src="common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AiZaSyDh00EZ7Jb1K2rTxLyTH6d80b4Qzcrwf_XI",
            authDomain: "copros-my-page.firebaseapp.com",
            projectId: "copros-my-page",
            storageBucket: "copros-my-page.firebasestorage.app",
            messagingSenderId: "54419849010",
            appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 地図の初期化
        const map = L.map('map', { zoomControl: false }).setView([35.6812, 139.7671], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // --- 便利機能関数の公開 ---
        window.locateMe = () => {
            map.locate({setView: true, maxZoom: 15});
        };
        window.zoomToJapan = () => {
            map.setView([35.6812, 139.7671], 5);
        };

        async function init() {
            try {
                const snap = await getDocs(collection(db, "customers"));
                const customers = snap.docs.map(doc => doc.data());
                
                // 顧客データを地図にプロット
                // ※本来は住所から座標(緯度経度)へ変換が必要ですが、今回は仮のランダム位置または座標データがある想定で動かします
                customers.forEach(c => {
                    if (c.lat && c.lng) { // 座標データがある場合
                        const marker = L.marker([c.lat, c.lng]).addTo(map);
                        marker.bindPopup(`
                            <div class="popup-card">
                                <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Customer Info</p>
                                <h3 class="text-base font-black text-slate-800 mb-1">${c.name}</h3>
                                <p class="text-[11px] text-slate-500 font-bold mb-2"><i class="fa-solid fa-location-dot mr-1"></i>${c.address || '住所未登録'}</p>
                                <div class="flex gap-2">
                                    <span class="text-[9px] font-black bg-orange-100 text-orange-600 px-2 py-0.5 rounded">RANK: ${c.rank || '--'}</span>
                                    <span class="text-[9px] font-black bg-blue-100 text-blue-600 px-2 py-0.5 rounded">${c.type || '--'}</span>
                                </div>
                                <a href="history.html?name=${encodeURIComponent(c.name)}" class="nav-btn"><i class="fa-solid fa-pen mr-1"></i> 実績を登録</a>
                                <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.address)}" target="_blank" class="text-center block text-[10px] text-blue-500 font-black mt-2 underline">Googleマップでナビ開始</a>
                            </div>
                        `);
                    }
                });
            } catch (e) { console.error("Firebaseリセット待ち、または座標未設定"); }
        }

        // 現在地が見つかった時の青い円
        map.on('locationfound', (e) => {
            L.circle(e.latlng, e.accuracy / 2).addTo(map);
            L.marker(e.latlng).addTo(map).bindPopup("あなたは今ここにいます").openPopup();
        });

        init();
    </script>
</body>
</html>
