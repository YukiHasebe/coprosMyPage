<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>営業マップ | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --copros-blue: #004098; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        #map { height: calc(100vh - 124px); width: 100%; z-index: 1; }
        .search-bar-area { background: white; padding: 10px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: center; gap: 8px; z-index: 50; }
        .search-input { width: 100%; max-width: 400px; padding: 8px 16px; border-radius: 10px; border: 1px solid #cbd5e1; font-weight: 800; }
        .search-btn { background: var(--copros-blue); color: white; padding: 8px 20px; border-radius: 10px; font-weight: 900; }
        .map-control { position: absolute; top: 80px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .control-btn { background: white; width: 40px; height: 40px; border-radius: 10px; display: flex; items-center: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        /* 🌟 解析ログを表示するエリア */
        #geo-log { position: absolute; top: 130px; left: 50%; transform: translateX(-50%); z-index: 1001; background: rgba(0,0,0,0.8); color: #adff2f; padding: 10px 20px; border-radius: 10px; font-family: monospace; font-size: 10px; display: none; max-width: 80%; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <div id="header-placeholder"></div>
        <div class="search-bar-area shadow-sm">
            <input type="text" id="mapSearchInput" class="search-input" placeholder="地域名やお客様名で検索">
            <button onclick="window.execMapSearch()" class="search-btn">検索</button>
        </div>
        <div id="geo-log"></div>
        <div class="map-control">
            <button onclick="window.locateMe()" class="control-btn"><i class="fa-solid fa-location-crosshairs"></i></button>
            <button onclick="window.initMap('recent')" class="control-btn"><i class="fa-solid fa-sync"></i></button>
            <button onclick="window.zoomToJapan()" class="control-btn"><i class="fa-solid fa-map"></i></button>
        </div>
        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, limit, updateDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const map = L.map('map', { zoomControl: false }).setView([35.6812, 139.7671], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' }).addTo(map);
        let markersLayer = L.layerGroup().addTo(map);

        function log(msg) {
            const el = document.getElementById('geo-log');
            el.style.display = 'block';
            el.innerHTML = `> ${msg}`;
        }

        async function getCoords(address) {
            try {
                // 🌟 日本を明示して解析精度を上げる
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent('日本 ' + address)}`);
                const data = await res.json();
                return (data && data.length > 0) ? { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) } : null;
            } catch (e) { return null; }
        }

        function addPin(c) {
            const color = (c.rank && c.rank.startsWith('A')) ? '#ff7e11' : '#0ea5e9';
            const icon = L.divIcon({ html: `<div style="background-color:${color}; width:14px; height:14px; border-radius:50%; border:2px solid white; box-shadow:0 2px 5px rgba(0,0,0,0.3);"></div>`, className: '', iconSize: [14, 14] });
            L.marker([c.lat, c.lng], { icon }).addTo(markersLayer).bindPopup(`<b>${c.name}</b><br><small>${c.address}</small>`);
        }

        window.initMap = async (mode = 'recent', keyword = '') => {
            markersLayer.clearLayers();
            try {
                log("データを読み込み中...");
                let q = query(collection(db, "customers"), limit(50));
                if (mode === 'search') q = query(collection(db, "customers"), where("name", ">=", keyword), where("name", "<=", keyword + "\uf8ff"), limit(20));
                
                const snap = await getDocs(q);
                const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                for (const c of list) {
                    if (c.lat && c.lng) {
                        addPin(c);
                    } else if (c.address && c.address !== "未登録") {
                        log(`${c.name} の住所を解析中...`);
                        const coords = await getCoords(c.address);
                        if (coords) {
                            await updateDoc(doc(db, "customers", c.id), coords);
                            addPin({ ...c, ...coords });
                        }
                        await new Promise(r => setTimeout(r, 1200)); // 1.2秒待機
                    }
                }
                log("解析完了！");
                setTimeout(() => document.getElementById('geo-log').style.display = 'none', 3000);
            } catch (e) { log("エラー発生: " + e.message); }
        };

        window.execMapSearch = () => {
            const val = document.getElementById('mapSearchInput').value.trim();
            if (val) window.initMap('search', val);
        };
        window.locateMe = () => map.locate({setView: true, maxZoom: 15});
        window.zoomToJapan = () => map.setView([35.6812, 139.7671], 5);

        window.initMap('recent');
    </script>
</body>
</html>
