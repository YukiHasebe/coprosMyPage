<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>実績一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --sidebar-bg: #1a1a1a; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        
        /* ページ切替：右寄せプロ仕様 */
        .modern-page-btn {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-weight: 800; font-size: 12px; transition: all 0.3s;
            color: #94a3b8; cursor: pointer; border: 1px solid transparent;
        }
        .modern-page-btn.active {
            background: #334155; color: white; border-color: #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .nav-arrow {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; background: white; color: var(--copros-orange); border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .nav-arrow:hover:not(.disabled) { border-color: var(--copros-orange); background: var(--copros-orange); color: white; }
        .nav-arrow.disabled { opacity: 0.3; cursor: default; }

        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        
        #detailSearchSection { display: none; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>

        <div class="flex-1 overflow-auto p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                
                <!-- ヘッドエリア -->
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-2">実績一覧</h1>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Activity History Log</p>
                    </div>
                    <div class="flex gap-3 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                        <button id="detailSearchToggle" class="px-5 py-2.5 text-slate-500 rounded-xl font-bold text-sm hover:bg-slate-50 transition-all flex items-center gap-2">
                            <i class="fa-solid fa-sliders text-blue-400"></i>詳細絞り込み
                        </button>
                        <div class="w-px h-6 bg-slate-100 my-auto"></div>
                        <!-- 新規登録ボタンを「青」に統一 -->
                        <button onclick="location.href='history.html'" class="px-6 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-sm hover:shadow-lg hover:shadow-blue-900/20 transition-all flex items-center gap-2">
                            <i class="fa-solid fa-plus-circle"></i>実績を新規作成
                        </button>
                    </div>
                </div>

                <!-- 詳細検索パネル -->
                <div id="detailSearchSection" class="mb-8 p-8 bg-white rounded-3xl shadow-xl border border-blue-50">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 text-xs font-bold">
                        <div class="space-y-2"><label class="text-slate-400">お客様名</label><input type="text" id="filterCustomer" class="form-input" placeholder="キーワード"></div>
                        <div class="space-y-2"><label class="text-slate-400">訪問者</label><input type="text" id="filterVisitor" class="form-input" placeholder="氏名検索"></div>
                        <div class="space-y-2"><label class="text-slate-400">期間（開始）</label><input type="date" id="startDate" class="form-input"></div>
                        <div class="space-y-2"><label class="text-slate-400">期間（終了）</label><input type="date" id="endDate" class="form-input"></div>
                    </div>
                    <div class="flex justify-center gap-4 mt-8">
                        <button id="execSearch" class="bg-[#334155] text-white px-12 py-3 rounded-xl font-bold shadow-lg hover:bg-black transition-all">検索を実行</button>
                        <button id="clearSearch" class="text-slate-400 px-8 py-3 rounded-xl font-bold hover:text-slate-600 transition-all">リセット</button>
                    </div>
                </div>

                <!-- プロ仕様ナビゲーション（上部） -->
                <div class="flex justify-between items-center mb-6 px-2">
                    <div class="flex items-center gap-2 h-8">
                        <span id="pageRange" class="text-xl font-black text-slate-800 tracking-tighter">0-0</span>
                        <span class="text-slate-300 font-bold">/</span>
                        <span id="totalCount" class="text-sm font-bold text-slate-400">0</span>
                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest ml-1">件の実績</span>
                    </div>
                    <div id="paginationTop" class="flex items-center gap-1.5"></div>
                </div>

                <!-- 実績テーブル -->
                <div class="table-container">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-white text-[10px] font-black uppercase tracking-widest">
                                <th class="p-6 text-center w-16 opacity-50">No</th>
                                <th class="p-6">お客様名</th>
                                <th class="p-6 text-center w-24">訪問回数</th>
                                <th class="p-6">訪問日時 / 滞在時間</th>
                                <th class="p-6">訪問者</th>
                                <th class="p-6">次回訪問予定</th>
                                <th class="p-6 text-center w-16"><i class="fa-solid fa-eye opacity-30"></i></th>
                            </tr>
                        </thead>
                        <tbody id="recordTable" class="divide-y divide-slate-100 text-sm font-bold">
                            <!-- JSで挿入 -->
                        </tbody>
                    </table>
                </div>

                <!-- ページネーション（下部） -->
                <div id="paginationBottom" class="mt-12 mb-24 flex justify-center items-center gap-1.5"></div>
            </div>
        </div>
    </main>

    <script src="common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AiZaSyDh00EZ7Jb1K2rTxLyTH6d80b4Qzcrwf_XI",
            authDomain: "copros-my-page.firebaseapp.com",
            projectId: "copros-my-page",
            storageBucket: "copros-my-page.firebasestorage.app",
            messagingSenderId: "54419849010",
            appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allRecords = [];
        let filteredData = [];
        let currentPage = 1;
        const perPage = 20;

        async function init() {
            try {
                const snap = await getDocs(query(collection(db, "activity_records"), orderBy("visitDate", "desc")));
                allRecords = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                filteredData = [...allRecords];
                updateView();
            } catch (e) { console.error(e); }
        }

        function calculateDuration(start, end) {
            if (!start || !end) return "";
            const s = start.split(':');
            const e = end.split(':');
            const diff = (parseInt(e[0]) * 60 + parseInt(e[1])) - (parseInt(s[0]) * 60 + parseInt(s[1]));
            return diff > 0 ? `${diff}分` : "";
        }

        function getCustomerVisitCount(customerName) {
            return allRecords.filter(r => r.customerName === customerName).length;
        }

        function updateView() {
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pagedData = filteredData.slice(start, end);
            renderTable(pagedData, start);
            renderPagination();
            document.getElementById('totalCount').innerText = filteredData.length;
            document.getElementById('pageRange').innerText = filteredData.length > 0 ? `${start + 1}-${Math.min(end, filteredData.length)}` : "0-0";
        }

        function renderTable(dataList, startIndex) {
            const tbody = document.getElementById('recordTable');
            tbody.innerHTML = "";
            dataList.forEach((data, index) => {
                const duration = calculateDuration(data.startTime, data.endTime);
                const visitCount = getCustomerVisitCount(data.customerName);
                
                const row = `
                    <tr class="hover:bg-blue-50/40 transition-all border-b border-slate-50">
                        <td class="p-6 text-center text-slate-300 font-mono text-xs">${startIndex + index + 1}</td>
                        <td class="p-6"><div class="text-base text-slate-800 leading-tight cursor-pointer hover:text-blue-600 font-black" onclick="location.href='customer_history.html?name=${encodeURIComponent(data.customerName)}'">${data.customerName}</div></td>
                        <td class="p-6 text-center"><span class="bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-xs">${visitCount}回</span></td>
                        <td class="p-6">
                            <div class="text-slate-800 font-mono">${data.visitDate.replace(/-/g, '/')}</div>
                            <div class="text-[10px] text-slate-400 mt-1">
                                ${data.startTime || '--:--'} 〜 ${data.endTime || '--:--'} 
                                <span class="text-blue-500 font-black ml-2">${duration ? '滞在: '+duration : ''}</span>
                            </div>
                        </td>
                        <td class="p-6">
                            <div class="text-slate-700">${data.visitorName}</div>
                            <div class="text-[9px] text-slate-400 font-black uppercase mt-0.5">${data.visitorRole || 'メイン'}</div>
                        </td>
                        <td class="p-6">
                            <div class="text-orange-500 text-xs">${data.nextVisitDate ? data.nextVisitDate.replace(/-/g, '/') : '--'}</div>
                        </td>
                        <td class="p-6 text-center">
                           <button class="text-slate-300 hover:text-blue-500 transition-colors" onclick="location.href='customer_history.html?name=${encodeURIComponent(data.customerName)}'">
                                <i class="fa-solid fa-circle-chevron-right text-lg"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / perPage);
            const containers = [document.getElementById('paginationTop'), document.getElementById('paginationBottom')];
            
            containers.forEach(container => {
                container.innerHTML = "";
                if (totalPages <= 1) return;

                const prev = document.createElement('div');
                prev.innerHTML = '<i class="fa-solid fa-arrow-left"></i>';
                prev.className = `nav-arrow prev ${currentPage === 1 ? 'disabled' : ''}`;
                prev.onclick = () => { if(currentPage > 1) { currentPage--; updateView(); window.scrollTo({top: 0, behavior: 'smooth'}); } };
                container.appendChild(prev);

                const startPage = Math.max(1, currentPage - 1);
                const endPage = Math.min(totalPages, startPage + 3);
                
                for (let i = startPage; i <= endPage; i++) {
                    const btn = document.createElement('div');
                    btn.innerText = i;
                    btn.className = `modern-page-btn ${currentPage === i ? 'active' : ''}`;
                    btn.onclick = () => { currentPage = i; updateView(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                    container.appendChild(btn);
                }

                const next = document.createElement('div');
                next.innerHTML = '<i class="fa-solid fa-arrow-right"></i>';
                next.className = `nav-arrow next ${currentPage === totalPages ? 'disabled' : ''}`;
                next.onclick = () => { if(currentPage < totalPages) { currentPage++; updateView(); window.scrollTo({top: 0, behavior: 'smooth'}); } };
                container.appendChild(next);
            });
        }

        document.getElementById('detailSearchToggle').onclick = () => {
            const sec = document.getElementById('detailSearchSection');
            sec.style.display = (sec.style.display === 'block') ? 'none' : 'block';
        };

        document.getElementById('execSearch').onclick = () => {
            const custK = document.getElementById('filterCustomer').value.toLowerCase();
            const visiK = document.getElementById('filterVisitor').value.toLowerCase();
            const startK = document.getElementById('startDate').value;
            const endK = document.getElementById('endDate').value;
            filteredData = allRecords.filter(d => {
                const mCust = !custK || d.customerName.toLowerCase().includes(custK);
                const mVisi = !visiK || d.visitorName.toLowerCase().includes(visiK);
                let mDate = true;
                if (startK && d.visitDate < startK) mDate = false;
                if (endK && d.visitDate > endK) mDate = false;
                return mCust && mVisi && mDate;
            });
            currentPage = 1; updateView();
        };

        document.getElementById('clearSearch').onclick = () => {
            document.querySelectorAll('#detailSearchSection input').forEach(i => i.value = "");
            filteredData = [...allRecords]; currentPage = 1; updateView();
        };

        init();
    </script>
</body>
</html>
