<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>実績一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .filter-btn.active { background: var(--copros-orange); color: white; box-shadow: 0 4px 12px rgba(255,126,17,0.3); }
        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        thead tr { background-color: #3c4b5a; }
        .modern-page-btn.active { background: #334155; color: white; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                <!-- ヘッドエリア -->
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-2">実績一覧</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Activity History V2</nav>
                    </div>
                    <div class="flex gap-3">
                        <select id="deptFilter" onchange="window.updateView()" class="p-3 bg-white border border-slate-200 rounded-xl font-bold text-xs shadow-sm outline-none">
                            <option value="ALL">全社表示</option>
                            <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option>
                        </select>
                        <button onclick="location.href='history.html'" class="px-6 py-3 bg-[#004098] text-white rounded-xl font-bold text-sm hover:shadow-lg transition-all flex items-center gap-2"><i class="fa-solid fa-plus-circle"></i>新規作成</button>
                    </div>
                </div>

                <!-- 50音フィルタ -->
                <div class="flex items-center gap-4 mb-6 overflow-x-auto pb-2 custom-scrollbar">
                    <div class="flex gap-1 p-1 bg-white rounded-xl border border-slate-200 shadow-sm font-black">
                        <button class="filter-btn active px-4 py-1.5 rounded-lg text-xs" data-range="all">全件</button>
                        <script>
                            ['あ','か','さ','た','な','は','ま','や','ら','わ','他'].forEach(k => document.write(`<button class="filter-btn px-3 py-1.5 rounded-lg text-xs text-slate-400" data-range="${k}">${k}</button>`));
                        </script>
                    </div>
                    <div class="text-slate-400 font-bold text-sm whitespace-nowrap"><span id="pageRange" class="text-slate-800 text-xl tracking-tighter">0-0</span> / <span id="totalCount">0</span> 件</div>
                </div>

                <div class="table-container overflow-x-auto mb-20">
                    <table class="w-full text-left border-collapse min-w-[1000px]">
                        <thead>
                            <tr class="text-white text-[10px] font-black uppercase text-center">
                                <th class="p-6 w-16 opacity-50">No</th><th class="p-6 text-left">お客様名</th><th class="p-6">訪問日時</th><th class="p-6">訪問者</th><th class="p-6">次回予定</th><th class="p-6 w-16">詳細</th>
                            </tr>
                        </thead>
                        <tbody id="recordTable" class="divide-y divide-slate-100 text-sm font-bold bg-white">
                            <!-- JS注入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allRecords = [];
        const rangeMap = { 'あ': /^[あ-おア-オ]/, 'か': /^[か-こカ-コが-ごガ-ゴ]/, 'さ': /^[さ-そサ-ソざ-ぞザ-ゾ]/, 'た': /^[た-とタ-トだ-どダ-ド]/, 'な': /^[な-のナ-ノ]/, 'は': /^[は-ほハ-ホば-ぼバ-ボぱ-ぽパ-ポ]/, 'ま': /^[ま-もマ-モ]/, 'や': /^[や-よヤ-ヨ]/, 'ら': /^[ら-ろラ-ロ]/, 'わ': /^[わ-んワ-ン]/ };

        async function init() {
            const tbody = document.getElementById('recordTable');
            tbody.innerHTML = `<tr><td colspan="6" class="p-16 text-center text-slate-400">データを読み込み中...</td></tr>`;
            try {
                // 🌟 最新100件を確実に取得。エラー回避のためorderByを使わずJSでソート
                const q = query(collection(db, "activity_records"), limit(100));
                const snap = await getDocs(q);
                allRecords = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                // 🌟 最新順（登録日順）にJSで並び替え
                allRecords.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                
                window.updateView();
            } catch (e) {
                console.error(e);
                tbody.innerHTML = `<tr><td colspan="6" class="p-16 text-center text-rose-400">データの取得に失敗しました。</td></tr>`;
            }
        }

        window.updateView = () => {
            const dept = document.getElementById('deptFilter').value;
            const range = document.querySelector('.filter-btn.active').dataset.range;

            let filtered = allRecords;
            if (dept !== 'ALL') filtered = filtered.filter(r => r.visitorDept === dept);
            if (range !== 'all') {
                if (range === '他') filtered = filtered.filter(r => !Object.values(rangeMap).some(re => re.test(r.customerName)));
                else filtered = filtered.filter(r => rangeMap[range].test(r.customerName));
            }

            renderTable(filtered);
        };

        function renderTable(dataList) {
            const tbody = document.getElementById('recordTable');
            if (dataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-16 text-center text-slate-400">実績が見つかりません。</td></tr>`;
                document.getElementById('totalCount').innerText = "0";
                return;
            }
            tbody.innerHTML = dataList.map((data, i) => `
                <tr class="hover:bg-blue-50/40 transition-all text-center">
                    <td class="p-6 text-slate-300 font-mono text-xs">${i+1}</td>
                    <td class="p-6 text-left font-black text-slate-800">${data.customerName || '不明'}</td>
                    <td class="p-6">
                        <div class="text-slate-600">${(data.visitDate || '').replace(/-/g,'/')}</div>
                        <div class="text-[10px] text-blue-500">${data.startTime || '--:--'}〜${data.endTime || '--:--'}</div>
                    </td>
                    <td class="p-6">${data.visitorName || '不明'}<br><span class="text-[9px] text-slate-400">${data.visitorDept || ''}</span></td>
                    <td class="p-6 text-orange-500 font-black">${(data.nextVisitDate || '--').replace(/-/g,'/')}</td>
                    <td class="p-6">
                        <button onclick="location.href='customer_history.html?name=${encodeURIComponent(data.customerName)}'" class="text-slate-300 hover:text-blue-600">
                            <i class="fa-solid fa-circle-chevron-right text-xl"></i>
                        </button>
                    </td>
                </tr>`).join('');
            document.getElementById('totalCount').innerText = dataList.length;
            document.getElementById('pageRange').innerText = dataList.length > 0 ? `1-${dataList.length}` : "0-0";
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                window.updateView();
            };
        });

        init();
    </script>
</body>
</html>
