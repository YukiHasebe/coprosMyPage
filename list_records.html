<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>実績一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .filter-btn { border: 1px solid #e2e8f0; color: #64748b; background: white; transition: all 0.2s; font-weight: 900; padding: 0.5rem 0.8rem; cursor: pointer; border-radius: 0.75rem; font-size: 0.75rem; }
        .filter-btn.active { background: var(--copros-orange) !important; color: white !important; border-color: var(--copros-orange); box-shadow: 0 4px 12px rgba(255,126,17,0.3); }
        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        .scope-select { background: #e2e8f0; border: none; padding: 0.4rem 1rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; color: #475569; outline: none; cursor: pointer; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                
                <div class="flex justify-between items-end mb-8 gap-4">
                    <div class="flex items-end gap-6">
                        <div>
                            <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-1">実績一覧</h1>
                            <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Activity History Log</nav>
                        </div>
                        <select id="deptFilter" onchange="window.executeSearch()" class="scope-select shadow-inner mb-2">
                            <option value="ALL">全ケコム関連 表示</option>
                            <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option>
                        </select>
                    </div>
                    <div class="flex flex-wrap gap-2 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100 items-center shrink-0 ml-auto">
                        <button onclick="document.getElementById('detailSearchSection').classList.toggle('hidden')" class="px-5 py-2.5 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 flex items-center gap-2 transition-all">
                            <i class="fa-solid fa-sliders text-blue-400"></i> 詳細検索
                        </button>
                        <div class="w-px h-6 bg-slate-100 mx-1"></div>
                        <button onclick="location.href='history.html'" class="px-8 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-xs hover:shadow-lg transition-all flex items-center gap-2 active:scale-95">
                            <i class="fa-solid fa-plus-circle"></i> 実績登録
                        </button>
                        <div class="w-px h-6 bg-slate-100 mx-1"></div>
                        <button onclick="window.bulkDelete()" class="px-5 py-2.5 text-rose-400 rounded-xl font-bold text-xs hover:bg-rose-50 flex items-center gap-2 transition-all">
                            <i class="fa-solid fa-trash-can"></i> 一括削除
                        </button>
                    </div>
                </div>

                <!-- 詳細検索エリア -->
                <div id="detailSearchSection" class="hidden mb-8 p-8 bg-white rounded-[2rem] shadow-xl border border-blue-50">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-xs font-bold">
                        <div class="space-y-2"><label class="text-slate-400">お客様名</label><input type="text" id="filterCustomer" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-orange-400" placeholder="お客様名で検索"></div>
                        <div class="space-y-2"><label class="text-slate-400">訪問者名</label><input type="text" id="filterVisitor" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-orange-400" placeholder="氏名検索"></div>
                        <div class="md:col-span-2 space-y-2"><label class="text-slate-400">訪問期間</label><div class="flex items-center gap-2"><input type="date" id="startDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl"><span>〜</span><input type="date" id="endDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl"></div></div>
                    </div>
                    <div class="flex justify-center gap-4 mt-8">
                        <button onclick="window.executeSearch()" class="bg-slate-800 text-white px-16 py-3 rounded-xl font-black shadow-lg active:scale-95 transition-all">検索を実行</button>
                        <button onclick="window.clearSearch()" class="text-slate-400 px-8 py-3 font-bold hover:text-slate-600 transition-colors">クリア</button>
                    </div>
                </div>

                <!-- 🌟 あかさたなフィルター：実績一覧版 -->
                <div class="flex items-center gap-6 mb-6 px-2">
                    <div id="syllabaryFilter" class="flex p-1.5 bg-white rounded-xl border border-slate-200 shadow-sm font-black items-center overflow-x-auto custom-scrollbar gap-1">
                        <button class="filter-btn active px-4 py-1.5 text-xs" onclick="window.setKanaFilter(this, 'all')">全件</button>
                        <script>['あ','か','さ','た','な','は','ま','や','ら','わ','他'].forEach(k => document.write(`<button class="filter-btn px-3 py-1.5 text-xs hover:text-orange-500" onclick="window.setKanaFilter(this, '${k}')">${k}</button>`));</script>
                    </div>
                    <div class="text-slate-400 font-bold text-sm whitespace-nowrap ml-auto bg-white px-5 py-2 rounded-full border border-slate-100 shadow-sm"><span id="totalDisplay" class="text-slate-800 text-xl tracking-tighter">0</span> <span class="text-[10px] uppercase font-black">Records Found</span></div>
                </div>

                <div class="table-container overflow-x-auto mb-24">
                    <table class="w-full text-left border-collapse min-w-[1100px]">
                        <thead>
                            <tr class="text-white text-[10px] font-black uppercase text-center tracking-widest">
                                <th class="p-6 w-16 opacity-50">No</th>
                                <th class="p-6 text-left w-[400px]">お客様名</th>
                                <th class="p-6 w-[200px]">訪問日時 / 滞在</th>
                                <th class="p-6 w-[180px]">訪問者</th>
                                <th class="p-6 w-20">履歴</th>
                                <th class="p-6 w-24 opacity-30"><i class="fa-solid fa-check-double"></i></th>
                            </tr>
                        </thead>
                        <tbody id="recordTable" class="divide-y divide-slate-100 text-sm font-bold bg-white text-center">
                            <tr><td colspan="6" class="p-20 text-center text-slate-400 font-bold italic animate-pulse">実績データを同期中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
       <script type="module">
        import { db, TARGET_DEPTS } from "./common.js";
        import { collection, getDocs, query, limit, doc, writeBatch, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allRecords = [];
        let currentKana = 'all';

        const clean = (s) => (s||"").toString().replace(/[\s\u3000]+/g, '').trim();

        function normalizeDate(str) {
            if (!str) return "0000-00-00";
            const d = str.toString().replace(/\//g, '-').split('-');
            if (d.length < 3) return str;
            return `${d[0]}-${d[1].padStart(2,'0')}-${d[2].padStart(2,'0')}`;
        }

        window.executeSearch = async () => {
            const tbody = document.getElementById('recordTable');
            tbody.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-slate-400 font-bold italic animate-pulse">データを取得中...</td></tr>`;
            
            const custK = document.getElementById('filterCustomer').value.trim();
            const visiK = document.getElementById('filterVisitor').value.trim();
            const startD = document.getElementById('startDate').value;
            const endD = document.getElementById('endDate').value;
            const dept = document.getElementById('deptFilter').value;

            try {
                // 🌟 【省エネと確実性の両立】
                // 部署フィルタがALLでない場合も、まずは日付順で取得しJS側でフィルタする方が「名寄せミス」を防げます
                let q = query(collection(db, "activity_records"), orderBy("visitDate", "desc"), limit(500));
                
                const snap = await getDocs(q);
                let data = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                // 🌟 JS側での徹底フィルタリング
                if (dept !== 'ALL') data = data.filter(r => clean(r.visitorDept) === clean(dept));
                if (custK) data = data.filter(r => (r.customerName||"").includes(custK));
                if (visiK) data = data.filter(r => (r.visitorName||"").includes(visiK));
                if (startD) data = data.filter(r => normalizeDate(r.visitDate) >= startD);
                if (endD) data = data.filter(r => normalizeDate(r.visitDate) <= endD);

                allRecords = data;
                window.updateView();
            } catch (e) {
                console.error(e);
                tbody.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-rose-400 font-bold">通信エラー: 権限または接続を確認してください</td></tr>`;
            }
        };

        window.setKanaFilter = (btn, kana) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'text-white'));
            btn.classList.add('active', 'text-white');
            currentKana = kana;
            window.updateView();
        };

        window.updateView = () => {
            let filtered = allRecords;
            const rangeMap = { 'あ': /^[あ-おア-オ安阿伊藤]/, 'か': /^[か-こカ-コ加河]/, 'さ': /^[さ-そサ-ソ佐佐藤]/, 'た': /^[た-とタ-トだ-ど田高]/, 'な': /^[な-のナ-ノ内中]/, 'は': /^[は-ほハ-ホ波橋]/, 'ま': /^[ま-もマ-モ前松]/, 'や': /^[や-よヤ-ヨ山谷]/, 'ら': /^[ら-ろラ-ロ]/, 'わ': /^[わ-んワ-ン]/ };
            
            if (currentKana !== 'all') {
                if (currentKana === '他') filtered = filtered.filter(r => !Object.values(rangeMap).some(re => re.test(r.customerName||"")));
                else filtered = filtered.filter(r => rangeMap[currentKana].test(r.customerName||""));
            }
            renderTable(filtered);
        };

        function renderTable(dataList) {
            const tbody = document.getElementById('recordTable');
            if (dataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-slate-300 font-bold uppercase tracking-widest">該当する実績はありません</td></tr>`;
                document.getElementById('totalDisplay').innerText = 0;
                return;
            }
            tbody.innerHTML = dataList.map((data, i) => {
                let dur = "";
                if(data.startTime && data.endTime && data.startTime !== "00:00") {
                    const s = data.startTime.split(':'), e = data.endTime.split(':');
                    const diff = (parseInt(e[0])*60+parseInt(e[1]||0)) - (parseInt(s[0])*60+parseInt(s[1]||0));
                    if(diff > 0) dur = `<div class="text-[#0ea5e9] text-[10px] mt-1 font-black"><i class="fa-regular fa-clock mr-1"></i>滞在: ${diff}分</div>`;
                }
                return `<tr class="hover:bg-sky-50/50 transition-colors">
                    <td class="p-6 text-slate-300 font-mono text-xs border-r border-slate-50">${i+1}</td>
                    <td class="p-6 text-left font-black text-slate-800 leading-snug w-[400px]">${data.customerName || '---'}</td>
                    <td class="p-6 w-[200px]"><div class="text-slate-600 font-mono text-sm">${(data.visitDate || '').replace(/-/g,'/')}</div><div class="text-[10px] text-slate-400 mt-0.5 font-bold uppercase">${data.startTime || '00:00'} 〜 ${data.endTime || '00:00'}</div>${dur}</td>
                    <td class="p-6 w-[180px] text-slate-700 font-bold">${data.visitorName || '不明'}<br><span class="text-[8px] text-slate-400 uppercase font-black tracking-tighter">${data.visitorDept || ''}</span></td>
                    <td class="p-6 text-center">
                        <button onclick="location.href='customer_history.html?name=${encodeURIComponent(data.customerName)}'" class="w-9 h-9 flex items-center justify-center bg-blue-50 text-[#004098] rounded-xl hover:bg-[#004098] hover:text-white mx-auto transition-all shadow-sm">
                            <i class="fa-solid fa-chevron-right text-xs"></i>
                        </button>
                    </td>
                    <td class="p-6 text-center">
                        <input type="checkbox" class="record-check w-5 h-5 accent-rose-500 rounded-md cursor-pointer border-slate-200" value="${data.id}">
                    </td>
                </tr>`;
            }).join('');
            document.getElementById('totalDisplay').innerText = dataList.length;
        }

        window.bulkDelete = async () => {
            const checks = document.querySelectorAll('.record-check:checked');
            if (!checks.length) return alert("削除したい実績にチェックを入れてください");
            if (!confirm(`${checks.length}件の実績を削除しますか？\n（カレンダーからも消去されます）`)) return;

            const batch = writeBatch(db);
            checks.forEach(cb => { batch.delete(doc(db, "activity_records", cb.value)); });
            
            try {
                await batch.commit();
                alert("一括削除が完了しました");
                window.executeSearch();
            } catch (e) { alert("削除に失敗しました"); }
        };

        window.clearSearch = () => {
            document.getElementById('filterCustomer').value = "";
            document.getElementById('filterVisitor').value = "";
            document.getElementById('startDate').value = "";
            document.getElementById('endDate').value = "";
            window.executeSearch();
        };

        window.executeSearch();
    </script>
</body>
</html>
