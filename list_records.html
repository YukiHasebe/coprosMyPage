<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>実績一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #1a1a1a;
            --header-bg: #3c4b5a;
            --accent-orange: #ff7e11;
            --primary-blue: #004098;
        }
        body { font-family: "Meiryo", sans-serif; background-color: #f4f7f9; }
        
        .sidebar { background-color: var(--sidebar-bg); width: 200px; }
        .nav-item { border-bottom: 1px solid #2d2d2d; transition: all 0.2s; color: #b8b8b8; }
        .nav-item:hover { background-color: #333; color: white; }
        .active-menu { background-color: #2d3748; border-left: 4px solid var(--accent-orange); color: white !important; }

        /* テーブルスタイル */
        .record-table thead th {
            background-color: #222;
            color: white;
            font-weight: normal;
            font-size: 13px;
            border: 1px solid #444;
            padding: 12px 8px;
            white-space: nowrap;
        }
        .record-table tbody td {
            font-size: 13px;
            border: 1px solid #e2e8f0;
            padding: 12px 10px;
        }
        .record-table tr:nth-child(even) { background-color: #f9fafb; }
        .record-table tr:hover { background-color: #fff9e6; }

        /* ページネーションボタン */
        .pg-btn {
            background-color: #000;
            color: white;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .pg-btn:hover { background-color: #444; }
        .pg-btn-active {
            background-color: #fff;
            color: #000;
            border: 1px solid #000;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- サイドバー（完全版） -->
    <aside class="sidebar flex-shrink-0 text-white flex flex-col shadow-2xl">
        <div class="p-4 text-xs font-bold text-gray-500 border-b border-gray-800 tracking-widest uppercase">Menu</div>
        <nav class="flex-1 overflow-y-auto">
            <a href="list.html" class="nav-item block px-5 py-4 text-sm flex items-center"><i class="fa-solid fa-users w-6"></i> お客様</a>
            <a href="list_records.html" class="nav-item active-menu block px-5 py-4 text-sm flex items-center"><i class="fa-solid fa-file-invoice w-6"></i> 実績</a>
            <a href="#" class="nav-item block px-5 py-4 text-sm flex items-center"><i class="fa-solid fa-calendar-days w-6"></i> カレンダー</a>
            <a href="#" class="nav-item block px-5 py-4 text-sm flex items-center"><i class="fa-solid fa-envelope-open-text w-6"></i> 回覧一覧</a>
            <a href="#" class="nav-item block px-5 py-4 text-sm flex items-center"><i class="fa-solid fa-map-location-dot w-6"></i> 地図</a>
            <a href="#" class="nav-item block px-5 py-4 text-sm flex items-center"><i class="fa-solid fa-clock w-6"></i> アポイント</a>
            <a href="#" class="nav-item block px-5 py-4 text-sm flex items-center"><i class="fa-solid fa-chart-line w-6"></i> 集計</a>
            <a href="#" class="nav-item block px-5 py-4 text-sm flex items-center"><i class="fa-solid fa-gears w-6"></i> マスタ管理</a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- ヘッダー -->
        <header class="h-14 bg-[#3c4b5a] flex items-center justify-between px-6 text-white shadow-md z-10">
            <div class="flex items-center gap-4">
                <span class="text-xl font-bold tracking-tighter text-[#87ceeb]">株式会社コプロス</span>
                <div class="relative ml-4 flex">
                    <input type="text" placeholder="お客様名を入力してください" class="w-80 py-1 px-3 text-sm text-gray-800 rounded-l focus:outline-none border-none">
                    <button class="bg-[#eee] text-[#333] px-5 py-1 text-sm rounded-r font-bold hover:bg-gray-300 transition-colors border-none">検　索</button>
                </div>
            </div>
            <div class="text-xs font-medium flex items-center gap-4">
                <span class="bg-gray-700 px-3 py-1 rounded">篠原 栄 殿</span>
            </div>
        </header>

        <!-- コンテンツエリア -->
        <div class="flex-1 overflow-auto p-8">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-700 flex items-center">
                            <i class="fa-solid fa-file-lines mr-3 text-gray-400"></i>実績一覧
                        </h1>
                        <button class="mt-4 bg-[#004098] hover:bg-blue-900 text-white px-8 py-2 rounded text-sm font-bold shadow-md transition-transform active:scale-95">詳細検索</button>
                    </div>
                    <div class="flex gap-4 items-center">
                        <div class="text-sm text-gray-500 bg-white p-2 rounded shadow-sm border border-gray-100">
                            <input type="text" value="20" class="w-10 border-b border-gray-300 text-center focus:outline-none font-bold text-gray-700"> 件 
                            <button class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded text-xs ml-2 font-bold border border-gray-300 transition-colors">表示</button>
                        </div>
                        <a href="history.html" class="bg-[#ff7e11] hover:bg-[#e66f00] text-white px-6 py-2 rounded shadow-md font-bold text-sm transition-transform active:scale-95">
                            <i class="fa-solid fa-pen-to-square mr-2"></i>実績を新規作成
                        </a>
                    </div>
                </div>

                <!-- ページネーション（上） -->
                <div class="flex items-center gap-1 mb-3">
                    <button class="pg-btn">«</button>
                    <button class="pg-btn"><</button>
                    <button class="pg-btn pg-btn-active">1</button>
                    <button class="pg-btn">2</button>
                    <button class="pg-btn">3</button>
                    <button class="pg-btn">></button>
                    <button class="pg-btn">»</button>
                    <span class="ml-4 text-xs font-bold text-gray-500 tracking-wider">1～20 / 2,665件</span>
                </div>

                <!-- 実績テーブル -->
                <div class="bg-white shadow-2xl rounded-lg overflow-hidden border border-gray-200">
                    <table class="w-full record-table">
                        <thead>
                            <tr>
                                <th class="w-12 text-center">No</th>
                                <th class="text-left">お客様名</th>
                                <th class="w-32">属性・区分</th>
                                <th class="w-24">顧客ランク</th>
                                <th class="w-24">訪問回数</th>
                                <th class="w-44 text-left">最終訪問日時</th>
                                <th class="w-32 text-left">最終訪問者</th>
                                <th class="w-44 text-left">次回訪問予定日時</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- サンプル行 1 -->
                            <tr>
                                <td class="text-center text-gray-400 font-mono">1</td>
                                <td class="text-left font-bold text-[#004098] hover:underline cursor-pointer">株式会社大阪工営</td>
                                <td class="text-center text-gray-600">コンサル</td>
                                <td class="text-center"><span class="bg-blue-50 px-2 py-0.5 rounded text-blue-700 font-bold border border-blue-100 text-[11px]">Bd</span></td>
                                <td class="text-center font-mono font-bold text-gray-700">14</td>
                                <td class="text-gray-600">2026/03/10 10:00</td>
                                <td class="text-gray-800 font-medium">吉野 正則</td>
                                <td class="text-gray-400 italic text-[11px]">--</td>
                            </tr>
                            <!-- サンプル行 2 -->
                            <tr>
                                <td class="text-center text-gray-400 font-mono">2</td>
                                <td class="text-left font-bold text-[#004098] hover:underline cursor-pointer">中央コンサルタンツ株式会社</td>
                                <td class="text-center text-gray-600">コンサル</td>
                                <td class="text-center"><span class="bg-gray-50 px-2 py-0.5 rounded text-gray-700 font-bold border border-gray-200 text-[11px]">Cd</span></td>
                                <td class="text-center font-mono font-bold text-gray-700">38</td>
                                <td class="text-gray-600">2026/03/10 09:00</td>
                                <td class="text-gray-800 font-medium">吉野 正則</td>
                                <td class="text-gray-400 italic text-[11px]">--</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- ページネーション（下） -->
                <div class="mt-4 flex items-center gap-1">
                    <button class="pg-btn">«</button>
                    <button class="pg-btn"><</button>
                    <button class="pg-btn pg-btn-active">1</button>
                    <button class="pg-btn">2</button>
                    <button class="pg-btn">3</button>
                    <button class="pg-btn">></button>
                    <button class="pg-btn">»</button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
