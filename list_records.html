<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>実績一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #004098; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .filter-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; border: 1px solid #e2e8f0; }
        .filter-btn.active { background: var(--copros-orange); color: white; border-color: var(--copros-orange); box-shadow: 0 4px 12px rgba(255,126,17,0.3); transform: translateY(-1px); }
        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        .scope-select { background: #e2e8f0; border: none; padding: 0.4rem 1rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; color: #475569; outline: none; appearance: none; cursor: pointer; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                <!-- ヘッドエリア -->
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 gap-6">
                    <div class="flex items-end gap-4 lg:gap-6">
                        <div>
                            <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-2">実績一覧</h1>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Activity History</p>
                        </div>
                        <div class="mb-2">
                            <select id="deptFilter" onchange="window.updateView()" class="scope-select shadow-inner">
                                <option value="ALL">全社表示</option>
                                <option>ケコム部</option><option>関西支店</option><option>関東支店</option>
                                <option>中部営業所</option><option>土木部</option><option>建築部</option>
                                <option>建機部</option><option>総務部</option><option>購買課</option>
                                <option>宮崎産商</option><option>企画部</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-3 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100 w-full lg:w-auto items-center">
                        <button id="detailSearchToggle" class="flex-1 lg:flex-none px-5 py-2.5 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-sliders text-blue-400"></i>詳細検索
                        </button>
                        <div class="w-px h-6 bg-slate-100 mx-1"></div>
                        <button id="bulkDeleteBtn" class="flex-1 lg:flex-none px-5 py-2.5 text-rose-400 rounded-xl font-bold text-xs hover:bg-rose-50 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-trash-can"></i>一括削除
                        </button>
                        <div class="hidden lg:block w-px h-6 bg-slate-100 mx-1"></div>
                        <button onclick="location.href='history.html'" class="flex-1 lg:flex-none px-6 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-xs hover:shadow-lg flex items-center justify-center gap-2">
                            <i class="fa-solid fa-plus-circle"></i>実績登録
                        </button>
                    </div>
                </div>

                <!-- 詳細検索パネル -->
                <div id="detailSearchSection" class="hidden mb-8 p-8 bg-white rounded-3xl shadow-xl border border-blue-50">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-xs font-bold">
                        <div class="space-y-2">
                            <label class="text-slate-400">お客様名</label>
                            <input type="text" id="filterCustomer" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="キーワード">
                        </div>
                        <div class="space-y-2">
                            <label class="text-slate-400">訪問者名</label>
                            <input type="text" id="filterVisitor" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="氏名">
                        </div>
                        <div class="md:col-span-2 space-y-2">
                            <label class="text-slate-400">訪問期間</label>
                            <div class="flex items-center gap-2">
                                <input type="date" id="startDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                                <span class="text-slate-300">〜</span>
                                <input type="date" id="endDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-center gap-4 mt-8">
                        <button onclick="window.updateView()" class="bg-[#334155] text-white px-12 py-3 rounded-xl font-bold shadow-lg hover:bg-slate-700 transition-all">検索実行</button>
                        <button onclick="window.clearSearch()" class="text-slate-400 px-8 py-3 font-bold hover:text-slate-600">クリア</button>
                    </div>
                </div>

                <!-- 50音フィルタ -->
                <div class="flex items-center gap-4 mb-6 overflow-x-auto pb-2 custom-scrollbar">
                    <div class="flex gap-1 p-1 bg-white rounded-xl border border-slate-200 shadow-sm font-black">
                        <button class="filter-btn active px-4 py-1.5 rounded-lg text-xs" data-range="all">全件</button>
                        <script>
                            ['あ','か','さ','た','な','は','ま','や','ら','わ','他'].forEach(k => {
                                document.write(`<button class="filter-btn px-3 py-1.5 rounded-lg text-xs text-slate-400 bg-slate-50" data-range="${k}" onclick="window.setKanaFilter(this)">${k}</button>`);
                            });
                        </script>
                    </div>
                    <div class="text-slate-400 font-bold text-sm whitespace-nowrap">
                        <span id="pageRange" class="text-slate-800 text-xl tracking-tighter">0</span> / <span id="totalCount">0</span> 件
                    </div>
                </div>

                <div class="table-container custom-scrollbar overflow-x-auto mb-24">
                    <table class="w-full text-left border-collapse min-w-[1000px]">
                        <thead>
                            <tr class="text-white text-[10px] font-black uppercase tracking-widest text-center">
                                <th class="p-6 w-16 opacity-50">No</th>
                                <th class="p-6 text-left">お客様名</th>
                                <th class="p-6">訪問日時 / 滞在時間</th>
                                <th class="p-6">訪問者</th>
                                <th class="p-6">次回予定</th>
                                <th class="p-6 w-16 opacity-30">履歴</th>
                                <th class="p-6 w-16 opacity-30"><i class="fa-solid fa-check-double"></i></th>
                            </tr>
                        </thead>
                        <tbody id="recordTable" class="divide-y divide-slate-100 text-sm font-bold bg-white">
                            <!-- JS注入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, limit, doc, deleteDoc, writeBatch, where, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allRecords = [];
        const rangeMap = { 'あ': /^[あ-おア-オ]/, 'か': /^[か-こカ-コが-ごガ-ゴ]/, 'さ': /^[さ-そサ-ソざ-ぞザ-ゾ]/, 'た': /^[た-とタ-トだ-どダ-ド]/, 'な': /^[な-のナ-ノ]/, 'は': /^[は-ほハ-ホば-ぼバ-ボぱ-ぽパ-ポ]/, 'ま': /^[ま-もマ-モ]/, 'や': /^[や-よヤ-ヨ]/, 'ら': /^[ら-ろラ-ロ]/, 'わ': /^[わ-んワ-ン]/ };

        async function init() {
            const tbody = document.getElementById('recordTable');
            tbody.innerHTML = `<tr><td colspan="7" class="p-16 text-center text-slate-400 font-bold italic">実績データを読み込み中...</td></tr>`;
            try {
                // 省エネ：最新200件をまず取得（1日50人利用でも余裕）
                const q = query(collection(db, "activity_records"), orderBy("visitDate", "desc"), limit(200));
                const snap = await getDocs(q);
                allRecords = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                window.updateView();
            } catch (e) {
                console.error(e);
                tbody.innerHTML = `<tr><td colspan="7" class="p-16 text-center text-rose-400">読み込みに失敗しました。</td></tr>`;
            }
        }

        window.setKanaFilter = (btn) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'text-white'));
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.add('text-slate-400'));
            btn.classList.add('active', 'text-white');
            btn.classList.remove('text-slate-400');
            window.updateView();
        };

        window.updateView = () => {
            const dept = document.getElementById('deptFilter').value;
            const range = document.querySelector('.filter-btn.active').dataset.range;
            const custK = (document.getElementById('filterCustomer').value || "").toLowerCase();
            const visiK = (document.getElementById('filterVisitor').value || "").toLowerCase();
            const startK = document.getElementById('startDate').value;
            const endK = document.getElementById('endDate').value;

            let filtered = allRecords;

            if (dept !== 'ALL') filtered = filtered.filter(r => r.visitorDept === dept);
            if (custK) filtered = filtered.filter(r => (r.customerName||"").toLowerCase().includes(custK));
            if (visiK) filtered = filtered.filter(r => (r.visitorName||"").toLowerCase().includes(visiK));
            if (startK) filtered = filtered.filter(r => r.visitDate >= startK);
            if (endK) filtered = filtered.filter(r => r.visitDate <= endK);

            if (range !== 'all') {
                if (range === '他') filtered = filtered.filter(r => !Object.values(rangeMap).some(re => re.test(r.customerName)));
                else filtered = filtered.filter(r => rangeMap[range].test(r.customerName));
            }
            renderTable(filtered);
        };

        function renderTable(dataList) {
            const tbody = document.getElementById('recordTable');
            if (dataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-16 text-center text-slate-400 font-bold italic">該当する実績が見つかりませんでした。</td></tr>`;
                document.getElementById('totalCount').innerText = "0";
                document.getElementById('pageRange').innerText = "0";
                return;
            }

            tbody.innerHTML = dataList.map((data, i) => {
                let durationText = "";
                if(data.startTime && data.endTime) {
                    const s = data.startTime.split(':'); const e = data.endTime.split(':');
                    const diff = (parseInt(e[0]||0)*60+parseInt(e[1]||0)) - (parseInt(s[0]||0)*60+parseInt(s[1]||0));
                    if(diff > 0) durationText = `<span class="text-blue-500 ml-1">(${diff}分)</span>`;
                }
                return `
                    <tr class="hover:bg-blue-50/40 transition-all text-center">
                        <td class="p-6 text-slate-300 font-mono text-xs border-r border-slate-50">${i+1}</td>
                        <td class="p-6 text-left font-black text-slate-800">${data.customerName || '不明'}</td>
                        <td class="p-6">
                            <div class="text-slate-600 font-mono">${(data.visitDate || '').replace(/-/g,'/')}</div>
                            <div class="text-[10px] text-slate-400 mt-1 uppercase font-black">${data.startTime || '--:--'} 〜 ${data.endTime || '--:--'} ${durationText}</div>
                        </td>
                        <td class="p-6 text-slate-700 font-bold">${data.visitorName || '不明'}<br><span class="text-[9px] text-slate-400 font-black uppercase">${data.visitorDept || ''}</span></td>
                        <td class="p-6 text-emerald-500 font-black font-mono">${(data.nextVisitDate || '--').replace(/-/g,'/')}</td>
                        <td class="p-6">
                            <button onclick="location.href='customer_history.html?name=${encodeURIComponent(data.customerName)}'" class="text-slate-200 hover:text-blue-600 transition-colors">
                                <i class="fa-solid fa-circle-chevron-right text-xl"></i>
                            </button>
                        </td>
                        <td class="p-6 text-center">
                            <input type="checkbox" class="record-check w-5 h-5 accent-rose-500 rounded-md cursor-pointer" value="${data.id}" data-customer="${data.customerName}">
                        </td>
                    </tr>
                `;
            }).join('');

            document.getElementById('totalCount').innerText = dataList.length;
            document.getElementById('pageRange').innerText = dataList.length;
        }

        document.getElementById('bulkDeleteBtn').onclick = async () => {
            const checked = document.querySelectorAll('.record-check:checked');
            if (checked.length === 0) return alert("削除する項目を選んでください");
            if (!confirm(`${checked.length}件の実績を消去します。名簿の訪問回数も自動修正されます。よろしいですか？`)) return;

            const batch = writeBatch(db);
            const customersToUpdate = new Set();
            checked.forEach(cb => {
                batch.delete(doc(db, "activity_records", cb.value));
                customersToUpdate.add(cb.dataset.customer);
            });

            try {
                await batch.commit();
                // 削除後、対象顧客の名簿を再集計（誠実なデータ巻き戻し）
                for (const custName of customersToUpdate) {
                    const q = query(collection(db, "activity_records"), where("customerName", "==", custName));
                    const snap = await getDocs(q);
                    const records = snap.docs.map(d => d.data()).sort((a,b) => (b.visitDate||"").localeCompare(a.visitDate||""));
                    
                    const qCust = query(collection(db, "customers"), where("name", "==", custName), limit(1));
                    const snapCust = await getDocs(qCust);
                    if (!snapCust.empty) {
                        await updateDoc(snapCust.docs[0].ref, {
                            visitCount: records.length,
                            lastVisit: records.length > 0 ? records[0].visitDate.replace(/-/g,'/') : "未訪問"
                        });
                    }
                }
                alert("削除と名簿の再集計が完了しました。");
                init();
            } catch (e) { alert("失敗しました"); }
        };

        document.getElementById('detailSearchToggle').onclick = () => document.getElementById('detailSearchSection').classList.toggle('hidden');
        window.clearSearch = () => {
            document.querySelectorAll('#detailSearchSection input').forEach(i => i.value = "");
            document.getElementById('deptFilter').value = "ALL";
            window.updateView();
        };

        init();
    </script>
</body>
</html>
