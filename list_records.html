<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>実績一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --sidebar-bg: #1a1a1a; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        
        .filter-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; }
        .filter-btn.active { background: var(--copros-orange); color: white; box-shadow: 0 4px 12px rgba(255,126,17,0.3); transform: translateY(-1px); }

        .modern-page-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 800; font-size: 12px; transition: all 0.3s; color: #94a3b8; cursor: pointer; border: 1px solid transparent; }
        .modern-page-btn.active { background: #334155; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        
        #detailSearchSection { display: none; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .scope-select { 
            background: #e2e8f0; border: none; padding: 0.4rem 1rem; border-radius: 0.75rem; 
            font-size: 0.75rem; font-weight: 900; color: #475569; outline: none; appearance: none;
            cursor: pointer; transition: all 0.2s;
        }
        .scope-select:hover { background: #cbd5e1; }
        
        /* スクロールバーのカスタマイズ */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>

        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                
                <!-- ヘッドエリア -->
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 lg:mb-10 gap-6">
                    <div class="flex items-end gap-4 lg:gap-6">
                        <div>
                            <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-2">実績一覧</h1>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Activity History</p>
                        </div>
                        <div class="mb-2">
                            <select id="deptFilter" onchange="window.updateView()" class="scope-select shadow-inner">
                                <option value="ALL">全社表示</option>
                                <option>ケコム部</option><option>関西支店</option><option>関東支店</option>
                                <option>中部営業所</option><option>土木部</option><option>建築部</option>
                                <option>建機部</option><option>総務部</option><option>購買課</option>
                                <option>宮崎産商</option><option>企画部</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex gap-2 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100 w-full lg:w-auto">
                        <button id="detailSearchToggle" class="flex-1 lg:flex-none px-4 py-2.5 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-sliders text-blue-400"></i>絞り込み
                        </button>
                        <div class="hidden lg:block w-px h-6 bg-slate-100 my-auto"></div>
                        <button onclick="location.href='history.html'" class="flex-1 lg:flex-none px-5 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-xs hover:shadow-lg transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-plus-circle"></i>新規作成
                        </button>
                    </div>
                </div>

                <!-- 詳細検索 -->
                <div id="detailSearchSection" class="mb-8 p-6 bg-white rounded-3xl shadow-xl border border-blue-50">
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 text-xs font-bold">
                        <div class="space-y-2"><label class="text-slate-400 pl-1">お客様名</label><input type="text" id="filterCustomer" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="キーワード"></div>
                        <div class="space-y-2"><label class="text-slate-400 pl-1">訪問者</label><input type="text" id="filterVisitor" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="氏名"></div>
                        <div class="space-y-2"><label class="text-slate-400 pl-1">開始日</label><input type="date" id="startDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none"></div>
                        <div class="space-y-2"><label class="text-slate-400 pl-1">終了日</label><input type="date" id="endDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none"></div>
                    </div>
                    <div class="flex justify-center gap-4 mt-8">
                        <button onclick="window.updateView()" class="bg-[#334155] text-white px-10 py-3 rounded-xl font-bold shadow-lg hover:bg-black transition-all">検索実行</button>
                        <button onclick="clearSearch()" class="text-slate-400 px-6 py-3 rounded-xl font-bold hover:text-slate-600 transition-all">クリア</button>
                    </div>
                </div>

                <!-- 50音・件数 -->
                <div class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 px-2">
                    <div class="flex items-center gap-4 w-full lg:w-auto overflow-x-auto pb-2 lg:pb-0 custom-scrollbar">
                        <div class="flex gap-1 p-1 bg-white rounded-xl border border-slate-200 shadow-sm font-black">
                            <button class="filter-btn active px-4 py-1.5 rounded-lg text-xs" data-range="all">全件</button>
                            <script>
                                ['あ','か','さ','た','な','は','ま','や','ら','わ','他'].forEach(k => {
                                    document.write(`<button class="filter-btn px-3 py-1.5 rounded-lg text-xs text-slate-400" data-range="${k}">${k}</button>`);
                                });
                            </script>
                        </div>
                    </div>
                    <div class="flex items-center justify-between w-full lg:w-auto gap-6 px-2">
                        <div class="flex items-center gap-2 border-l-2 border-slate-200 pl-6 h-8">
                            <span id="pageRange" class="text-xl font-black text-slate-800 tracking-tighter">0-0</span>
                            <span class="text-sm font-bold text-slate-400 ml-2">/ <span id="totalCount">0</span> 件</span>
                        </div>
                        <div id="paginationTop" class="flex items-center gap-1.5"></div>
                    </div>
                </div>

                <div class="table-container custom-scrollbar overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[1000px]">
                        <thead>
                            <tr class="text-white text-[10px] font-black uppercase tracking-widest text-center">
                                <th class="p-6 w-16 opacity-50 text-center">No</th>
                                <th class="p-6 text-left">お客様名</th>
                                <th class="p-6 w-24">訪問回数</th>
                                <th class="p-6 text-left">訪問日時 / 滞在時間</th>
                                <th class="p-6 text-left">訪問者</th>
                                <th class="p-6 text-left">次回予定</th>
                                <th class="p-6 w-16 opacity-30"><i class="fa-solid fa-eye"></i></th>
                            </tr>
                        </thead>
                        <tbody id="recordTable" class="divide-y divide-slate-100 text-sm font-bold"></tbody>
                    </table>
                </div>
                <div id="paginationBottom" class="mt-12 mb-24 flex justify-center items-center gap-1.5"></div>
            </div>
        </div>
    </main>

    <script src="common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./common.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allRecords = [];
        let filteredData = [];
        let currentPage = 1;
        const perPage = 20;
        let current50on = 'all';

        async function init() {
            try {
                // 🌟 197万回防止：最新100件リミット
                const q = query(collection(db, "activity_records"), orderBy("visitDate", "desc"), limit(100));
                const snap = await getDocs(q);
                allRecords = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                window.updateView();
            } catch (e) { console.error("Firebaseリセット待ち", e); }
        }

        window.updateView = () => {
            const deptK = document.getElementById('deptFilter').value;
            const custK = (document.getElementById('filterCustomer').value || "").toLowerCase();
            const visiK = (document.getElementById('filterVisitor').value || "").toLowerCase();
            const startK = document.getElementById('startDate').value;
            const endK = document.getElementById('endDate').value;
            const rangeMap = { 'あ': /^[あ-おア-オ]/, 'か': /^[か-こカ-コが-ごガ-ゴ]/, 'さ': /^[さ-そサ-ソざ-ぞザ-ゾ]/, 'た': /^[た-とタ-トだ-どダ-ド]/, 'な': /^[な-のナ-ノ]/, 'は': /^[は-ほハ-ホば-ぼバ-ボぱ-ぽパ-ポ]/, 'ま': /^[ま-もマ-モ]/, 'や': /^[や-よヤ-ヨ]/, 'ら': /^[ら-ろラ-ロ]/, 'わ': /^[わ-んワ-ン]/ };

            filteredData = allRecords.filter(d => {
                const mDept = deptK === 'ALL' || d.visitorDept === deptK;
                const mCust = !custK || (d.customerName||"").toLowerCase().includes(custK);
                const mVisi = !visiK || (d.visitorName||"").toLowerCase().includes(visiK);
                let mDate = true;
                if (startK && d.visitDate < startK) mDate = false;
                if (endK && d.visitDate > endK) mDate = false;
                let m50on = current50on === 'all' ? true : (current50on === '他' ? !Object.values(rangeMap).some(re => re.test(d.customerName)) : (d.customerName && rangeMap[current50on].test(d.customerName)));
                return mDept && mCust && mVisi && mDate && m50on;
            });

            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            renderTable(filteredData.slice(start, end), start);
            renderPagination();
            document.getElementById('totalCount').innerText = filteredData.length;
            document.getElementById('pageRange').innerText = filteredData.length > 0 ? `${start + 1}-${Math.min(end, filteredData.length)}` : "0-0";
        };

        function renderTable(dataList, startIndex) {
            const tbody = document.getElementById('recordTable');
            tbody.innerHTML = "";
            dataList.forEach((data, index) => {
                const duration = calculateDuration(data.startTime, data.endTime);
                const visitCount = allRecords.filter(r => r.customerName === data.customerName).length;
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-blue-50/40 transition-all border-b border-slate-50">
                        <td class="p-6 text-center text-slate-300 font-mono text-xs">${startIndex + index + 1}</td>
                        <td class="p-6">
                            <div class="text-base text-slate-800 leading-tight cursor-pointer hover:text-blue-600 font-black" 
                                 onclick="location.href='customer_history.html?name=${encodeURIComponent(data.customerName || '')}'">
                                 ${data.customerName || '名称未設定'}
                            </div>
                        </td>
                        <td class="p-6 text-center"><span class="bg-slate-100 text-slate-500 px-4 py-1.5 rounded-full text-xs">${visitCount}回</span></td>
                        <td class="p-6">
                            <div class="text-slate-800 font-mono">${(data.visitDate || '').replace(/-/g, '/')}</div>
                            <div class="text-[10px] text-slate-400 mt-1">${data.startTime || '--:--'} 〜 ${data.endTime || '--:--'} 
                                <span class="text-blue-500 font-black ml-2">${duration ? '滞在: '+duration : ''}</span>
                            </div>
                        </td>
                        <td class="p-6">
                            <div class="text-slate-700">${data.visitorName || '未登録'}</div>
                            <div class="text-[9px] text-slate-400 font-black uppercase mt-0.5">${data.visitorRole || 'メイン'}</div>
                        </td>
                        <td class="p-6"><div class="text-orange-500 text-xs font-bold">${(data.nextVisitDate || '--').replace(/-/g, '/')}</div></td>
                        <td class="p-6 text-center">
                            <button class="text-slate-200 hover:text-blue-500" onclick="location.href='customer_history.html?name=${encodeURIComponent(data.customerName || '')}'">
                                <i class="fa-solid fa-circle-chevron-right text-lg"></i>
                            </button>
                        </td>
                    </tr>
                `);
            });
        }

        function calculateDuration(s, e) { 
            if (!s || !e) return ""; 
            const sp = s.split(':'); const ep = e.split(':'); 
            const d = (parseInt(ep[0])*60+parseInt(ep[1]))-(parseInt(sp[0])*60+parseInt(sp[1])); 
            return d>0 ? d+'分' : ""; 
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / perPage);
            const containers = [document.getElementById('paginationTop'), document.getElementById('paginationBottom')];
            containers.forEach(container => {
                container.innerHTML = "";
                if (totalPages <= 1) return;
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('div');
                    btn.innerText = i;
                    btn.className = `modern-page-btn ${currentPage === i ? 'active' : ''}`;
                    btn.onclick = () => { currentPage = i; window.updateView(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                    container.appendChild(btn);
                }
            });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                current50on = btn.dataset.range;
                currentPage = 1;
                window.updateView();
            };
        });

        document.getElementById('detailSearchToggle').onclick = () => {
            const sec = document.getElementById('detailSearchSection');
            sec.style.display = (sec.style.display === 'block') ? 'none' : 'block';
        };

        window.clearSearch = () => {
            document.querySelectorAll('#detailSearchSection input').forEach(i => i.value = "");
            document.getElementById('deptFilter').value = "ALL";
            current50on = 'all';
            currentPage = 1;
            window.updateView();
        };

        init();
    </script>
</body>
</html>
