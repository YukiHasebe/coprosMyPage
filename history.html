    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #1a1a1a;
            --header-bg: #3c4b5a;
            --accent-orange: #ff7e11;
            --primary-blue: #004098;
        }
        body { font-family: "Meiryo", sans-serif; background-color: #f4f7f9; }
        
        /* サイドバー共通 */
        .sidebar { background-color: var(--sidebar-bg); width: 200px; }
        .nav-item { border-bottom: 1px solid #2d2d2d; transition: all 0.2s; color: #b8b8b8; }
        .nav-item:hover { background-color: #333; color: white; }
        .active-menu { background-color: #2d3748; border-left: 4px solid var(--accent-orange); color: white !important; }

        /* 入力エリアの質感 */
        .form-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        .form-table th { 
            width: 220px; background-color: #fff; text-align: left; padding: 18px; 
            font-size: 14px; color: #444; border-bottom: 1px solid #eee; vertical-align: top;
        }
        .form-table td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .form-input { 
            width: 100%; border: 1px solid #d1d5db; padding: 10px; border-radius: 6px; 
            transition: all 0.2s; outline: none; font-size: 14px;
        }
        .form-input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(0, 64, 152, 0.1); }

        .required-tag {
            background-color: #fff1f0; color: #d8514d; border: 1px solid #ffa39e;
            font-size: 10px; padding: 1px 4px; border-radius: 2px; margin-left: 8px;
        }

        .btn-blue { background-color: var(--primary-blue); color: white; padding: 6px 15px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .btn-action { transition: transform 0.1s; cursor: pointer; }
        .btn-action:active { transform: scale(0.98); }
    </style>
</head>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. Firebase設定
    const firebaseConfig = {
        apiKey: "AIzaSyDhOEZ7Jb1K2rTxLyTH6d8ob4Qzcrwf_XI",
        authDomain: "copros-my-page.firebaseapp.com",
        projectId: "copros-my-page",
        storageBucket: "copros-my-page.firebasestorage.app",
        messagingSenderId: "54419849010",
        appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 2. 保存処理
    async function saveHistory(e) {
        e.preventDefault(); 

        const historyData = {
            customerName: document.querySelector('input[placeholder="キーワードを入力"]')?.value || "",
            visitDate: document.querySelector('input[type="date"]')?.value || "",
            customerFeedback: document.querySelectorAll('textarea')[2]?.value || "",
            staffOpinion: document.querySelectorAll('textarea')[3]?.value || "",
            visitor: "篠原 栄", 
            createdAt: serverTimestamp()
        };

        if (!historyData.customerName || !historyData.visitDate) {
            alert("「お客様名」と「訪問日」を入力してください。");
            return;
        }

        try {
            await addDoc(collection(db, "visit_records"), historyData);
            alert("実績を登録しました！実績一覧へ戻ります。");
            window.location.href = "list_records.html"; 
        } catch (error) {
            console.error("Error:", error);
            alert("保存に失敗しました。設定を確認してください。");
        }
    }

    // 3. ボタンの設定（上下のボタン両方を「登 録」にし、イベントを設定）
    document.addEventListener('DOMContentLoaded', () => {
        const btns = document.querySelectorAll('button');
        btns.forEach(btn => {
            // 文字を「登 録」に統一（スペースありに合わせる）
            if (btn.innerText.includes('登録') || btn.innerText.includes('実績を登録する')) {
                btn.innerText = "登 録"; 
                btn.type = "button"; // 画面リロード防止
                btn.onclick = saveHistory; // 保存機能を紐付け
            }
        });
    });
</script>
