<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>組織員情報一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; --copros-navy: #004098; --copros-blue: #87ceeb; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .filter-btn { border: 1px solid #e2e8f0; color: #64748b; background: white; transition: all 0.2s; font-weight: 900; padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 0.75rem; font-size: 0.75rem; white-space: nowrap; }
        /* 🌟 部署ボタンのアクティブ表示 */
        .filter-btn.active { background: var(--copros-navy) !important; color: white !important; border-color: var(--copros-navy); box-shadow: 0 4px 12px rgba(0,64,152,0.2); }
        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 900; border-width: 1px; white-space: nowrap; display: inline-block; min-width: 60px; text-align: center; }
        .status-on { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
        .status-off { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-4">
                    <div>
                        <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-1">組織員情報一覧</h1>
                        <nav class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Organization Staff Master</nav>
                    </div>
                    <div class="flex flex-wrap gap-2 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100 items-center shrink-0 ml-auto">
                        <button onclick="document.getElementById('staffSearchSection').classList.toggle('hidden')" class="px-5 py-2.5 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 flex items-center gap-2 transition-all">
                            <i class="fa-solid fa-magnifying-glass text-blue-400"></i> 名前検索
                        </button>
                        <div class="w-px h-6 bg-slate-100 mx-1"></div>
                        <button onclick="location.href='staff_add.html'" class="px-8 py-2.5 bg-[#ff7e11] text-white rounded-xl font-bold text-xs hover:shadow-lg transition-all flex items-center gap-2 active:scale-95">
                            <i class="fa-solid fa-plus text-[10px]"></i> 新規登録
                        </button>
                        <div class="w-px h-6 bg-slate-100 mx-1"></div>
                        <button onclick="window.bulkDelete()" class="px-5 py-2.5 text-rose-400 rounded-xl font-bold text-xs hover:bg-rose-50 flex items-center gap-2 transition-all">
                            <i class="fa-solid fa-trash-can"></i> 一括削除
                        </button>
                    </div>
                </div>

                <!-- 🌟 検索エリア -->
                <div id="staffSearchSection" class="hidden mb-8 p-6 bg-white rounded-2xl shadow-lg border border-blue-50">
                    <div class="flex gap-4 items-end">
                        <div class="flex-1 space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Name Search</label>
                            <input type="text" id="searchName" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-orange-400 font-bold" placeholder="氏名を入力（漢字・かな）">
                        </div>
                        <button onclick="window.applySearch()" class="bg-slate-800 text-white px-10 py-3 rounded-xl font-black shadow-md hover:bg-black transition-all">検索</button>
                        <button onclick="window.clearSearch()" class="text-slate-400 px-4 py-3 font-bold hover:text-slate-600">クリア</button>
                    </div>
                </div>

                <!-- 🌟 部署抽出フィルター：あかさたなから変更 -->
                <div class="flex items-center gap-6 mb-8 overflow-x-auto pb-2 custom-scrollbar">
                    <div id="deptButtons" class="flex gap-2">
                        <button class="filter-btn active" data-dept="ALL">全社員</button>
                        <button class="filter-btn" data-dept="ケコム部">ケコム部</button>
                        <button class="filter-btn" data-dept="関西支店">関西支店</button>
                        <button class="filter-btn" data-dept="関東支店">関東支店</button>
                        <button class="filter-btn" data-dept="中部営業所">中部営業所</button>
                        <button class="filter-btn" data-dept="他">その他部署</button>
                    </div>
                    <div class="text-slate-400 font-bold text-sm whitespace-nowrap ml-auto bg-white px-4 py-2 rounded-full border border-slate-100"><span id="totalDisplay" class="text-slate-800 text-xl tracking-tighter">0</span> <span class="text-[10px] uppercase">Staffs Found</span></div>
                </div>

                <div class="table-container overflow-x-auto mb-24">
                    <table class="w-full text-left border-collapse min-w-[1000px]">
                        <thead>
                            <tr class="text-white text-[10px] font-black uppercase text-center tracking-widest">
                                <th class="p-6 w-16 opacity-50">No</th>
                                <th class="p-6 text-left">氏名 (ID)</th>
                                <th class="p-6">所属部署</th>
                                <th class="p-6">メールアドレス</th>
                                <th class="p-6 w-24">権限</th>
                                <th class="p-6 w-32">状態</th>
                                <th class="p-6 w-16 opacity-30"><i class="fa-solid fa-check-double"></i></th>
                            </tr>
                        </thead>
                        <tbody id="staffTable" class="divide-y divide-slate-100 text-sm font-bold bg-white text-center">
                            <tr><td colspan="7" class="p-20 text-center text-slate-400 font-bold italic">同期中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db, TARGET_DEPTS } from "./common.js";
        import { collection, getDocs, doc, deleteDoc, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allStaffs = [];

        async function init() {
            try {
                // 安全のため全読み込み（全件といっても100人程度なので省エネ範囲内）
                const snap = await getDocs(query(collection(db, "staffs"), orderBy("name")));
                allStaffs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTable(allStaffs);
            } catch (e) { 
                console.error(e);
                document.getElementById('staffTable').innerHTML = '<tr><td colspan="7" class="p-20 text-center text-rose-400 font-bold italic">データの同期に失敗しました</td></tr>';
            }
        }

        function renderTable(dataList) {
            const tbody = document.getElementById('staffTable');
            tbody.innerHTML = dataList.map((data, i) => `
                <tr class="hover:bg-sky-50/50 border-b border-slate-50 transition-colors">
                    <td class="p-6 text-slate-300 font-mono text-xs border-r border-slate-50 text-center">${i+1}</td>
                    <td class="p-6 text-left">
                        <div class="font-black text-slate-800 cursor-pointer hover:text-[#ff7e11]" onclick="location.href='staff_add.html?id=${data.id}'">
                            ${data.name || '不明'} <span class="text-[10px] text-slate-300 ml-1">#${data.id || ''}</span>
                        </div>
                    </td>
                    <td class="p-6 text-slate-500 text-center text-xs font-bold">${data.dept || '-'}</td>
                    <td class="p-6 text-slate-400 font-mono text-xs text-center">${data.email || '--'}</td>
                    <td class="p-6 text-center text-[10px] font-black uppercase text-slate-400">${data.role || '一般'}</td>
                    <td class="p-6 text-center">
                        <span class="status-badge ${data.status === '有効' ? 'status-on' : 'status-off'}">${data.status || '有効'}</span>
                    </td>
                    <td class="p-6 text-center">
                        <input type="checkbox" class="staff-check w-5 h-5 accent-rose-500 rounded-md cursor-pointer border-slate-200" data-id="${data.id}">
                    </td>
                </tr>`).join('');
            document.getElementById('totalDisplay').innerText = dataList.length;
        }

        // 🌟 部署ボタンによる抽出ロジック
        document.querySelectorAll('#deptButtons .filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('#deptButtons .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const targetDept = btn.dataset.dept;
                let filtered = allStaffs;
                
                if (targetDept === '他') {
                    filtered = allStaffs.filter(s => !TARGET_DEPTS.includes(s.dept));
                } else if (targetDept !== 'ALL') {
                    filtered = allStaffs.filter(s => s.dept === targetDept);
                }
                renderTable(filtered);
            };
        });

        window.applySearch = () => {
            const name = document.getElementById('searchName').value.toLowerCase();
            const filtered = allStaffs.filter(s => !name || (s.name||"").includes(name));
            renderTable(filtered);
        };

        window.clearSearch = () => {
            document.getElementById('searchName').value = "";
            renderTable(allStaffs);
        };

        window.bulkDelete = async () => {
            const checks = document.querySelectorAll('.staff-check:checked');
            if (!checks.length) return alert("削除したい社員の右端にチェックを入れてください");
            if (!confirm(`選択された${checks.length}件を削除しますか？\n（この操作は取り消せません）`)) return;

            try {
                const batch = writeBatch(db);
                checks.forEach(cb => { batch.delete(doc(db, "staffs", cb.dataset.id)); });
                await batch.commit();
                alert("削除が完了しました");
                location.reload();
            } catch (e) { alert("削除に失敗しました"); }
        };

        init();
    </script>
</body>
</html>
