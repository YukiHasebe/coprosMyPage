<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アポイント登録 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #004098; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .form-input { width: 100%; padding: 0.8rem 1rem; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-weight: 600; transition: all 0.2s; font-size: 0.95rem; }
        .form-input:focus { outline: none; border-color: var(--copros-blue); background-color: white; box-shadow: 0 0 0 4px rgba(0, 64, 152, 0.1); }
        .label-text { font-size: 0.85rem; font-weight: 800; color: #475569; margin-bottom: 0.6rem; display: block; }
        .section-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); padding: 1.5rem; lg:padding: 2.5rem; margin-bottom: 2rem; }
        .section-title { font-size: 0.75rem; font-weight: 900; color: #94a3b8; letter-spacing: 0.1em; border-bottom: 2px solid #f1f5f9; padding-bottom: 0.5rem; margin-bottom: 2rem; text-transform: uppercase; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 1rem; }
        .modal-content { background: white; width: 95%; max-width: 450px; border-radius: 1.5rem; overflow: hidden; animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .staff-item { padding: 1rem 1.5rem; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-weight: 600; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .staff-item:hover { background: #f8fafc; color: var(--copros-orange); }
        .staff-item.selected { background: #eff6ff; color: var(--copros-blue); border-left: 4px solid var(--copros-blue); }
        .suggestion-box { position: absolute; width: 100%; top: 100%; left: 0; z-index: 50; background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; max-height: 200px; overflow-y: auto; display: none; }
        .suggestion-item { padding: 0.8rem 1rem; cursor: pointer; font-weight: 600; font-size: 0.9rem; border-bottom: 1px solid #f8fafc; }
        .suggestion-item:hover { background-color: #f1f5f9; color: var(--copros-blue); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1000px] mx-auto">
                
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-4">
                    <div>
                        <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-1">アポイント登録</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Kekom Sales - Forward Planning</nav>
                    </div>
                    <div class="flex gap-2 w-full lg:w-auto">
                        <button type="button" onclick="location.href='calendar.html'" class="flex-1 lg:flex-none px-6 py-2.5 bg-white border border-slate-200 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 transition-all shadow-sm">戻る</button>
                        <button type="button" id="submitBtnTop" class="flex-1 lg:flex-none px-10 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-sm hover:shadow-lg transition-all flex items-center justify-center gap-2 active:scale-95 shadow-md">
                            <i class="fa-solid fa-paper-plane"></i> 登録を実行
                        </button>
                    </div>
                </div>

                <form id="appointForm">
                    <div class="section-card">
                        <p class="section-title">訪問予定の基本情報</p>
                        <div class="space-y-8">
                            <div class="relative w-full">
                                <label class="label-text">お客様名 <span class="text-rose-500">*</span></label>
                                <input type="text" id="customerSearch" placeholder="お客様名を検索..." class="form-input" autocomplete="off" required>
                                <div id="customerSuggestions" class="suggestion-box custom-scrollbar"></div>
                            </div>
                            <div>
                                <label class="label-text">訪問予定日時 <span class="text-rose-500">*</span></label>
                                <div class="flex flex-wrap items-center gap-4">
                                    <input type="date" id="appointDate" class="form-input w-full sm:w-52" required>
                                    <div class="flex items-center bg-slate-50 rounded-xl border border-slate-200 px-4 py-2 shadow-inner">
                                        <i class="fa-regular fa-clock text-slate-400 mr-2"></i>
                                        <input type="time" id="startTime" class="bg-transparent outline-none font-bold text-sm w-20" required>
                                        <span class="text-slate-400 mx-3 font-black">〜</span>
                                        <input type="time" id="endTime" class="bg-transparent outline-none font-bold text-sm w-20" required>
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div>
                                    <label class="label-text">訪問予定者 <span class="text-rose-500">*</span></label>
                                    <div class="flex gap-2">
                                        <input type="text" id="visitorName" class="form-input bg-blue-50 text-blue-700 font-bold" readonly>
                                        <button type="button" onclick="window.openStaffModal('visitor')" class="px-5 bg-white border border-slate-200 rounded-xl text-xs font-black shadow-sm shrink-0 hover:bg-slate-50 transition-all">選択</button>
                                    </div>
                                </div>
                                <div><label class="label-text">内容（仮）</label><input type="text" id="appointSubject" placeholder="例：定期訪問、見積提出など" class="form-input"></div>
                            </div>
                        </div>
                    </div>

                    <div class="section-card">
                        <p class="section-title">通知設定（回覧）</p>
                        <div class="space-y-6">
                            <button type="button" onclick="window.openStaffModal('circular')" class="px-8 py-2.5 bg-slate-800 text-white rounded-xl text-xs font-black shadow-md hover:bg-black transition-all">回覧者を選択</button>
                            <div id="circularDisplay" class="p-6 bg-slate-50 border border-slate-200 rounded-2xl min-h-[80px] text-sm font-bold text-slate-500 leading-relaxed">未選択</div>
                        </div>
                    </div>
                    
                    <div class="flex justify-center gap-4 py-12 border-t border-slate-100 mt-10">
                        <button type="button" onclick="window.saveDraft()" class="px-10 py-3 bg-white border border-slate-200 text-slate-400 rounded-xl font-bold text-sm shadow-sm hover:bg-slate-50 transition-all">下書きを保存</button>
                        <button type="button" id="submitBtnBottom" onclick="document.getElementById('submitBtnTop').click()" class="px-20 py-4 bg-[#004098] text-white rounded-xl font-black text-sm hover:shadow-xl flex items-center gap-3 active:scale-95 transition-all">
                            <i class="fa-solid fa-paper-plane"></i> 登録を確定
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="staffModal" class="modal-overlay">
        <div class="modal-content">
            <div class="bg-slate-900 p-4 text-white flex justify-between items-center"><span id="modalTitle" class="font-black text-xs uppercase tracking-widest">Select Member</span><i class="fa-solid fa-xmark cursor-pointer hover:text-rose-400" onclick="window.closeModal()"></i></div>
            <div class="p-4 bg-slate-50 border-b border-slate-100">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="staffKeyword" oninput="window.renderStaffList()" placeholder="氏名検索..." class="p-3 rounded-lg border border-slate-200 text-xs font-bold outline-none focus:border-blue-400 shadow-sm">
                    <select id="staffDeptFilter" onchange="window.renderStaffList()" class="p-3 rounded-lg border border-slate-200 text-xs font-bold outline-none focus:border-blue-400 shadow-sm">
                        <option value="ALL">全ケコム関連</option>
                        <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option>
                    </select>
                </div>
            </div>
            <div id="staffList" class="overflow-y-auto custom-scrollbar" style="height: 320px;"></div>
            <div class="p-4 bg-slate-50 grid grid-cols-3 gap-2 border-t border-slate-100">
                <button onclick="window.applySelection()" class="col-span-2 py-4 bg-[#004098] text-white rounded-xl font-black shadow-lg active:scale-95">決定する</button>
                <button onclick="window.clearModalSelection()" class="py-4 bg-white border border-slate-200 text-slate-400 rounded-xl font-bold hover:bg-slate-100 transition-all">クリア</button>
            </div>
        </div>
    </div>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db, TARGET_DEPTS } from "./common.js";
        import { collection, getDocs, addDoc, serverTimestamp, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allStaffs = [], modalSelected = [], currentTarget = '';

        async function init() {
            document.getElementById('visitorName').value = sessionStorage.getItem('userName') || "";
            document.getElementById('appointDate').valueAsDate = new Date();
            try {
                // 🌟 【省エネ ＆ ケコム限定】最初から4部署の社員だけを狙い撃ちで取得
                const q = query(collection(db, "staffs"), where("dept", "in", TARGET_DEPTS), orderBy("name"));
                const snap = await getDocs(q);
                allStaffs = snap.docs.map(d => d.data());
                
                setupCustomerSearch();
            } catch (e) { console.error("Init Error:", e); }
        }

        function setupCustomerSearch() {
            const input = document.getElementById('customerSearch'), box = document.getElementById('customerSuggestions');
            let timeout = null;
            input.oninput = () => {
                clearTimeout(timeout);
                const val = input.value.trim();
                if (val.length < 1) { box.style.display = 'none'; return; }
                timeout = setTimeout(async () => {
                    const q = query(collection(db, "customers"), where("name", ">=", val), where("name", "<=", val + "\uf8ff"), limit(10));
                    const snap = await getDocs(q);
                    box.innerHTML = snap.docs.map(d => `<div class="suggestion-item">${d.data().name}</div>`).join('');
                    box.style.display = snap.empty ? 'none' : 'block';
                }, 400);
            };
            box.onclick = (e) => { if (e.target.classList.contains('suggestion-item')) { input.value = e.target.innerText; box.style.display = 'none'; } };
        }

        window.openStaffModal = (target) => {
            currentTarget = target;
            document.getElementById('modalTitle').innerText = target === 'visitor' ? '訪問予定者を選択' : '通知先を選択';
            document.getElementById('staffModal').style.display = 'flex';
            const cur = (target === 'visitor') ? document.getElementById('visitorName').value : document.getElementById('circularDisplay').innerText;
            modalSelected = (cur && cur !== '未選択') ? cur.split(', ') : [];
            window.renderStaffList();
        };

        window.closeModal = () => document.getElementById('staffModal').style.display = 'none';

        window.renderStaffList = () => {
            const kw = document.getElementById('staffKeyword').value.toLowerCase();
            const dp = document.getElementById('staffDeptFilter').value;
            const container = document.getElementById('staffList');
            
            // 🌟 4部署限定フィルタ
            const filtered = allStaffs.filter(s => (!kw || s.name.includes(kw)) && (dp === 'ALL' || s.dept === dp));
            
            container.innerHTML = filtered.map(s => `
                <div class="staff-item ${modalSelected.includes(s.name) ? 'selected' : ''}" onclick="window.toggleStaffSelection('${s.name}')">
                    <span>${s.name}</span><span class="text-[9px] opacity-40 uppercase font-black tracking-widest">${s.dept || ''}</span>
                </div>`).join('');
        };

        window.toggleStaffSelection = (name) => {
            if (currentTarget === 'visitor') modalSelected = [name];
            else { if (modalSelected.includes(name)) modalSelected = modalSelected.filter(n => n !== name); else modalSelected.push(name); }
            window.renderStaffList();
        };

        window.applySelection = () => {
            const names = modalSelected.join(', ');
            if (currentTarget === 'visitor') document.getElementById('visitorName').value = names;
            else document.getElementById('circularDisplay').innerText = names || '未選択';
            window.closeModal();
        };

        window.clearModalSelection = () => { modalSelected = []; window.renderStaffList(); };

        const handleRegister = async () => {
            const form = document.getElementById('appointForm');
            if (!form.checkValidity()) { form.reportValidity(); return; }
            const btn = document.getElementById('submitBtnTop');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>保存中...';
            
            const vName = document.getElementById('visitorName').value;
            const staff = allStaffs.find(s => s.name === vName);
            const vDept = staff ? staff.dept : "不明";

            try {
                await addDoc(collection(db, "appointments"), {
                    customerName: document.getElementById('customerSearch').value,
                    appointDate: document.getElementById('appointDate').value,
                    startTime: document.getElementById('startTime').value,
                    endTime: document.getElementById('endTime').value,
                    visitorName: vName,
                    visitorDept: vDept,
                    subject: document.getElementById('appointSubject').value,
                    createdAt: serverTimestamp()
                });

                const cDisp = document.getElementById('circularDisplay').innerText;
                const cNames = (cDisp !== '未選択' && cDisp !== '') ? cDisp.split(', ') : [];
                for (const name of cNames) {
                    await addDoc(collection(db, "notifications"), {
                        recipient: name, visitorName: vName, customerName: document.getElementById('customerSearch').value,
                        isRead: false, content: "【アポ】" + (document.getElementById('appointSubject').value || "予定"),
                        appointDate: document.getElementById('appointDate').value,
                        createdAt: serverTimestamp(), type: "アポ回覧"
                    });
                }
                localStorage.removeItem('cp_draft_appoint');
                alert("アポイントを登録しました！");
                location.href = 'calendar.html';
            } catch (e) {
                alert("保存に失敗しました");
                btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> 登録を実行';
            }
        };

        window.saveDraft = () => {
            const draft = {
                cust: document.getElementById('customerSearch').value,
                date: document.getElementById('appointDate').value,
                sub: document.getElementById('appointSubject').value,
                visitor: document.getElementById('visitorName').value
            };
            localStorage.setItem('cp_draft_appoint', JSON.stringify(draft));
            alert("下書きを保存しました。");
        };

        document.getElementById('submitBtnTop').onclick = handleRegister;
        init();
    </script>
</body>
</html>
