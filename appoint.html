<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アポイント登録 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #1a1a1a;
            --header-bg: #3c4b5a;
            --accent-orange: #ff7e11;
            --primary-blue: #004098;
        }
        body { font-family: "Meiryo", sans-serif; background-color: #f4f7f9; }
        
        /* サイドバー共通 */
        .sidebar { background-color: var(--sidebar-bg); width: 200px; }
        .nav-item { border-bottom: 1px solid #2d2d2d; transition: all 0.2s; color: #b8b8b8; }
        .nav-item:hover { background-color: #333; color: white; }
        .active-menu { background-color: #2d3748; border-left: 4px solid var(--accent-orange); color: white !important; }

        /* 入力エリア */
        .form-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        .form-table th { 
            width: 220px; background-color: #fff; text-align: left; padding: 18px; 
            font-size: 14px; color: #444; border-bottom: 1px solid #eee; vertical-align: top;
        }
        .form-table td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .form-input { 
            width: 100%; border: 1px solid #d1d5db; padding: 8px; border-radius: 4px; 
            transition: all 0.2s; outline: none; font-size: 14px;
        }
        .form-input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(0, 64, 152, 0.1); }

        .required-tag {
            background-color: #fff1f0; color: #d8514d; border: 1px solid #ffa39e;
            font-size: 10px; padding: 1px 4px; border-radius: 2px; margin-left: 8px;
        }

        .btn-blue { background-color: var(--primary-blue); color: white; padding: 6px 20px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .btn-gray { background-color: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; padding: 6px 20px; border-radius: 4px; font-size: 12px; }
        .btn-action { transition: transform 0.1s; cursor: pointer; }
        .btn-action:active { transform: scale(0.98); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- サイドバー（共通リンク設定済） -->
<aside class="sidebar flex-shrink-0 text-white flex flex-col shadow-2xl">
    <div class="p-4 text-xs font-bold text-gray-500 border-b border-gray-800 tracking-widest uppercase">Menu</div>
    <nav class="flex-1 overflow-y-auto">
        <!-- お客様 -->
        <a href="list.html" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-users w-6"></i> お客様
        </a>

        <!-- 実績（サブメニュー付き） -->
        <div class="nav-group">
            <div class="nav-item block px-5 py-4 text-sm flex items-center cursor-pointer">
                <i class="fa-solid fa-file-invoice w-6"></i> 実績
            </div>
            <div class="bg-black text-[11px]">
                <a href="history.html" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">実績登録</a>
                <a href="list_records.html" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">実績一覧</a>
                <a href="#" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">実績CSV出力</a>
            </div>
        </div>

        <!-- カレンダー -->
        <a href="calendar.html" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-calendar-days w-6"></i> カレンダー
        </a>

        <!-- 回覧一覧 -->
        <a href="#" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-envelope-open-text w-6"></i> 回覧一覧
            <span class="ml-auto bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full">1</span>
        </a>

        <!-- 地図 -->
        <a href="map.html" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-map-location-dot w-6"></i> 地図
        </a>

        <!-- アポイント -->
        <a href="appoint.html" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-clock w-6"></i> アポイント
        </a>

        <!-- 集計（サブメニュー付き） -->
        <div class="nav-group">
            <div class="nav-item block px-5 py-4 text-sm flex items-center cursor-pointer">
                <i class="fa-solid fa-chart-line w-6"></i> 集計
            </div>
            <div class="bg-black text-[11px]">
                <a href="usage.html" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">組織員利用状況</a>
                <a href="monthly_list.html" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">月別一覧</a>
                <a href="#" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">お客様別滞在時間一覧</a>
                <a href="#" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">実績グラフ出力</a>
            </div>
        </div>

        <!-- マスタ管理 -->
        <a href="#" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-gears w-6"></i> マスタ管理
        </a>
    </nav>

    <!-- ログアウト -->
    <div class="p-4 border-t border-gray-800">
        <a href="index.html" class="text-xs text-gray-500 hover:text-white flex items-center">
            <i class="fa-solid fa-right-from-bracket mr-2"></i> ログアウト
        </a>
    </div>
</aside>

    <!-- メインコンテンツ -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-14 bg-[#3c4b5a] flex items-center justify-between px-6 text-white shadow-md z-10">
            <div class="flex items-center gap-4"><span class="text-xl font-bold text-[#87ceeb]">株式会社コプロス</span></div>
            <div class="text-xs font-medium">篠原 栄 殿</div>
        </header>

        <div class="flex-1 overflow-auto p-8">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold text-gray-700">アポイント</h1>
                    <div class="flex gap-3">
                        <button class="bg-[#ff7e11] text-white px-12 py-2 rounded font-bold text-sm shadow btn-action">登 録</button>
                        <button class="bg-[#f39800] text-white px-12 py-2 rounded font-bold text-sm shadow btn-action">下書き</button>
                    </div>
                </div>

                <form id="appointForm" class="bg-white shadow-xl rounded-xl border border-gray-200 overflow-hidden">
                    <table class="form-table">
                        <!-- お客様名 -->
                        <tr>
                            <th>お客様名<span class="required-tag">必須</span></th>
                            <td>
                                <input type="text" placeholder="キーワードを入力" class="form-input mb-2 max-w-md">
                                <select class="form-input max-w-md"><option>--</option></select>
                            </td>
                        </tr>

                        <!-- 訪問予定日時（動的追加エリアのイメージ） -->
                        <tr>
                            <th>訪問予定日時<span class="required-tag">必須</span></th>
                            <td id="dateArea">
                                <button type="button" class="btn-blue mb-4">訪問予定日時追加</button>
                                <div class="p-4 bg-gray-50 border border-gray-100 rounded mb-2">
                                    <div class="flex items-center gap-2 mb-2">
                                        <input type="date" class="form-input w-40" value="2026-03-10">
                                        <select class="form-input w-20"><option>--</option></select> 時
                                        <select class="form-input w-20"><option>--</option></select> 分
                                    </div>
                                    <div class="text-gray-400 text-xs my-1">～</div>
                                    <div class="flex items-center gap-2 mb-4">
                                        <input type="date" class="form-input w-40" value="2026-03-10">
                                        <select class="form-input w-20"><option>--</option></select> 時
                                        <select class="form-input w-20"><option>--</option></select> 分
                                    </div>
                                    <button type="button" class="btn-gray text-xs">削除</button>
                                </div>
                            </td>
                        </tr>

                        <!-- 訪問予定者 -->
                        <tr>
                            <th>訪問予定者<span class="required-tag">必須</span></th>
                            <td>
                                <button type="button" class="btn-blue mb-2">選択</button>
                                <div class="text-sm font-bold text-gray-700 mt-2 ml-1">篠原 栄</div>
                            </td>
                        </tr>

                        <!-- 回覧 -->
                        <tr>
                            <th>回覧</th>
                            <td>
                                <label class="flex items-center cursor-pointer text-sm font-bold">
                                    <input type="checkbox" checked class="mr-2 w-4 h-4 accent-[#ff7e11]"> メール回覧
                                </label>
                            </td>
                        </tr>

                        <!-- 回覧者 -->
                        <tr>
                            <th>回覧者</th>
                            <td>
                                <div class="flex items-start gap-4">
                                    <button type="button" class="btn-blue">選択</button>
                                    <div class="text-xs text-gray-500 leading-relaxed max-w-xl">
                                        今冨 弘, 岩本 猛, 金丸 卓朗, 上村 信二, 刈野 慶史, 篠原 栄, 原田 隆仁, 船場 勝信, 宮﨑 薫
                                    </div>
                                    <label class="flex items-center text-xs text-gray-500 whitespace-nowrap">
                                        <input type="checkbox" class="mr-1"> 回覧者を保持する
                                    </label>
                                </div>
                            </td>
                        </tr>
                    </table>

                    <!-- 下部ボタンエリア -->
                    <div class="p-8 bg-gray-50 flex justify-center gap-4 border-t">
                        <button type="submit" class="bg-[#ff7e11] text-white px-20 py-3 rounded-lg font-bold shadow-lg btn-action hover:bg-[#e66f00]">登 録</button>
                        <button type="button" class="bg-[#f39800] text-white px-20 py-3 rounded-lg font-bold shadow-lg btn-action hover:bg-[#e66f00]">下書き</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
