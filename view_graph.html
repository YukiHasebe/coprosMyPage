<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>実績グラフ出力 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --copros-orange: #ff7e11; --copros-navy: #004098; --copros-blue: #87ceeb; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .scope-select { background: #e2e8f0; border: none; padding: 0.4rem 1rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; color: #475569; outline: none; cursor: pointer; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .tab-btn { padding: 0.8rem 1.5rem; border-radius: 0.75rem; font-size: 0.8rem; font-weight: 900; transition: all 0.2s; white-space: nowrap; border: 1px solid #e2e8f0; background: white; color: #64748b; }
        .tab-btn.active { background: var(--copros-navy); color: white; border-color: var(--copros-navy); box-shadow: 0 4px 12px rgba(0,64,152,0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1200px] mx-auto">
                
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-6">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-1">実績グラフ出力</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Performance Analytics Visualizer</nav>
                    </div>
                    <div class="flex flex-wrap items-center gap-4 w-full lg:w-auto">
                        <select id="deptFilter" onchange="window.init()" class="scope-select shadow-inner">
                            <option value="ALL">全ケコム関連 合計</option>
                            <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option>
                        </select>
                        <div class="flex gap-1 bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                            <button onclick="window.switchChart('trend')" id="btn-trend" class="tab-btn active">月別推移</button>
                            <button onclick="window.switchChart('quality')" id="btn-quality" class="tab-btn">内容分析</button>
                        </div>
                    </div>
                </div>

                <div class="flex justify-center mb-10">
                    <div class="flex items-center gap-8 bg-white py-2 px-8 rounded-2xl shadow-sm border border-slate-100">
                        <button onclick="window.changeYear(-1)" class="p-2 text-slate-300 hover:text-slate-600 transition-colors"><i class="fa-solid fa-chevron-left fa-lg"></i></button>
                        <span id="displayYear" class="text-lg font-black text-slate-700 min-w-[120px] text-center">----年度</span>
                        <button onclick="window.changeYear(1)" class="p-2 text-slate-300 hover:text-slate-600 transition-colors"><i class="fa-solid fa-chevron-right fa-lg"></i></button>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10 text-center">
                    <div class="stat-card"><p class="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">営業件数</p><p id="statTotalVisits" class="text-3xl font-black text-slate-800">--</p></div>
                    <div class="stat-card"><p class="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">合計時間</p><p id="statTotalTime" class="text-3xl font-black text-[#004098]">--</p></div>
                    <div class="stat-card"><p class="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">平均滞在</p><p id="statAvgTime" class="text-3xl font-black text-[#ff7e11]">--</p></div>
                </div>

                <div class="bg-white p-6 lg:p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 min-h-[500px] flex flex-col items-center mb-20">
                    <div id="qualityControls" class="mb-10 hidden w-full max-w-md">
                        <label class="block text-center text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">分析する項目を選択</label>
                        <select id="qualityType" onchange="window.updateCharts()" class="scope-select bg-slate-50 font-black w-full border border-slate-200 py-3">
                            <option value="qualData1">定性データ1 (リサーチ・受注等)</option>
                            <option value="qualData2">定性データ2 (工法・区分等)</option>
                            <option value="qualData3">定性データ3 (エリア等)</option>
                        </select>
                    </div>
                    <div class="w-full relative h-[400px]"><canvas id="mainChart"></canvas></div>
                </div>

                <div id="loading" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center">
                    <div class="animate-spin mb-4 text-[#ff7e11] text-6xl"><i class="fa-solid fa-circle-notch"></i></div>
                    <p class="text-slate-800 font-black tracking-tighter uppercase italic text-xs">Generating Performance Data...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db, TARGET_DEPTS } from "./common.js";
        import { collection, getDocs, query, where, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const now = new Date();
        let currentYear = now.getMonth() + 1 >= 7 ? now.getFullYear() : now.getFullYear() - 1;
        let allRecords = [];
        let chartInstance = null;
        let currentChartType = 'trend';

        const standardizeDate = (s) => {
            if(!s) return "";
            const d = s.replace(/\//g, '-').split('-');
            return d.length < 3 ? s : `${d[0]}-${d[1].padStart(2, '0')}-${d[2].padStart(2, '0')}`;
        };

        window.init = async () => {
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';
            document.getElementById('displayYear').innerText = `${currentYear}年度`;
            const selectedDept = document.getElementById('deptFilter').value;

            try {
                let q;
                const ref = collection(db, "activity_records");
                
                // 🌟 【省エネ】年度の開始（7/1）以降のデータを取得
                if (selectedDept === 'ALL') {
                    q = query(ref, where("visitorDept", "in", TARGET_DEPTS), where("visitDate", ">=", `${currentYear}`), limit(3000));
                } else {
                    q = query(ref, where("visitorDept", "==", selectedDept), where("visitDate", ">=", `${currentYear}`), limit(2000));
                }

                const snap = await getDocs(q);
                allRecords = snap.docs.map(d => d.data());
                
                loading.style.display = 'none';
                window.updateCharts();
            } catch (e) { 
                console.error(e); 
                loading.style.display = 'none';
                alert("データの取得に失敗しました。");
            }
        };

        window.updateCharts = () => {
            const filtered = allRecords.filter(r => {
                const sDate = standardizeDate(r.visitDate);
                const parts = sDate.split('-');
                const y = parseInt(parts[0]), m = parseInt(parts[1]);
                return (y === currentYear && m >= 7) || (y === currentYear + 1 && m <= 6);
            });

            let totalMins = 0;
            filtered.forEach(r => {
                if(r.startTime && r.endTime && r.startTime !== "00:00") {
                    const s = r.startTime.split(':'), e = r.endTime.split(':');
                    totalMins += (parseInt(e[0])*60 + parseInt(e[1]||0)) - (parseInt(s[0])*60 + parseInt(s[1]||0));
                }
            });

            document.getElementById('statTotalVisits').innerHTML = `${filtered.length} <span class="text-xs">件</span>`;
            document.getElementById('statTotalTime').innerHTML = `${Math.floor(totalMins/60)} <span class="text-xs">時間</span>`;
            document.getElementById('statAvgTime').innerHTML = `${filtered.length ? Math.round(totalMins/filtered.length) : 0} <span class="text-xs">分</span>`;

            if (currentChartType === 'trend') renderTrendChart(filtered);
            else renderQualityChart(filtered);
        };

        function renderTrendChart(data) {
            const months = ["7月", "8月", "9月", "10月", "11月", "12月", "1月", "2月", "3月", "4月", "5月", "6月"];
            const counts = new Array(12).fill(0);
            data.forEach(r => {
                const parts = standardizeDate(r.visitDate).split('-');
                const m = parseInt(parts[1]);
                const idx = (m >= 7) ? m - 7 : m + 5; 
                if (idx >= 0 && idx < 12) counts[idx]++;
            });
            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('mainChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: months,
                    datasets: [{ label: '営業件数', data: counts, backgroundColor: '#ff7e11', borderRadius: 8 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } } } }
            });
        }

        function renderQualityChart(data) {
            const field = document.getElementById('qualityType').value;
            const counts = {};
            data.forEach(r => { 
                const val = r[field] || "未設定"; 
                if(val.trim() !== "") counts[val] = (counts[val] || 0) + 1; 
            });
            
            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('mainChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{ data: Object.values(counts), backgroundColor: ['#004098', '#ff7e11', '#0ea5e9', '#10b981', '#f59e0b', '#6366f1', '#ec4899'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 20, font: { weight: 'bold', size: 11 } } } } }
            });
        }

        window.switchChart = (type) => {
            currentChartType = type;
            document.getElementById('btn-trend').classList.toggle('active', type === 'trend');
            document.getElementById('btn-quality').classList.toggle('active', type === 'quality');
            document.getElementById('qualityControls').classList.toggle('hidden', type !== 'quality');
            window.updateCharts();
        };

        window.changeYear = (val) => { currentYear += val; window.init(); };
        window.addEventListener('load', () => setTimeout(window.init, 300));
    </script>
</body>
</html>
