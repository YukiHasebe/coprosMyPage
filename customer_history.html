<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>訪問実績履歴 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #004098; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .history-card { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; transition: all 0.3s; overflow: hidden; margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .history-header { padding: 1.2rem 1.5rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #3c4b5a; color: white; transition: background 0.2s; }
        .history-header:hover { background: #2d3748; }
        .history-body { display: none; padding: 1.5rem; background: white; border-top: 1px solid #f1f5f9; }
        .detail-label { font-size: 0.75rem; font-weight: 900; color: #94a3b8; width: 150px; shrink: 0; }
        .detail-content { font-size: 0.9rem; font-weight: 600; color: #334155; line-height: 1.6; }
        .detail-row { display: flex; align-items: flex-start; padding: 0.8rem 0; border-bottom: 1px solid #f8fafc; }
        .detail-row:last-child { border-bottom: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-2">訪問実績履歴</h1>
                        <p id="targetCustomerName" class="text-xl font-bold text-[#004098]">読み込み中...</p>
                    </div>
                    <div class="flex gap-3">
                        <!-- 🌟 魔法の戻るボタン：直前のページ（一覧or実績）に自動で戻る -->
                        <button onclick="history.back()" class="px-6 py-2.5 bg-white border border-slate-200 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 shadow-sm transition-all">前の画面に戻る</button>
                        <button id="newRegBtn" class="px-8 py-2.5 bg-[#ff7e11] text-white rounded-xl font-bold text-xs hover:shadow-lg transition-all flex items-center gap-2"><i class="fa-solid fa-plus"></i> 実績登録</button>
                    </div>
                </div>
                <div id="historyListContainer" class="space-y-4 pb-20"></div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const customerName = params.get('name');

        async function init() {
            if (!customerName) return;
            document.getElementById('targetCustomerName').innerText = customerName;
            document.getElementById('newRegBtn').onclick = () => location.href = `history.html?name=${encodeURIComponent(customerName)}`;

            try {
                const q = query(collection(db, "activity_records"), where("customerName", "==", customerName), limit(50));
                const snap = await getDocs(q);
                if (snap.empty) {
                    document.getElementById('historyListContainer').innerHTML = '<p class="p-20 text-center text-slate-400">実績がありません。</p>';
                    return;
                }
                let records = snap.docs.map(doc => doc.data());
                records.sort((a, b) => (b.visitDate || "").localeCompare(a.visitDate || ""));
                renderHistory(records);

                // 🌟 最初の一件を自動でパカッと開く
                const firstCard = document.querySelector('.history-body');
                if(firstCard) {
                    firstCard.style.display = 'block';
                    document.querySelector('.arrow-icon').style.transform = 'rotate(180deg)';
                }

            } catch (e) { console.error(e); }
        }

        function renderHistory(dataList) {
            const container = document.getElementById('historyListContainer');
            container.innerHTML = dataList.map(data => `
                <div class="history-card">
                    <div class="history-header" onclick="window.toggleDetail(this)">
                        <div class="flex items-center gap-6">
                            <span class="text-sm font-black tracking-widest bg-white/20 px-3 py-1 rounded-full">${(data.visitDate || '').replace(/-/g, '/')}</span>
                            <span class="text-sm font-bold opacity-90 underline underline-offset-4 decoration-orange-400">${data.visitorName || '担当者不明'}</span>
                        </div>
                        <i class="fa-solid fa-chevron-down transition-transform duration-300 arrow-icon opacity-50"></i>
                    </div>
                    <div class="history-body">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-x-12">
                            <div class="detail-row"><div class="detail-label">お客様担当者</div><div class="detail-content">${data.customerStaff || '--'}</div></div>
                            <div class="detail-row"><div class="detail-label">訪問時間</div><div class="detail-content">${data.startTime || '--:--'} 〜 ${data.endTime || '--:--'}</div></div>
                            <div class="detail-row"><div class="detail-label">同行者</div><div class="detail-content">${data.companion || 'なし'}</div></div>
                            <div class="detail-row"><div class="detail-label">定性データ</div><div class="flex gap-2">
                                ${data.qualData1 ? `<span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[10px] font-black">${data.qualData1}</span>` : ''}
                                ${data.qualData3 ? `<span class="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded text-[10px] font-black">${data.qualData3}</span>` : ''}
                            </div></div>
                        </div>
                        <div class="mt-6 p-5 bg-slate-50 rounded-2xl">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">お客様からの情報</p>
                            <div class="detail-content whitespace-pre-wrap">${data.customerReport || '-'}</div>
                        </div>
                        <div class="mt-4 p-5 bg-blue-50/50 rounded-2xl border border-blue-100/50">
                            <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-3">自分・スタッフの考え</p>
                            <div class="detail-content whitespace-pre-wrap">${data.staffThoughts || '-'}</div>
                        </div>
                        <div class="mt-6 text-right"><span class="text-[#ff7e11] bg-orange-50 px-4 py-1 rounded-full border border-orange-100 text-xs font-black">次回訪問：${(data.nextVisitDate || '--').replace(/-/g, '/')}</span></div>
                    </div>
                </div>`).join('');
        }

        window.toggleDetail = (el) => {
            const body = el.nextElementSibling;
            const arrow = el.querySelector('.arrow-icon');
            const isOpen = body.style.display === 'block';
            body.style.display = isOpen ? 'none' : 'block';
            arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
        };

        init();
    </script>
</body>
</html>
