<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ登録 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .form-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .form-input { width: 100%; padding: 1rem; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; font-weight: 600; transition: all 0.2s; }
        .form-input:focus { outline: none; border-color: var(--copros-orange); background-color: white; box-shadow: 0 0 0 4px rgba(255, 126, 17, 0.1); }
        .label-text { font-size: 0.8rem; font-weight: 800; color: #475569; margin-bottom: 0.5rem; display: block; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-3xl mx-auto">
                
                <!-- 🌟 ヘッドエリア：他画面とスタイルを完全統合 -->
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-4">
                    <div>
                        <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-1" id="pageTitle">お知らせ登録</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Broadcast & Internal Notice Setup</nav>
                    </div>
                    <div class="flex gap-2 w-full lg:w-auto">
                        <button type="button" onclick="location.href='notice_list.html'" class="flex-1 lg:flex-none px-6 py-2.5 bg-white border border-slate-200 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 transition-all active:scale-95 shadow-sm">
                            一覧へ戻る
                        </button>
                        <button type="button" onclick="document.getElementById('saveBtnMain').click()" class="flex-1 lg:flex-none px-10 py-2.5 bg-[#004098] text-white rounded-xl font-black text-xs hover:shadow-lg transition-all flex items-center justify-center gap-2 active:scale-95 shadow-md">
                            <i class="fa-solid fa-cloud-arrow-up"></i> 登録を実行
                        </button>
                    </div>
                </div>

                <div class="form-card p-6 lg:p-10 mb-10 border border-slate-200">
                    <form id="noticeForm" class="space-y-8">
                        <div>
                            <label class="label-text">お知らせ件名 <span class="text-rose-500">*</span></label>
                            <input type="text" id="title" class="form-input text-slate-800" placeholder="全社員へ周知するタイトル" required>
                        </div>
                        <div>
                            <label class="label-text">詳細内容 <span class="text-rose-500">*</span></label>
                            <textarea id="content" rows="8" class="form-input resize-none font-medium leading-relaxed" placeholder="周知の本文を入力してください..." required></textarea>
                        </div>
                        <div>
                            <label class="label-text">リンク先URL (任意)</label>
                            <input type="url" id="linkUrl" class="form-input font-mono text-sm" placeholder="https://...">
                            <p class="text-[10px] text-slate-400 mt-2 font-bold italic">※PDFや外部サイトを参照させる場合にURLを入力してください</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <label class="label-text">掲載開始日 <span class="text-rose-500">*</span></label>
                                <input type="date" id="startDate" class="form-input font-bold" required>
                            </div>
                            <div>
                                <label class="label-text">掲載終了日 <span class="text-rose-500">*</span></label>
                                <input type="date" id="endDate" class="form-input font-bold" required>
                            </div>
                        </div>
                        <!-- 隠し送信ボタン -->
                        <button type="submit" id="saveBtnMain" class="hidden"></button>
                    </form>
                </div>

                <!-- 🌟 下部ボタン -->
                <div class="flex justify-center gap-4 py-8 mb-20 border-t border-slate-200">
                    <button type="button" id="saveBtnBottom" onclick="document.getElementById('saveBtnMain').click()" class="px-24 py-4 bg-[#004098] text-white rounded-2xl font-black text-sm hover:shadow-xl hover:scale-[1.02] flex items-center gap-3 active:scale-95 transition-all shadow-lg">
                        <i class="fa-solid fa-paper-plane"></i> 周知内容を保存・公開
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, addDoc, serverTimestamp, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const editId = params.get('id');

        async function init() {
            if (editId) {
                document.getElementById('pageTitle').innerText = "お知らせ編集";
                try {
                    const snap = await getDoc(doc(db, "notices", editId));
                    if (snap.exists()) {
                        const d = snap.data();
                        document.getElementById('title').value = d.title;
                        document.getElementById('content').value = d.content;
                        document.getElementById('linkUrl').value = d.linkUrl || '';
                        document.getElementById('startDate').value = d.startDate;
                        document.getElementById('endDate').value = d.endDate;
                    }
                } catch (e) { console.error("Load Error:", e); }
            } else {
                document.getElementById('startDate').valueAsDate = new Date();
                const nextMonth = new Date(); 
                nextMonth.setMonth(nextMonth.getMonth() + 1);
                document.getElementById('endDate').valueAsDate = nextMonth;
            }
        }

        document.getElementById('noticeForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // バリデーション：終了日が開始日より前になっていないか
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if (start > end) {
                alert("掲載終了日は、開始日より後の日付に設定してください。");
                return;
            }

            const btn = document.getElementById('saveBtnBottom');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>保存中...';

            const data = {
                title: document.getElementById('title').value.trim(),
                content: document.getElementById('content').value.trim(),
                linkUrl: document.getElementById('linkUrl').value.trim(),
                startDate: start,
                endDate: end,
                updatedAt: serverTimestamp()
            };

            try {
                if (editId) {
                    await updateDoc(doc(db, "notices", editId), data);
                } else {
                    data.createdAt = serverTimestamp();
                    await addDoc(collection(db, "notices"), data);
                }
                alert("お知らせを保存しました。");
                location.href = 'notice_list.html';
            } catch (e) {
                console.error("Save Error:", e);
                alert("保存に失敗しました。再度お試しください。");
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        };

        init();
    </script>
</body>
</html>
