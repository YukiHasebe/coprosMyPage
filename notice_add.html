<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ登録 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .form-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .form-input { width: 100%; padding: 1rem; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; font-weight: 600; transition: all 0.2s; }
        .form-input:focus { outline: none; border-color: var(--copros-orange); background-color: white; box-shadow: 0 0 0 4px rgba(255, 126, 17, 0.1); }
        .label-text { font-size: 0.8rem; font-weight: 800; color: #475569; margin-bottom: 0.5rem; display: block; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-3xl mx-auto">
                
                <!-- ヘッドエリア：他の画面とデザインを統一 -->
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 gap-4">
                    <div>
                        <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-2">お知らせ登録</h1>
                        <nav class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Notice & Information Setup</nav>
                    </div>
                    <button onclick="location.href='notice_list.html'" class="px-6 py-2.5 bg-white border border-slate-200 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 shadow-sm transition-all">
                        <i class="fa-solid fa-arrow-left mr-1"></i> 戻る
                    </button>
                </div>

                <div class="form-card p-6 lg:p-10 mb-20">
                    <form id="noticeForm" class="space-y-8">
                        <div>
                            <label class="label-text">件名（タイトル） <span class="text-rose-500">*</span></label>
                            <input type="text" id="title" class="form-input" placeholder="社内周知のタイトルを入力" required>
                        </div>
                        <div>
                            <label class="label-text">本文 <span class="text-rose-500">*</span></label>
                            <textarea id="content" rows="8" class="form-input resize-none font-medium leading-relaxed" placeholder="周知内容を入力してください..." required></textarea>
                        </div>
                        <div>
                            <label class="label-text">関連URL (任意)</label>
                            <input type="url" id="linkUrl" class="form-input font-mono text-sm" placeholder="https://...">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="label-text">掲載開始日 <span class="text-rose-500">*</span></label>
                                <input type="date" id="startDate" class="form-input font-bold" required>
                            </div>
                            <div>
                                <label class="label-text">掲載終了日 <span class="text-rose-500">*</span></label>
                                <input type="date" id="endDate" class="form-input font-bold" required>
                            </div>
                        </div>
                        <div class="pt-6 border-t border-slate-100">
                            <button type="submit" id="saveBtn" class="w-full py-4 bg-[#004098] text-white rounded-2xl font-black text-lg hover:shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3">
                                <i class="fa-solid fa-paper-plane"></i> 登録情報を保存・公開
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./common.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const editId = params.get('id');

        async function init() {
            if (editId) {
                try {
                    const snap = await getDoc(doc(db, "notices", editId));
                    if (snap.exists()) {
                        const d = snap.data();
                        document.getElementById('title').value = d.title;
                        document.getElementById('content').value = d.content;
                        document.getElementById('linkUrl').value = d.linkUrl || '';
                        document.getElementById('startDate').value = d.startDate;
                        document.getElementById('endDate').value = d.endDate;
                        document.getElementById('saveBtn').innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 登録情報を更新する';
                    }
                } catch (e) { console.error("Load Error:", e); }
            } else {
                document.getElementById('startDate').valueAsDate = new Date();
                const nextMonth = new Date(); nextMonth.setMonth(nextMonth.getMonth() + 1);
                document.getElementById('endDate').valueAsDate = nextMonth;
            }
        }

        document.getElementById('noticeForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>保存中...';

            const data = {
                title: document.getElementById('title').value.trim(),
                content: document.getElementById('content').value.trim(),
                linkUrl: document.getElementById('linkUrl').value.trim(),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                updatedAt: serverTimestamp(),
                createdAt: editId ? undefined : serverTimestamp()
            };

            if (!editId) delete data.updatedAt; else delete data.createdAt;

            try {
                if (editId) { await updateDoc(doc(db, "notices", editId), data); }
                else { await addDoc(collection(db, "notices"), data); }
                alert("お知らせを保存しました。");
                location.href = 'notice_list.html';
            } catch (e) {
                alert("保存に失敗しました。");
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> 登録情報を保存・公開';
            }
        };

        init();
    </script>
</body>
</html>
