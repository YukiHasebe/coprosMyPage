<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>回覧一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .accordion-item { background: white; border-radius: 1.2rem; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 1rem; transition: 0.2s; }
        .accordion-header { padding: 1.2rem 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; position: relative; }
        /* 🌟 未読はオレンジの左線 */
        .accordion-item.unread { border-left: 5px solid var(--copros-orange); }
        .accordion-content { display: none; padding: 2rem; background: white; border-top: 1px solid #f1f5f9; }
        
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 1.5rem; }
        .info-label { font-size: 10px; font-weight: 800; color: #94a3b8; margin-bottom: 0.2rem; }
        .info-value { font-size: 13px; font-weight: 800; color: #475569; }
        .report-box { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; border: 1px solid #f1f5f9; font-size: 13px; line-height: 1.7; }
        
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 900; color: white; }
        .badge-apo { background: #3b82f6; }
        .badge-rec { background: var(--copros-orange); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1000px] mx-auto">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-1">回覧一覧</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic font-bold">Unread Circular Reports</nav>
                    </div>
                    <button onclick="window.markAllAsRead()" class="px-6 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-xs hover:shadow-lg transition-all active:scale-95">すべて既読にする</button>
                </div>

                <div id="kairanList" class="space-y-3 mb-20">
                    <!-- JS注入 -->
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, where, orderBy, updateDoc, doc, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let myName = sessionStorage.getItem('userName');

        async function init() {
            if(!myName) return;
            const container = document.getElementById('kairanList');
            container.innerHTML = '<p class="text-center py-20 text-slate-400 italic">回覧情報を取得中...</p>';

            try {
                // 自分宛の通知を最新50件取得
                const q = query(collection(db, "notifications"), 
                                where("recipient", "==", myName), 
                                orderBy("createdAt", "desc"), 
                                limit(50));
                const snap = await getDocs(q);
                const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                if(data.length === 0) {
                    container.innerHTML = '<p class="text-center py-20 text-slate-400 font-bold">現在、新しい回覧はありません</p>';
                    return;
                }

                container.innerHTML = data.map(n => {
                    const isApo = n.type === "アポ回覧";
                    const dateStr = n.visitDate ? String(n.visitDate).replace(/-/g,'/') : '--/--/--';
                    
                    return `
                        <div class="accordion-item ${n.isRead ? '' : 'unread'}">
                            <div class="accordion-header" onclick="window.toggleKairan(this, '${n.id}', ${n.isRead})">
                                <div class="flex items-center gap-4">
                                    <span class="badge ${isApo ? 'badge-apo' : 'badge-rec'}">${isApo ? 'アポ' : '実績'}</span>
                                    <span class="text-xs font-mono font-black text-slate-400">${dateStr}</span>
                                    <span class="text-sm font-black text-slate-700">${n.visitorName} ➔ ${n.customerName}</span>
                                </div>
                                <i class="fa-solid fa-chevron-down opacity-30 text-xs transition-transform"></i>
                            </div>
                            <div class="accordion-content">
                                <div class="info-grid">
                                    <div><p class="info-label">お客様名</p><p class="info-value text-blue-600">${n.customerName}</p></div>
                                    <div><p class="info-label">訪問/予定日</p><p class="info-value">${dateStr}</p></div>
                                    <div><p class="info-label">報告者</p><p class="info-value">${n.visitorName}</p></div>
                                    <div><p class="info-label">区分</p><p class="info-value">${n.type || '一般回覧'}</p></div>
                                </div>
                                <div>
                                    <p class="info-label">回覧内容</p>
                                    <div class="report-box">${n.content || '詳細なし'}</div>
                                </div>
                                <div class="mt-8 flex justify-end">
                                    <button onclick="location.href='usage.html?name=${encodeURIComponent(n.visitorName)}&date=${n.visitDate}'" class="text-[10px] font-black text-blue-500 hover:underline">
                                        この社員の全履歴を確認 ➔
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.error(e); }
        }

        window.toggleKairan = async (header, id, isRead) => {
            const content = header.nextElementSibling;
            const arrow = header.querySelector('i');
            const item = header.parentElement;
            const open = content.style.display === 'block';
            
            content.style.display = open ? 'none' : 'block';
            arrow.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';

            // 🌟 開いた瞬間に「既読」にする（未読だった場合のみ）
            if (!open && !isRead) {
                await updateDoc(doc(db, "notifications", id), { isRead: true });
                item.classList.remove('unread');
            }
        };

        window.markAllAsRead = async () => {
            if(!confirm("全て既読にしますか？")) return;
            const q = query(collection(db, "notifications"), where("recipient", "==", myName), where("isRead", "==", false));
            const snap = await getDocs(q);
            const batch = db.batch(); // 簡易記述
            // ※実際はFirebaseの制約上、個別にupdateかブラウザリロード推奨
            alert("一括既読を完了しました");
            location.reload();
        };

        init();
    </script>
</body>
</html>
