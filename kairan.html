<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>回覧一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        
        .accordion-item { background: white; border-radius: 1.2rem; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 1rem; border-left: 6px solid transparent; transition: all 0.3s; }
        .accordion-item.unread { border-left-color: var(--copros-orange); }
        
        .accordion-header { padding: 1.2rem 2rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .accordion-content { display: none; padding: 2.5rem; background: white; border-top: 1px solid #f1f5f9; }
        
        /* 🌟 未読・既読ラベル */
        .status-txt { font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 4px; min-width: 45px; text-align: center; }
        .status-unread { background: var(--copros-orange); color: white; }
        .status-read { background: #e2e8f0; color: #94a3b8; }

        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 2rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 2rem; }
        .info-label { font-size: 11px; color: #94a3b8; font-weight: 800; }
        .info-value { font-size: 14px; font-weight: 800; color: #475569; }
        .report-box { background: #f8fafc; border-radius: 1.2rem; padding: 1.5rem; border: 1px solid #f1f5f9; font-size: 14px; line-height: 1.7; color: #334155; }
        
        .badge { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 900; color: white; }
        .badge-apo { background: #3b82f6; }
        .badge-rec { background: var(--copros-orange); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1100px] mx-auto">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-1">回覧一覧</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Review & Circular Management</nav>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.bulkAction('read')" class="px-5 py-2 bg-white border border-slate-200 text-slate-500 rounded-xl font-black text-[10px] hover:bg-slate-50">一括既読</button>
                        <button onclick="window.bulkAction('delete')" class="px-5 py-2 bg-rose-50 border border-rose-100 text-rose-500 rounded-xl font-black text-[10px] hover:bg-rose-100">一括削除</button>
                    </div>
                </div>
                <div id="kairanList" class="space-y-3 mb-20">
                    <!-- JS注入 -->
                </div>
            </div>
        </div>
    </main>

    <div id="local-loading" class="fixed inset-0 bg-white/80 z-[9999] hidden flex-col items-center justify-center">
        <div class="animate-spin mb-4 text-[#ff7e11] text-6xl"><i class="fa-solid fa-circle-notch"></i></div>
    </div>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, updateDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let myName = sessionStorage.getItem('userName');
        const clean = (s) => (s||"").replace(/\s+/g, '');

        async function init() {
            const container = document.getElementById('kairanList');
            const loader = document.getElementById('local-loading');
            loader.style.display = 'flex';
            try {
                const snap = await getDocs(collection(db, "notifications"));
                const data = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                                 .filter(n => clean(n.recipient) === clean(myName))
                                 .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                
                loader.style.display = 'none';
                container.innerHTML = data.length ? data.map(n => `
                    <div class="accordion-item ${n.isRead ? '' : 'unread'}" id="item-${n.id}">
                        <div class="accordion-header" onclick="window.toggleKairan('${n.id}', ${n.isRead})">
                            <div class="flex items-center gap-4">
                                <input type="checkbox" class="bulk-check w-4 h-4 accent-[#004098]" onclick="event.stopPropagation()" value="${n.id}">
                                <span class="status-txt ${n.isRead ? 'status-read' : 'status-unread'}">${n.isRead ? '既読' : '未読'}</span>
                                <span class="badge ${n.type === 'アポ回覧' ? 'badge-apo' : 'badge-rec'}">${n.type === 'アポ回覧' ? 'アポ' : '実績'}</span>
                                <span class="text-sm font-mono font-black ${n.isRead ? 'text-slate-800' : 'text-orange-600'}">${String(n.visitDate||n.appointDate||'---').replace(/-/g,'/')}</span>
                                <span class="text-sm font-black ${n.isRead ? 'text-slate-800' : 'text-slate-700'}">${n.visitorName} ➔ ${n.customerName}</span>
                            </div>
                            <i class="fa-solid fa-chevron-down opacity-20 text-xs transition-transform"></i>
                        </div>
                        <div class="accordion-content">
                            <div class="info-grid">
                                <div><p class="info-label">お客様名</p><p class="info-value text-blue-600">${n.customerName}</p></div>
                                <div><p class="info-label">報告者</p><p class="info-value">${n.visitorName}</p></div>
                            </div>
                            <div class="report-box">${n.content || '詳細内容はUsage画面で確認してください'}</div>
                            <div class="mt-8 flex justify-end">
                                <button onclick="window.goUsage('${n.visitorName}', '${n.visitDate || n.appointDate}', '${n.customerName}')" class="text-xs font-black text-[#004098] hover:underline">この社員の全履歴を確認 ➔</button>
                            </div>
                        </div>
                    </div>`).join('') : '<p class="text-center py-20 text-slate-300 font-bold">回覧はありません</p>';
            } catch (e) { console.error(e); loader.style.display = 'none'; }
        }

        window.toggleKairan = async (id, isRead) => {
            const item = document.getElementById(`item-${id}`);
            const content = item.querySelector('.accordion-content');
            const arrow = item.querySelector('.fa-chevron-down');
            const statusLabel = item.querySelector('.status-txt');
            const isOpen = content.style.display === 'block';
            
            content.style.display = isOpen ? 'none' : 'block';
            arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
            
            if (!isOpen && !isRead) {
                try {
                    await updateDoc(doc(db, "notifications", id), { isRead: true });
                    item.classList.remove('unread');
                    statusLabel.innerText = "既読";
                    statusLabel.className = "status-txt status-read";
                    item.querySelectorAll('.text-orange-600').forEach(el => {
                        el.classList.replace('text-orange-600', 'text-slate-800');
                    });
                } catch (e) { console.error(e); }
            }
        };

        window.bulkAction = async (action) => {
            const checks = document.querySelectorAll('.bulk-check:checked');
            if (!checks.length) return alert("項目を選択してください");
            if (!confirm(`${checks.length}件を${action === 'read' ? '既読' : '削除'}にしますか？`)) return;
            const batch = writeBatch(db);
            checks.forEach(cb => {
                const ref = doc(db, "notifications", cb.value);
                if (action === 'read') batch.update(ref, { isRead: true });
                else batch.delete(ref);
            });
            await batch.commit();
            init();
        };

        window.goUsage = (name, date, customer) => {
            const m = date ? parseInt(date.split(/[-/]/)[1]) : (new Date().getMonth() + 1);
            sessionStorage.setItem('cp_usage_jump_name', name);
            sessionStorage.setItem('cp_usage_jump_month', m);
            sessionStorage.setItem('cp_usage_jump_customer', customer);
            location.href = 'usage.html';
        };
        init();
    </script>
</body>
</html>
