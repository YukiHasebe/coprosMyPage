<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>回覧一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .accordion-item { background: white; border-radius: 1.2rem; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 1rem; border-left: 6px solid transparent; transition: all 0.3s; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.02); }
        .accordion-item.unread { border-left-color: var(--copros-orange); box-shadow: 0 10px 15px -3px rgba(255,126,17,0.1); }
        .accordion-header { padding: 1.2rem 2rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .accordion-content { display: none; padding: 2rem; background: white; border-top: 1px solid #f8fafc; }
        .status-txt { font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 6px; min-width: 50px; text-align: center; text-transform: uppercase; }
        .status-unread { background: var(--copros-orange); color: white; }
        .status-read { background: #f1f5f9; color: #94a3b8; }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 1.5rem; }
        .info-label { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .info-value { font-size: 14px; font-weight: 800; color: #475569; }
        .report-box { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; border: 1px solid #f1f5f9; font-size: 13px; line-height: 1.7; color: #334155; }
        .badge { padding: 3px 10px; border-radius: 8px; font-size: 10px; font-weight: 900; color: white; }
        .badge-apo { background: #3b82f6; }
        .badge-rec { background: var(--copros-navy); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1100px] mx-auto">
                
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-1">回覧一覧</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Review & Circular Management</nav>
                    </div>
                    <div class="flex gap-2 items-center bg-white p-1.5 rounded-2xl border border-slate-100 shadow-sm">
                        <button onclick="window.bulkAction('read')" class="px-5 py-2.5 text-slate-500 rounded-xl font-black text-[10px] hover:bg-slate-50 transition-all border border-transparent">一括既読</button>
                        <div class="w-px h-6 bg-slate-100"></div>
                        <button onclick="window.bulkAction('delete')" class="px-5 py-2.5 text-rose-500 rounded-xl font-black text-[10px] hover:bg-rose-50 transition-all">一括削除</button>
                    </div>
                </div>

                <div id="kairanList" class="space-y-3 mb-24">
                    <div class="py-20 text-center text-slate-300 font-bold italic animate-pulse">データを同期中...</div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, updateDoc, doc, writeBatch, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let myName = sessionStorage.getItem('userName');
        const clean = (s) => (s||"").toString().replace(/\s+/g, '');

        // ▼ カレンダーのキャッシュを消す共通関数（0埋め対応）
        const clearCalCache = (dateStr) => {
            if(!dateStr) { 
                Object.keys(sessionStorage).forEach(k => {
                    if (k.startsWith('cp_cal_cache')) sessionStorage.removeItem(k);
                });
                return; 
            }
            const parts = dateStr.split(/[-/]/);
            const key = `cp_cal_cache_v_ultimate_${parts[0]}_${parts[1].padStart(2, '0')}`;
            sessionStorage.removeItem(key);
        };

        async function init() {
            const container = document.getElementById('kairanList');
            if(!myName) { container.innerHTML = '<p class="text-center py-20 text-rose-400 font-bold">ログイン情報がありません</p>'; return; }

            try {
                // ▼ 最新を常に反映させるため、あえてキャッシュを使わずに取得（limit 100で省エネ）
                const q = query(collection(db, "notifications"), where("recipient", "==", myName), limit(100));
                const snap = await getDocs(q);
                let data = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                data.sort((a, b) => {
                    const timeA = a.createdAt?.seconds || 0;
                    const timeB = b.createdAt?.seconds || 0;
                    return timeB - timeA;
                });

                renderList(data);
            } catch (e) { 
                console.error("回覧取得エラー:", e); 
                container.innerHTML = '<p class="text-center py-20 text-rose-400 font-bold uppercase text-xs font-black">データの取得に失敗しました</p>';
            }
        }

        function renderList(data) {
            const container = document.getElementById('kairanList');
            container.innerHTML = data.length ? data.map(n => {
                const displayDate = n.visitDate || n.appointDate || "";
                const dateFmt = displayDate ? String(displayDate).replace(/-/g,'/') : '日付不明';

                return `
                <div class="accordion-item ${n.isRead ? '' : 'unread'}" id="item-${n.id}">
                    <div class="accordion-header" onclick="window.toggleKairan('${n.id}', ${n.isRead}, '${displayDate}')">
                        <div class="flex items-center gap-4">
                            <input type="checkbox" class="bulk-check w-5 h-5 accent-[#004098] rounded-md" onclick="event.stopPropagation()" value="${n.id}" data-date="${displayDate}">
                            <span class="status-txt ${n.isRead ? 'status-read' : 'status-unread'}">${n.isRead ? '既読' : '未読'}</span>
                            <span class="badge ${n.type === 'アポ回覧' ? 'badge-apo' : 'badge-rec'}">${n.type === 'アポ回覧' ? 'アポ' : '実績'}</span>
                            <span class="text-sm font-mono font-black ${n.isRead ? 'text-slate-400' : 'text-orange-600'}">${dateFmt}</span>
                            <span class="text-sm font-black text-slate-700 tracking-tight">${n.visitorName} <i class="fa-solid fa-caret-right mx-1 opacity-30"></i> ${n.customerName}</span>
                        </div>
                        <i class="fa-solid fa-chevron-down opacity-20 text-xs transition-transform"></i>
                    </div>
                    <div class="accordion-content">
                        <div class="info-grid">
                            <div><p class="info-label">お客様名</p><p class="info-value text-blue-600">${n.customerName}</p></div>
                            <div><p class="info-label">報告者</p><p class="info-value">${n.visitorName}</p></div>
                        </div>
                        <p class="info-label mb-2 tracking-widest">■ 報告の抜粋</p>
                        <div class="report-box">${n.content || '詳細内容は個人履歴画面で確認してください'}</div>
                        <div class="mt-8 flex justify-end">
                            <button onclick="window.goUsage('${n.visitorName}', '${displayDate}', '${n.customerName}')" class="px-6 py-2.5 bg-slate-100 text-[#004098] rounded-xl text-xs font-black hover:bg-[#004098] hover:text-white transition-all shadow-sm">
                                個人履歴を確認する <i class="fa-solid fa-arrow-right ml-2"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('') : '<div class="py-20 text-center border-2 border-dashed border-slate-200 rounded-3xl"><p class="text-slate-300 font-black italic tracking-widest uppercase">No review items found</p></div>';
        }

        // ▼ アコーディオン開く時に既読処理
        window.toggleKairan = async (id, isRead, date) => {
            const item = document.getElementById(`item-${id}`);
            const content = item.querySelector('.accordion-content');
            const isOpen = content.style.display === 'block';
            content.style.display = isOpen ? 'none' : 'block';
            
            if (!isOpen && !isRead) {
                try {
                    await updateDoc(doc(db, "notifications", id), { isRead: true });
                    item.classList.remove('unread');
                    const label = item.querySelector('.status-txt');
                    label.innerText = "既読"; 
                    label.className = "status-txt status-read";
                    // ▼ カレンダーキャッシュをクリア
                    clearCalCache(date);
                } catch (e) { console.error(e); }
            }
        };

        // ▼ 一括処理
        window.bulkAction = async (action) => {
            const checks = document.querySelectorAll('.bulk-check:checked');
            if (!checks.length) return alert("項目にチェックを入れてください");
            if (!confirm(`${checks.length}件を${action === 'read' ? '既読' : '削除'}にしますか？`)) return;
            
            const batch = writeBatch(db);
            checks.forEach(cb => {
                const ref = doc(db, "notifications", cb.value);
                if (action === 'read') batch.update(ref, { isRead: true });
                else batch.delete(ref);
            });
            await batch.commit();
            
            // ▼ 一括処理後、カレンダーキャッシュを全クリア
            Object.keys(sessionStorage).forEach(k => {
                if (k.startsWith('cp_cal_cache')) sessionStorage.removeItem(k);
            });
            
            location.reload();
        };

        // ▼ 個人履歴へ遷移（省エネ＋既読同期）
        window.goUsage = (name, date, customer) => {
            let m = new Date().getMonth() + 1;
            if (date) {
                const parts = date.split(/[-/]/);
                if (parts.length >= 2) m = parseInt(parts[1]);
            }
            sessionStorage.setItem('cp_usage_jump_name', name);
            sessionStorage.setItem('cp_usage_jump_month', m);
            sessionStorage.setItem('cp_usage_jump_customer', customer);
            sessionStorage.setItem('cp_usage_jump_date', date);
            
            // ▼ 戻ってくるまでのフラグをセット
            sessionStorage.setItem('cp_return_from_kairan', 'true');
            
            location.href = 'usage.html';
        };

        // ▼ usage から戻ってきた時の処理
        async function handleReturnFromUsage() {
            if (sessionStorage.getItem('cp_return_from_kairan') === 'true') {
                sessionStorage.removeItem('cp_return_from_kairan');
                // ▼ 最新データを再取得（既読状態が反映される）
                await init();
            }
        }

        init();

        // ▼ ページ表示時に戻り処理を実行
        window.addEventListener('pageshow', handleReturnFromUsage);
    </script>
</body>
</html>
