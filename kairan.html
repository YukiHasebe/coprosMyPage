<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>回覧一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        
        .accordion-item { background: white; border-radius: 1.2rem; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .accordion-header { padding: 1.2rem 2rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; position: relative; }
        .accordion-item.unread { border-left: 6px solid var(--copros-orange); }
        .accordion-content { display: none; padding: 2.5rem; background: white; border-top: 1px solid #f1f5f9; }
        
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; margin-bottom: 2.5rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 2rem; }
        .info-label { font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 0.5rem; }
        .info-value { font-size: 14px; font-weight: 800; color: #475569; }
        .report-label { font-size: 11px; font-weight: 900; color: var(--copros-orange); margin-bottom: 1rem; display: block; }
        .report-box { background: #f8fafc; border-radius: 1.2rem; padding: 2rem; border: 1px solid #f1f5f9; font-size: 14px; line-height: 1.8; color: #475569; }
        
        .badge { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 900; color: white; text-transform: uppercase; }
        .badge-apo { background: #3b82f6; }
        .badge-rec { background: var(--copros-orange); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1000px] mx-auto">
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-1">回覧一覧</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Circular Reports</nav>
                    </div>
                    <button onclick="window.markAllAsRead()" class="px-8 py-3 bg-[#004098] text-white rounded-xl font-black text-xs hover:shadow-lg transition-all active:scale-95">すべて既読にする</button>
                </div>

                <div id="kairanList" class="space-y-4 mb-20">
                    <!-- JS注入 -->
                </div>
            </div>
        </div>
    </main>

    <div id="local-loading" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[9999] hidden flex-col items-center justify-center">
        <div class="animate-spin mb-4 text-[#ff7e11] text-6xl"><i class="fa-solid fa-circle-notch"></i></div>
        <p class="text-slate-800 font-black tracking-tighter uppercase italic text-xs">Syncing Circulars...</p>
    </div>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, where, updateDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let myName = sessionStorage.getItem('userName');

        async function init() {
            if(!myName) return;
            const container = document.getElementById('kairanList');
            const loader = document.getElementById('local-loading');
            loader.style.display = 'flex';

            try {
                // 🌟 【名寄せ解決】Firebase側での並び替えをせず、まずは全件取得（省エネ）
                const snap = await getDocs(collection(db, "notifications"));
                const clean = (s) => (s||"").replace(/\s+/g, '');
                
                // ブラウザ側で自分宛てを抽出 ＆ 最新順にソート
                const data = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .filter(n => clean(n.recipient) === clean(myName))
                    .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                loader.style.display = 'none';

                if(data.length === 0) {
                    container.innerHTML = '<p class="text-center py-20 text-slate-300 font-bold">回覧はありません</p>';
                    return;
                }

                container.innerHTML = data.map(n => {
                    const isApo = n.type === "アポ回覧";
                    const dateStr = n.visitDate ? String(n.visitDate).replace(/-/g,'/') : '日付なし';
                    
                    return `
                        <div class="accordion-item ${n.isRead ? '' : 'unread'}">
                            <div class="accordion-header" onclick="window.toggleKairan(this, '${n.id}', ${n.isRead})">
                                <div class="flex items-center gap-6">
                                    <span class="badge ${isApo ? 'badge-apo' : 'badge-rec'}">${isApo ? 'アポ' : '実績'}</span>
                                    <span class="text-sm font-mono font-black text-slate-800">${dateStr}</span>
                                    <span class="text-base font-black text-slate-700">${n.visitorName} ➔ ${n.customerName}</span>
                                </div>
                                <i class="fa-solid fa-chevron-down opacity-30 text-xs transition-transform"></i>
                            </div>
                            <div class="accordion-content">
                                <div class="info-grid">
                                    <div><p class="info-label">お客様名</p><p class="info-value text-[#004098]">${n.customerName}</p></div>
                                    <div><p class="info-label">訪問/予定日</p><p class="info-value font-mono font-black">${dateStr}</p></div>
                                    <div><p class="info-label">報告者</p><p class="info-value">${n.visitorName}</p></div>
                                    <div><p class="info-label">区分</p><p class="info-value font-black text-orange-500">${n.type || '実績回覧'}</p></div>
                                </div>
                                <div>
                                    <span class="report-label">◆ 詳細内容</span>
                                    <div class="report-box">${n.content || '報告内容の詳細はUsage画面で確認できます。'}</div>
                                </div>
                                <div class="mt-10 flex justify-end">
                                    <button onclick="window.goUsage('${n.visitorName}', '${n.visitDate}', '${n.customerName}')" class="px-6 py-2 bg-slate-100 text-[#004098] rounded-lg text-xs font-black hover:bg-[#004098] hover:text-white transition-all">
                                        この社員の全履歴を確認する ➔
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.error(e); loader.style.display = 'none'; }
        }

        window.toggleKairan = async (header, id, isRead) => {
            const content = header.nextElementSibling;
            const arrow = header.querySelector('i');
            const item = header.parentElement;
            const open = content.style.display === 'block';
            content.style.display = open ? 'none' : 'block';
            arrow.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';

            if (!open && !isRead) {
                await updateDoc(doc(db, "notifications", id), { isRead: true });
                item.classList.remove('unread');
            }
        };

        window.markAllAsRead = async () => {
            if(!confirm("未読の回覧をすべて既読にします。よろしいですか？")) return;
            const q = query(collection(db, "notifications"), where("recipient", "==", myName), where("isRead", "==", false));
            const snap = await getDocs(q);
            const batch = writeBatch(db);
            snap.docs.forEach(d => batch.update(d.ref, { isRead: true }));
            await batch.commit();
            alert("すべて既読にしました");
            location.reload();
        };

        window.goUsage = (name, date, customer) => {
            const m = date ? parseInt(date.split(/[-/]/)[1]) : (new Date().getMonth() + 1);
            sessionStorage.setItem('cp_usage_jump_name', name);
            sessionStorage.setItem('cp_usage_jump_month', m);
            sessionStorage.setItem('cp_usage_jump_customer', customer);
            location.href = 'usage.html';
        };

        init();
    </script>
</body>
</html>
