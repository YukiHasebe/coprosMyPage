<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お客様情報一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --sidebar-bg: #1a1a1a; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        
        .filter-btn { transition: all 0.2s; }
        .filter-btn.active { 
            background: linear-gradient(135deg, #ff9d47 0%, #ff7e11 100%) !important; 
            color: white !important; 
            box-shadow: 0 4px 12px rgba(255,126,17,0.3);
        }

        .table-container { border-radius: 2rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        
        #detailSearchSection { display: none; }
        /* スクロールバーのカスタマイズ */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>

        <div class="flex-1 overflow-auto p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                
                <!-- タイトル・ボタンエリア -->
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 mb-2">お客様情報一覧</h1>
                        <nav class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Customer Relationship Management</nav>
                    </div>
                    <div class="flex gap-3">
                        <button id="detailSearchToggle" class="px-5 py-2.5 bg-white border border-slate-200 text-slate-600 rounded-xl font-bold text-sm hover:bg-slate-50 transition-all shadow-sm">
                            <i class="fa-solid fa-sliders text-blue-500 mr-2"></i>詳細検索
                        </button>
                        <button onclick="location.href='add.html'" class="px-6 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-sm hover:scale-105 transition-all shadow-lg shadow-blue-900/20">
                            <i class="fa-solid fa-plus-circle mr-2"></i>新規顧客登録
                        </button>
                        <button id="bulkDeleteBtn" class="px-5 py-2.5 bg-rose-50 text-rose-600 border border-rose-100 rounded-xl font-bold text-sm hover:bg-rose-600 hover:text-white transition-all shadow-sm">
                            <i class="fa-solid fa-trash-can mr-2"></i>一括削除
                        </button>
                    </div>
                </div>

                <!-- 詳細検索パネル -->
                <div id="detailSearchSection" class="mb-8 p-8 bg-white rounded-3xl shadow-xl border border-blue-100">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 text-xs font-bold">
                        <div class="space-y-2">
                            <label class="text-slate-400">お客様名/カナ</label>
                            <input type="text" id="detailName" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-400" placeholder="キーワード">
                        </div>
                        <div class="space-y-2">
                            <label class="text-slate-400">住所</label>
                            <input type="text" id="detailAddress" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-400" placeholder="市区町村など">
                        </div>
                        <div class="space-y-2">
                            <label class="text-slate-400">訪問日（開始）</label>
                            <input type="date" id="startDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-400">
                        </div>
                        <div class="space-y-2">
                            <label class="text-slate-400">訪問日（終了）</label>
                            <input type="date" id="endDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-400">
                        </div>
                    </div>
                    <div class="flex justify-center gap-4 mt-8">
                        <button id="execDetailSearch" class="bg-[#3c4b5a] text-white px-12 py-3 rounded-xl font-bold shadow-lg hover:bg-black transition-all">検索を実行</button>
                        <button id="clearDetailSearch" class="bg-slate-100 text-slate-500 px-8 py-3 rounded-xl font-bold hover:bg-slate-200 transition-all">リセット</button>
                    </div>
                </div>

                <!-- 50音フィルター ＆ 件数表示（枠なしスッキリ版） -->
                <div class="flex justify-between items-center mb-8 px-2">
                    <div class="flex flex-wrap gap-1.5 p-1.5 bg-white rounded-2xl border border-slate-200 shadow-sm">
                        <button class="filter-btn active px-6 py-2 rounded-xl text-sm font-bold transition-all" data-range="all">全件</button>
                        <script>
                            ['あ','か','さ','た','な','は','ま','や','ら','わ','他'].forEach(k => {
                                document.write(`<button class="filter-btn px-4 py-2 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all" data-range="${k}">${k}</button>`);
                            });
                        </script>
                    </div>
                    <!-- 枠を消して、シンプルなテキスト表示に -->
                    <div class="text-slate-400 font-mono font-bold text-sm tracking-widest">
                        <span id="pageRange" class="text-slate-800 text-lg">0-0</span> <span class="mx-1 text-slate-300">/</span> <span id="totalCount" class="text-slate-500">0</span> <span class="text-[10px] text-slate-300 uppercase ml-1">Customers</span>
                    </div>
                </div>

                <div class="table-container">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-white text-[10px] font-black uppercase tracking-widest">
                                <th class="p-6 text-center w-20">No</th>
                                <th class="p-6">お客様情報</th>
                                <th class="p-6 text-center w-48">実績</th>
                                <th class="p-6 text-center w-40">連絡先</th>
                                <th class="p-6">住所</th>
                                <th class="p-6 text-center w-28">訪問数</th>
                                <th class="p-6 text-center w-40">最終訪問</th>
                                <th class="p-6 text-center w-16"><i class="fa-solid fa-check-double text-slate-400"></i></th>
                            </tr>
                        </thead>
                        <tbody id="customerTable" class="divide-y divide-slate-100 text-sm font-bold italic-none"></tbody>
                    </table>
                </div>

                <!-- ページネーション -->
                <div id="paginationControls" class="mt-8 mb-24 flex justify-center gap-2"></div>
            </div>
        </div>
    </main>

    <script src="common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query, doc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AiZaSyDh00EZ7Jb1K2rTxLyTH6d80b4Qzcrwf_XI",
            authDomain: "copros-my-page.firebaseapp.com",
            projectId: "copros-my-page",
            storageBucket: "copros-my-page.firebasestorage.app",
            messagingSenderId: "54419849010",
            appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        const perPage = 20;

        async function init() {
            try {
                const snap = await getDocs(query(collection(db, "customers"), orderBy("name")));
                allData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                filteredData = [...allData];
                updateView();
                setupSearch();
            } catch (e) { console.error(e); }
        }

        function updateView() {
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pagedData = filteredData.slice(start, end);

            renderTable(pagedData, start);
            renderPagination();
            
            document.getElementById('totalCount').innerText = filteredData.length;
            document.getElementById('pageRange').innerText = filteredData.length > 0 ? `${start + 1}-${Math.min(end, filteredData.length)}` : "0-0";
        }

        function renderTable(dataList, startIndex) {
            const tbody = document.getElementById('customerTable');
            tbody.innerHTML = "";
            dataList.forEach((data, index) => {
                let countNum = parseInt(String(data.visitCount || 0).replace(/[^0-9]/g, "")) || 0;
                const row = `
                    <tr class="hover:bg-blue-50/50 transition-all border-b border-slate-50">
                        <td class="p-6 text-center text-slate-400 font-mono text-xs">${startIndex + index + 1}</td>
                        <td class="p-6">
                            <div class="font-black text-slate-800 text-base">${data.name || ""}</div>
                        </td>
                        <td class="p-6">
                            <div class="flex gap-1.5 justify-center">
                                <button class="bg-[#2c5282] text-white px-4 py-1.5 rounded-lg font-black text-[10px] hover:opacity-80 transition-all shadow-sm" onclick="location.href='customer_history.html?name=${encodeURIComponent(data.name)}'">履歴</button>
                                <button class="bg-[#004098] text-white px-4 py-1.5 rounded-lg font-black text-[10px] hover:opacity-80 transition-all shadow-sm" onclick="location.href='history.html?name=${encodeURIComponent(data.name)}'">登録</button>
                            </div>
                        </td>
                        <td class="p-6 text-center text-slate-600 font-mono text-xs">${data.tel || "-"}</td>
                        <td class="p-6 text-slate-500 text-xs font-medium">${data.address || "-"}</td>
                        <td class="p-6 text-center"><span class="font-black text-orange-600 text-lg">${countNum}</span><span class="text-[10px] ml-0.5">回</span></td>
                        <td class="p-6 text-center text-slate-400 font-bold text-[10px]">${data.lastVisit || "未訪問"}</td>
                        <td class="p-6 text-center"><input type="checkbox" class="customer-check w-5 h-5 accent-rose-500" data-id="${data.id}"></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / perPage);
            const container = document.getElementById('paginationControls');
            container.innerHTML = "";
            if (totalPages <= 1) return;
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `w-10 h-10 rounded-xl font-bold transition-all ${currentPage === i ? 'bg-[#ff7e11] text-white shadow-lg' : 'bg-white text-slate-400 hover:bg-slate-100 border border-slate-200'}`;
                btn.onclick = () => { currentPage = i; updateView(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                container.appendChild(btn);
            }
        }

        document.getElementById('detailSearchToggle').onclick = () => {
            const sec = document.getElementById('detailSearchSection');
            sec.style.display = (sec.style.display === 'block') ? 'none' : 'block';
        };

        document.getElementById('execDetailSearch').onclick = () => {
            const nameK = document.getElementById('detailName').value.toLowerCase();
            const addrK = document.getElementById('detailAddress').value.toLowerCase();
            const startK = document.getElementById('startDate').value;
            const endK = document.getElementById('endDate').value;
            filteredData = allData.filter(d => {
                const matchName = !nameK || (d.name && d.name.toLowerCase().includes(nameK)) || (d.kana && d.kana.toLowerCase().includes(nameK));
                const matchAddr = !addrK || (d.address && d.address.toLowerCase().includes(addrK));
                let matchDate = true;
                if (startK || endK) {
                    if (!d.lastVisit || d.lastVisit === "未訪問") { matchDate = false; }
                    else {
                        const dDate = d.lastVisit.replace(/\//g, '-');
                        if (startK && dDate < startK) matchDate = false;
                        if (endK && dDate > endK) matchDate = false;
                    }
                }
                return matchName && matchAddr && matchDate;
            });
            currentPage = 1;
            updateView();
        };

        document.getElementById('clearDetailSearch').onclick = () => {
            document.querySelectorAll('#detailSearchSection input').forEach(i => i.value = "");
            filteredData = [...allData];
            currentPage = 1;
            updateView();
        };

        function setupSearch() {
            const searchInput = document.getElementById('headerSearchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const k = e.target.value.toLowerCase();
                    filteredData = allData.filter(d => (d.name && d.name.toLowerCase().includes(k)) || (d.kana && d.kana.toLowerCase().includes(k)));
                    currentPage = 1;
                    updateView();
                });
            }
        }

        const rangeMap = {
            'あ': /^[あ-おア-オ]/, 'か': /^[か-こカ-コ]/, 'さ': /^[さ-そサ-ソ]/,
            'た': /^[た-とタ-ト]/, 'な': /^[な-のナ-ノ]/, 'は': /^[は-ほハ-ホ]/,
            'ま': /^[ま-もマ-モ]/, 'や': /^[や-よヤ-ヨ]/, 'ら': /^[ら-ろラ-ロ]/, 'わ': /^[わ-んワ-ン]/
        };

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const range = btn.dataset.range;
                if (range === 'all') { filteredData = [...allData]; }
                else if (range === '他') { filteredData = allData.filter(d => !Object.values(rangeMap).some(re => re.test(d.kana || d.name))); }
                else { filteredData = allData.filter(d => rangeMap[range].test(d.kana || "")); }
                currentPage = 1;
                updateView();
            };
        });

        document.getElementById('bulkDeleteBtn').onclick = async () => {
            const checked = document.querySelectorAll('.customer-check:checked');
            if (checked.length === 0) return alert("削除するデータを選択してください。");
            if (!confirm(`${checked.length}件のデータを削除しますか？`)) return;
            const batch = writeBatch(db);
            checked.forEach(el => batch.delete(doc(db, "customers", el.dataset.id)));
            try { await batch.commit(); alert("削除が完了しました。"); init(); } catch (e) { alert("削除に失敗しました。"); }
        };

        init();
    </script>
</body>
</html>
