<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お客様情報一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- list.html 固有のスタイル（一括削除ボタン等）はそのまま維持 -->
    <style>
        :root { --copros-blue: #004098; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .filter-btn { transition: all 0.2s; cursor: pointer; }
        .filter-btn.active { background: var(--copros-orange); color: white; box-shadow: 0 4px 12px rgba(255,126,17,0.3); }
        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        #detailSearchSection { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8">
            <div class="max-w-[1400px] mx-auto">
                <!-- ヘッダーアクション -->
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 gap-4">
                    <div>
                        <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter">お客様情報一覧</h1>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Customer Management</p>
                    </div>
                    <div class="flex gap-3 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100 w-full lg:w-auto overflow-x-auto">
                        <button id="detailSearchToggle" class="px-5 py-2.5 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 flex items-center gap-2 shrink-0">
                            <i class="fa-solid fa-sliders text-blue-400"></i>詳細検索
                        </button>
                        <button onclick="location.href='add.html'" class="px-6 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-xs hover:shadow-lg flex items-center gap-2 shrink-0">
                            <i class="fa-solid fa-plus-circle"></i>新規登録
                        </button>
                        <button id="bulkDeleteBtn" class="px-5 py-2.5 text-rose-400 rounded-xl font-bold text-xs hover:bg-rose-50 flex items-center gap-2 shrink-0">
                            <i class="fa-solid fa-trash-can"></i>一括削除
                        </button>
                    </div>
                </div>

                <!-- 詳細検索 -->
                <div id="detailSearchSection" class="mb-8 p-6 bg-white rounded-3xl shadow-xl border border-blue-50">
                    <div class="flex gap-4">
                        <input type="text" id="detailName" class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-400 font-bold" placeholder="お客様名で検索...">
                        <button id="execDetailSearch" class="bg-[#334155] text-white px-8 py-3 rounded-xl font-bold">検索実行</button>
                    </div>
                </div>

                <!-- 50音フィルター -->
                <div class="flex flex-wrap gap-1 p-1 bg-white rounded-xl border border-slate-200 mb-6 shadow-sm" id="filterContainer">
                    <button class="filter-btn active px-4 py-1.5 rounded-lg text-xs" data-range="all">初期表示</button>
                </div>

                <!-- テーブル -->
                <div class="table-container">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[1000px]">
                            <thead>
                                <tr class="text-white text-[10px] font-black uppercase tracking-widest">
                                    <th class="p-6 text-center w-20 opacity-50">No</th>
                                    <th class="p-6">お客様名</th>
                                    <th class="p-6 text-center w-48 opacity-70">実績</th>
                                    <th class="p-6 text-center w-40 opacity-70">連絡先</th>
                                    <th class="p-6 opacity-70">住所</th>
                                    <th class="p-6 text-center w-28 opacity-70">訪問回数</th>
                                    <th class="p-6 text-center w-40 opacity-70">最終訪問日</th>
                                    <th class="p-6 text-center w-16 opacity-70"><i class="fa-solid fa-trash-can"></i></th>
                                </tr>
                            </thead>
                            <tbody id="customerTable" class="divide-y divide-slate-100 text-sm font-bold"></tbody>
                        </table>
                    </div>
                </div>
                <!-- 読み込みボタン -->
                <div class="mt-8 mb-20 text-center" id="paginationBottom"></div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, limit, startAfter, orderBy, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./common.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let lastVisible = null;
        let currentMode = 'all'; 

        // 50音生成
        const filterContainer = document.getElementById('filterContainer');
        ['あ','か','さ','た','な','は','ま','や','ら','わ'].forEach(k => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn px-3.5 py-1.5 rounded-lg text-xs';
            btn.dataset.range = k;
            btn.innerText = k;
            filterContainer.appendChild(btn);
        });

        // 通信節約型：取得関数
        async function fetchCustomers(isMore = false, searchQuery = null) {
            const tbody = document.getElementById('customerTable');
            if (!isMore) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i> 通信中...</td></tr>`;
                lastVisible = null;
            }

            try {
                let q;
                const constraints = [limit(30)];
                if (isMore && lastVisible) constraints.push(startAfter(lastVisible));

                if (searchQuery) {
                    q = query(collection(db, "customers"), searchQuery, ...constraints);
                } else if (currentMode === 'all') {
                    q = query(collection(db, "customers"), orderBy("name"), ...constraints);
                } else {
                    // 50音（kanaフィールド必須）
                    const rangeMap = { 'あ':'い','か':'き','さ':'し','た':'ち','な':'に','は':'ひ','ま':'み','や':'ゆ','ら':'り','わ':'を' };
                    q = query(collection(db, "customers"), where("kana", ">=", currentMode), where("kana", "<", rangeMap[currentMode] || currentMode + "\uf8ff"), orderBy("kana"), ...constraints);
                }

                const snap = await getDocs(q);
                if (snap.empty && !isMore) {
                    tbody.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-slate-400">該当なし</td></tr>`;
                    return;
                }

                lastVisible = snap.docs[snap.docs.length - 1];
                renderTable(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })), isMore);
                renderLoadMore(snap.docs.length === 30);
            } catch (e) {
                console.error(e);
                tbody.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-rose-400">読み込みエラー。FirebaseのIndex設定を確認してください。</td></tr>`;
            }
        }

        function renderTable(dataList, append) {
            const tbody = document.getElementById('customerTable');
            if (!append) tbody.innerHTML = "";
            dataList.forEach((data, index) => {
                const row = `
                    <tr class="hover:bg-blue-50/40 transition-all border-b border-slate-50">
                        <td class="p-6 text-center text-slate-300 font-mono text-xs">-</td>
                        <td class="p-6"><div class="font-black text-slate-800 text-base leading-tight">${data.name || "未設定"}</div></td>
                        <td class="p-6 text-center">
                            <div class="flex gap-1.5 justify-center">
                                <button class="border-2 border-[#004098] text-[#004098] px-3 py-1.5 rounded-lg font-black text-[10px] hover:bg-[#004098] hover:text-white transition-all flex items-center gap-1" onclick="location.href='customer_history.html?name=${encodeURIComponent(data.name)}'"><i class="fa-solid fa-clock-rotate-left"></i>履歴</button>
                                <button class="bg-[#ff7e11] text-white px-3 py-1.5 rounded-lg font-black text-[10px] hover:shadow-lg transition-all flex items-center gap-1" onclick="location.href='history.html?name=${encodeURIComponent(data.name)}'"><i class="fa-solid fa-pen-to-square"></i>登録</button>
                            </div>
                        </td>
                        <td class="p-6 text-center text-slate-600 font-mono text-xs tracking-tighter">${data.tel || "-"}</td>
                        <td class="p-6 text-slate-500 text-xs font-medium truncate max-w-[200px]">${data.address || "-"}</td>
                        <td class="p-6 text-center"><span class="inline-block bg-orange-50 text-[#ff7e11] px-3 py-1 rounded-full text-sm font-black border border-orange-100">${data.visitCount || 0}回</span></td>
                        <td class="p-6 text-center text-slate-400 font-bold text-[10px] uppercase">${data.lastVisit || "未登録"}</td>
                        <td class="p-6 text-center"><input type="checkbox" class="customer-check w-5 h-5 accent-rose-500 rounded-md cursor-pointer" data-id="${data.id}"></td>
                    </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function renderLoadMore(hasNext) {
            const container = document.getElementById('paginationBottom');
            container.innerHTML = hasNext ? `<button id="loadMoreBtn" class="px-12 py-3 bg-slate-800 text-white rounded-2xl font-black text-xs hover:bg-black">もっと見る</button>` : `<span class="text-slate-300 font-bold text-xs">End of List</span>`;
            if (hasNext) document.getElementById('loadMoreBtn').onclick = () => fetchCustomers(true);
        }

        // 検索窓・50音のイベント
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.range;
                fetchCustomers();
            };
        });

        const execSearch = () => {
            const val = document.getElementById('detailName').value.trim() || document.getElementById('headerSearchInput')?.value.trim();
            if (!val) return;
            const q = where("name", ">=", val), w2 = where("name", "<=", val + "\uf8ff");
            fetchCustomers(false, query(collection(db, "customers"), q, w2, orderBy("name")));
        };

        document.getElementById('execDetailSearch').onclick = execSearch;
        
        // ヘッダー検索窓の連動
        document.addEventListener('input', (e) => {
            if (e.target.id === 'headerSearchInput') {
                if (e.target.value.length >= 2) execSearch();
            }
        });

        document.getElementById('detailSearchToggle').onclick = () => {
            const sec = document.getElementById('detailSearchSection');
            sec.style.display = (sec.style.display === 'block') ? 'none' : 'block';
        };

        fetchCustomers();
    </script>
</body>
</html>
