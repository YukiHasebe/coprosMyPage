
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お客様一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #1a1a1a;
            --header-bg: #3c4b5a;
            --accent-orange: #ff7e11;
            --sidebar-hover: #333333;
        }
        body { font-family: "Meiryo", sans-serif; background-color: #f4f7f9; }
        
        /* サイドバー */
        .sidebar { background-color: var(--sidebar-bg); width: 200px; }
        .nav-item { 
            border-bottom: 1px solid #2d2d2d; 
            transition: all 0.2s; 
            color: #b8b8b8;
        }
        .nav-item:hover { background-color: var(--sidebar-hover); color: white; }
        .active-menu { 
            background-color: #2d3748; 
            border-left: 4px solid var(--accent-orange); 
            color: white !important; 
        }

        /* テーブル */
        .custom-table thead th {
            background-color: #222;
            color: white;
            font-weight: normal;
            font-size: 13px;
            border: 1px solid #444;
            padding: 12px 8px;
        }
        .custom-table tbody td {
            font-size: 13px;
            border: 1px solid #e2e8f0;
            padding: 12px 10px;
        }
        .custom-table tr:nth-child(even) { background-color: #f9fafb; }
        .custom-table tr:hover { background-color: #fff9e6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

   <!-- サイドバー（共通リンク設定済） -->
<aside class="sidebar flex-shrink-0 text-white flex flex-col shadow-2xl">
    <div class="p-4 text-xs font-bold text-gray-500 border-b border-gray-800 tracking-widest uppercase">Menu</div>
    <nav class="flex-1 overflow-y-auto">
        <!-- お客様 -->
        <a href="list.html" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-users w-6"></i> お客様
        </a>

        <!-- 実績（サブメニュー付き） -->
        <div class="nav-group">
            <div class="nav-item block px-5 py-4 text-sm flex items-center cursor-pointer">
                <i class="fa-solid fa-file-invoice w-6"></i> 実績
            </div>
            <div class="bg-black text-[11px]">
                <a href="history.html" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">実績登録</a>
                <a href="list_records.html" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">実績一覧</a>
                <a href="#" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">実績CSV出力</a>
            </div>
        </div>

        <!-- カレンダー -->
        <a href="calendar.html" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-calendar-days w-6"></i> カレンダー
        </a>

        <!-- 回覧一覧 -->
        <a href="#" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-envelope-open-text w-6"></i> 回覧一覧
            <span class="ml-auto bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full">1</span>
        </a>

        <!-- 地図 -->
        <a href="map.html" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-map-location-dot w-6"></i> 地図
        </a>

        <!-- アポイント -->
        <a href="appoint.html" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-clock w-6"></i> アポイント
        </a>

        <!-- 集計（サブメニュー付き） -->
        <div class="nav-group">
            <div class="nav-item block px-5 py-4 text-sm flex items-center cursor-pointer">
                <i class="fa-solid fa-chart-line w-6"></i> 集計
            </div>
            <div class="bg-black text-[11px]">
                <a href="usage.html" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">組織員利用状況</a>
                <a href="monthly_list.html" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">月別一覧</a>
                <a href="#" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">お客様別滞在時間一覧</a>
                <a href="#" class="block px-10 py-3 text-gray-400 hover:text-white border-b border-gray-900">実績グラフ出力</a>
            </div>
        </div>

        <!-- マスタ管理 -->
        <a href="#" class="nav-item block px-5 py-4 text-sm flex items-center hover:text-white">
            <i class="fa-solid fa-gears w-6"></i> マスタ管理
        </a>
    </nav>

    <!-- ログアウト -->
    <div class="p-4 border-t border-gray-800">
        <a href="index.html" class="text-xs text-gray-500 hover:text-white flex items-center">
            <i class="fa-solid fa-right-from-bracket mr-2"></i> ログアウト
        </a>
    </div>
</aside>
    <!-- メインコンテンツ -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- ヘッダー -->
        <header class="h-14 bg-[#3c4b5a] flex items-center justify-between px-6 text-white shadow-md">
            <div class="flex items-center gap-4">
                <span class="text-xl font-bold tracking-tighter text-[#87ceeb]">株式会社コプロス</span>
                <div class="relative ml-4 flex">
                    <input type="text" placeholder="お客様名を入力してください" class="w-80 py-1 px-3 text-sm text-gray-800 rounded-l focus:outline-none border-none">
                    <button class="bg-[#eee] text-[#333] px-5 py-1 text-sm rounded-r font-bold hover:bg-gray-300 transition-colors border-none">検　索</button>
                </div>
            </div>
            <div class="text-xs font-medium flex items-center gap-4">
                <span><i class="fa-solid fa-bell mr-1"></i> お知らせ</span>
                <span class="bg-gray-700 px-3 py-1 rounded">篠原 栄 殿</span>
            </div>
        </header>

        <!-- コンテンツエリア -->
        <div class="flex-1 overflow-auto p-8">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-700">実績一覧</h1>
                    <div class="mt-4 flex gap-2">
                        <button class="bg-[#004098] text-white px-8 py-2 rounded text-sm font-bold shadow hover:bg-blue-900 transition-all">詳細検索</button>
                    </div>
                </div>
                <div class="flex gap-4 items-center">
                    <div class="text-sm text-gray-500">
                        <input type="text" value="20" class="w-12 border border-gray-300 px-2 py-1 rounded text-center mr-1"> 件
                        <button class="bg-[#004098] text-white px-4 py-1 rounded text-sm ml-2">表示</button>
                    </div>
                    <a href="add.html" class="bg-[#ff7e11] hover:bg-[#e66f00] text-white px-6 py-2 rounded shadow-md font-bold text-sm transition-transform active:scale-95">
                        <i class="fa-solid fa-plus mr-2"></i>新規登録
                    </a>
                </div>
            </div>

            <!-- テーブル -->
            <div class="bg-white shadow-xl rounded overflow-hidden border border-gray-200">
                <table class="w-full custom-table">
                    <thead>
                        <tr>
                            <th class="w-12 text-center">No</th>
                            <th class="text-left">お客様名</th>
                            <th class="w-32">実績登録</th>
                            <th class="w-40">電話番号</th>
                            <th class="text-left">住所</th>
                        </tr>
                    </thead>
                    <tbody id="customerTable">
                        <!-- ここにFirebaseのデータが1行サンプル＋実データとして入る -->
                    </tbody>
                </table>
            </div>

            <!-- ページネーション（再現） -->
            <div class="mt-6 flex items-center gap-1">
                <button class="bg-black text-white px-2 py-1 text-xs">«</button>
                <button class="bg-black text-white px-2 py-1 text-xs"><</button>
                <button class="bg-white text-black border border-black px-3 py-1 text-xs font-bold">1</button>
                <button class="bg-black text-white px-2 py-1 text-xs">2</button>
                <button class="bg-black text-white px-2 py-1 text-xs">3</button>
                <button class="bg-black text-white px-2 py-1 text-xs">></button>
                <button class="bg-black text-white px-2 py-1 text-xs">»</button>
                <span class="ml-4 text-sm text-gray-600">1～20/2665件</span>
            </div>
        </div>
    </main>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, getDocs, doc, deleteDoc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhOEZ7Jb1K2rTxLyTH6d8ob4Qzcrwf_XI",
        authDomain: "copros-my-page.firebaseapp.com",
        projectId: "copros-my-page",
        storageBucket: "copros-my-page.firebasestorage.app",
        messagingSenderId: "54419849010",
        appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. 列名の修正（表の見出しを自動で書き換える）
    function updateTableHeaders() {
        const headers = document.querySelectorAll('table thead th');
        if (headers.length >= 7) {
            headers[5].innerText = "訪問回数";
            headers[6].innerText = "最終訪問日";
            // 削除列が既にある場合はそれも修正
            const lastHeader = headers[headers.length - 1];
            if (lastHeader) lastHeader.innerText = "削除";
        }
    }

    // 2. 削除機能
    window.deleteCustomer = async function(customerId, customerName) {
        if (confirm(`「${customerName}」様を削除してもよろしいですか？`)) {
            try {
                await deleteDoc(doc(db, "customers", customerId));
                alert("削除しました。");
                location.reload();
            } catch (e) {
                alert("削除に失敗しました。");
            }
        }
    }

    // 3. データ読み込み（絞り込み対応）
    async function loadCustomers(filterRange = null) {
        const tbody = document.getElementById('customerTable');
        if (!tbody) return;
        tbody.innerHTML = "<tr><td colspan='8' class='text-center p-10'>読み込み中...</td></tr>";

        try {
            let q;
            const customersRef = collection(db, "customers");

            if (filterRange) {
                // あいうえお順の絞り込み（例：あ行なら「あ」以上「か」未満）
                q = query(customersRef, 
                    where("name", ">=", filterRange.start), 
                    where("name", "<", filterRange.end),
                    orderBy("name"), limit(100));
            } else {
                q = query(customersRef, orderBy("name"), limit(50));
            }

            const querySnapshot = await getDocs(q);
            tbody.innerHTML = "";

            let count = 1;
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const customerId = docSnap.id;
                let visitCount = String(data.visitCount || "0").replace('回', '');

                const row = `
                    <tr class="hover:bg-gray-50 border-b text-sm">
                        <td class="p-4 text-center text-gray-500">${count++}</td>
                        <td class="p-4 text-blue-600 font-bold">${data.name}</td>
                        <td class="p-4 text-center">
                           <button class="bg-blue-600 text-white px-3 py-1 rounded text-xs" 
                                   onclick="location.href='history.html?name=${encodeURIComponent(data.name)}'">登録</button>
                        </td>
                        <td class="p-4 text-center">${data.tel || "-"}</td>
                        <td class="p-4 text-gray-600">${data.address || "-"}</td>
                        <td class="p-4 text-center font-bold">${visitCount}回</td>
                        <td class="p-4 text-center text-gray-500 text-xs">${data.lastVisit || "-"}</td>
                        <td class="p-4 text-center"><input type="checkbox" onclick="deleteCustomer('${customerId}', '${data.name}')"></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        } catch (e) {
            console.error(e);
            tbody.innerHTML = "<tr><td colspan='8' class='text-center text-red-500 p-10'>エラーが発生しました</td></tr>";
        }
    }

    // 4. あいうえおボタンのイベント設定
    const kanaMap = {
        'あ行': {start: 'あ', end: 'か'},
        'か行': {start: 'か', end: 'さ'},
        'さ行': {start: 'さ', end: 'た'},
        'た行': {start: 'た', end: 'な'},
        'な行': {start: 'な', end: 'は'},
        'は行': {start: 'は', end: 'ま'},
        'ま行': {start: 'ま', end: 'や'},
        'や行': {start: 'や', end: 'ら'},
        'ら行': {start: 'ら', end: 'わ'},
        'わ行': {start: 'わ', end: 'ん'},
        '全件': null
    };

    document.addEventListener('DOMContentLoaded', () => {
        updateTableHeaders();
        loadCustomers();

        // 既存のボタンを探してイベントをつける
        document.querySelectorAll('button').forEach(btn => {
            const label = btn.innerText.trim();
            if (kanaMap[label] !== undefined) {
                btn.addEventListener('click', () => {
                    // 全ボタンの背景色をリセットしてクリックしたのだけ色を変える
                    document.querySelectorAll('button').forEach(b => b.classList.remove('bg-green-500', 'text-white'));
                    if(label !== '全件') btn.classList.add('bg-green-500', 'text-white');
                    loadCustomers(kanaMap[label]);
                });
            }
        });

        // 名前反映
        const savedName = sessionStorage.getItem('userName');
        if (savedName) {
            document.querySelectorAll('header span').forEach(el => {
                if (el.innerText.includes('篠原 栄') || el.innerText.includes('長谷部由紀')) el.innerText = savedName;
            });
        }
    });
</script>
</body>   
</html>
