    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background-color: #f8fafc; }
        
        /* サイドバー：画像1枚目の仕様（下展開） */
        .sidebar { width: 220px; background-color: #1a1a1a; z-index: 100; overflow-y: auto; }
        .nav-item { border-bottom: 1px solid #2d2d2d; color: #b8b8b8; cursor: pointer; transition: all 0.3s; }
        .nav-item:hover { background-color: #262626; color: white; }
        .nav-item.open { background-color: #2d3748; color: white; border-left: 4px solid #ff7e11; }
        .submenu { max-height: 0; overflow: hidden; background-color: #0f0f0f; transition: max-height 0.3s ease-out; }
        .nav-item.open + .submenu { max-height: 500px; }
        .submenu-item { padding: 12px 20px 12px 45px; font-size: 12px; color: #888; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .submenu-item:hover { color: #ff7e11; background-color: #1a1a1a; }
        .badge { background-color: #e53e3e; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }

        /* コンテンツ：画像2枚目の洗練デザイン */

        #detailSearchSection { display: none; }
        .btn-hover:hover { transform: translateY(-1px); transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

        <div class="flex-1 overflow-auto p-8">
            <div class="max-w-[1400px] mx-auto">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-3xl font-black text-slate-800 mb-2">お客様情報一覧</h1>
                        <nav class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Customer Relationship Management</nav>
                    </div>
                    <div class="flex gap-3">
                        <button id="detailSearchToggle" class="btn-hover px-6 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl shadow-sm font-bold text-sm flex items-center gap-2 hover:bg-slate-50"><i class="fa-solid fa-sliders text-blue-500"></i> 詳細検索</button>
                        <button onclick="location.href='add.html'" class="btn-hover px-6 py-2.5 bg-[#004098] text-white rounded-xl shadow-md font-bold text-sm flex items-center gap-2"><i class="fa-solid fa-plus-circle"></i> 新規顧客登録</button>
                        <button id="bulkDeleteBtn" class="btn-hover px-6 py-2.5 bg-rose-50 text-rose-600 border border-rose-200 rounded-xl font-bold text-sm flex items-center gap-2"><i class="fa-solid fa-trash-can"></i> 一括削除</button>

                </div>

                <!-- 詳細検索 -->
               <!-- 詳細検索セクション（画像2・3枚目の内容を反映） -->
<div id="detailSearchSection" class="mb-8 p-8 bg-white rounded-3xl shadow-xl border border-blue-100 animate-in fade-in duration-300">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 text-xs">
        <!-- 1列目 -->
        <div class="space-y-2">
            <label class="font-black text-slate-400 uppercase">お客様名</label>
            <input type="text" id="detailName" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="space-y-2">
            <label class="font-black text-slate-400 uppercase">住所</label>
            <input type="text" id="detailAddress" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <!-- 2列目 -->
        <div class="space-y-2">
            <label class="font-black text-slate-400 uppercase">顧客ランク</label>
            <select id="detailRank" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none">
                <option value="">選択無し</option>
                <option>Aa</option><option>Ab</option><option>Ac</option><option>Ad</option>
                <option>Ba</option><option>Bb</option><option>Bc</option><option>Bd</option>
                <option>Ca</option><option>Cb</option><option>Cc</option><option>Cd</option>
                <option>取引先</option><option>合併</option><option>廃業</option>
            </select>
        </div>
        <div class="space-y-2">
            <label class="font-black text-slate-400 uppercase">属性・区分</label>
            <select id="detailType" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none">
                <option value="">選択無し</option>
                <option>宮崎産商</option><option>ケコム</option><option>技術開発部</option>
                <option>建築部</option><option>コンサル</option><option>官庁</option><option>取引先</option>
            </select>
        </div>
        <!-- 3列目：訪問期間（新規追加） -->
        <div class="space-y-2 lg:col-span-1">
            <label class="font-black text-slate-400 uppercase">訪問期間</label>
            <div class="flex items-center gap-2">
                <input type="date" id="dateStart" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none text-[10px]">
                <span class="text-slate-400">～</span>
                <input type="date" id="dateEnd" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none text-[10px]">
            </div>
        </div>
    </div>
    <!-- 検索・クリアボタン -->
    <div class="flex justify-center gap-4 mt-8">
        <button id="execDetailSearch" class="bg-blue-600 text-white px-12 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-all">検 索</button>
        <button id="clearDetailSearch" class="bg-slate-100 text-slate-500 px-12 py-3 rounded-xl font-bold hover:bg-slate-200 transition-all">クリア</button>
    </div>
</div>

                <!-- あかさたな -->
                <div class="flex flex-wrap gap-1.5 mb-8 p-1.5 bg-slate-200/50 rounded-2xl w-fit">
                    <button class="filter-btn active px-6 py-2 rounded-xl text-sm font-black transition-all" data-range="all">全件</button>
                    <script>
                        ['あ','か','さ','た','な','は','ま','や','ら','わ'].forEach(k => document.write(`<button class="filter-btn px-4 py-2 rounded-xl text-sm font-bold text-slate-500 hover:bg-white transition-all" data-range="${k}">${k}</button>`));
                    </script>
                    <button class="filter-btn px-4 py-2 rounded-xl text-sm font-bold text-slate-500 hover:bg-white transition-all" data-range="others">他</button>
                </div>

                <!-- ページネーション（上） -->
                <div id="paginationTop" class="mb-6"></div>

                <!-- テーブル (画像2枚目究極デザイン) -->
                <div class="bg-white shadow-2xl rounded-[2.5rem] overflow-hidden border border-slate-200">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-800 text-white text-[10px] font-black uppercase tracking-widest">
                                <th class="p-6 text-center w-20">No</th>
                                <th class="p-6">お客様情報</th>
                                <th class="p-6 text-center w-48">実 績</th>
                                <th class="p-6 text-center w-40">連絡先</th>
                                <th class="p-6">住所</th>
                                <th class="p-6 text-center w-28">訪問数</th>
                                <th class="p-6 text-center w-40">最終訪問</th>
                                <th class="p-6 text-center w-16"><i class="fa-solid fa-check-double"></i></th>
                            </tr>
                        </thead>
                        <tbody id="customerTable" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>

                <!-- ページネーション（下） -->
                <div id="paginationBottom" class="mt-8 mb-24"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhOEZ7Jb1K2rTxLyTH6d8ob4Qzcrwf_XI",
            authDomain: "copros-my-page.firebaseapp.com",
            projectId: "copros-my-page",
            storageBucket: "copros-my-page.firebasestorage.app",
            messagingSenderId: "54419849010",
            appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        const perPage = 20;

        async function init() {
            const savedName = sessionStorage.getItem('userName');
            if (savedName) document.getElementById('userNameDisplay').innerText = savedName;

            try {
                const snap = await getDocs(query(collection(db, "customers"), orderBy("name")));
                allData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                filteredData = [...allData];
                updateView();
            } catch (e) { console.error(e); }
        }

        function updateView() {
            renderTable();
            renderPagination();
        }

        function renderTable() {
            const tbody = document.getElementById('customerTable');
            const start = (currentPage - 1) * perPage;
            const pageData = filteredData.slice(start, start + perPage);
            tbody.innerHTML = "";
            
            pageData.forEach((data, index) => {
                const no = start + index + 1;
                const vCount = String(data.visitCount || 0).replace(/[^0-9]/g,'');
                const row = `
                    <tr class="hover:bg-blue-50/50 transition-all group">
                        <td class="p-6 text-center text-slate-300 font-mono text-sm">${no}</td>
                        <td class="p-6">
                            <div class="font-black text-slate-800 text-base group-hover:text-blue-600 transition-colors">${data.name || ""}</div>
                            <div class="text-[9px] text-slate-400 mt-1 font-bold tracking-widest uppercase italic">Customer Profile Verified</div>
                        </td>
                        <td class="p-6 text-center">
                            <div class="flex gap-1.5 justify-center">
                                <button class="btn-hover bg-[#2c5282] text-white px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-tighter shadow-md">履歴</button>
                                <button class="btn-hover bg-[#004098] text-white px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-tighter shadow-md" 
                                        onclick="location.href='history.html?name=${encodeURIComponent(data.name)}'">登録</button>
                            </div>
                        </td>
                        <td class="p-6 text-center text-slate-600 font-bold text-sm font-mono"><a href="tel:${data.tel}">${data.tel || "-"}</a></td>
                        <td class="p-6 text-slate-500 text-xs leading-relaxed max-w-xs truncate">${data.address || "-"}</td>
                        <td class="p-6 text-center">
                            <span class="inline-block px-3 py-1 bg-orange-50 text-orange-600 rounded-full font-black text-sm italic">${vCount}回</span>
                        </td>
                        <td class="p-6 text-center text-slate-400 font-bold text-[10px]">${data.lastVisit || "未訪問"}</td>
                        <td class="p-6 text-center"><input type="checkbox" class="customer-check" data-id="${data.id}"></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / perPage);
            const startIdx = (currentPage - 1) * perPage + 1;
            const endIdx = Math.min(currentPage * perPage, filteredData.length);
            
            const generatePageBtns = () => {
                let btns = "";
                let start = Math.max(1, currentPage - 2);
                let end = Math.min(totalPages, start + 4);
                if (end - start < 4) start = Math.max(1, end - 4);
                for(let i=start; i<=end; i++) {
                    const activeClass = i === currentPage ? 'active-page' : 'bg-white text-slate-600 hover:bg-slate-100';
                    btns += `<button onclick="changePage(${i})" class="${activeClass} w-10 h-10 flex items-center justify-center rounded-xl font-black text-sm shadow-sm border border-slate-200 transition-all">${i}</button>`;
                }
                return btns;
            };

            const html = `
                <div class="flex items-center justify-between bg-white p-4 rounded-[1.5rem] shadow-sm border border-slate-200">
                    <div class="flex items-center gap-2">
                        <button onclick="changePage(1)" class="w-10 h-10 flex items-center justify-center bg-slate-800 text-white rounded-xl disabled:opacity-20" ${currentPage===1?'disabled':''}>«</button>
                        ${generatePageBtns()}
                        <button onclick="changePage(${totalPages})" class="w-10 h-10 flex items-center justify-center bg-slate-800 text-white rounded-xl disabled:opacity-20" ${currentPage===totalPages?'disabled':''}>»</button>
                    </div>
                    <div class="text-slate-400 text-xs font-black tracking-widest">${startIdx}-${endIdx}/${filteredData.length}</div>
            `;
            document.getElementById('paginationTop').innerHTML = html;
            document.getElementById('paginationBottom').innerHTML = html;
        }

        window.changePage = (p) => { currentPage = p; updateView(); window.scrollTo({top: 0, behavior: 'smooth'}); };

        document.getElementById('detailSearchToggle').onclick = () => {
            const sec = document.getElementById('detailSearchSection');
            sec.style.display = (sec.style.display === 'block') ? 'none' : 'block';
        };

        document.getElementById('bulkDeleteBtn').onclick = async () => {
            const selected = Array.from(document.querySelectorAll('.customer-check:checked')).map(el => el.dataset.id);
            if (!selected.length) return alert("削除対象を選択してください。");
            if (confirm(`${selected.length}件を削除しますか？`)) {
                const batch = writeBatch(db);
                selected.forEach(id => batch.delete(doc(db, "customers", id)));
                await batch.commit(); location.reload();
            }
        };

        document.getElementById('headerSearchInput').addEventListener('input', (e) => {
            const k = e.target.value.toLowerCase();
            filteredData = allData.filter(d => d.name.toLowerCase().includes(k));
            currentPage = 1; updateView();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                const r = btn.dataset.range;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'bg-green-600', 'text-white'));
                btn.classList.add('active', 'bg-green-600', 'text-white');
                if(r === 'all') filteredData = [...allData];
                else {
                    const range = {'あ':/^[あ-おア-オ]/,'か':/^[か-こカ-コ]/,'さ':/^[さ-そサ-ソ]/,'た':/^[た-とタ-ト]/,'な':/^[な-のナ-ノ]/,'は':/^[は-ほハ-ホ]/,'ま':/^[ま-もマ-モ]/,'や':/^[や-よヤ-ヨ]/,'ら':/^[ら-ろラ-ロ]/,'わ':/^[わ-んワ-ン]/};
                    filteredData = allData.filter(d => r === 'others' ? !Object.values(range).some(regex => regex.test(d.name)) : range[r].test(d.name));
                }
                currentPage = 1; updateView();
            };
        });

        init();
    </script>
</body>
</html>
