<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お客様情報一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --sidebar-bg: #1a1a1a; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f8fafc; }
        
        /* 共通サイドバースタイル */
        .sidebar { width: 220px; background-color: var(--sidebar-bg); color: white; height: 100vh; }
        .filter-btn.active { background-color: #ff7e11 !important; color: white !important; transform: scale(1.1); box-shadow: 0 4px 10px rgba(255,126,17,0.3); }
        .btn-hover:hover { transform: translateY(-1px); transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <!-- サイドバー挿入用 -->
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
        <!-- ヘッダー挿入用 -->
        <div id="header-placeholder"></div>

        <!-- メインコンテンツ -->
        <div class="flex-1 overflow-auto p-8">
            <div class="max-w-[1400px] mx-auto">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-3xl font-black text-slate-800 mb-2">お客様情報一覧</h1>
                        <nav class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Customer Relationship Management</nav>
                    </div>
                    <div class="flex gap-3">
                        <button id="detailSearchToggle" class="px-6 py-2.5 bg-white border border-slate-200 text-slate-600 rounded-xl font-bold text-sm hover:bg-slate-50 transition-all flex items-center gap-2 shadow-sm">
                            <i class="fa-solid fa-sliders text-blue-500"></i> 詳細検索
                        </button>
                        <button onclick="location.href='add.html'" class="px-6 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-sm btn-hover flex items-center gap-2 shadow-lg shadow-blue-900/20">
                            <i class="fa-solid fa-plus-circle"></i> 新規顧客登録
                        </button>
                    </div>
                </div>

                <!-- 50音フィルター -->
                <div class="flex flex-wrap gap-1.5 mb-8 p-1.5 bg-white/50 rounded-2xl w-fit border border-slate-200">
                    <button class="filter-btn active px-6 py-2 rounded-xl text-sm font-bold transition-all" data-range="all">全件</button>
                    <script>
                        ['あ','か','さ','た','な','は','ま','や','ら','わ','他'].forEach(k => {
                            document.write(`<button class="filter-btn px-4 py-2 rounded-xl text-sm font-bold text-slate-500 hover:bg-white transition-all" data-range="${k}">${k}</button>`);
                        });
                    </script>
                </div>

                <!-- テーブルカード -->
                <div class="bg-white shadow-2xl rounded-[2.5rem] overflow-hidden border border-slate-200">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800 text-white text-[10px] font-black uppercase tracking-widest">
                                <th class="p-6 text-center w-20">No</th>
                                <th class="p-6">お客様情報</th>
                                <th class="p-6 text-center w-48">実績</th>
                                <th class="p-6 text-center w-40">連絡先</th>
                                <th class="p-6">住所</th>
                                <th class="p-6 text-center w-28">訪問数</th>
                                <th class="p-6 text-center w-40">最終訪問</th>
                                <th class="p-6 text-center w-16"><i class="fa-solid fa-trash-can"></i></th>
                            </tr>
                        </thead>
                        <tbody id="customerTable" class="divide-y divide-slate-100 text-sm">
                            <!-- JSで挿入 -->
                        </tbody>
                    </table>
                </div>
                <div id="paginationBottom" class="mt-8 mb-24"></div>
            </div>
        </div>
    </main>

    <!-- 共通スクリプトを読み込む -->
    <script src="common.js"></script>

    <!-- Firebase・データ表示ロジック -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase設定（あなたの設定）
        const firebaseConfig = {
            apiKey: "AiZaSyDh00EZ7Jb1K2rTxLyTH6d80b4Qzcrwf_XI",
            authDomain: "copros-my-page.firebaseapp.com",
            projectId: "copros-my-page",
            storageBucket: "copros-my-page.firebasestorage.app",
            messagingSenderId: "54419849010",
            appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allData = [];
        let filteredData = [];

        async function init() {
            try {
                const snap = await getDocs(query(collection(db, "customers"), orderBy("name")));
                allData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                filteredData = [...allData];
                renderTable();
            } catch (e) { console.error(e); }
        }

        function renderTable() {
            const tbody = document.getElementById('customerTable');
            tbody.innerHTML = "";
            filteredData.forEach((data, index) => {
                const row = `
                    <tr class="hover:bg-blue-50/50 transition-all border-b border-slate-50">
                        <td class="p-6 text-center text-slate-400 font-mono text-xs">${index + 1}</td>
                        <td class="p-6">
                            <div class="font-black text-slate-800 text-base">${data.name || ""}</div>
                            <div class="text-[9px] text-slate-400 mt-1 font-bold">CUSTOMER ID: ${data.id.substring(0,8)}</div>
                        </td>
                        <td class="p-6">
                            <div class="flex gap-1.5 justify-center">
                                <button class="bg-[#2c5282] text-white px-4 py-1.5 rounded-lg font-black text-[10px]" onclick="location.href='customer_history.html?name=${encodeURIComponent(data.name)}'">履歴</button>
                                <button class="bg-[#004098] text-white px-4 py-1.5 rounded-lg font-black text-[10px]" onclick="location.href='history.html?name=${encodeURIComponent(data.name)}'">登録</button>
                            </div>
                        </td>
                        <td class="p-6 text-center text-slate-600 font-bold font-mono">${data.tel || "-"}</td>
                        <td class="p-6 text-slate-500 text-xs font-medium">${data.address || "-"}</td>
                        <td class="p-6 text-center"><span class="font-black text-orange-600">${data.visitCount || 0}</span>回</td>
                        <td class="p-6 text-center text-slate-400 font-bold text-[10px]">${data.lastVisit || "未訪問"}</td>
                        <td class="p-6 text-center"><input type="checkbox" class="w-5 h-5"></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        // 50音フィルターの動作
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const range = btn.dataset.range;
                if (range === 'all') {
                    filteredData = [...allData];
                } else {
                    // ここに50音判定ロジック（前回のコードから流用可能）が入ります
                }
                renderTable();
            };
        });

        init();
    </script>
</body>
</html>
