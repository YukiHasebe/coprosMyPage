<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>お客様情報一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; --copros-blue: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .filter-btn { border: 1px solid #e2e8f0; color: #64748b; background: white; transition: all 0.2s; font-weight: 900; padding: 0.5rem 0.8rem; cursor: pointer; border-radius: 0.75rem; font-size: 0.75rem; }
        .filter-btn.active { background: var(--copros-orange) !important; color: white !important; border-color: var(--copros-orange); box-shadow: 0 4px 12px rgba(255,126,17,0.3); }
        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        .visit-badge { background-color: #fff7ed; color: #ff7e11; padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 900; border: 1px solid #ffedd5; white-space: nowrap; display: inline-block; min-width: 55px; text-align: center; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-4">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-1">お客様情報一覧</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Customer Relationship Management</nav>
                    </div>
                    <div class="flex gap-2 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100 items-center shrink-0 ml-auto">
                        <button onclick="document.getElementById('detailSearchSection').classList.toggle('hidden')" class="px-6 py-2.5 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 flex items-center gap-2"><i class="fa-solid fa-sliders text-blue-400"></i>詳細検索</button>
                        <div class="w-px h-6 bg-slate-100 mx-1"></div>
                        <button onclick="location.href='add.html'" class="px-8 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-xs hover:shadow-lg flex items-center gap-2 active:scale-95"><i class="fa-solid fa-plus-circle"></i>新規登録</button>
                        <div class="w-px h-6 bg-slate-100 mx-1"></div>
                        <button onclick="window.bulkDelete()" class="px-6 py-2.5 text-rose-400 rounded-xl font-bold text-xs hover:bg-rose-50 flex items-center gap-2"><i class="fa-solid fa-trash-can"></i>一括削除</button>
                    </div>
                </div>

                <div id="detailSearchSection" class="hidden mb-8 p-8 bg-white rounded-3xl shadow-xl border border-blue-50">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-xs font-bold">
                        <div class="space-y-2"><label class="text-slate-400">お客様名</label><input type="text" id="detailName" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-orange-400" placeholder="漢字・カナ検索"></div>
                        <div class="space-y-2"><label class="text-slate-400">住所</label><input type="text" id="detailAddress" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-orange-400" placeholder="山口など"></div>
                        <div class="space-y-2"><label class="text-slate-400">顧客ランク</label><select id="detailRank" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl"><option value="">全て</option><option>Aa</option><option>Ab</option><option>Ac</option><option>Ba</option><option>Bb</option><option>Bc</option><option>Ca</option><option>Cb</option><option>Cc</option><option>Cd</option></select></div>
                        <div class="space-y-2"><label class="text-slate-400">属性・区分</label><select id="detailType" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl"><option value="">全て</option><option>ケコム</option><option>建築部</option><option>コンサル</option><option>官庁</option><option>取引先</option><option>宮崎産商</option><option>技術開発部</option></select></div>
                    </div>
                    <div class="flex justify-center gap-4 mt-8">
                        <button onclick="window.executeSearch()" class="bg-[#334155] text-white px-16 py-3 rounded-xl font-black shadow-lg active:scale-95 transition-all">検索を実行</button>
                        <button onclick="window.clearSearch()" class="text-slate-400 px-8 py-3 font-bold hover:text-slate-600">クリア</button>
                    </div>
                </div>

                <div class="flex items-center gap-6 mb-6">
                    <div id="syllabaryFilter" class="flex p-1.5 bg-white rounded-xl border border-slate-200 shadow-sm font-black items-center overflow-x-auto custom-scrollbar gap-1">
                        <button class="filter-btn active px-4 py-1.5" onclick="window.setKanaFilter(this, 'all')">全件</button>
                        <script>['あ','か','さ','た','な','は','ま','や','ら','わ','他'].forEach(k => document.write(`<button class="filter-btn px-3 py-1.5 hover:text-orange-500" onclick="window.setKanaFilter(this, '${k}')">${k}</button>`));</script>
                    </div>
                    <div class="text-slate-400 font-bold text-sm whitespace-nowrap ml-auto bg-white px-5 py-2 rounded-full border border-slate-100 shadow-sm">
                        <span id="totalDisplay" class="text-slate-800 text-xl tracking-tighter">0</span>
                        <span class="text-[10px] uppercase">Customers Loaded</span>
                    </div>
                </div>

                <div class="table-container overflow-x-auto mb-20">
                    <table class="w-full text-left border-collapse min-w-[1100px]">
                        <thead>
                            <tr class="text-white text-[10px] font-black uppercase text-center tracking-widest">
                                <th class="p-6 w-16 opacity-50">No</th>
                                <th class="p-6 text-left">お客様名</th>
                                <th class="p-6 w-48">実績/履歴</th>
                                <th class="p-6">電話番号</th>
                                <th class="p-6 text-left">住所</th>
                                <th class="p-6 w-24">訪問数</th>
                                <th class="p-6 w-32">最終訪問日</th>
                                <th class="p-6 w-16 opacity-30"><i class="fa-solid fa-check-double"></i></th>
                            </tr>
                        </thead>
                        <tbody id="customerTable" class="divide-y divide-slate-100 text-sm font-bold bg-white text-center">
                            <tr><td colspan="8" class="p-20 text-center text-slate-400 font-bold italic animate-pulse">同期中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, orderBy, query, limit, where, doc, writeBatch }
            from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // =========================================================
        // 定数・状態管理
        // =========================================================
        let allCustomers = [];
        const clean = (s) => (s || "").toString().replace(/[\s\u3000]+/g, '').trim();

        // =========================================================
        // ▼▼▼ 追加：キャッシュキー管理 ▼▼▼
        // キャッシュキーはクエリ条件ごとに生成し、同日中は再通信しない
        // =========================================================
        const today = new Date().toDateString();

        function getCacheKey(kana, name, addr, rank, type) {
            return `cp_customers_${today}_${kana}_${clean(name)}_${clean(addr)}_${rank}_${type}`;
        }

        function loadFromCache(key) {
            try {
                const raw = sessionStorage.getItem(key);
                return raw ? JSON.parse(raw) : null;
            } catch { return null; }
        }

        function saveToCache(key, data) {
            try {
                sessionStorage.setItem(key, JSON.stringify(data));
            } catch {
                // sessionStorage 容量超過時は無視（通信にフォールバック）
            }
        }
        // =========================================================
        // ▲▲▲ キャッシュ管理ここまで ▲▲▲
        // =========================================================

        async function init() {
            window.executeSearch();
        }

        window.executeSearch = async (kana = 'all') => {
            const tbody = document.getElementById('customerTable');
            tbody.innerHTML = `<tr><td colspan="8" class="p-16 text-center text-slate-400 font-bold italic">データを照合中...</td></tr>`;

            const name = document.getElementById('detailName').value.trim();
            const addr = document.getElementById('detailAddress').value.trim();
            const rank = document.getElementById('detailRank').value;
            const type = document.getElementById('detailType').value;

            // =========================================================
            // ▼▼▼ 追加：キャッシュチェック（Firebase通信ゼロ化）▼▼▼
            // =========================================================
            const cacheKey = getCacheKey(kana, name, addr, rank, type);
            const cached = loadFromCache(cacheKey);
            if (cached) {
                allCustomers = cached;
                renderTable(allCustomers);
                return; // ✅ キャッシュHIT → Firebase通信なし
            }
            // =========================================================
            // ▲▲▲ キャッシュチェックここまで ▲▲▲
            // =========================================================

            try {
                const ref = collection(db, "customers");
                let q = query(ref, orderBy("updatedAt", "desc"), limit(100));

                // 既存：条件がある時だけピンポイントで取得
                if (kana !== 'all' && kana !== '他') {
                    const rangeMap = {
                        'あ': 'ア', 'か': 'カ', 'さ': 'サ', 'た': 'タ',
                        'な': 'ナ', 'は': 'ハ', 'ま': 'マ', 'や': 'ヤ',
                        'ら': 'ラ', 'わ': 'ワ'
                    };
                    const start = rangeMap[kana] || kana;
                    const end = String.fromCharCode(start.charCodeAt(0) + 1);
                    q = query(ref, where("kana", ">=", start), where("kana", "<", end), orderBy("kana"), limit(100));
                } else if (kana === '他') {
                    // 既存の「他」ボタン：数字・英字・記号等
                    q = query(ref, where("kana", "<", "ア"), orderBy("kana"), limit(100));
                } else if (name) {
                    q = query(ref, where("name", ">=", name), where("name", "<=", name + '\uf8ff'), orderBy("name"), limit(100));
                } else if (addr) {
                    q = query(ref, where("address", ">=", addr), where("address", "<=", addr + '\uf8ff'), orderBy("address"), limit(100));
                } else if (rank) {
                    q = query(ref, where("rank", "==", rank), orderBy("updatedAt", "desc"), limit(100));
                } else if (type) {
                    q = query(ref, where("type", "==", type), orderBy("updatedAt", "desc"), limit(100));
                }

                const snap = await getDocs(q);
                allCustomers = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                // ▼ 取得データをキャッシュ保存 ▼
                saveToCache(cacheKey, allCustomers);

                renderTable(allCustomers);
            } catch (e) {
                console.error(e);
                tbody.innerHTML = `<tr><td colspan="8" class="p-16 text-center text-rose-400 font-bold">読み込みに失敗しました</td></tr>`;
            }
        };

        window.setKanaFilter = (btn, kana) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'text-white'));
            btn.classList.add('active', 'text-white');
            window.executeSearch(kana);
        };

        function renderTable(dataList) {
            const tbody = document.getElementById('customerTable');
            if (dataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-20 text-center text-slate-300 font-black tracking-widest uppercase">No Data Found</td></tr>`;
                document.getElementById('totalDisplay').innerText = 0;
                return;
            }

            // =========================================================
            // ▼▼▼ 修正①②：実績・履歴ボタンに rank と attr を追加 ▼▼▼
            // =========================================================
            tbody.innerHTML = dataList.map((data, i) => {
                // URLパラメータ用にエンコード
                const eName = encodeURIComponent(data.name   || '');
                const eRank = encodeURIComponent(data.rank   || '');
                const eAttr = encodeURIComponent(data.type   || '');

                return `
                <tr class="hover:bg-blue-50/50 border-b border-slate-50 transition-colors">
                    <td class="p-6 text-slate-300 font-mono text-xs border-r border-slate-50">${i + 1}</td>
                    <td class="p-6 text-left font-black text-slate-800">${data.name || '不明'}</td>
                    <td class="p-6 text-center">
                        <div class="flex gap-1 justify-center">
                            <!-- ▼ 修正②：履歴ボタンに rank・attr を追加 ▼ -->
                            <button
                                onclick="location.href='customer_history.html?name=${eName}&rank=${eRank}&attr=${eAttr}'"
                                class="bg-slate-100 text-slate-500 px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-[#004098] hover:text-white transition-all">
                                履歴
                            </button>
                            <!-- ▼ 修正①：実績ボタンに rank・attr を追加 ▼ -->
                            <button
                                onclick="location.href='history.html?name=${eName}&rank=${eRank}&attr=${eAttr}'"
                                class="bg-[#004098] text-white px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-[#ff7e11] transition-all">
                                実績
                            </button>
                        </div>
                    </td>
                    <td class="p-6 text-slate-500 font-mono text-xs text-center">${data.tel || '-'}</td>
                    <td class="p-6 text-left text-xs text-slate-400 truncate max-w-[250px] font-medium">${data.address || '-'}</td>
                    <td class="p-6 text-center"><span class="visit-badge">${data.visitCount || 0}回</span></td>
                    <td class="p-6 text-center text-slate-400 text-[10px] font-black uppercase">${data.lastVisit || '未訪問'}</td>
                    <td class="p-6 text-center">
                        <input type="checkbox" class="customer-check w-5 h-5 accent-rose-500 rounded-md cursor-pointer" data-id="${data.id}">
                    </td>
                </tr>`;
            }).join('');
            // =========================================================
            // ▲▲▲ 修正①②ここまで ▲▲▲
            // =========================================================

            document.getElementById('totalDisplay').innerText = dataList.length;
        }

        window.bulkDelete = async () => {
            const checks = document.querySelectorAll('.customer-check:checked');
            if (!checks.length) return alert("削除したいお客様の右端にチェックを入れてください");
            if (!confirm(`${checks.length}件のデータを削除しますか？\n（この操作は取り消せません）`)) return;

            try {
                const batch = writeBatch(db);
                checks.forEach(cb => { batch.delete(doc(db, "customers", cb.dataset.id)); });
                await batch.commit();

                // ▼ 追加：削除後はキャッシュをクリアして再取得 ▼
                Object.keys(sessionStorage)
                    .filter(k => k.startsWith('cp_customers_'))
                    .forEach(k => sessionStorage.removeItem(k));

                alert("削除が完了しました");
                window.executeSearch();
            } catch (e) { alert("削除に失敗しました"); }
        };

        window.clearSearch = () => {
            document.querySelectorAll('#detailSearchSection input, #detailSearchSection select')
                .forEach(e => e.value = "");
            window.executeSearch();
        };

        init();
    </script>
</body>
</html>
