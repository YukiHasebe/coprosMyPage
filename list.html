
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CP My Page - お客様一覧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; }
        .active-menu { background-color: #2d3748; border-left: 4px solid #4299e1; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-44 bg-gray-900 text-white flex-shrink-0">
            <div class="p-3 text-xs font-bold text-gray-500 border-b border-gray-800">メニュー</div>
            <nav class="mt-2 text-sm font-bold">
                <a href="list.html" class="block px-4 py-3 active-menu">お客様</a>
                <a href="#" class="block px-4 py-3 hover:bg-gray-800">実績</a>
                <a href="#" class="block px-4 py-3 hover:bg-gray-800 text-gray-500">カレンダー</a>
            </nav>
        </aside>
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-[#2c5282] h-14 flex items-center justify-between px-6 text-white shadow-md">
                <div class="text-2xl font-bold tracking-tighter">株式会社コプロス</div>
                <div class="text-sm font-bold pl-4 border-l border-gray-400">篠原 栄 殿</div>
            </header>
            <div class="flex-1 overflow-auto p-8">
                <h1 class="text-2xl font-bold mb-6 text-gray-700">お客様情報一覧</h1>
                <div class="flex flex-col space-y-2 mb-6 w-full max-w-xl">
                    <button class="bg-[#004bb1] text-white w-full py-2.5 rounded-sm font-bold shadow-md text-sm">詳細検索</button>
                    <div class="flex space-x-2">
                        <a href="add.html" class="bg-[#004bb1] text-white flex-1 py-2 rounded-sm font-bold shadow-md text-sm text-center">新規登録</a>
                        <button class="bg-gray-100 text-gray-400 flex-1 py-2 rounded-sm font-bold shadow-sm border border-gray-300 text-sm">削 除</button>
                    </div>
                </div>
                <div class="bg-white shadow-xl overflow-hidden border border-gray-200">
                    <table class="w-full text-left border-collapse text-[12px]">
                        <thead><tr class="bg-[#1a202c] text-white font-normal">
                            <th class="p-2 border border-gray-600 font-normal w-12 text-center">No</th>
                            <th class="p-2 border border-gray-600 font-normal">お客様名</th>
                            <th class="p-2 border border-gray-600 font-normal text-center w-24">実績</th>
                            <th class="p-2 border border-gray-600 font-normal w-32">電話番号</th>
                            <th class="p-2 border border-gray-600 font-normal">住所</th>
                        </tr></thead>
                        <tbody id="customerTable"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyDhOEZ7Jb1K2rTXlyTH6d8ob4Qzcrwf_XI", authDomain: "copros-my-page.firebaseapp.com", projectId: "copros-my-page", storageBucket: "copros-my-page.firebasestorage.app", messagingSenderId: "54419849010", appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        async function loadData() {
            const q = query(collection(db, "customers"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            const tbody = document.getElementById("customerTable");
            tbody.innerHTML = "";
            let i = 1;
            querySnapshot.forEach(doc => {
                const d = doc.data();
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50 border-b border-gray-200">
                        <td class="p-2 border-r text-center">${i++}</td>
                        <td class="p-2 border-r font-bold text-[#2b6cb0] underline cursor-pointer">${d.name || ''}</td>
                        <td class="p-2 border-r text-center">
                            <button class="bg-[#2c5282] text-white px-2 py-0.5 rounded text-[10px] mr-1">履歴</button>
                            <button class="bg-[#2b6cb0] text-white px-2 py-0.5 rounded text-[10px]">登録</button>
                        </td>
                        <td class="p-2 border-r text-blue-500">${d.tel || ''}</td>
                        <td class="p-2 text-blue-500 text-[11px]">${d.pref || ''}${d.address || ''}</td>
                    </tr>`;
            });
        }
        window.onload = loadData;
    </script>
</body>
</html>
