<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>お客様情報一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; --copros-blue: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .filter-btn { border: none; color: #94a3b8; background: transparent; transition: all 0.2s; font-weight: 900; padding: 0.4rem 0.8rem; cursor: pointer; }
        .filter-btn.active { background: var(--copros-orange) !important; color: white !important; border-radius: 0.5rem; box-shadow: 0 4px 12px rgba(255,126,17,0.3); }
        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        .visit-badge { background-color: #fff7ed; color: #ff7e11; padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 900; border: 1px solid #ffedd5; white-space: nowrap; display: inline-block; min-width: 55px; text-align: center; }
        .scope-select { background: #e2e8f0; border: none; padding: 0.4rem 1rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; color: #475569; outline: none; appearance: none; cursor: pointer; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-4">
                    <div><h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-2">お客様情報一覧</h1><nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest">CRM Management</nav></div>
                    <!-- 🌟 厳格な右配置 ＆ 詳細・登録・削除の順 -->
                    <div class="flex gap-1 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100 items-center">
                        <button onclick="document.getElementById('detailSearchSection').classList.toggle('hidden')" class="px-5 py-2.5 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 flex items-center justify-center gap-2"><i class="fa-solid fa-sliders text-blue-400"></i>詳細検索</button>
                        <div class="w-px h-6 bg-slate-100 mx-1"></div>
                        <button onclick="location.href='add.html'" class="px-6 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-xs hover:shadow-lg flex items-center justify-center gap-2"><i class="fa-solid fa-plus-circle"></i>新規登録</button>
                        <div class="w-px h-6 bg-slate-100 mx-1"></div>
                        <button id="bulkDeleteBtn" class="px-5 py-2.5 text-rose-400 rounded-xl font-bold text-xs hover:bg-rose-50 flex items-center justify-center gap-2"><i class="fa-solid fa-trash-can"></i>一括削除</button>
                    </div>
                </div>
                <!-- 詳細検索パネル、50音、テーブル（内容は維持） -->
                ... (中略) ...
            </div>
        </div>
    </main>
    ... (スクリプト部分は前回のグローバル検索対応版をそのまま維持) ...
</body>
</html>
