<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>お客様情報一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .filter-btn.active { background: var(--copros-orange) !important; color: white !important; box-shadow: 0 4px 12px rgba(255,126,17,0.3); }
        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-2">お客様情報一覧</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest">CRM Management</nav>
                    </div>
                    <div class="flex gap-3 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                        <button id="detailSearchToggle" class="px-5 py-2.5 text-slate-500 rounded-xl font-bold text-sm hover:bg-slate-50 flex items-center gap-2"><i class="fa-solid fa-sliders text-blue-400"></i>詳細検索</button>
                        <div class="w-px h-6 bg-slate-100 my-auto"></div>
                        <button onclick="location.href='add.html'" class="px-6 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-sm hover:shadow-lg flex items-center gap-2"><i class="fa-solid fa-plus-circle"></i>新規登録</button>
                        <div class="w-px h-6 bg-slate-100 my-auto"></div>
                        <button id="bulkDeleteBtn" class="px-5 py-2.5 text-rose-400 rounded-xl font-bold text-sm hover:bg-rose-50 flex items-center gap-2"><i class="fa-solid fa-trash-can"></i>一括削除</button>
                    </div>
                </div>

                <!-- 🌟 詳細検索：期間検索を復活させました -->
                <div id="detailSearchSection" class="hidden mb-8 p-8 bg-white rounded-3xl shadow-xl border border-blue-50">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-xs font-bold">
                        <div class="space-y-2"><label class="text-slate-400">お客様名</label><input type="text" id="detailName" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="漢字・カナ検索"></div>
                        <div class="space-y-2"><label class="text-slate-400">住所</label><input type="text" id="detailAddress" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="市区町村など"></div>
                        <div class="space-y-2">
                            <label class="text-slate-400">顧客ランク</label>
                            <select id="detailRank" class="form-input w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                                <option value="">選択無し</option>
                                <option>Aa</option><option>Ab</option><option>Ac</option><option>Ad</option>
                                <option>Ba</option><option>Bb</option><option>Bc</option><option>Bd</option>
                                <option>Ca</option><option>Cb</option><option>Cc</option><option>Cd</option>
                                <option>取引先</option><option>合併</option><option>廃業</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-slate-400">属性・区分</label>
                            <select id="detailType" class="form-input w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                                <option value="">カテゴリ未設定</option>
                                <option>宮崎産商</option><option>ケコム</option><option>技術開発部</option>
                                <option>建築部</option><option>コンサル</option><option>官庁</option><option>取引先</option>
                            </select>
                        </div>
                        <!-- 🌟 期間検索の復活 -->
                        <div class="md:col-span-2 space-y-2">
                            <label class="text-slate-400">最終訪問期間</label>
                            <div class="flex items-center gap-2">
                                <input type="date" id="startDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                                <span class="text-slate-300">〜</span>
                                <input type="date" id="endDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-center gap-4 mt-8">
                        <button id="execSearch" class="bg-[#334155] text-white px-12 py-3 rounded-xl font-bold shadow-lg hover:bg-slate-700 transition-all">検索実行</button>
                        <button id="clearSearch" class="text-slate-400 px-8 py-3 font-bold hover:text-slate-600">クリア</button>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-6">
                        <div id="syllabaryFilter" class="flex gap-1 p-1 bg-white rounded-xl border border-slate-200 shadow-sm font-black">
                            <button class="filter-btn active px-4 py-1.5 rounded-lg text-xs" data-range="all">全件</button>
                            <script>
                                ['あ','か','さ','た','な','は','ま','や','ら','わ','他'].forEach(k => document.write(`<button class="filter-btn px-3 py-1.5 rounded-lg text-xs text-slate-400 hover:bg-slate-50" data-range="${k}">${k}</button>`));
                            </script>
                        </div>
                        <div class="text-slate-400 font-bold text-sm"><span id="pageRange" class="text-slate-800 text-xl tracking-tighter">0-0</span> / <span id="totalCount">0</span> Customers</div>
                    </div>
                </div>

                <div class="table-container overflow-x-auto mb-20">
                    <table class="w-full text-left border-collapse min-w-[1100px]">
                        <thead>
                            <tr class="text-white text-[10px] font-black uppercase text-center">
                                <th class="p-6 w-16 opacity-50">No</th><th class="p-6 text-left">お客様名</th><th class="p-6 w-48">実績</th><th class="p-6">電話番号</th><th class="p-6 text-left">住所</th><th class="p-6 w-24">回数</th><th class="p-6 w-32">最終訪問日</th><th class="p-6 w-16">選択</th>
                            </tr>
                        </thead>
                        <tbody id="customerTable" class="divide-y divide-slate-100 text-sm font-bold bg-white"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

        <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, orderBy, query, limit, where, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allCustomers = [];
        // 🌟 50音判定用の正規表現マップ
        const rangeMap = { 'あ': /^[あ-おア-オ]/, 'か': /^[か-こカ-コが-ごガ-ゴ]/, 'さ': /^[さ-そサ-ソざ-ぞザ-ゾ]/, 'た': /^[た-とタ-トだ-どダ-ド]/, 'な': /^[な-のナ-ノ]/, 'は': /^[は-ほハ-ホば-ぼバ-ボぱ-ぽパ-ポ]/, 'ま': /^[ま-もマ-モ]/, 'や': /^[や-よヤ-ヨ]/, 'ら': /^[ら-ろラ-ロ]/, 'わ': /^[わ-んワ-ン]/ };

        async function init() {
            const tbody = document.getElementById('customerTable');
            tbody.innerHTML = `<tr><td colspan="8" class="p-16 text-center text-slate-400 font-bold">データを読み込み中...</td></tr>`;
            try {
                // 🌟 超省エネ：最新更新順に100件だけ取得
                const q = query(collection(db, "customers"), orderBy("updatedAt", "desc"), limit(100));
                const snap = await getDocs(q);
                allCustomers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                window.updateView();
            } catch (e) {
                console.error(e);
                tbody.innerHTML = `<tr><td colspan="8" class="p-16 text-center text-rose-400">取得失敗。Indexを作成するか権限を確認してください。</td></tr>`;
            }
        }

        window.updateView = () => {
            const range = document.querySelector('.filter-btn.active').dataset.range;
            const nameK = (document.getElementById('detailName').value || "").toLowerCase();
            const addrK = (document.getElementById('detailAddress').value || "").toLowerCase();
            const rankK = document.getElementById('detailRank').value;
            const typeK = document.getElementById('detailType').value;
            const startD = document.getElementById('startDate').value;
            const endD = document.getElementById('endDate').value;

            // 🌟 メモリ内検索（Firebase通信ゼロ！）
            let filtered = allCustomers;

            if (nameK) filtered = filtered.filter(d => (d.name||"").toLowerCase().includes(nameK) || (d.kana||"").toLowerCase().includes(nameK));
            if (addrK) filtered = filtered.filter(d => (d.address||"").includes(addrK));
            if (rankK) filtered = filtered.filter(d => d.rank === rankK);
            if (typeK) filtered = filtered.filter(d => d.type === typeK);
            if (startD) filtered = filtered.filter(d => d.lastVisit >= startD.replace(/-/g,'/'));
            if (endD) filtered = filtered.filter(d => d.lastVisit <= endD.replace(/-/g,'/'));

            if (range !== 'all') {
                if (range === '他') filtered = filtered.filter(d => !Object.values(rangeMap).some(re => re.test(d.kana || d.name)));
                else filtered = filtered.filter(d => rangeMap[range].test(d.kana || d.name));
            }

            renderTable(filtered);
        };

        function renderTable(dataList) {
            const tbody = document.getElementById('customerTable');
            if (dataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-16 text-center text-slate-400 italic">該当するお客様はいません。</td></tr>`;
                document.getElementById('totalCount').innerText = "0";
                document.getElementById('pageRange').innerText = "0";
                return;
            }
            tbody.innerHTML = dataList.map((data, i) => `
                <tr class="hover:bg-blue-50/50 border-b border-slate-50 transition-colors text-center">
                    <td class="p-6 text-slate-300 font-mono text-xs border-r border-slate-50">${i+1}</td>
                    <td class="p-6 text-left font-black text-slate-800">${data.name || '不明'}</td>
                    <td class="p-6 text-center"><div class="flex gap-1 justify-center">
                        <button onclick="location.href='customer_history.html?name=${encodeURIComponent(data.name)}'" class="bg-slate-100 text-slate-500 px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-[#004098] hover:text-white transition-all">履歴</button>
                        <button onclick="location.href='history.html?name=${encodeURIComponent(data.name)}'" class="bg-[#004098] text-white px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-orange-500 transition-all">実績</button>
                    </div></td>
                    <td class="p-6 text-slate-500 font-mono text-xs">${data.tel || '-'}</td>
                    <td class="p-6 text-left text-xs text-slate-400 truncate max-w-[250px] font-medium">${data.address || '-'}</td>
                    <td class="p-6 text-center"><span class="bg-orange-50 text-[#ff7e11] px-3 py-1 rounded-full text-xs font-black border border-orange-100">${data.visitCount || 0}回</span></td>
                    <td class="p-6 text-center text-slate-400 text-[10px] font-bold uppercase">${data.lastVisit || '未訪問'}</td>
                    <td class="p-6 text-center"><input type="checkbox" class="customer-check w-5 h-5 accent-rose-500 rounded-md cursor-pointer" data-id="${data.id}"></td>
                </tr>`).join('');
            document.getElementById('totalCount').innerText = dataList.length;
            document.getElementById('pageRange').innerText = dataList.length;
        }

        // イベント設定
        document.getElementById('execSearch').onclick = window.updateView;
        document.getElementById('detailSearchToggle').onclick = () => document.getElementById('detailSearchSection').classList.toggle('hidden');
        document.getElementById('clearSearch').onclick = () => { document.querySelectorAll('#detailSearchSection input, select').forEach(e => e.value = ""); window.updateView(); };
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                window.updateView();
            };
        });

        document.getElementById('bulkDeleteBtn').onclick = async () => {
            const checked = document.querySelectorAll('.customer-check:checked');
            if (checked.length === 0) return alert("選択してください");
            if (!confirm("削除しますか？")) return;
            const batch = writeBatch(db);
            checked.forEach(el => batch.delete(doc(db, "customers", el.dataset.id)));
            await batch.commit(); alert("削除完了"); init();
        };

        init();
    </script>
</body>
</html>
