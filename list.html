<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お客様情報一覧 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --sidebar-bg: #1a1a1a; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .filter-btn { transition: all 0.2s; }
        .filter-btn.active { background: var(--copros-orange); color: white; box-shadow: 0 4px 12px rgba(255,126,17,0.3); }
        .modern-page-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 800; font-size: 14px; transition: all 0.3s; color: #94a3b8; cursor: pointer; }
        .modern-page-btn.active { background: #334155; color: white; }
        .nav-arrow { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: white; color: var(--copros-orange); border: 1px solid #e2e8f0; }
        .nav-arrow:hover:not(.disabled) { background: var(--copros-orange); color: white; }
        .nav-arrow.disabled { opacity: 0.2; cursor: default; }
        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        #detailSearchSection { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>

        <div class="flex-1 overflow-auto p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                
                <!-- ヘッダーアクション -->
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-2">お客様情報一覧</h1>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Customer Relationship Management</p>
                    </div>
                    <div class="flex gap-3 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                        <button id="detailSearchToggle" class="px-5 py-2.5 text-slate-500 rounded-xl font-bold text-sm hover:bg-slate-50 transition-all flex items-center gap-2">
                            <i class="fa-solid fa-sliders text-blue-400"></i>詳細検索
                        </button>
                        <div class="w-px h-6 bg-slate-100 my-auto"></div>
                        <button onclick="location.href='add.html'" class="px-6 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-sm hover:shadow-lg transition-all flex items-center gap-2">
                            <i class="fa-solid fa-plus-circle"></i>新規顧客登録
                        </button>
                        <div class="w-px h-6 bg-slate-100 my-auto"></div>
                        <button id="bulkDeleteBtn" class="px-5 py-2.5 text-rose-400 rounded-xl font-bold text-sm hover:bg-rose-50 transition-all flex items-center gap-2">
                            <i class="fa-solid fa-trash-can"></i>一括削除
                        </button>
                    </div>
                </div>

                <!-- 詳細検索 -->
                <div id="detailSearchSection" class="mb-8 p-8 bg-white rounded-3xl shadow-xl border border-blue-50">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 text-xs font-bold">
                        <div class="space-y-2"><label class="text-slate-400">お客様名/カナ</label><input type="text" id="detailName" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-400" placeholder="キーワード"></div>
                        <div class="space-y-2"><label class="text-slate-400">住所</label><input type="text" id="detailAddress" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-400" placeholder="市区町村など"></div>
                        <div class="space-y-2"><label class="text-slate-400">訪問日（開始）</label><input type="date" id="startDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-400"></div>
                        <div class="space-y-2"><label class="text-slate-400">訪問日（終了）</label><input type="date" id="endDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-400"></div>
                    </div>
                    <div class="flex justify-center gap-4 mt-8">
                        <button id="execDetailSearch" class="bg-[#334155] text-white px-12 py-3 rounded-xl font-bold shadow-lg hover:bg-black transition-all">検索を実行</button>
                        <button id="clearDetailSearch" class="text-slate-400 px-8 py-3 rounded-xl font-bold hover:text-slate-600 transition-all">リセット</button>
                    </div>
                </div>

                <!-- ナビゲーション（左：絞り込み・件数 / 右：ページ切替） -->
                <div class="flex justify-between items-center mb-6 px-2">
                    <div class="flex items-center gap-6">
                        <div class="flex flex-wrap gap-1 p-1 bg-white rounded-xl border border-slate-200 shadow-sm font-black text-slate-400">
                            <button class="filter-btn active px-4 py-1.5 rounded-lg text-xs transition-all" data-range="all">全件</button>
                            <script>
                                ['あ','か','さ','た','な','は','ま','や','ら','わ','他'].forEach(k => {
                                    document.write(`<button class="filter-btn px-3 py-1.5 rounded-lg text-xs" data-range="${k}">${k}</button>`);
                                });
                            </script>
                        </div>
                        <div class="flex items-center gap-2 border-l-2 border-slate-200 pl-6 h-8">
                            <span id="pageRange" class="text-xl font-black text-slate-800 tracking-tighter">0-0</span>
                            <span class="text-slate-300 font-bold">/</span>
                            <span id="totalCount" class="text-sm font-bold text-slate-400">0</span>
                            <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest ml-1 text-slate-400">件</span>
                        </div>
                    </div>
                    <div id="paginationTop" class="flex items-center gap-1.5"></div>
                </div>

                <!-- テーブル -->
                <div class="table-container">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[1000px]">
                            <thead>
                                <tr class="text-white text-[10px] font-black uppercase tracking-widest">
                                    <th class="p-6 text-center w-20 opacity-50">No</th>
                                    <th class="p-6">お客様情報</th>
                                    <th class="p-6 text-center w-48 opacity-70">実績</th>
                                    <th class="p-6 text-center w-40 opacity-70">連絡先</th>
                                    <th class="p-6 opacity-70">住所</th>
                                    <th class="p-6 text-center w-28 opacity-70">訪問回数</th>
                                    <th class="p-6 text-center w-40 opacity-70">最終訪問日</th>
                                    <th class="p-6 text-center w-16"><i class="fa-solid fa-check-double opacity-30"></i></th>
                                </tr>
                            </thead>
                            <tbody id="customerTable" class="divide-y divide-slate-100 text-sm font-bold"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 下部ナビ -->
                <div id="paginationBottom" class="mt-12 mb-24 flex justify-center items-center gap-1.5"></div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query, doc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase設定
               // Firebase設定（V2最新版に更新済み）
        const firebaseConfig = {
            apiKey: "AIzaSyC5L1V6jn3Q8i1bWFW03Gd25w_If6dklmY",
            authDomain: "copros-my-page-v2.firebaseapp.com",
            projectId: "copros-my-page-v2",
            storageBucket: "copros-my-page-v2.firebasestorage.app",
            messagingSenderId: "595195904220",
            appId: "1:595195904220:web:402fd4e8620e2f32673419"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        const perPage = 20;

        async function init() {
            const tbody = document.getElementById('customerTable');
            tbody.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i> データを読み込み中...</td></tr>`;
            try {
                // 安全のため orderBy は使わずに取得し、JS側でソートします
                const q = query(collection(db, "customers"), limit(1000));
                const snap = await getDocs(q);
                allData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // カナ順で並び替え
                allData.sort((a, b) => (a.kana || "").localeCompare(b.kana || "", 'ja'));
                
                filteredData = [...allData];
                updateView();
                setupSearch();
            } catch (e) { 
                console.error(e); 
                tbody.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-rose-400">エラーが発生しました。コンソールを確認してください。</td></tr>`;
            }
        }

        function updateView() {
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pagedData = filteredData.slice(start, end);
            renderTable(pagedData, start);
            renderPagination();
            document.getElementById('totalCount').innerText = filteredData.length;
            document.getElementById('pageRange').innerText = filteredData.length > 0 ? `${start + 1}-${Math.min(end, filteredData.length)}` : "0-0";
        }

        function renderTable(dataList, startIndex) {
            const tbody = document.getElementById('customerTable');
            tbody.innerHTML = "";
            dataList.forEach((data, index) => {
                let countNum = parseInt(String(data.visitCount || 0).replace(/[^0-9]/g, "")) || 0;
                const row = `
                    <tr class="hover:bg-blue-50/40 transition-all border-b border-slate-50">
                        <td class="p-6 text-center text-slate-300 font-mono text-xs">${startIndex + index + 1}</td>
                        <td class="p-6">
                            <div class="font-black text-slate-800 text-base leading-tight">${data.name || ""}</div>
                            <div class="text-[10px] text-slate-400 font-bold">${data.kana || ""}</div>
                        </td>
                        <td class="p-6 text-center">
                            <div class="flex gap-1.5 justify-center">
                                <button class="bg-slate-100 text-slate-500 px-4 py-2 rounded-lg font-black text-[10px] hover:bg-[#004098] hover:text-white transition-all shadow-sm" onclick="location.href='customer_history.html?name=${encodeURIComponent(data.name)}'">履歴</button>
                                <button class="bg-[#ff7e11] text-white px-4 py-2 rounded-lg font-black text-[10px] hover:shadow-lg transition-all shadow-sm" onclick="location.href='history.html?name=${encodeURIComponent(data.name)}'">登録</button>
                            </div>
                        </td>
                        <td class="p-6 text-center text-slate-600 font-mono text-xs tracking-tighter">${data.tel || "-"}</td>
                        <td class="p-6 text-slate-500 text-xs font-medium truncate max-w-[200px]">${data.address || "-"}</td>
                        <td class="p-6 text-center"><span class="inline-block bg-orange-50 text-[#ff7e11] px-3 py-1 rounded-full text-sm font-black border border-orange-100">${countNum}回</span></td>
                        <td class="p-6 text-center text-slate-400 font-bold text-[10px] uppercase">${data.lastVisit || "未登録"}</td>
                        <td class="p-6 text-center"><input type="checkbox" class="customer-check w-5 h-5 accent-rose-500 rounded-md" data-id="${data.id}"></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / perPage);
            const containers = [document.getElementById('paginationTop'), document.getElementById('paginationBottom')];
            containers.forEach(container => {
                container.innerHTML = "";
                if (totalPages <= 1) return;
                const prev = document.createElement('div');
                prev.innerHTML = '<i class="fa-solid fa-arrow-left"></i>';
                prev.className = `nav-arrow prev ${currentPage === 1 ? 'disabled' : ''}`;
                prev.onclick = () => { if(currentPage > 1) { currentPage--; updateView(); scrollToTop(); } };
                container.appendChild(prev);
                const startPage = Math.max(1, currentPage - 1);
                const endPage = Math.min(totalPages, startPage + 3);
                for (let i = startPage; i <= endPage; i++) {
                    const btn = document.createElement('div');
                    btn.innerText = i;
                    btn.className = `modern-page-btn ${currentPage === i ? 'active' : ''}`;
                    btn.onclick = () => { currentPage = i; updateView(); scrollToTop(); };
                    container.appendChild(btn);
                }
                const next = document.createElement('div');
                next.innerHTML = '<i class="fa-solid fa-arrow-right"></i>';
                next.className = `nav-arrow next ${currentPage === totalPages ? 'disabled' : ''}`;
                next.onclick = () => { if(currentPage < totalPages) { currentPage++; updateView(); scrollToTop(); } };
                container.appendChild(next);
            });
        }

        function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }

        document.getElementById('detailSearchToggle').onclick = () => {
            const sec = document.getElementById('detailSearchSection');
            sec.style.display = (sec.style.display === 'block') ? 'none' : 'block';
        };

        document.getElementById('execDetailSearch').onclick = () => {
            const nameK = document.getElementById('detailName').value.toLowerCase();
            const addrK = document.getElementById('detailAddress').value.toLowerCase();
            const startK = document.getElementById('startDate').value;
            const endK = document.getElementById('endDate').value;
            filteredData = allData.filter(d => {
                const matchName = !nameK || (d.name && d.name.toLowerCase().includes(nameK)) || (d.kana && d.kana.toLowerCase().includes(nameK));
                const matchAddr = !addrK || (d.address && d.address.toLowerCase().includes(addrK));
                let matchDate = true;
                if (startK || endK) {
                    if (!d.lastVisit || d.lastVisit === "未訪問") matchDate = false;
                    else {
                        const dDate = d.lastVisit.replace(/\//g, '-');
                        if (startK && dDate < startK) matchDate = false;
                        if (endK && dDate > endK) matchDate = false;
                    }
                }
                return matchName && matchAddr && matchDate;
            });
            currentPage = 1; updateView();
        };

        document.getElementById('clearDetailSearch').onclick = () => {
            document.querySelectorAll('#detailSearchSection input').forEach(i => i.value = "");
            filteredData = [...allData]; currentPage = 1; updateView();
        };

        function setupSearch() {
            const si = document.getElementById('headerSearchInput');
            if (si) {
                si.addEventListener('input', (e) => {
                    const k = e.target.value.toLowerCase();
                    filteredData = allData.filter(d => (d.name && d.name.toLowerCase().includes(k)) || (d.kana && d.kana.toLowerCase().includes(k)));
                    currentPage = 1; updateView();
                });
            }
        }

        // --- 改良：濁点・半濁点対応の50音判定 ---
        const rangeMap = {
            'あ': /^[あ-おア-オ]/,
            'か': /^[か-こカ-コが-ごガ-ゴ]/,
            'さ': /^[さ-そサ-ソざ-ぞザ-ゾ]/,
            'た': /^[た-とタ-トだ-どダ-ド]/,
            'な': /^[な-のナ-ノ]/,
            'は': /^[は-ほハ-ホば-ぼバ-ボぱ-ぽパ-ポ]/,
            'ま': /^[ま-もマ-モ]/,
            'や': /^[や-よヤ-ヨ]/,
            'ら': /^[ら-ろラ-ロ]/,
            'わ': /^[わ-んワ-ン]/
        };

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const range = btn.dataset.range;
                if (range === 'all') {
                    filteredData = [...allData];
                } else if (range === '他') {
                    filteredData = allData.filter(d => !Object.values(rangeMap).some(re => re.test(d.kana || d.name)));
                } else {
                    const re = rangeMap[range];
                    filteredData = allData.filter(d => re.test(d.kana || ""));
                }
                currentPage = 1; updateView();
            };
        });

        document.getElementById('bulkDeleteBtn').onclick = async () => {
            const checked = document.querySelectorAll('.customer-check:checked');
            if (checked.length === 0) return alert("削除するデータを選択してください。");
            if (!confirm(`${checked.length}件のデータを削除しますか？`)) return;
            const batch = writeBatch(db);
            checked.forEach(el => batch.delete(doc(db, "customers", el.dataset.id)));
            try { await batch.commit(); alert("削除が完了しました。"); init(); } catch (e) { alert("削除に失敗しました。"); }
        };

        init();
    </script>
</body>
</html>
