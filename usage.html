<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>組織員利用状況 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .staff-selector-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.04); }
        .staff-item { padding: 0.8rem 1.2rem; cursor: pointer; border-radius: 0.75rem; transition: all 0.2s; border: 1px solid transparent; text-align: center; }
        .staff-item:hover { background: #f8fafc; border-color: #e2e8f0; }
        .staff-item.active { background: var(--copros-navy); color: white; box-shadow: 0 4px 12px rgba(0,64,152,0.2); }
        .month-btn { padding: 0.6rem 0.2rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; flex: 1; text-align: center; transition: 0.2s; border: 1px solid transparent; }
        .month-btn:hover { background: #f1f5f9; color: var(--copros-navy); }
        .month-btn.active { background: var(--copros-navy); color: white; }
        
        /* 🌟 訪問実績履歴アコーディオン（画像1枚目を完全再現） */
        .accordion-item { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .accordion-header { padding: 1.2rem 2rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; background: #3c4b5a; color: white; }
        .accordion-header:hover { background: #2d3748; }
        .accordion-content { display: none; padding: 2.5rem; background: white; }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; margin-bottom: 2.5rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 2rem; }
        .info-label { font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 0.5rem; }
        .info-value { font-size: 14px; font-weight: 800; color: #475569; }
        .report-label { font-size: 11px; font-weight: 900; color: var(--copros-orange); margin-bottom: 1rem; display: block; }
        .report-box { background: #f8fafc; border-radius: 1.2rem; padding: 2rem; border: 1px solid #f1f5f9; font-size: 14px; line-height: 1.8; color: #475569; }

        .scope-select { background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.6rem 1rem; border-radius: 0.75rem; font-size: 0.8rem; font-weight: 800; color: #475569; outline: none; }
        .count-badge { background: #fff7ed; color: var(--copros-orange); padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 900; border: 1px solid #ffedd5; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div id="loading" style="display:none;"></div>

        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1200px] mx-auto">
                <div class="mb-8">
                    <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-1">組織員利用状況</h1>
                    <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Staff Activity Logs</nav>
                </div>

                <!-- 1. 社員選択エリア -->
                <div class="staff-selector-card p-6 mb-8">
                    <div class="flex flex-col lg:flex-row gap-4 mb-6">
                        <div class="flex flex-col gap-1.5 min-w-[240px]">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Department</label>
                            <select id="deptFilter" onchange="window.renderStaffList()" class="scope-select">
                                <option value="ALL">全ての部署</option>
                                <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option><option>土木部</option><option>建築部</option><option>建機部</option><option>総務部</option><option>購買課</option><option>宮崎産商</option><option>企画部</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1.5 flex-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Search Name</label>
                            <div class="relative">
                                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-300"></i>
                                <input type="text" id="staffSearch" oninput="window.renderStaffList()" placeholder="社員名で検索..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-400 outline-none font-bold transition-all">
                            </div>
                        </div>
                    </div>
                    <div id="staffList" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2 max-h-[160px] overflow-y-auto custom-scrollbar p-1"></div>
                </div>

                <!-- 2. 月選択ツール ＆ 結果表示 -->
                <div id="toolArea" class="hidden">
                    <div class="bg-white p-1.5 rounded-2xl border border-slate-200 shadow-sm mb-8 flex overflow-x-auto whitespace-nowrap custom-scrollbar">
                        <script>for(let i=1; i<=12; i++) document.write(`<button onclick="window.setMonth(${i})" id="m-btn-${i}" class="month-btn">${i}月</button>`);</script>
                    </div>

                    <div class="mb-20">
                        <div class="flex justify-between items-center mb-8 px-4">
                            <div>
                                <h3 id="selectedStaffLabel" class="text-2xl font-black text-slate-800 tracking-tighter">---</h3>
                                <p id="selectedDateLabel" class="text-xs font-bold text-slate-400 mt-1 uppercase tracking-widest italic">2026年 --月</p>
                            </div>
                            <span class="count-badge"><span id="recordCount">0</span> 件の実績</span>
                        </div>
                        <div id="activityAccordion" class="space-y-4"></div>
                    </div>
                </div>

                <div id="guideMsg" class="py-20 text-center">
                    <div class="text-slate-200 text-7xl mb-6"><i class="fa-solid fa-address-book"></i></div>
                    <p class="text-slate-400 font-bold text-lg">社員を選択して活動履歴を表示してください</p>
                </div>
            </div>
        </div>
    </main>

    <div id="local-loading" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[9999] hidden flex-col items-center justify-center">
        <div class="animate-spin mb-4 text-[#ff7e11] text-6xl"><i class="fa-solid fa-circle-notch"></i></div>
        <p class="text-slate-800 font-black tracking-tighter uppercase italic text-xs">Syncing Performance Data...</p>
    </div>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allStaffs = [], currentDeptRecords = [], selectedName = "", currentY = 2026, currentM = new Date().getMonth() + 1;

        async function init() {
            try {
                const snap = await getDocs(query(collection(db, "staffs"), orderBy("name")));
                allStaffs = snap.docs.map(d => d.data());
                setTimeout(() => window.renderStaffList(), 300);
            } catch (e) { console.error(e); }
        }

        window.renderStaffList = () => {
            const kw = document.getElementById('staffSearch').value.toLowerCase();
            const dept = document.getElementById('deptFilter').value;
            const container = document.getElementById('staffList');
            container.innerHTML = "";
            allStaffs.filter(s => (!kw || s.name.includes(kw)) && (dept === 'ALL' || s.dept === dept))
                .forEach(s => {
                    const div = document.createElement('div');
                    div.className = `staff-item ${selectedName === s.name ? 'active' : ''}`;
                    div.innerHTML = `<p class="font-black text-xs">${s.name}</p><p class="text-[8px] opacity-60 uppercase">${s.dept || ''}</p>`;
                    div.onclick = () => window.selectStaff(s.name, s.dept);
                    container.appendChild(div);
                });
        };

        window.selectStaff = async (name, dept) => {
            selectedName = name;
            window.renderStaffList();
            document.getElementById('guideMsg').style.display = 'none';
            document.getElementById('toolArea').style.display = 'block';
            document.getElementById('local-loading').style.display = 'flex';
            
            try {
                // 🌟 【名寄せ解決】人ではなく「部署」で全取得（名前にスペースがあってもJSで拾うため）
                const q = query(collection(db, "activity_records"), 
                                where("visitorDept", "==", dept || "不明"),
                                where("visitDate", ">=", `${currentY}`),
                                where("visitDate", "<=", `${currentY}\uf8ff`));
                const snap = await getDocs(q);
                currentDeptRecords = snap.docs.map(d => d.data());
                
                document.getElementById('local-loading').style.display = 'none';
                document.getElementById('selectedStaffLabel').innerText = `${name} さんの履歴`;
                window.setMonth(currentM); 
            } catch (e) { console.error(e); document.getElementById('local-loading').style.display = 'none'; }
        };

        window.setMonth = (m) => {
            currentM = m;
            document.querySelectorAll('.month-btn').forEach(btn => btn.classList.remove('active'));
            if(document.getElementById(`m-btn-${m}`)) document.getElementById(`m-btn-${m}`).classList.add('active');
            document.getElementById('selectedDateLabel').innerText = `${currentY}年 ${m}月`;
            window.renderAccordion();
        };

        window.renderAccordion = () => {
            const container = document.getElementById('activityAccordion');
            const countLabel = document.getElementById('recordCount');
            
            // 🌟 丁寧な名寄せ ＆ 日付判定
            const clean = (s) => (s||"").replace(/\s+/g, ''); // スペースを消去
            const filtered = currentDeptRecords.filter(r => {
                const dateParts = String(r.visitDate).replace(/\//g, '-').split('-');
                const matchName = clean(r.visitorName) === clean(selectedName);
                const matchMonth = parseInt(dateParts[1]) === currentM;
                return matchName && matchMonth;
            }).sort((a,b) => String(b.visitDate).localeCompare(String(a.visitDate)));

            container.innerHTML = filtered.length ? filtered.map((r, i) => `
                <div class="accordion-item">
                    <div class="accordion-header" onclick="window.toggleAcc(this)">
                        <div class="flex items-center gap-6">
                            <span class="text-xs font-mono font-black opacity-60">${String(r.visitDate).replace(/-/g,'/')}</span>
                            <span class="text-base font-black">${r.customerName}</span>
                        </div>
                        <i class="fa-solid fa-chevron-down opacity-30 text-xs transition-transform"></i>
                    </div>
                    <div class="accordion-content">
                        <div class="info-grid">
                            <div><p class="info-label">お客様担当者</p><p class="info-value">${r.customerStaff || '-'}</p></div>
                            <div><p class="info-label">訪問時間</p><p class="info-value font-mono">${r.startTime || '--:--'} 〜 ${r.endTime || '--:--'}</p></div>
                            <div><p class="info-label">同行者</p><p class="info-value">${r.companion || '-'}</p></div>
                            <div><p class="info-label">定性データ</p><p class="info-value text-blue-500 font-black">${r.qualData1 || '-'}</p></div>
                        </div>
                        <div class="space-y-6">
                            <div><span class="report-label">▼ お客様からの情報</span><div class="report-box">${r.customerReport || 'なし'}</div></div>
                            <div><span class="report-label">▼ 自分・スタッフの考え</span><div class="report-box border-orange-100">${r.staffThoughts || 'なし'}</div></div>
                        </div>
                    </div>
                </div>
            `).join('') : '<p class="text-center py-20 text-slate-300 font-bold">この月の実績登録はありません</p>';

            countLabel.innerText = filtered.length;
        };

        window.toggleAcc = (h) => {
            const c = h.nextElementSibling; const a = h.querySelector('i');
            const open = c.style.display === 'block';
            c.style.display = open ? 'none' : 'block';
            a.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
        };

        window.addEventListener('load', () => { setTimeout(() => { const l = document.getElementById('loading'); if(l) l.style.display='none'; }, 500); });
        init();
    </script>
</body>
</html>
