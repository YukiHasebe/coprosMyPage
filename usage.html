<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>組織員利用状況 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .tab-btn { padding: 0.8rem 1.5rem; font-size: 0.75rem; font-weight: 900; transition: all 0.3s; border-bottom: 3px solid transparent; opacity: 0.4; }
        .tab-btn.active { opacity: 1; color: #0ea5e9; border-bottom-color: #0ea5e9; }
        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        .scope-select { background: #e2e8f0; border: none; padding: 0.4rem 1rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; color: #475569; outline: none; appearance: none; cursor: pointer; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1200px] mx-auto">
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 gap-6">
                    <div class="flex items-end gap-6 shrink-0">
                        <div>
                            <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-1">組織員利用状況</h1>
                            <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Performance Analytics Dashboard</nav>
                        </div>
                        <select id="deptFilter" onchange="window.fetchAndRender()" class="scope-select shadow-inner mb-2">
                            <option value="ALL">全社表示</option>
                            <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option><option>土木部</option><option>建築部</option><option>建機部</option><option>総務部</option><option>購買課</option><option>宮崎産商</option><option>企画部</option>
                        </select>
                    </div>
                </div>

                <div class="relative flex flex-col lg:flex-row justify-between items-center mb-8 gap-4 min-h-[50px]">
                    <div class="flex gap-2 bg-white p-1 rounded-2xl shadow-sm border border-slate-200">
                        <button onclick="window.switchMode('visit')" id="tab-visit" class="tab-btn active rounded-xl">お客様訪問状況</button>
                        <button onclick="window.switchMode('usage')" id="tab-usage" class="tab-btn rounded-xl">実績登録状況</button>
                    </div>
                    <div class="lg:absolute lg:left-1/2 lg:-translate-x-1/2 flex items-center gap-6 bg-white py-2 px-6 rounded-2xl shadow-sm border border-slate-100">
                        <button onclick="window.changeMonth(-1)" class="text-slate-300 hover:text-slate-600 transition-colors"><i class="fa-solid fa-chevron-left fa-lg"></i></button>
                        <span id="displayMonth" class="text-lg font-black text-slate-700 min-w-[140px] text-center tracking-tighter">----年 --月</span>
                        <button onclick="window.changeMonth(1)" class="text-slate-300 hover:text-slate-600 transition-colors"><i class="fa-solid fa-chevron-right fa-lg"></i></button>
                    </div>
                </div>

                <div class="table-container overflow-x-auto bg-white mb-20">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead><tr id="tableHead" class="text-white text-[10px] font-black uppercase text-center tracking-widest"></tr></thead>
                        <tbody id="statsTable" class="divide-y divide-slate-100 text-sm font-bold"></tbody>
                    </table>
                </div>
                <div id="loading" class="py-20 text-center"><div class="animate-spin mb-4 text-blue-400 text-4xl"><i class="fa-solid fa-circle-notch"></i></div><p id="loadingStatus" class="text-slate-400 font-bold italic uppercase tracking-widest text-[10px]">Analyzing Database...</p></div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentMode = 'visit'; let targetDate = new Date();

        function isMatchDate(dateStr, targetY, targetM) {
            if (!dateStr) return false;
            const parts = dateStr.replace(/\//g, '-').split('-');
            if (parts.length < 2) return false;
            return parseInt(parts[0]) === targetY && parseInt(parts[1]) === targetM;
        }

        window.fetchAndRender = async () => {
            const loading = document.getElementById('loading');
            const body = document.getElementById('statsTable');
            loading.style.display = 'block';
            body.innerHTML = "";
            
            const targetY = targetDate.getFullYear();
            const targetM = targetDate.getMonth() + 1;
            document.getElementById('displayMonth').innerText = `${targetY}年 ${targetM}月`;
            const selectedDept = document.getElementById('deptFilter').value;

            try {
                // 1. スタッフ名簿を取得
                const staffSnap = await getDocs(collection(db, "staffs"));
                const staffs = staffSnap.docs.map(d => d.data());

                // 2. 🌟 成功パターン：年度で広めに取得し、JS側で仕分ける
                const q = query(collection(db, "activity_records"), 
                                where("visitDate", ">=", `${targetY}`), 
                                where("visitDate", "<=", `${targetY}\uf8ff`), 
                                limit(2000));
                const recordSnap = await getDocs(q);
                const records = recordSnap.docs.map(d => d.data());

                // 3. 集計ロジック（部署でフィルタリング）
                const targetStaffs = selectedDept === 'ALL' ? staffs : staffs.filter(s => s.dept === selectedDept);

                const stats = targetStaffs.map(staff => {
                    const myRecords = records.filter(r => 
                        r.visitorName === staff.name && isMatchDate(r.visitDate, targetY, targetM)
                    );
                    
                    if (myRecords.length === 0) return null;

                    let totalMins = 0;
                    myRecords.forEach(r => {
                        if(r.startTime && r.endTime && r.startTime !== "00:00") {
                            const s = r.startTime.split(':'), e = r.endTime.split(':');
                            const diff = (parseInt(e[0])*60 + parseInt(e[1]||0)) - (parseInt(s[0])*60 + parseInt(s[1]||0));
                            if (diff > 0) totalMins += diff;
                        }
                    });

                    return { 
                        id: staff.id || '---', name: staff.name, dept: staff.dept, 
                        recordCount: myRecords.length, 
                        visitCount: new Set(myRecords.map(r => r.customerName)).size, 
                        avgTime: Math.round(totalMins / myRecords.length) || 0 
                    };
                }).filter(Boolean);

                loading.style.display = 'none';
                renderTableBody(stats);
            } catch (e) { 
                console.error(e);
                document.getElementById('loadingStatus').innerText = "Sync Error. Please retry.";
            }
        };

        function renderTableBody(stats) {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('statsTable');
            body.innerHTML = (stats.length === 0) ? `<tr><td colspan="5" class="p-20 text-center text-slate-400 font-bold">この条件の実績はありません</td></tr>` : "";
            if (stats.length === 0) return;

            if (currentMode === 'visit') {
                head.innerHTML = '<th class="p-6 w-24">NO</th><th class="p-6 text-left">氏名</th><th class="p-6 text-left">部署</th><th class="p-6">訪問顧客数</th><th class="p-6">平均滞在時間</th>';
                stats.sort((a,b)=>b.visitCount-a.visitCount).forEach(s => {
                    body.insertAdjacentHTML('beforeend', `<tr class="hover:bg-emerald-50/30 transition-all border-b border-slate-50 text-center"><td class="p-6 text-slate-400 font-mono text-xs border-r border-slate-50">${s.id}</td><td class="p-6 text-slate-800 text-left font-black">${s.name}</td><td class="p-6 text-slate-500 text-left text-xs">${s.dept}</td><td class="p-6 text-emerald-600 font-black">${s.visitCount}社</td><td class="p-6 text-slate-700 font-black">${s.avgTime}分</td></tr>`);
                });
            } else {
                head.innerHTML = '<th class="p-6 w-24">NO</th><th class="p-6 text-left">氏名</th><th class="p-6 text-left">部署</th><th class="p-6">実績登録数</th>';
                stats.sort((a,b)=>b.recordCount-a.recordCount).forEach(s => {
                    body.insertAdjacentHTML('beforeend', `<tr class="hover:bg-sky-50/30 transition-all border-b border-slate-50 text-center"><td class="p-6 text-slate-400 font-mono text-xs border-r border-slate-50">${s.id}</td><td class="p-6 text-slate-800 text-left font-black">${s.name}</td><td class="p-6 text-slate-500 text-left text-xs">${s.dept}</td><td class="p-6 text-blue-600 font-black">${s.recordCount}件</td></tr>`);
                });
            }
        }

        window.changeMonth = (val) => { targetDate.setMonth(targetDate.getMonth() + val); window.fetchAndRender(); };
        window.switchMode = (mode) => {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            window.fetchAndRender();
        };

        window.addEventListener('load', () => { setTimeout(() => window.fetchAndRender(), 300); });
    </script>
</body>
</html>
