<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>組織員利用状況 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .staff-selector-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.04); }
        .staff-item { padding: 0.8rem 1.2rem; cursor: pointer; border-radius: 0.75rem; transition: all 0.2s; border: 1px solid transparent; text-align: center; }
        .staff-item:hover { background: #f8fafc; border-color: #e2e8f0; }
        .staff-item.active { background: var(--copros-navy); color: white; box-shadow: 0 4px 12px rgba(0,64,152,0.2); }
        
        /* 🌟 カレンダー同期の月ボタン */
        .month-btn { padding: 0.6rem 0.2rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; flex: 1; text-align: center; transition: 0.2s; border: 1px solid transparent; }
        .month-btn:hover { background: #f1f5f9; color: var(--copros-navy); }
        .month-btn.active { background: var(--copros-navy); color: white; }

        .history-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; min-height: 400px; }
        .history-line { border-left: 3px solid #f1f5f9; margin-left: 1.5rem; padding: 1.5rem 0 1.5rem 2rem; position: relative; }
        .history-line::before { content: ''; position: absolute; left: -9px; top: 2rem; width: 15px; height: 15px; background: white; border: 3px solid var(--copros-orange); border-radius: 50%; }
        .scope-select { background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.6rem 1rem; border-radius: 0.75rem; font-size: 0.8rem; font-weight: 800; color: #475569; outline: none; }
        .count-badge { background: #fff7ed; color: var(--copros-orange); padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 900; border: 1px solid #ffedd5; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <!-- 🌟 真っ白回避用の隠しローダー（common.jsが制御します） -->
        <div id="loading" style="display:none;"></div>

        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1200px] mx-auto">
                
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 gap-6">
                    <div class="flex items-end gap-6 shrink-0">
                        <div>
                            <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-1">組織員利用状況</h1>
                            <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Staff Activity Timeline</nav>
                        </div>
                        <select id="deptFilter" onchange="window.renderStaffList()" class="scope-select shadow-inner mb-2">
                            <option value="ALL">全ての部署</option>
                            <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option><option>土木部</option><option>建築部</option><option>建機部</option><option>総務部</option><option>購買課</option><option>宮崎産商</option><option>企画部</option>
                        </select>
                    </div>
                </div>

                <!-- 1. 社員選択エリア -->
                <div class="staff-selector-card p-6 mb-8">
                    <div class="relative mb-6">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-300"></i>
                        <input type="text" id="staffSearch" oninput="window.renderStaffList()" placeholder="社員名で検索..." class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-400 outline-none font-bold transition-all">
                    </div>
                    <div id="staffList" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2 max-h-[160px] overflow-y-auto custom-scrollbar p-1"></div>
                </div>

                <!-- 2. カレンダー同期の月選択ツール -->
                <div id="toolArea" class="hidden">
                    <div class="bg-white p-1 rounded-2xl border border-slate-200 shadow-sm mb-8 flex overflow-x-auto whitespace-nowrap custom-scrollbar">
                        <script>for(let i=1; i<=12; i++) document.write(`<button onclick="window.setMonth(${i})" id="m-btn-${i}" class="month-btn">${i}月</button>`);</script>
                    </div>

                    <!-- 3. 履歴表示カード -->
                    <div class="history-card p-8 mb-20">
                        <div class="flex justify-between items-center mb-10 border-b-2 border-slate-50 pb-6">
                            <div>
                                <h3 id="selectedStaffLabel" class="text-2xl font-black text-slate-800">---</h3>
                                <p id="selectedMonthLabel" class="text-xs font-bold text-slate-400 mt-1 uppercase tracking-widest">Target Period</p>
                            </div>
                            <div id="countBadgeArea">
                                <span class="count-badge"><span id="recordCount">0</span> 件の実績</span>
                            </div>
                        </div>
                        <div id="activityTimeline" class="space-y-2"></div>
                    </div>
                </div>

                <div id="guideMsg" class="py-20 text-center">
                    <div class="text-slate-200 text-7xl mb-6"><i class="fa-solid fa-address-book"></i></div>
                    <p class="text-slate-400 font-bold text-lg">社員を選択してください</p>
                </div>

            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allStaffs = [];
        let fetchedRecords = [];
        let selectedName = "";
        let currentY = new Date().getFullYear();
        let currentM = new Date().getMonth() + 1;

        async function init() {
            try {
                const snap = await getDocs(query(collection(db, "staffs"), orderBy("name")));
                allStaffs = snap.docs.map(d => d.data());
                // 🌟 最初から自分の部署が出るように調整
                setTimeout(() => window.renderStaffList(), 300);
            } catch (e) { console.error(e); }
        }

        window.renderStaffList = () => {
            const kw = document.getElementById('staffSearch').value.toLowerCase();
            const dept = document.getElementById('deptFilter').value;
            const container = document.getElementById('staffList');
            container.innerHTML = "";
            allStaffs.filter(s => (!kw || s.name.includes(kw)) && (dept === 'ALL' || s.dept === dept))
                .forEach(s => {
                    const div = document.createElement('div');
                    div.className = `staff-item ${selectedName === s.name ? 'active' : ''}`;
                    div.innerHTML = `<p class="font-black text-xs">${s.name}</p><p class="text-[8px] opacity-60 uppercase">${s.dept || ''}</p>`;
                    div.onclick = () => window.selectStaff(s.name);
                    container.appendChild(div);
                });
        };

        window.selectStaff = async (name) => {
            selectedName = name;
            window.renderStaffList();
            document.getElementById('guideMsg').style.display = 'none';
            document.getElementById('toolArea').style.display = 'block';
            
            // 🌟 読み込み開始（真っ白回避のため関数を正しく呼ぶ）
            if(window.showLoading) window.showLoading(`${name} さんのデータを取得中...`);
            
            try {
                const q = query(collection(db, "activity_records"), 
                                where("visitorName", "==", name),
                                where("visitDate", ">=", `${currentY}-01-01`),
                                where("visitDate", "<=", `${currentY}-12-31\uf8ff`));
                const snap = await getDocs(q);
                fetchedRecords = snap.docs.map(d => d.data());
                
                if(window.hideLoading) window.hideLoading();
                document.getElementById('selectedStaffLabel').innerText = `${name} さんの履歴`;
                window.setMonth(currentM); 
            } catch (e) { 
                console.error(e);
                if(window.hideLoading) window.hideLoading();
            }
        };

        window.setMonth = (m) => {
            currentM = m;
            document.querySelectorAll('.month-btn').forEach(btn => btn.classList.remove('active'));
            if(document.getElementById(`m-btn-${m}`)) document.getElementById(`m-btn-${m}`).classList.add('active');
            document.getElementById('selectedMonthLabel').innerText = `${currentY}年 ${m}月`;
            window.renderTimeline();
        };

        window.renderTimeline = () => {
            const timeline = document.getElementById('activityTimeline');
            const countLabel = document.getElementById('recordCount');
            
            const filtered = fetchedRecords.filter(r => {
                const parts = String(r.visitDate).replace(/\//g, '-').split('-');
                return parseInt(parts[1]) === currentM;
            }).sort((a,b) => String(b.visitDate).localeCompare(String(a.visitDate)));

            timeline.innerHTML = filtered.length ? filtered.map(r => `
                <div class="history-line">
                    <p class="text-xs text-slate-400 font-mono font-bold mb-1">${String(r.visitDate).replace(/-/g,'/')}</p>
                    <p class="text-base font-black text-[#004098] mb-1">${r.customerName}</p>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-xs text-slate-500 leading-relaxed">${r.customerReport || '報告なし'}</p>
                    </div>
                </div>`).join('') : '<p class="text-center py-20 text-slate-300 font-bold">この月の実績登録はありません</p>';

            countLabel.innerText = filtered.length;
        };

        init();
    </script>
</body>
</html>
