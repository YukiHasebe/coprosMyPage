<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>組織員利用状況 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .staff-selector-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.04); }
        .staff-item { padding: 0.8rem 1.2rem; cursor: pointer; border-radius: 0.75rem; transition: all 0.2s; border: 1px solid transparent; text-align: center; overflow: hidden; }
        .staff-item:hover { background: #f8fafc; }
        .staff-item.active { background: var(--copros-navy); color: white; box-shadow: 0 4px 12px rgba(0,64,152,0.3); }
        .summary-card { background: linear-gradient(135deg, #004098 0%, #2d3748 100%); color: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; display: grid; grid-template-columns: repeat(4, 1fr); text-align: center; gap: 10px; }
        .month-btn { padding: 0.6rem 0.2rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; flex: 1; text-align: center; cursor: pointer; }
        .month-btn.active { background: var(--copros-navy); color: white; }
        .accordion-item { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 1rem; }
        .accordion-header { padding: 1.2rem 2rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; background: #3c4b5a; color: white; }
        .accordion-content { display: none; padding: 2rem; background: white; }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .info-label { font-size: 10px; font-weight: 800; color: #94a3b8; }
        .info-value { font-size: 13px; font-weight: 800; color: #475569; }
        .report-box { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; border: 1px solid #f1f5f9; font-size: 13px; line-height: 1.7; margin-bottom: 1rem; }
        .scope-select { background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.6rem 1rem; border-radius: 0.75rem; font-size: 0.8rem; font-weight: 800; color: #475569; outline: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1200px] mx-auto">
                <div class="flex justify-between items-end mb-8"><h1 class="text-4xl font-black text-slate-800 tracking-tighter">組織員利用状況</h1>
                    <button onclick="location.href='calendar.html'" class="px-6 py-2 bg-white border rounded-xl font-bold text-xs shadow-sm">カレンダーへ戻る</button>
                </div>
                <div class="staff-selector-card p-6 mb-8">
                    <div class="flex flex-col lg:flex-row gap-4 mb-6">
                        <select id="deptFilter" onchange="window.renderStaffList()" class="scope-select min-w-[240px]">
                            <option value="ALL">全ケコム関連</option>
                            <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option>
                        </select>
                        <input type="text" id="staffSearch" oninput="window.renderStaffList()" placeholder="氏名で検索..." class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold">
                    </div>
                    <div id="staffList" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2 max-h-[160px] overflow-y-auto custom-scrollbar p-1 text-center"></div>
                </div>
                <div id="toolArea" class="hidden">
                    <div class="summary-card shadow-lg">
                        <div><p class="text-[9px] opacity-60 font-black uppercase mb-1">訪問件数</p><p class="text-xl font-black"><span id="sumActualVisits">0</span>件</p></div>
                        <div><p class="text-[9px] opacity-60 font-black uppercase mb-1">営業件数</p><p class="text-xl font-black"><span id="sumSales">0</span>件</p></div>
                        <div><p class="text-[9px] opacity-60 font-black uppercase mb-1">合計滞在</p><p class="text-xl font-black"><span id="sumTime">0</span>時間</p></div>
                        <div><p class="text-[9px] opacity-60 font-black uppercase mb-1">平均滞在</p><p class="text-xl font-black"><span id="sumAvg">0</span>分</p></div>
                    </div>
                    <div class="bg-white p-1 rounded-2xl border mb-8 flex overflow-x-auto whitespace-nowrap custom-scrollbar">
                        <script>for(let i=1; i<=12; i++) document.write(`<button onclick="window.setMonth(${i})" id="m-btn-${i}" class="month-btn">${i}月</button>`);</script>
                    </div>
                    <div class="mb-20"><h3 id="selectedStaffLabel" class="text-xl font-black mb-8 px-4 text-slate-800 border-l-4 border-orange-500 pl-4"></h3><div id="activityAccordion" class="space-y-4"></div></div>
                </div>
                <div id="guideMsg" class="py-20 text-center"><p class="text-slate-400 font-bold tracking-widest uppercase italic">左上のリストから社員を選択してください</p></div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db, TARGET_DEPTS } from "./common.js";
        import { collection, getDocs, query, where, orderBy, limit, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allStaffs = [], currentStaffRecords = [], selectedName = "", currentM = new Date().getMonth() + 1;
        
        const clean = (s) => (s||"").toString().replace(/[\s\u3000]+/g, '').trim();
        const dateToNum = (s) => (s||"").toString().replace(/\D/g, '');

        async function init() {
            try {
                let sData = sessionStorage.getItem('cp_cache_staffs');
                if(sData) { allStaffs = JSON.parse(sData); } 
                else {
                    const snap = await getDocs(query(collection(db, "staffs"), orderBy("name")));
                    allStaffs = snap.docs.map(d => d.data());
                    sessionStorage.setItem('cp_cache_staffs', JSON.stringify(allStaffs));
                }
                window.renderStaffList();
                
                const jName = sessionStorage.getItem('cp_usage_jump_name');
                const jMonth = sessionStorage.getItem('cp_usage_jump_month');
                if (jName) {
                    sessionStorage.removeItem('cp_usage_jump_name');
                    sessionStorage.removeItem('cp_usage_jump_month');
                    if(jMonth) currentM = parseInt(jMonth);
                    window.selectStaff(jName);
                }
            } catch (e) { console.error(e); }
        }

        window.renderStaffList = () => {
            const kw = clean(document.getElementById('staffSearch').value.toLowerCase());
            const dept = document.getElementById('deptFilter').value;
            const container = document.getElementById('staffList');
            container.innerHTML = allStaffs.filter(s => {
                const nameM = !kw || clean(s.name).toLowerCase().includes(kw);
                const sDept = clean(s.dept || "");
                return nameM && (dept === 'ALL' ? TARGET_DEPTS.some(t => clean(t) === sDept) : sDept === clean(dept));
            }).map(s => `<div class="staff-item ${clean(selectedName) === clean(s.name) ? 'active' : ''}" onclick="window.selectStaff('${s.name}')"><p class="font-black text-xs">${s.name}</p><p class="text-[8px] opacity-60 uppercase">${s.dept || ''}</p></div>`).join('');
        };

        window.selectStaff = async (name) => {
            selectedName = name; 
            window.renderStaffList();
            document.getElementById('guideMsg').style.display = 'none';
            document.getElementById('toolArea').style.display = 'block';
            
            const cacheKey = `cp_usage_data_v2_${clean(name)}`;
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                currentStaffRecords = JSON.parse(cached);
                window.finishSelectStaff(name);
                return;
            }

            try {
                // 🌟 【省エネ】その人のデータだけを取得（最大1000件）
                const q = query(collection(db, "activity_records"), where("visitorName", "==", name), limit(1000));
                const snap = await getDocs(q); 
                currentStaffRecords = snap.docs.map(d => d.data());
                
                localStorage.setItem(cacheKey, JSON.stringify(currentStaffRecords));
                window.finishSelectStaff(name);
            } catch (e) { console.error("Firebase通信エラー:", e); }
        };

        window.finishSelectStaff = (name) => {
            document.getElementById('selectedStaffLabel').innerText = `${name} さんの活動履歴`;
            window.setMonth(currentM); 
        };

        window.setMonth = (m) => {
            currentM = m;
            document.querySelectorAll('.month-btn').forEach(btn => btn.classList.toggle('active', btn.id === `m-btn-${m}`));
            window.renderAccordion();
        };

        window.renderAccordion = () => {
            const container = document.getElementById('activityAccordion');
            const filtered = currentStaffRecords.filter(r => {
                const dStr = (r.visitDate||"").toString().replace(/\//g, '-');
                const m = parseInt(dStr.split('-')[1]);
                return m === currentM;
            }).sort((a,b) => (b.visitDate||"").toString().localeCompare((a.visitDate||"").toString()));

            let totalMins = 0;
            const uniqueVisits = new Set();
            filtered.forEach(r => {
                uniqueVisits.add(`${r.visitDate}_${r.customerName}`);
                if(r.startTime && r.endTime){
                    const s = r.startTime.split(':'), e = r.endTime.split(':');
                    if(s.length===2 && e.length===2) totalMins += (parseInt(e[0])*60+parseInt(e[1])) - (parseInt(s[0])*60+parseInt(s[1]));
                }
            });

            document.getElementById('sumActualVisits').innerText = uniqueVisits.size;
            document.getElementById('sumSales').innerText = filtered.length;
            document.getElementById('sumTime').innerText = Math.floor(totalMins/60);
            document.getElementById('sumAvg').innerText = filtered.length ? Math.round(totalMins / filtered.length) : 0;

            container.innerHTML = filtered.length ? filtered.map((r, i) => `
                <div class="accordion-item" id="acc-${i}">
                    <div class="accordion-header" onclick="window.toggleAcc('acc-${i}')">
                        <div class="flex items-center gap-4">
                            <span class="text-xs font-black opacity-60">${r.visitDate}</span>
                            <span class="text-base font-black">${r.customerName}</span>
                        </div>
                        <i class="fa-solid fa-chevron-down opacity-30 text-xs"></i>
                    </div>
                    <div class="accordion-content">
                        <div class="info-grid">
                            <div><p class="info-label">お客様担当者</p><p class="info-value">${r.customerStaff || '-'}</p></div>
                            <div><p class="info-label">訪問時間</p><p class="info-value">${r.startTime}〜${r.endTime}</p></div>
                            <div><p class="info-label">同行者</p><p class="info-value text-blue-600">${r.companion || 'なし'}</p></div>
                        </div>
                        <p class="info-label mb-2 uppercase tracking-widest">報告内容</p>
                        <div class="report-box">${r.content || '報告なし'}</div>
                        <p class="info-label mb-2 uppercase tracking-widest">スタッフの考え</p>
                        <div class="report-box border-l-4 border-orange-100">${r.staffThoughts || '未入力'}</div>
                    </div>
                </div>`).join('') : '<p class="text-center py-20 text-slate-300 font-bold uppercase tracking-widest">実績はありません</p>';

            // 🌟 【爆速連動】自動展開 ＋ 自動既読（カレンダーのバッジを消す）
            const jDate = sessionStorage.getItem('cp_usage_jump_date');
            if (jDate) {
                const targetNum = dateToNum(jDate);
                const idx = filtered.findIndex(r => dateToNum(r.visitDate) === targetNum || dateToNum(r.nextVisitDate) === targetNum);
                if (idx !== -1) {
                    setTimeout(() => {
                        window.toggleAcc(`acc-${idx}`);
                        const el = document.getElementById(`acc-${idx}`);
                        if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        window.markAsReadOnOpen(selectedName, jDate);
                        sessionStorage.removeItem('cp_usage_jump_date');
                    }, 1200);
                }
            }
        };

        window.markAsReadOnOpen = async (visitor, date) => {
            const myName = sessionStorage.getItem('userName') || "";
            const targetNum = date.toString().replace(/\D/g, '');
            try {
                const q = query(collection(db, "notifications"), where("recipient", "==", myName), where("isRead", "==", false), where("visitorName", "==", visitor));
                const snap = await getDocs(q);
                const batch = writeBatch(db);
                let count = 0;
                snap.forEach(d => {
                    const nDate = (d.data().visitDate || d.data().appointDate || "").toString().replace(/\D/g, '');
                    if (nDate === targetNum) { batch.update(d.ref, { isRead: true }); count++; }
                });
                if (count > 0) {
                    await batch.commit();
                    const y = date.split(/[-/]/)[0], m = date.split(/[-/]/)[1].padStart(2, '0');
                    sessionStorage.removeItem(`cp_cal_cache_v_ultimate_${y}_${m}`);
                    console.log(`自動既読連動: ${y}_${m} のキャッシュを破棄しました`);
                }
            } catch (e) { console.error("AutoRead Error:", e); }
        };

        window.toggleAcc = (id) => {
            const item = document.getElementById(id);
            if(!item) return;
            const content = item.querySelector('.accordion-content');
            const icon = item.querySelector('i');
            const isOpen = content.style.display === 'block';
            content.style.display = isOpen ? 'none' : 'block';
            if(icon) icon.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
        };

        init();       
    </script>
</body>
</html>
