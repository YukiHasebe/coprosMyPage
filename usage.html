<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>組織員利用状況 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .tab-btn { padding: 0.8rem 1.5rem; font-size: 0.75rem; font-weight: 900; transition: all 0.3s; border-bottom: 3px solid transparent; opacity: 0.4; }
        .tab-btn.active { opacity: 1; color: #0ea5e9; border-bottom-color: #0ea5e9; }
        .table-container { border-radius: 1.5rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        .scope-select { background: #e2e8f0; border: none; padding: 0.4rem 1rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; color: #475569; outline: none; cursor: pointer; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1200px] mx-auto">
                
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 gap-6">
                    <div class="flex items-end gap-6 shrink-0">
                        <div>
                            <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-1">組織員利用状況</h1>
                            <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Performance Analytics Dashboard</nav>
                        </div>
                        <select id="deptFilter" class="scope-select shadow-inner mb-2">
                            <option value="ALL">全社表示</option>
                            <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option><option>土木部</option><option>建築部</option><option>建機部</option><option>総務部</option><option>購買課</option><option>宮崎産商</option><option>企画部</option>
                        </select>
                    </div>
                </div>

                <div class="relative flex flex-col lg:flex-row justify-between items-center mb-8 gap-4 min-h-[50px]">
                    <div class="flex gap-2 bg-white p-1 rounded-2xl shadow-sm border border-slate-200">
                        <button onclick="window.switchMode('visit')" id="tab-visit" class="tab-btn active rounded-xl">お客様訪問状況</button>
                        <button onclick="window.switchMode('usage')" id="tab-usage" class="tab-btn rounded-xl">実績登録状況</button>
                    </div>
                    <div class="lg:absolute lg:left-1/2 lg:-translate-x-1/2 flex items-center gap-6 bg-white py-2 px-6 rounded-2xl shadow-sm border border-slate-100">
                        <button onclick="window.changeMonth(-1)" class="text-slate-300 hover:text-slate-600 transition-colors"><i class="fa-solid fa-chevron-left fa-lg"></i></button>
                        <span id="displayMonth" class="text-lg font-black text-slate-700 min-w-[140px] text-center tracking-tighter">----年 --月</span>
                        <button onclick="window.changeMonth(1)" class="text-slate-300 hover:text-slate-600 transition-colors"><i class="fa-solid fa-chevron-right fa-lg"></i></button>
                    </div>
                </div>

                <div class="table-container overflow-x-auto bg-white">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead><tr id="tableHead" class="text-white text-[10px] font-black uppercase text-center tracking-widest"></tr></thead>
                        <tbody id="statsTable" class="divide-y divide-slate-100 text-sm font-bold"></tbody>
                    </table>
                </div>
                <div id="loading" class="py-20 text-center"><div class="animate-spin mb-4 text-blue-400 text-4xl"><i class="fa-solid fa-circle-notch"></i></div><p class="text-slate-400 font-bold italic uppercase tracking-widest text-[10px]">Processing Database...</p></div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allRecords = []; let allStaffs = [];
        let currentMode = 'visit'; let targetDate = new Date();

        // 🌟 日付を「2026/1」や「2026-01」などあらゆる形式から「年-月」に変換する超柔軟関数
        function parseToYearMonth(dateStr) {
            if (!dateStr) return "";
            const clean = dateStr.replace(/\//g, '-'); // スラッシュをハイフンに
            const parts = clean.split('-');
            if (parts.length < 2) return "";
            return `${parseInt(parts[0])}-${parseInt(parts[1])}`; // "2026-1" という形式を返す
        }

        async function fetchAndRender() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            document.getElementById('statsTable').innerHTML = "";
            
            const targetY = targetDate.getFullYear();
            const targetM = targetDate.getMonth() + 1;
            document.getElementById('displayMonth').innerText = `${targetY}年 ${targetM}月`;
            const currentYearMonth = `${targetY}-${targetM}`;

            const selectedDept = document.getElementById('deptFilter').value;

            try {
                // 1. スタッフ全員を取得
                const staffSnap = await getDocs(collection(db, "staffs"));
                allStaffs = staffSnap.docs.map(d => d.data());

                // 2. 実績データを取得（部署指定があれば絞り込み、なければ全取得）
                let recordQuery;
                if (selectedDept === "ALL") {
                    recordQuery = query(collection(db, "activity_records"), limit(2000));
                } else {
                    recordQuery = query(collection(db, "activity_records"), where("visitorDept", "==", selectedDept));
                }

                const recordSnap = await getDocs(recordQuery);
                allRecords = recordSnap.docs.map(d => d.data());

                loading.style.display = 'none';
                window.renderTable();
            } catch (e) { 
                console.error("Firebase Error:", e);
                loading.innerHTML = '<p class="text-rose-400 font-bold">Data Fetch Error.</p>';
            }
        }

        window.changeMonth = (val) => { targetDate.setMonth(targetDate.getMonth() + val); fetchAndRender(); };
        window.switchMode = (mode) => {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            window.renderTable();
        };

        window.renderTable = () => {
            const body = document.getElementById('statsTable');
            const head = document.getElementById('tableHead');
            const selectedDept = document.getElementById('deptFilter').value;
            const targetY = targetDate.getFullYear();
            const targetM = targetDate.getMonth() + 1;
            const targetKey = `${targetY}-${targetM}`;
            
            body.innerHTML = "";
            const targetStaffs = selectedDept === 'ALL' ? allStaffs : allStaffs.filter(s => s.dept === selectedDept);

            const stats = targetStaffs.map(staff => {
                // 🌟 JavaScript側で柔軟にフィルタリング
                const myRecords = allRecords.filter(r => 
                    r.visitorName === staff.name && parseToYearMonth(r.visitDate) === targetKey
                );
                
                if (myRecords.length === 0) return null;

                let totalMins = 0;
                myRecords.forEach(r => {
                    if(r.startTime && r.endTime) {
                        const s = r.startTime.split(':'); const e = r.endTime.split(':');
                        const diff = (parseInt(e[0])*60 + parseInt(e[1])) - (parseInt(s[0])*60 + parseInt(s[1]));
                        if (diff > 0) totalMins += diff;
                    }
                });

                return { 
                    id: staff.id || '---', name: staff.name, dept: staff.dept, 
                    recordCount: myRecords.length, 
                    visitCount: new Set(myRecords.map(r => r.customerName)).size, 
                    avgTime: Math.round(totalMins / myRecords.length) || 0 
                };
            }).filter(Boolean);

            if (currentMode === 'visit') {
                head.innerHTML = '<th class="p-6 w-24 text-center">NO</th><th class="p-6 text-left">氏名</th><th class="p-6 text-left">部署</th><th class="p-6 text-center">訪問顧客数</th><th class="p-6 text-center">平均滞在時間</th>';
                stats.sort((a,b)=>b.visitCount-a.visitCount).forEach(s => {
                    body.insertAdjacentHTML('beforeend', `<tr class="hover:bg-emerald-50/30 border-b border-slate-50"><td class="p-6 text-slate-400 font-mono text-xs text-center border-r border-slate-50">${s.id}</td><td class="p-6 text-slate-800 text-left font-black">${s.name}</td><td class="p-6 text-slate-500 text-left text-xs">${s.dept}</td><td class="p-6 text-emerald-600 font-black text-center">${s.visitCount}社</td><td class="p-6 text-slate-700 font-black text-center">${s.avgTime}分</td></tr>`);
                });
            } else {
                head.innerHTML = '<th class="p-6 w-24 text-center">NO</th><th class="p-6 text-left">氏名</th><th class="p-6 text-left">部署</th><th class="p-6 text-center">実績登録数</th>';
                stats.sort((a,b)=>b.recordCount-a.recordCount).forEach(s => {
                    body.insertAdjacentHTML('beforeend', `<tr class="hover:bg-sky-50/30 border-b border-slate-50"><td class="p-6 text-slate-400 font-mono text-xs text-center border-r border-slate-50">${s.id}</td><td class="p-6 text-slate-800 text-left font-black">${s.name}</td><td class="p-6 text-slate-500 text-left text-xs">${s.dept}</td><td class="p-6 text-blue-600 font-black text-center">${s.recordCount}件</td></tr>`);
                });
            }
        };

        document.getElementById('deptFilter').addEventListener('change', fetchAndRender);
        fetchAndRender();
    </script>
</body>
</html>
