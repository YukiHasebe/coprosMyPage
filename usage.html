<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>組織員利用状況 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .staff-selector-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.04); }
        .staff-item { padding: 0.8rem 1.2rem; cursor: pointer; border-radius: 0.75rem; transition: all 0.2s; border: 1px solid transparent; text-align: center; overflow: hidden; }
        .staff-item:hover { background: #f8fafc; }
        .staff-item.active { background: var(--copros-navy); color: white; box-shadow: 0 4px 12px rgba(0,64,152,0.3); }
        .summary-card { background: linear-gradient(135deg, #004098 0%, #2d3748 100%); color: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; display: grid; grid-template-columns: repeat(4, 1fr); text-align: center; gap: 10px; }
        .month-btn { padding: 0.6rem 0.2rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; flex: 1; text-align: center; cursor: pointer; }
        .month-btn.active { background: var(--copros-navy); color: white; }
        .accordion-item { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 1rem; }
        .accordion-header { padding: 1.2rem 2rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; background: #3c4b5a; color: white; }
        .accordion-content { display: none; padding: 2rem; background: white; }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .info-label { font-size: 10px; font-weight: 800; color: #94a3b8; }
        .info-value { font-size: 13px; font-weight: 800; color: #475569; }
        .report-box { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; border: 1px solid #f1f5f9; font-size: 13px; line-height: 1.7; margin-bottom: 1rem; }
        .scope-select { background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.6rem 1rem; border-radius: 0.75rem; font-size: 0.8rem; font-weight: 800; color: #475569; outline: none; }
        .attach-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 0.75rem; }
        .attach-item { position: relative; cursor: pointer; border-radius: 0.75rem; overflow: hidden; border: 2px solid #e2e8f0; transition: all 0.2s; flex-shrink: 0; }
        .attach-item img { width: 90px; height: 90px; object-fit: cover; display: block; }
        .attach-zoom-icon { position: absolute; inset: 0; background: rgba(0,0,0,0); display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .attach-item:hover .attach-zoom-icon { background: rgba(0,0,0,0.35); }
        .attach-zoom-icon i { color: white; font-size: 1.2rem; opacity: 0; transition: opacity 0.2s; }
        .attach-item:hover .attach-zoom-icon i { opacity: 1; }
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .lightbox.active { display: flex; }
        .lightbox-img-wrap { position: relative; max-width: 94vw; max-height: 94vh; }
        .lightbox-img-wrap img { max-width: 94vw; max-height: 88vh; border-radius: 1rem; object-fit: contain; box-shadow: 0 30px 80px rgba(0,0,0,0.7); }
        .lightbox-close { position: absolute; top: -2.5rem; right: 0; color: white; font-size: 1.8rem; cursor: pointer; opacity: 0.7; line-height: 1; }
        .lightbox-close:hover { opacity: 1; }
        .lightbox-filename { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.75rem; font-weight: 700; margin-top: 0.75rem; }
        .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 1.8rem; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; padding: 0.5rem; user-select: none; }
        .lightbox-nav:hover { opacity: 1; }
        .lightbox-nav.prev { left: -3.5rem; }
        .lightbox-nav.next { right: -3.5rem; }
        .lightbox-counter { text-align: center; color: rgba(255,255,255,0.4); font-size: 0.7rem; font-weight: 900; margin-top: 0.4rem; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1200px] mx-auto">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 tracking-tighter">組織員利用状況</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic mt-1">Staff Activity Dashboard</nav>
                    </div>
                    <button onclick="window.returnToCalendar()" class="px-6 py-2 bg-white border rounded-xl font-bold text-xs shadow-sm hover:bg-slate-50 transition-all">カレンダーへ戻る</button>
                </div>
                <div class="staff-selector-card p-6 mb-8">
                    <div class="flex flex-col lg:flex-row gap-4 mb-6">
                        <select id="deptFilter" onchange="window.renderStaffList()" class="scope-select min-w-[240px]">
                            <option value="ALL">全ケコム関連</option>
                            <option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option>
                        </select>
                        <input type="text" id="staffSearch" oninput="window.renderStaffList()" placeholder="氏名で検索..."
                            class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold">
                    </div>
                    <div id="staffList" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2 max-h-[160px] overflow-y-auto custom-scrollbar p-1 text-center"></div>
                </div>
                <div id="toolArea" class="hidden">
                    <div class="summary-card shadow-lg">
                        <div><p class="text-[9px] opacity-60 font-black uppercase mb-1">訪問件数</p><p class="text-xl font-black"><span id="sumActualVisits">0</span>件</p></div>
                        <div><p class="text-[9px] opacity-60 font-black uppercase mb-1">営業件数</p><p class="text-xl font-black"><span id="sumSales">0</span>件</p></div>
                        <div><p class="text-[9px] opacity-60 font-black uppercase mb-1">合計滞在</p><p class="text-xl font-black"><span id="sumTime">0</span>時間</p></div>
                        <div><p class="text-[9px] opacity-60 font-black uppercase mb-1">平均滞在</p><p class="text-xl font-black"><span id="sumAvg">0</span>分</p></div>
                    </div>
                    <div class="bg-white p-1 rounded-2xl border mb-8 flex overflow-x-auto whitespace-nowrap custom-scrollbar">
                        <script>for(let i=1;i<=12;i++) document.write(`<button onclick="window.setMonth(${i})" id="m-btn-${i}" class="month-btn">${i}月</button>`);</script>
                    </div>
                    <div class="mb-20">
                        <h3 id="selectedStaffLabel" class="text-xl font-black mb-8 text-slate-800 border-l-4 border-orange-500 pl-4"></h3>
                        <div id="activityAccordion" class="space-y-4"></div>
                    </div>
                </div>
                <div id="guideMsg" class="py-20 text-center">
                    <p class="text-slate-400 font-bold tracking-widest uppercase italic">左上のリストから社員を選択してください</p>
                </div>
            </div>
        </div>
    </main>

    <div id="lightbox" class="lightbox" onclick="window.handleLightboxClick(event)">
        <div class="lightbox-img-wrap">
            <div class="lightbox-close" onclick="window.closeLightbox(); event.stopPropagation();">
                <i class="fa-solid fa-xmark"></i>
            </div>
            <div class="lightbox-nav prev" id="lbPrev" onclick="window.lbNavigate(-1); event.stopPropagation();">
                <i class="fa-solid fa-chevron-left"></i>
            </div>
            <div class="lightbox-nav next" id="lbNext" onclick="window.lbNavigate(1); event.stopPropagation();">
                <i class="fa-solid fa-chevron-right"></i>
            </div>
            <img id="lightboxImg" src="" alt="拡大表示">
            <div class="lightbox-filename" id="lightboxFilename"></div>
            <div class="lightbox-counter" id="lightboxCounter"></div>
        </div>
    </div>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db, TARGET_DEPTS } from "./common.js";
        import { collection, getDocs, query, where, orderBy, limit, writeBatch, doc, updateDoc }
            from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allStaffs = [], currentStaffRecords = [], selectedName = "", currentM = new Date().getMonth() + 1, recordImageMap = {}, myNotifications = [];

        const clean = (s) => (s || "").toString().replace(/[\s\u3000]+/g, '').trim();
        const dateToNum = (s) => {
            if (!s) return "";
            const p = s.toString().split(/[-/]/);
            if (p.length < 3) return s.toString().replace(/\D/g, '');
            return p[0] + p[1].padStart(2, '0') + p[2].padStart(2, '0');
        };

        // --- Lightbox Functions ---
        let lbImages = [], lbCurrent = 0;
        window.openLightbox = (images, startIdx) => { lbImages = images; lbCurrent = startIdx || 0; renderLightbox(); document.getElementById('lightbox').classList.add('active'); document.addEventListener('keydown', handleLbKey); };
        window.closeLightbox = () => { document.getElementById('lightbox').classList.remove('active'); document.getElementById('lightboxImg').src = ''; document.removeEventListener('keydown', handleLbKey); };
        window.lbNavigate = (dir) => { lbCurrent = (lbCurrent + dir + lbImages.length) % lbImages.length; renderLightbox(); };
        window.handleLightboxClick = (e) => { if (e.target === document.getElementById('lightbox')) window.closeLightbox(); };
        function renderLightbox() { document.getElementById('lightboxImg').src = lbImages[lbCurrent].src; document.getElementById('lightboxFilename').innerText = lbImages[lbCurrent].name || ''; document.getElementById('lightboxCounter').innerText = lbImages.length > 1 ? `${lbCurrent + 1} / ${lbImages.length}` : ''; document.getElementById('lbPrev').style.display = lbImages.length > 1 ? 'block' : 'none'; document.getElementById('lbNext').style.display = lbImages.length > 1 ? 'block' : 'none'; }
        function handleLbKey(e) { if (e.key === 'ArrowLeft') window.lbNavigate(-1); if (e.key === 'ArrowRight') window.lbNavigate(1); if (e.key === 'Escape') window.closeLightbox(); }
        window.openLightboxFromRecord = (recordIdx, imgIdx) => { const images = recordImageMap[recordIdx] || []; if (images.length) window.openLightbox(images, imgIdx); };

        function renderAttachments(attachments, recordIdx) {
            if (!attachments || !attachments.length) return '';
            const images = attachments.filter(f => { const src = f.base64 || f.url || ''; return src && ((f.type || '').startsWith('image/') || src.startsWith('data:image') || /\.(jpg|jpeg|png|gif|webp)$/i.test(src)); }).map(f => ({ src: f.base64 || f.url, name: f.name || '添付画像' }));
            if (!images.length) return '';
            recordImageMap[recordIdx] = images;
            return `<div class="mt-4 p-4 bg-slate-50 rounded-2xl border border-slate-200"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3"><i class="fa-solid fa-images mr-1 text-orange-400"></i>添付画像（${images.length}枚）</p><div class="attach-grid">${images.map((img, imgIdx) => `<div class="attach-item" onclick="window.openLightboxFromRecord(${recordIdx}, ${imgIdx})" title="${img.name}"><img src="${img.src}" alt="${img.name}" loading="lazy"><div class="attach-zoom-icon"><i class="fa-solid fa-magnifying-glass-plus"></i></div></div>`).join('')}</div></div>`;
        }

        async function loadStaffs() {
            const snap = await getDocs(query(collection(db, "staffs"), orderBy("name")));
            return snap.docs.map(d => d.data());
        }

        async function loadRecords(name) {
            const snap = await getDocs(query(collection(db, "activity_records"), where("visitorName", "==", name), limit(500)));
            return snap.docs.map(d => d.data());
        }

        async function fetchMyNotifications() {
            const myName = sessionStorage.getItem('userName') || "";
            const q = query(collection(db, "notifications"), where("recipient", "==", myName));
            const snap = await getDocs(q);
            myNotifications = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        }

        async function init() {
            try {
                allStaffs = await loadStaffs();
                await fetchMyNotifications();
                window.renderStaffList();
                const jName = sessionStorage.getItem('cp_usage_jump_name'), jMonth = sessionStorage.getItem('cp_usage_jump_month');
                if (jName) { if (jMonth) currentM = parseInt(jMonth); await window.selectStaff(jName); }
            } catch (e) { console.error(e); }
        }

        window.renderStaffList = () => {
            const kw = clean(document.getElementById('staffSearch').value.toLowerCase()), dept = document.getElementById('deptFilter').value;
            document.getElementById('staffList').innerHTML = allStaffs.filter(s => { const nameM = !kw || clean(s.name).toLowerCase().includes(kw); const sDept = clean(s.dept || ""); return nameM && (dept === 'ALL' ? TARGET_DEPTS.some(t => clean(t) === sDept) : sDept === clean(dept)); }).map(s => `<div class="staff-item ${clean(selectedName) === clean(s.name) ? 'active' : ''}" onclick="window.selectStaff('${s.name}')"><p class="font-black text-xs">${s.name}</p><p class="text-[8px] opacity-60 uppercase">${s.dept || ''}</p></div>`).join('');
        };

        window.selectStaff = async (name) => {
            selectedName = name; window.renderStaffList();
            document.getElementById('guideMsg').style.display = 'none';
            document.getElementById('toolArea').style.display = 'block';
            try {
                currentStaffRecords = await loadRecords(name);
                await fetchMyNotifications();
                document.getElementById('selectedStaffLabel').innerText = `${name} さんの活動履歴`;
                window.setMonth(currentM);
            } catch (e) { console.error(e); }
        };

        window.setMonth = (m) => { currentM = m; document.querySelectorAll('.month-btn').forEach(btn => btn.classList.toggle('active', btn.id === `m-btn-${m}`)); window.renderAccordion(); };

        window.renderAccordion = () => {
            recordImageMap = {};
            const container = document.getElementById('activityAccordion');
            const filtered = currentStaffRecords.filter(r => { const dParts = (r.visitDate || "").toString().split(/[-/]/); return dParts.length >= 2 && parseInt(dParts[1]) === currentM; }).sort((a, b) => (b.visitDate || "").toString().localeCompare((a.visitDate || "").toString()));
            
            let totalMins = 0; const uniqueVisits = new Set();
            filtered.forEach(r => { uniqueVisits.add(`${r.visitDate}_${r.customerName}`); if (r.startTime && r.endTime) { const s = r.startTime.split(':'), e = r.endTime.split(':'); if (s.length === 2 && e.length === 2) { totalMins += (parseInt(e[0]) * 60 + parseInt(e[1])) - (parseInt(s[0]) * 60 + parseInt(s[1])); } } });
            document.getElementById('sumActualVisits').innerText = uniqueVisits.size;
            document.getElementById('sumSales').innerText = filtered.length;
            document.getElementById('sumTime').innerText = Math.floor(totalMins / 60);
            document.getElementById('sumAvg').innerText = filtered.length ? Math.round(totalMins / filtered.length) : 0;

            if (!filtered.length) { container.innerHTML = '<p class="text-center py-20 text-slate-300 font-bold uppercase">実績なし</p>'; return; }

            container.innerHTML = filtered.map((r, i) => {
                const targetNum = dateToNum(r.visitDate);
                const noti = myNotifications.find(n => clean(n.visitorName) === clean(selectedName) && dateToNum(n.visitDate || n.appointDate) === targetNum && clean(n.customerName) === clean(r.customerName));
                const isUnread = noti && noti.isRead === false;
                return `
                <div class="accordion-item" id="acc-${i}" data-visit-date="${r.visitDate}">
                    <div class="accordion-header" onclick="window.toggleAcc('acc-${i}')">
                        <div class="flex items-center gap-4 flex-wrap">
                            <span class="text-xs font-black opacity-60 bg-white/10 px-3 py-1 rounded-full">${r.visitDate}</span>
                            <span class="text-base font-black">${r.customerName}</span>
                            <span id="badge-${i}" class="bg-rose-500 text-white text-[9px] px-2 py-0.5 rounded-full font-black" style="display:${isUnread ? 'inline' : 'none'}">未読</span>
                        </div>
                        <i class="fa-solid fa-chevron-down opacity-30 text-xs transition-transform flex-shrink-0"></i>
                    </div>
                    <div class="accordion-content">
                        <div class="info-grid">
                            <div><p class="info-label">訪問時間</p><p class="info-value text-blue-600">${r.startTime} 〜 ${r.endTime}</p></div>
                            <div><p class="info-label">同行者</p><p class="info-value">${r.companion || 'なし'}</p></div>
                        </div>
                        <div class="report-box whitespace-pre-wrap">${r.content || r.customerReport || '報告なし'}</div>
                        <div class="flex justify-end mt-4 pt-4 border-t border-slate-100">
                            <button id="toggle-btn-${i}" onclick="window.toggleReadStatus('${r.visitDate}', '${i}')" class="px-6 py-2 rounded-xl font-black text-[11px] transition-all shadow-sm ${isUnread ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-400'}">
                                <i class="fa-solid ${isUnread ? 'fa-check-double' : 'fa-envelope'} mr-2"></i>${isUnread ? '既読にする' : '未読に戻す'}
                            </button>
                        </div>
                        ${renderAttachments(r.attachments, i)}
                    </div>
                </div>`;
            }).join('');

            // 🌟 会社名も含めた精密なジャンプ
            const jDate = sessionStorage.getItem('cp_usage_jump_date'), jCust = sessionStorage.getItem('cp_usage_jump_customer');
            if (jDate && jCust) {
                const idx = filtered.findIndex(r => dateToNum(r.visitDate) === dateToNum(jDate) && clean(r.customerName) === clean(jCust));
                if (idx !== -1) { setTimeout(() => { window.toggleAcc(`acc-${idx}`); document.getElementById(`acc-${idx}`).scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 500); }
                sessionStorage.removeItem('cp_usage_jump_date'); sessionStorage.removeItem('cp_usage_jump_customer');
            }
        };

        window.toggleReadStatus = async (date, index) => {
            const myName = sessionStorage.getItem('userName') || "", targetNum = dateToNum(date);
            const btn = document.getElementById(`toggle-btn-${index}`), badge = document.getElementById(`badge-${index}`);
            const customerName = currentStaffRecords.filter(r => { const dParts = (r.visitDate || "").toString().split(/[-/]/); return dParts.length >= 2 && parseInt(dParts[1]) === currentM; }).sort((a, b) => (b.visitDate || "").toString().localeCompare((a.visitDate || "").toString()))[index].customerName;

            try {
                const q = query(collection(db, "notifications"), where("recipient", "==", myName), where("visitorName", "==", selectedName));
                const snap = await getDocs(q);
                let targetDoc = null;
                snap.forEach(d => { if (dateToNum(d.data().visitDate || d.data().appointDate) === targetNum && clean(d.data().customerName) === clean(customerName)) targetDoc = d; });
                if (targetDoc) {
                    const nextStatus = !targetDoc.data().isRead;
                    await updateDoc(targetDoc.ref, { isRead: nextStatus });
                    Object.keys(sessionStorage).forEach(k => { if (k.startsWith('cp_cal_cache')) sessionStorage.removeItem(k); });
                    sessionStorage.setItem('cp_return_from_usage', 'true');
                    if (nextStatus) { btn.className = "px-6 py-2 rounded-xl font-black text-[11px] bg-slate-100 text-slate-400"; btn.innerHTML = '<i class="fa-solid fa-envelope mr-2"></i>未読に戻す'; badge.style.display = 'none'; }
                    else { btn.className = "px-6 py-2 rounded-xl font-black text-[11px] bg-emerald-500 text-white"; btn.innerHTML = '<i class="fa-solid fa-check-double mr-2"></i>既読にする'; badge.style.display = 'inline'; }
                    await fetchMyNotifications();
                    window.dispatchEvent(new CustomEvent('notificationUpdated'));
                }
            } catch (e) { console.error(e); }
        };

        window.toggleAcc = (id) => {
            const item = document.getElementById(id); if (!item) return;
            const content = item.querySelector('.accordion-content'), icon = item.querySelector('.fa-chevron-down');
            const isOpen = content.style.display === 'block';
            content.style.display = isOpen ? 'none' : 'block';
            if (icon) icon.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
            if (!isOpen) {
                const idx = id.split('-')[1], btn = document.getElementById(`toggle-btn-${idx}`);
                if (btn && btn.innerText.includes('既読にする')) window.toggleReadStatus(item.dataset.visitDate, idx);
            }
        };

        window.returnToCalendar = () => { Object.keys(sessionStorage).forEach(k => { if (k.startsWith('cp_cal_cache')) sessionStorage.removeItem(k); }); sessionStorage.setItem('cp_return_from_usage', 'true'); location.href = 'calendar.html'; };
        init();
    </script>
</body>
</html>
