<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>組織員利用状況 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .staff-selector-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.04); }
        .staff-item { padding: 0.8rem 1.2rem; cursor: pointer; border-radius: 0.75rem; transition: all 0.2s; border: 1px solid transparent; text-align: center; }
        .staff-item:hover { background: #f8fafc; }
        .staff-item.active { background: var(--copros-navy); color: white; }
        .month-btn { padding: 0.6rem 0.2rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; flex: 1; text-align: center; cursor: pointer; }
        .month-btn.active { background: var(--copros-navy); color: white; }
        .accordion-item { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 1rem; }
        .accordion-header { padding: 1.2rem 2rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; background: #3c4b5a; color: white; }
        .accordion-content { display: none; padding: 2rem; background: white; }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .info-label { font-size: 10px; font-weight: 800; color: #94a3b8; }
        .info-value { font-size: 13px; font-weight: 800; color: #475569; }
        .report-box { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; border: 1px solid #f1f5f9; font-size: 13px; line-height: 1.7; }
        .summary-card { background: linear-gradient(135deg, #004098 0%, #2d3748 100%); color: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; }
        .scope-select { background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.6rem 1rem; border-radius: 0.75rem; font-size: 0.8rem; font-weight: 800; color: #475569; outline: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1200px] mx-auto">
                <div class="flex justify-between items-end mb-8"><h1 class="text-4xl font-black text-slate-800 tracking-tighter">組織員利用状況</h1>
                    <button onclick="location.href='calendar.html'" class="px-6 py-2 bg-white border rounded-xl font-bold text-xs">カレンダーへ戻る</button>
                </div>
                <!-- 1. 社員選択 -->
                <div class="staff-selector-card p-6 mb-8">
                    <div class="flex flex-col lg:flex-row gap-4 mb-6">
                        <select id="deptFilter" onchange="window.renderStaffList()" class="scope-select min-w-[240px]"><option value="ALL">全ての部署</option><option>ケコム部</option><option>関西支店</option><option>関東支店</option><option>中部営業所</option><option>土木部</option><option>建築部</option><option>建機部</option><option>総務部</option><option>購買課</option><option>宮崎産商</option><option>企画部</option></select>
                        <input type="text" id="staffSearch" oninput="window.renderStaffList()" placeholder="氏名で検索..." class="flex-1 px-4 py-3 bg-slate-50 border rounded-xl outline-none font-bold">
                    </div>
                    <div id="staffList" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2 max-h-[160px] overflow-y-auto custom-scrollbar p-1"></div>
                </div>
                <!-- 2. 結果表示 -->
                <div id="toolArea" class="hidden">
                    <div class="summary-card shadow-lg">
                        <div><p class="text-[10px] opacity-60 font-black uppercase mb-1">訪問件数</p><p class="text-2xl font-black"><span id="sumVisits">0</span>件</p></div>
                        <div><p class="text-[10px] opacity-60 font-black uppercase mb-1">合計滞在</p><p class="text-2xl font-black"><span id="sumTime">0</span>時間</p></div>
                        <div><p class="text-[10px] opacity-60 font-black uppercase mb-1">平均滞在</p><p class="text-2xl font-black"><span id="sumAvg">0</span>分</p></div>
                    </div>
                    <div class="bg-white p-1 rounded-2xl border mb-8 flex overflow-x-auto whitespace-nowrap custom-scrollbar">
                        <script>for(let i=1; i<=12; i++) document.write(`<button onclick="window.setMonth(${i})" id="m-btn-${i}" class="month-btn">${i}月</button>`);</script>
                    </div>
                    <div class="mb-20"><h3 id="selectedStaffLabel" class="text-xl font-black mb-8 px-4 text-slate-800"></h3><div id="activityAccordion" class="space-y-4"></div></div>
                </div>
                <div id="guideMsg" class="py-20 text-center"><p class="text-slate-400 font-bold">社員を選択してください</p></div>
            </div>
        </div>
    </main>
    <div id="local-loading" class="fixed inset-0 bg-white/80 z-[9999] hidden flex-col items-center justify-center animate-spin text-[#ff7e11] text-6xl"><i class="fa-solid fa-circle-notch"></i></div>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allStaffs = [], currentDeptRecords = [], selectedName = "", currentY = 2026, currentM = new Date().getMonth() + 1;
        const clean = (s) => (s||"").replace(/\s+/g, '');

        async function init() {
            try {
                const snap = await getDocs(query(collection(db, "staffs"), orderBy("name")));
                allStaffs = snap.docs.map(d => d.data());
                window.renderStaffList();
                
                const jumpName = sessionStorage.getItem('cp_usage_jump_name');
                const jumpMonth = sessionStorage.getItem('cp_usage_jump_month');
                if (jumpName) {
                    sessionStorage.removeItem('cp_usage_jump_name');
                    sessionStorage.removeItem('cp_usage_jump_month');
                    currentM = parseInt(jumpMonth);
                    const staff = allStaffs.find(s => clean(s.name) === clean(jumpName));
                    if(staff) window.selectStaff(staff.name, staff.dept);
                }
            } catch (e) { console.error(e); }
        }

        window.renderStaffList = () => {
            const kw = document.getElementById('staffSearch').value.toLowerCase();
            const dept = document.getElementById('deptFilter').value;
            const container = document.getElementById('staffList');
            container.innerHTML = "";
            allStaffs.filter(s => (!kw || s.name.includes(kw)) && (dept === 'ALL' || s.dept === dept)).forEach(s => {
                const div = document.createElement('div'); div.className = `staff-item ${selectedName === s.name ? 'active' : ''}`;
                div.innerHTML = `<p class="font-black text-xs">${s.name}</p><p class="text-[8px] opacity-60 uppercase">${s.dept || ''}</p>`;
                div.onclick = () => window.selectStaff(s.name, s.dept); container.appendChild(div);
            });
        };

        window.selectStaff = async (name, dept) => {
            selectedName = name; window.renderStaffList();
            document.getElementById('guideMsg').style.display = 'none'; document.getElementById('toolArea').style.display = 'block';
            document.getElementById('local-loading').style.display = 'flex';
            try {
                const q = query(collection(db, "activity_records"), where("visitorDept", "==", dept || "不明"), where("visitDate", ">=", `${currentY}`), where("visitDate", "<=", `${currentY}\uf8ff`));
                const snap = await getDocs(q); currentDeptRecords = snap.docs.map(d => d.data());
                document.getElementById('local-loading').style.display = 'none';
                document.getElementById('selectedStaffLabel').innerText = `${name} さんの履歴`;
                window.setMonth(currentM); 
            } catch (e) { document.getElementById('local-loading').style.display = 'none'; }
        };

        window.setMonth = (m) => {
            currentM = m; document.querySelectorAll('.month-btn').forEach(btn => btn.classList.toggle('active', btn.id === `m-btn-${m}`));
            window.renderAccordion();
        };

        window.renderAccordion = () => {
            const container = document.getElementById('activityAccordion');
            const filtered = currentDeptRecords.filter(r => {
                const d = String(r.visitDate).replace(/\//g, '-').split('-');
                return clean(r.visitorName) === clean(selectedName) && parseInt(d[1]) === currentM;
            }).sort((a,b) => String(b.visitDate).localeCompare(String(a.visitDate)));

            let totalMins = 0;
            filtered.forEach(r => {
                const s = (r.startTime||"00:00").split(':'), e = (r.endTime||"00:00").split(':');
                totalMins += (parseInt(e[0])*60+parseInt(e[1])) - (parseInt(s[0])*60+parseInt(s[1]));
            });
            document.getElementById('sumVisits').innerText = filtered.length;
            document.getElementById('sumTime').innerText = Math.floor(totalMins/60);
            document.getElementById('sumAvg').innerText = filtered.length ? Math.round(totalMins / filtered.length) : 0;

            const jumpTarget = sessionStorage.getItem('cp_usage_jump_customer');
            container.innerHTML = filtered.length ? filtered.map((r, i) => `
                <div class="accordion-item ${r.customerName === jumpTarget ? 'ring-2 ring-orange-500' : ''}" id="acc-${i}">
                    <div class="accordion-header" onclick="window.toggleAcc('acc-${i}')">
                        <div class="flex items-center gap-4"><span class="text-xs font-black opacity-60">${String(r.visitDate).replace(/-/g,'/')}</span><span class="text-base font-black">${r.customerName}</span></div>
                        <i class="fa-solid fa-chevron-down opacity-30 text-xs"></i>
                    </div>
                    <div class="accordion-content">
                        <div class="info-grid">
                            <div><p class="info-label">お客様担当者</p><p class="info-value">${r.customerStaff || '-'}</p></div>
                            <div><p class="info-label">訪問時間</p><p class="info-value">${r.startTime}〜${r.endTime}</p></div>
                        </div>
                        <div class="report-box">${r.customerReport || 'なし'}</div>
                    </div>
                </div>`).join('') : '<p class="text-center py-20 text-slate-300 font-bold">この月の実績登録はありません</p>';
            if(jumpTarget) sessionStorage.removeItem('cp_usage_jump_customer');
        };

        window.toggleAcc = (id) => {
            const item = document.getElementById(id); const content = item.querySelector('.accordion-content');
            const open = content.style.display === 'block'; content.style.display = open ? 'none' : 'block';
            item.querySelector('i').style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
        };

        init();
    </script>
</body>
</html>
