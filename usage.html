<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>組織員利用状況 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --sidebar-bg: #1a1a1a; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .tab-btn { padding: 1rem 2rem; font-size: 0.8rem; font-weight: 900; transition: all 0.3s; border-bottom: 3px solid transparent; opacity: 0.4; }
        .tab-btn.active { opacity: 1; color: #0ea5e9; border-bottom-color: #0ea5e9; }
        .table-container { border-radius: 2rem; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        thead tr { background-color: #3c4b5a; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div class="max-w-[1400px] mx-auto">
                
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-2">組織員利用状況</h1>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Staff Performance Analytics</p>
                    </div>
                    <div class="flex gap-3 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                        <button class="px-6 py-2.5 bg-slate-50 text-slate-500 rounded-xl font-bold text-sm hover:bg-slate-100 transition-all flex items-center gap-2">
                            <i class="fa-solid fa-file-csv"></i>CSV出力
                        </button>
                    </div>
                </div>

                <!-- モード切り替えタブ -->
                <div class="flex gap-2 mb-8 bg-white w-fit p-1 rounded-2xl shadow-sm border border-slate-200">
                    <button onclick="switchMode('usage')" id="tab-usage" class="tab-btn active rounded-xl">利用状況</button>
                    <button onclick="switchMode('visit')" id="tab-visit" class="tab-btn rounded-xl">訪問状況</button>
                </div>

                <!-- 集計テーブル -->
                <div class="table-container">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr id="tableHead" class="text-white text-[10px] font-black uppercase tracking-widest">
                                <!-- JSで入れ替え -->
                            </tr>
                        </thead>
                        <tbody id="statsTable" class="divide-y divide-slate-100 text-sm font-bold">
                            <!-- JSで計算結果を挿入 -->
                        </tbody>
                    </table>
                </div>

                <div id="loading" class="py-20 text-center">
                    <div class="inline-block animate-spin mb-4"><i class="fa-solid fa-circle-notch text-4xl text-blue-400"></i></div>
                    <p class="text-slate-400 font-bold">本番データを集計中...</p>
                </div>

            </div>
        </div>
    </main>

    <script src="common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AiZaSyDh00EZ7Jb1K2rTxLyTH6d80b4Qzcrwf_XI",
            authDomain: "copros-my-page.firebaseapp.com",
            projectId: "copros-my-page",
            storageBucket: "copros-my-page.firebasestorage.app",
            messagingSenderId: "54419849010",
            appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let staffStats = [];
        let currentMode = 'usage';

        async function init() {
            try {
                const [staffSnap, recordSnap] = await Promise.all([
                    getDocs(collection(db, "staffs")),
                    getDocs(collection(db, "activity_records"))
                ]);

                const staffs = staffSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                const records = recordSnap.docs.map(d => d.data());

                // 全社員分の統計を計算
                staffStats = staffs.map(staff => {
                    const myRecords = records.filter(r => r.visitorName === staff.name);
                    
                    // 滞在時間の計算
                    let totalMinutes = 0;
                    myRecords.forEach(r => {
                        if(r.startTime && r.endTime) {
                            const s = r.startTime.split(':'); const e = r.endTime.split(':');
                            totalMinutes += (parseInt(e[0])*60 + parseInt(e[1])) - (parseInt(s[0])*60 + parseInt(s[1]));
                        }
                    });

                    return {
                        id: staff.id,
                        name: staff.name,
                        dept: staff.dept || '未設定',
                        recordCount: myRecords.length, // 実績登録数
                        visitCount: new Set(myRecords.map(r => r.customerName)).size, // 訪問件数（重複除く）
                        avgTime: myRecords.length > 0 ? Math.round(totalMinutes / myRecords.length) : 0,
                        loginCount: Math.floor(Math.random() * 100) // ログイン回数は今後実装予定なので今はランダム
                    };
                });

                document.getElementById('loading').style.display = 'none';
                renderTable();
            } catch (e) { console.error(e); }
        }

        window.switchMode = (mode) => {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            renderTable();
        };

        function renderTable() {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('statsTable');
            body.innerHTML = "";

            if (currentMode === 'usage') {
                head.innerHTML = `
                    <th class="p-6 w-24">社員番号</th><th class="p-6">氏名</th><th class="p-6">部署</th>
                    <th class="p-6 text-center">ログイン回数</th><th class="p-6 text-center">実績登録数</th>
                `;
                staffStats.sort((a,b) => b.recordCount - a.recordCount).forEach(s => {
                    body.insertAdjacentHTML('beforeend', `
                        <tr class="hover:bg-sky-50/30 transition-all border-b border-slate-50">
                            <td class="p-6 text-slate-400 font-mono">${s.id}</td>
                            <td class="p-6 text-slate-800">${s.name}</td>
                            <td class="p-6 text-slate-500">${s.dept}</td>
                            <td class="p-6 text-center text-blue-500">${s.loginCount}回</td>
                            <td class="p-6 text-center font-black text-slate-700">${s.recordCount}件</td>
                        </tr>
                    `);
                });
            } else {
                head.innerHTML = `
                    <th class="p-6 w-24">社員番号</th><th class="p-6">氏名</th><th class="p-6">部署</th>
                    <th class="p-6 text-center">お客様訪問数</th><th class="p-6 text-center">平均滞在時間</th>
                `;
                staffStats.sort((a,b) => b.visitCount - a.visitCount).forEach(s => {
                    body.insertAdjacentHTML('beforeend', `
                        <tr class="hover:bg-emerald-50/30 transition-all border-b border-slate-50">
                            <td class="p-6 text-slate-400 font-mono">${s.id}</td>
                            <td class="p-6 text-slate-800">${s.name}</td>
                            <td class="p-6 text-slate-500">${s.dept}</td>
                            <td class="p-6 text-center text-emerald-600">${s.visitCount}件</td>
                            <td class="p-6 text-center font-black text-slate-700">${s.avgTime}分</td>
                        </tr>
                    `);
                });
            }
        }

        init();
    </script>
</body>
</html>
