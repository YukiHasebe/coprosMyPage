<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>デイリーレポート | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --copros-orange: #ff7e11; --copros-navy: #004098; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .accordion-item { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .accordion-header { padding: 1.2rem 2rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; background: #3c4b5a; color: white; }
        .accordion-content { display: none; padding: 2rem; background: white; border-top: 1px solid #f1f5f9; }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .info-label { font-size: 10px; font-weight: 800; color: #94a3b8; margin-bottom: 4px; }
        .info-value { font-size: 13px; font-weight: 800; color: #475569; }
        .report-box { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; border: 1px solid #f1f5f9; font-size: 13px; line-height: 1.7; margin-bottom: 1rem; }
        .summary-card { background: linear-gradient(135deg, #004098 0%, #2d3748 100%); color: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 6rem; box-shadow: 0 10px 25px -5px rgba(0,64,152,0.3); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 font-sans">
    <div id="sidebar-placeholder"></div>
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>
        <div class="flex-1 overflow-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-[1200px] mx-auto">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-4xl font-black text-slate-800 tracking-tighter">デイリーレポート</h1>
                        <nav class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic mb-2">Daily Team Activity Overview</nav>
                        <p id="displayDate" class="text-xl font-black text-orange-500 border-l-4 border-orange-500 pl-4 mt-4">----/--/--</p>
                    </div>
                    <button onclick="location.href='calendar.html'" class="px-6 py-2 bg-white border border-slate-200 rounded-xl font-black text-xs shadow-sm hover:bg-slate-50 transition-all">カレンダーへ戻る</button>
                </div>

                <div class="summary-card">
                    <div class="text-center"><p class="text-[10px] opacity-60 font-black uppercase mb-1 tracking-widest">本日の営業件数</p><p class="text-3xl lg:text-4xl font-black"><span id="sumVisits">0</span><span class="text-sm ml-1">件</span></p></div>
                    <div class="w-px h-12 bg-white/10 hidden md:block"></div>
                    <div class="text-center"><p class="text-[10px] opacity-60 font-black uppercase mb-1 tracking-widest">活動メンバー</p><p class="text-3xl lg:text-4xl font-black"><span id="sumStaff">0</span><span class="text-sm ml-1">名</span></p></div>
                </div>

                <div id="activityAccordion" class="space-y-4 mb-20">
                    <!-- 読み込み中表示（一瞬で消えるはずです） -->
                    <div class="py-20 text-center text-slate-300 font-bold italic animate-pulse">同期中...</div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>
    <script type="module">
        import { db } from "./common.js";
        import { collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const standardizeDate = (s) => {
            if(!s) return "";
            const d = s.replace(/\//g, '-').split('-');
            if(d.length < 3) return s;
            return `${d[0]}-${d[1].padStart(2, '0')}-${d[2].padStart(2, '0')}`;
        };

        async function init() {
            const rawDate = sessionStorage.getItem('cp_daily_date');
            if (!rawDate) { location.href = 'calendar.html'; return; }
            
            const targetDate = standardizeDate(rawDate);
            document.getElementById('displayDate').innerText = targetDate.replace(/-/g, '/');

            // 🌟 【高速化の鍵】カレンダーが持っているキャッシュをチェック
            const [y, m] = targetDate.split('-');
            const cacheKey = `cp_cal_cache_${y}_${m}`;
            const cached = sessionStorage.getItem(cacheKey);

            let allData = [];

            if (cached) {
                // 🌟 キャッシュがあれば、それを使う（一瞬で終わる）
                console.log("Using cached data from Calendar");
                allData = JSON.parse(cached).records;
            } else {
                // キャッシュがない場合のみFirebaseから取得（念のためのバックアップ）
                console.log("No cache found. Fetching from Firestore...");
                const q = query(collection(db, "activity_records"), where("visitDate", ">=", `${y}/${m}/01`), where("visitDate", "<=", `${y}/${m}/31`));
                const snap = await getDocs(q);
                allData = snap.docs.map(d => d.data());
            }

            // その日だけのデータを抽出して表示
            const dailyData = allData.filter(r => standardizeDate(r.visitDate) === targetDate)
                                     .sort((a,b) => (a.startTime || "00:00").localeCompare(b.startTime || "00:00"));

            document.getElementById('sumVisits').innerText = dailyData.length;
            document.getElementById('sumStaff').innerText = [...new Set(dailyData.map(d => d.visitorName))].length;

            const container = document.getElementById('activityAccordion');
            container.innerHTML = dailyData.length ? dailyData.map((r, i) => `
                <div class="accordion-item" id="acc-${i}">
                    <div class="accordion-header" onclick="window.toggleAcc('acc-${i}')">
                        <div class="flex items-center gap-4">
                            <span class="bg-white/20 px-3 py-1 rounded text-[10px] font-black">${r.startTime || '--:--'}</span>
                            <span class="text-base font-black tracking-tight">${r.visitorName} <i class="fa-solid fa-caret-right mx-2 opacity-50"></i> ${r.customerName}</span>
                        </div>
                        <i class="fa-solid fa-chevron-down opacity-30 text-xs transition-transform"></i>
                    </div>
                    <div class="accordion-content">
                        <div class="info-grid">
                            <div><p class="info-label">お客様担当者</p><p class="info-value">${r.customerStaff || '-'}</p></div>
                            <div><p class="info-label">訪問時間</p><p class="info-value"><i class="fa-regular fa-clock mr-1"></i> ${r.startTime} 〜 ${r.endTime}</p></div>
                            <div><p class="info-label">所属部署</p><p class="info-value text-blue-600">${r.visitorDept || '-'}</p></div>
                            <div><p class="info-label">定性データ</p><p class="info-value text-[10px] opacity-60">${r.qualData1||'-'} / ${r.qualData2||'-'} / ${r.qualData3||'-'}</p></div>
                        </div>
                        <p class="info-label mb-2 uppercase">■ 報告内容</p>
                        <div class="report-box">${r.content || r.customerReport || '報告なし'}</div>
                        <p class="info-label mb-2 uppercase">■ スタッフの考え</p>
                        <div class="report-box border-l-4 border-orange-200 bg-orange-50/30">${r.staffThoughts || '未入力'}</div>
                    </div>
                </div>`).join('') : '<div class="py-20 text-center border-2 border-dashed border-slate-200 rounded-2xl"><p class="text-slate-300 font-black italic tracking-widest uppercase">No Records on this day</p></div>';
        }

        window.toggleAcc = (id) => {
            const item = document.getElementById(id);
            const content = item.querySelector('.accordion-content');
            const open = content.style.display === 'block';
            content.style.display = open ? 'none' : 'block';
            item.querySelector('i').style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
        };

        init();
    </script>
</body>
</html>
