
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CP My Page - 新規登録</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
    <header class="bg-[#2c5282] h-14 flex items-center justify-between px-6 text-white shadow-md">
        <div class="text-2xl font-bold tracking-tighter">株式会社コプロス</div>
    </header>
    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-2xl font-bold mb-6">お客様情報登録</h1>
        <div class="flex space-x-4 mb-8">
            <a href="list.html" class="bg-[#554a44] text-white px-12 py-2 rounded-sm font-bold shadow text-center">戻 る</a>
            <button id="saveBtn" class="bg-[#ff7211] text-white px-12 py-2 rounded-sm font-bold shadow tracking-widest hover:bg-orange-600">登 録</button>
        </div>
        <div class="border-t pt-6 space-y-6">
            <div><label class="block font-bold">お客様名</label><input type="text" id="name" class="w-full border p-2"></div>
            <div><label class="block font-bold">住所</label><input type="text" id="address" class="w-full border p-2"></div>
            <div><label class="block font-bold">電話番号</label><input type="text" id="tel" class="w-full border p-2"></div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyDhOEZ7Jb1K2rTXlyTH6d8ob4Qzcrwf_XI", authDomain: "copros-my-page.firebaseapp.com", projectId: "copros-my-page", storageBucket: "copros-my-page.firebasestorage.app", messagingSenderId: "54419849010", appId: "1:54419849010:web:a60015b9c6fcf60cd3e12b" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        document.getElementById('saveBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const address = document.getElementById('address').value;
            const tel = document.getElementById('tel').value;
            if(!name) return alert('氏名は必須です');
            try {
                await addDoc(collection(db, "customers"), { name, address, tel, createdAt: serverTimestamp() });
                alert("登録しました！"); window.location.href = "list.html";
            } catch (e) { alert("エラー"); }
        };
    </script>
</body>
</html>
