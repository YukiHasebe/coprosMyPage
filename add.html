<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お客様情報登録 | CP My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --copros-blue: #87ceeb; --sidebar-bg: #1a1a1a; --copros-orange: #ff7e11; }
        body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background-color: #f1f5f9; }
        .form-input {
            width: 100%; padding: 0.8rem 1rem; background-color: #f8fafc;
            border: 1px solid #e2e8f0; border-radius: 0.75rem; font-weight: 600;
            transition: all 0.2s; font-size: 0.95rem;
        }
        .form-input:focus {
            outline: none; border-color: var(--copros-orange);
            background-color: white; box-shadow: 0 0 0 4px rgba(255, 126, 17, 0.1);
        }
        .label-text { font-size: 0.85rem; font-weight: 800; color: #334155; margin-bottom: 0.5rem; display: block; }
        .section-title {
            font-size: 0.75rem; font-weight: 900; color: #94a3b8; letter-spacing: 0.1em;
            border-bottom: 2px solid #f1f5f9; padding-bottom: 0.5rem; margin-bottom: 1.5rem; text-transform: uppercase;
        }
        .form-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="header-placeholder"></div>

        <div class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
            <div class="max-w-4xl mx-auto">
                
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 gap-4">
                    <div>
                        <h1 class="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter mb-2">お客様情報登録</h1>
                        <nav class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Create New Customer Identity</nav>
                    </div>
                    <div class="flex gap-2 w-full lg:w-auto">
                        <button onclick="location.href='list.html'" class="flex-1 lg:flex-none px-6 py-2.5 bg-white border border-slate-200 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-50 transition-all">
                            <i class="fa-solid fa-arrow-left mr-2"></i>戻る
                        </button>
                        <button id="saveBtn" class="flex-1 lg:flex-none px-10 py-2.5 bg-[#004098] text-white rounded-xl font-bold text-xs hover:scale-105 transition-all shadow-lg active:scale-95">
                            <i class="fa-solid fa-cloud-arrow-up mr-2"></i>登録を実行
                        </button>
                    </div>
                </div>

                <div class="form-card p-6 lg:p-10 mb-20">
                    <form id="customerForm" class="space-y-10">
                        
                        <!-- 区分設定 -->
                        <div>
                            <p class="section-title">区分設定</p>
                            <div class="flex flex-wrap gap-6 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                <label class="flex items-center gap-3 cursor-pointer"><input type="radio" name="category" value="法人" checked class="w-5 h-5 accent-[#ff7e11]"><span class="font-bold">法人</span></label>
                                <label class="flex items-center gap-3 cursor-pointer"><input type="radio" name="category" value="個人" class="w-5 h-5 accent-[#ff7e11]"><span class="font-bold">個人</span></label>
                                <label class="flex items-center gap-3 cursor-pointer"><input type="radio" name="category" value="日報" class="w-5 h-5 accent-[#ff7e11]"><span class="font-bold">日報</span></label>
                            </div>
                        </div>

                        <!-- 基本情報 -->
                        <div>
                            <p class="section-title">基本情報</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <label class="label-text">お客様名 <span class="text-rose-500">*</span></label>
                                    <input type="text" id="name" placeholder="株式会社コプロス" class="form-input" required>
                                </div>
                                <div>
                                    <label class="label-text">お客様名カナ <span class="text-rose-500">*</span></label>
                                    <input type="text" id="kana" placeholder="コプロス" class="form-input" required>
                                    <p class="text-[10px] text-slate-400 mt-2 font-bold leading-relaxed">※50音検索用。株式会社等は除いて入力してください。</p>
                                </div>
                                <div>
                                    <label class="label-text">顧客ランク</label>
                                    <select id="rank" class="form-input">
                                        <option value="">選択無し</option>
                                        <option>Aa</option><option>Ab</option><option>Ac</option><option>Ad</option>
                                        <option>Ba</option><option>Bb</option><option>Bc</option><option>Bd</option>
                                        <option>Ca</option><option>Cb</option><option>Cc</option><option>Cd</option>
                                        <option>取引先</option><option>合併</option><option>廃業</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="label-text">属性・区分</label>
                                    <select id="type" class="form-input">
                                        <option value="">カテゴリ未設定</option>
                                        <option>宮崎産商</option><option>ケコム</option><option>技術開発部</option>
                                        <option>建築部</option><option>コンサル</option><option>官庁</option><option>取引先</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- 所在地情報 -->
                        <div>
                            <p class="section-title">所在地情報</p>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-8">
                                <div class="md:col-span-1">
                                    <label class="label-text">郵便番号</label>
                                    <input type="text" id="zip" placeholder="000-0000" class="form-input">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="label-text">住所 <span class="text-rose-500">*</span></label>
                                    <input type="text" id="address" placeholder="山口県下関市..." class="form-input" required>
                                </div>
                                <div class="md:col-span-3">
                                    <label class="label-text">ビル・建物名</label>
                                    <input type="text" id="building" placeholder="コプロスビル 3F" class="form-input">
                                </div>
                            </div>
                        </div>

                        <!-- 連絡先 -->
                        <div>
                            <p class="section-title">連絡先</p>
                            <div class="w-full md:w-1/2">
                                <label class="label-text">電話番号 <span class="text-rose-500">*</span></label>
                                <input type="tel" id="tel" placeholder="0832331632" class="form-input" required>
                            </div>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="common.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./common.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('saveBtn').onclick = async () => {
            const form = document.getElementById('customerForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>登録中...';

            const data = {
                category: document.querySelector('input[name="category"]:checked').value,
                name: document.getElementById('name').value,
                kana: document.getElementById('kana').value,
                rank: document.getElementById('rank').value,
                type: document.getElementById('type').value,
                zip: document.getElementById('zip').value,
                address: document.getElementById('address').value,
                building: document.getElementById('building').value,
                tel: document.getElementById('tel').value,
                visitCount: 0,
                lastVisit: "未訪問",
                createdAt: serverTimestamp()
            };

            try {
                await addDoc(collection(db, "customers"), data);
                alert("新しいお客様を登録しました！");
                location.href = 'list.html';
            } catch (e) {
                console.error(e);
                alert("保存に失敗しました。");
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2"></i>登録を実行';
            }
        };
    </script>
</body>
</html>
